// ⚡ FIX v2: Load tồn kho từ vc_inventory cho CN hiện tại
// Schema: vc_inventory(sku, branch_id BIGINT, qty)
// vc_branches: id BIGINT, code TEXT (PB/VT/TA), active BOOLEAN
async function loadInventoryForBranch(nccSupa, branchCode) {
  if (!nccSupa || !branchCode) return {};
  try {
    // Map branch code → branch_id
    const { data: branches, error: brErr } = await nccSupa
      .from('vc_branches')
      .select('id, code, active');
    if (brErr) {
      console.warn('[POS-HUB v2] vc_branches query fail:', brErr.message);
      return {};
    }
    const targetBranch = (branches || []).find(b => b.code === branchCode);
    if (!targetBranch) {
      console.warn(`[POS-HUB v2] Branch '${branchCode}' không tồn tại trong vc_branches`);
      return {};
    }
    
    // Load tất cả tồn của branch (paginated)
    let allInv = [];
    let page = 0;
    const PAGE = 1000;
    while (true) {
      const { data: batch, error: invErr } = await nccSupa
        .from('vc_inventory')
        .select('sku, qty')
        .eq('branch_id', targetBranch.id)
        .range(page * PAGE, (page + 1) * PAGE - 1);
      if (invErr) {
        console.warn('[POS-HUB v2] vc_inventory query fail:', invErr.message);
        break;
      }
      if (!batch || batch.length === 0) break;
      allInv = allInv.concat(batch);
      if (batch.length < PAGE) break;
      page++;
    }
    
    // Build map: { sku: qty }
    const invMap = {};
    allInv.forEach(r => {
      if (r.sku) invMap[r.sku] = r.qty || 0;
    });
    return invMap;
  } catch(e) {
    console.error('[POS-HUB v2] loadInventoryForBranch exception:', e);
    return {};
  }
}

async function syncProductsFromNcc() {
  if (!state.nccConfig?.enabled) return { success: false, error: 'NCC chưa bật' };
  if (!state.bctcSupabase) {
    if (!initSupabaseClient()) return { success: false, error: state.nccLastError };
  }
  const cfg = state.nccConfig;
  try {
    // ← HUB: Đọc thẳng từ products table DB NCC (không dùng Pancake cache nữa)
    const nccSupa = state.supabase; // DB AIPOS-PRO
    const branch = state.shift?.branch || 'PB';
    
    // ⚡ FIX v2 STEP 1: Load tồn từ vc_inventory cho CN hiện tại TRƯỚC khi map products
    state.inventoryMap = await loadInventoryForBranch(nccSupa, branch);
    console.log(`[POS-HUB v2] ✅ Inventory loaded: ${Object.keys(state.inventoryMap).length} SKU có tồn ở ${branch}`);
    
    // ← HUB: Phân trang để lấy hết tất cả SP (Supabase max 1000/request)
    let allProducts = [];
    let page = 0;
    const PAGE_SIZE = 1000;
    while (true) {
      const { data: batch, error: bErr } = await nccSupa
        .from('products')
        .select('*')
        .eq('active', true)  // ⚡ FIX v2: chỉ load SP active=true
        .order('id')
        .range(page * PAGE_SIZE, (page + 1) * PAGE_SIZE - 1);
      if (bErr) throw bErr;
      if (!batch || batch.length === 0) break;
      allProducts = allProducts.concat(batch);
      console.log(`[POS-HUB] Loaded page ${page + 1}: ${allProducts.length} SP`);
      if (batch.length < PAGE_SIZE) break; // Trang cuối
      page++;
    }
    const productsData = allProducts;
    if (!productsData || productsData.length === 0) {
      throw new Error('Không có sản phẩm trong DB NCC — kiểm tra bảng products');
    }
    console.log('[POS-HUB] ✅ Tổng SP:', productsData.length);
    const mapped = productsData.map(p => mapNccProductRowHub(p, branch));
    state.products = mapped;
    buildCategoriesFromProducts(mapped); // ← HUB: build categories động
    cfg.lastSyncAt = Date.now();
    cfg.productCount = mapped.length;
    Storage.set(CONFIG.storageKeys.nccConfig, cfg);
    Storage.set(CONFIG.storageKeys.nccProductsCache, {
      ts: cfg.lastSyncAt,
      products: mapped,
    });
    state.nccStatus = 'online';
    state.nccLastError = null;
    updateNccStatusBadge();
    setupNccRealtimeSubscription();
    // ← HUB SYNC v2: thêm 2 listener mới + retry queue
    // Phase 5: setupInventoryRealtimeSubscription là async, dùng .catch() để không break parent
    setupInventoryRealtimeSubscription().catch(e => 
      console.warn('[POS-HUB] inventory realtime setup failed:', e));
    flushPendingTxs(); // Đẩy các tx offline lên Hub (nếu có)
    return { success: true, count: mapped.length };
  } catch (err) {
    state.nccStatus = 'error';
    state.nccLastError = err.message || String(err);
    toast(`✗ Lỗi đồng bộ NCC: ${state.nccLastError}`, 'error', 5000);
    updateNccStatusBadge();
    return { success: false, error: state.nccLastError };
  }
}

// ─── HUB: Map từ products table DB NCC thật ──────────────────────────────────
function mapNccProductRowHub(p, branch) {
  branch = branch || state.shift?.branch || 'PB';

  // Thử nhiều tên cột khác nhau (schema DB NCC thật)
  const price = parseInt(
    p.sell_price || p.priceBan || p.price_ban || p.gia_ban || p.price || 0
  ) || 0;
  const cost = parseInt(
    p.cost_price || p.priceNhap || p.price_nhap || p.gia_nhap || p.cost || 0
  ) || 0;
  
  // ⚡ FIX v2: Tồn THẬT từ vc_inventory (state.inventoryMap), KHÔNG đọc cột không tồn tại
  // Schema thật: products KHÔNG có stock_pb/stock_vt/stock_ta
  // Tồn nằm ở bảng vc_inventory(sku, branch_id, qty) - load riêng
  const stockFromInv = (state.inventoryMap && state.inventoryMap[p.sku] !== undefined) 
    ? parseInt(state.inventoryMap[p.sku]) || 0 
    : 0;
  
  // Fallback (nếu schema cũ vẫn còn cột stock_*)
  const stockPB = stockFromInv || parseInt(p.stock_pb || p.stockPB || p.ton_pb || 0) || 0;
  const stockVT = stockFromInv || parseInt(p.stock_vt || p.stockVT || p.ton_vt || 0) || 0;
  const stockTA = stockFromInv || parseInt(p.stock_ta || p.stockTA || p.ton_ta || 0) || 0;
  
  const nccId   = p.ncc_id || p.supplier || p.ncc || p.supplier_id || '';
  const cat     = p.category || p.danh_muc || p.nhom || 'Khác';
  const unit    = p.unit || p.dvt || p.don_vi || 'cái';
  const barcode = p.barcode || p._barcode || p.ma_vach || p.sku || '';

  // ⚡ FIX v2: Stock = tồn từ inventoryMap (đúng cho branch hiện tại)
  const stock = stockFromInv;

  // ⚡ FIX v2: alt_units (Lốc/Thùng variants) — pass through cho POS scan
  const altUnits = Array.isArray(p.alt_units) ? p.alt_units : [];

  // Log schema lần đầu để debug
  if (!window._posSchemaLogged) {
    window._posSchemaLogged = true;
    console.log('[POS-HUB] products schema:', Object.keys(p));
    console.log('[POS-HUB] inventoryMap size:', Object.keys(state.inventoryMap || {}).length);
  }

  return {
    sku:      String(p.sku || p.id || ''),
    barcode:  String(barcode),
    name:     String(p.name || p.ten || p.product_name || '(Không tên)'),
    unit:     unit,
    price:    price,
    cost:     cost,
    category: String(cat),
    supplier: String(nccId),
    stock:    stock,
    stockPB:  stockPB,
    stockVT:  stockVT,
    stockTA:  stockTA,
    nccId:    nccId,
    altUnits: altUnits,    // ⚡ FIX v2: variants cho POS scan đa cấp
    brand:    p.brand || '',  // ⚡ FIX v2: brand
    pack:     parseInt(p.pack) || 1,
    vat:      parseFloat(p.vat) || 0.10,
    active:   p.active !== false,  // ⚡ FIX v2: default true
    _raw:     p,
  };
}

let _nccRealtimeChannel = null;
let _nccPollTimer = null;

function setupNccRealtimeSubscription() {
  // ← HUB: Watch products table DB NCC realtime — không poll Pancake cache nữa
  if (_nccPollTimer) clearInterval(_nccPollTimer); // Hủy polling cũ

  if (state.supabase && !_nccRealtimeChannel) {
    try {
      _nccRealtimeChannel = state.supabase
        .channel('pos-hub-products-watcher')
        .on('postgres_changes', {
          event: '*', // INSERT, UPDATE, DELETE
          schema: 'public',
          table: 'products',
        }, (payload) => {
          console.log('[POS-HUB] products changed — re-syncing', payload.eventType, payload.new?.sku);
          // Debounce: chờ 1s tránh re-sync liên tục khi bulk update
          if (_nccRealtimeChannel._debounce) clearTimeout(_nccRealtimeChannel._debounce);
          _nccRealtimeChannel._debounce = setTimeout(() => {
            syncProductsFromNcc().then(r => {
              if (r.success) {
                console.log('[POS-HUB] Products re-synced:', r.count, 'SKUs');
                renderCart();
              }
            });
          }, 1000);
        })
        .subscribe((status) => {
          if (status === 'SUBSCRIBED') {
            console.log('[POS-HUB] ✅ Realtime: products table active — auto-update khi KHO duyệt giá');
          }
        });
    } catch (err) {
      console.warn('[POS-HUB] Realtime subscribe failed:', err);
    }
  }
  
  // ⚡ FIX v2: Watch vc_inventory cho CN hiện tại — update tồn realtime
  if (state.supabase && !_inventoryRealtimeChannel) {
    try {
      _inventoryRealtimeChannel = state.supabase
        .channel('pos-hub-inventory-watcher')
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'vc_inventory',
        }, (payload) => {
          const row = payload.new || payload.old;
          if (!row || !row.sku) return;
          // Debounce: ngại bulk update
          if (_inventoryRealtimeChannel._debounce) clearTimeout(_inventoryRealtimeChannel._debounce);
          _inventoryRealtimeChannel._debounce = setTimeout(async () => {
            try {
              const branch = state.shift?.branch || 'PB';
              state.inventoryMap = await loadInventoryForBranch(state.supabase, branch);
              // Refresh stock từng SP từ map
              if (Array.isArray(state.products)) {
                state.products.forEach(p => {
                  p.stock = state.inventoryMap[p.sku] || 0;
                });
              }
              console.log('[POS-HUB v2] ✅ Inventory refreshed via realtime');
              if (typeof renderCart === 'function') renderCart();
              if (typeof renderSearchDropdown === 'function') renderSearchDropdown();
            } catch(e) {
              console.warn('[POS-HUB v2] Refresh inv fail:', e);
            }
          }, 800);
        })
        .subscribe((status) => {
          if (status === 'SUBSCRIBED') {
            console.log('[POS-HUB v2] ✅ Realtime: vc_inventory active — tồn cập nhật tự động');
          }
        });
    } catch(err) {
      console.warn('[POS-HUB v2] vc_inventory realtime subscribe fail:', err);
    }
  }
}

function teardownNccRealtimeSubscription() {
  if (_nccRealtimeChannel && state.bctcSupabase) {
    state.bctcSupabase.removeChannel(_nccRealtimeChannel);
    _nccRealtimeChannel = null;
  }
  if (_inventoryRealtimeChannel && state.supabase) {
    state.supabase.removeChannel(_inventoryRealtimeChannel);
    _inventoryRealtimeChannel = null;
  }
  if (_nccPollTimer) {
    clearInterval(_nccPollTimer);
    _nccPollTimer = null;
  }
}

/* ============================================================
   HUB SYNC: POS → Supabase (pos_transactions table)
   [Phase 2 — wired 02/05/2026]
   Khi POS bán/trả hàng → INSERT vào pos_transactions
   → KHO listener auto trừ tồn kho realtime
   → NCC SIS auto cộng dồn doanh thu realtime
   Lỗi mạng → enqueue local retry (vcm_pos_tx_pending)
   ============================================================ */
const POS_TX_QUEUE_KEY = 'vcm_pos_tx_pending';

// Convert tx (camelCase JS) → row (snake_case for Supabase pos_transactions table)
function txToSupabaseRow(tx) {
  return {
    id: tx.id,
    code: tx.code,
    kind: tx.kind || 'sale',
    branch: tx.branch || 'PB',
    user_code: tx.user || '',
    user_name: tx.userName || '',
    shift_id: tx.shiftId || null,
    items: tx.items || [],
    subtotal: tx.subtotal || 0,
    discount_amount: tx.discountAmount || 0,
    promo_discount: tx.promoDiscount || 0,
    loyalty_discount: tx.loyaltyDiscount || 0,
    points_earned: tx.pointsEarned || 0,
    total: tx.total || 0,
    payment_method: tx.paymentMethod || 'cash',
    cash_received: tx.cashReceived || 0,
    transfer_amount: tx.transferAmount || 0,
    card_amount: tx.cardAmount || 0,
    change_amount: tx.change || 0,
    customer: tx.customer || null,
    customer_phone: (tx.customer?.phone || '').trim() || null,
    customer_name:  (tx.customer?.name  || '').trim() || null,
    einvoice_requested: !!tx.einvoiceRequested,
    einvoice_mst: tx.einvoiceMst || null,
    einvoice_email: tx.einvoiceEmail || null,
    refund_of: tx.refundOf || null,
    reason: tx.reason || null,
    applied_promos: tx.appliedPromos || null,
    applied_coupon: tx.appliedCoupon || null,
    gifts: tx.gifts || null,
    discount: tx.discount || null,
    loyalty_tier: tx.loyaltyTier || null,
    created_at: new Date(tx.createdAt || Date.now()).toISOString(),
  };
}

// Push 1 tx lên Supabase (non-blocking). Lỗi → enqueue retry sau.
function syncTxToSupabase(tx) {
  if (!tx || !tx.id) return;
  if (!state.supabase) {
    enqueuePendingTx(tx);
    console.log('[POS-HUB] tx queued (Supabase chưa init):', tx.code);
    return;
  }
  const row = txToSupabaseRow(tx);
  state.supabase
    .from('pos_transactions')
    .upsert(row, { onConflict: 'id' })
    .then(({ error }) => {
      if (error) {
        console.warn('[POS-HUB] sync tx failed:', error.message, '— queued for retry');
        enqueuePendingTx(tx);
      } else {
        console.log('[POS-HUB] ✅ tx synced:', tx.code, tx.kind, fmt.money(tx.total));
        // AIPOS-PRO: bán xong → tự hạch toán kế toán + trừ tồn (chỉ đơn bán, không hạch toán đơn trả ở đây)
        if (tx.kind === 'sale') aiposAutoPost(tx.id);
      }
    })
    .catch(err => {
      console.warn('[POS-HUB] sync tx threw:', err?.message || err);
      enqueuePendingTx(tx);
    });
}

function enqueuePendingTx(tx) {
  try {
    const queue = Storage.get(POS_TX_QUEUE_KEY) || [];
    if (!queue.find(q => q.id === tx.id)) {
      queue.push(tx);
      Storage.set(POS_TX_QUEUE_KEY, queue);
    }
  } catch(e) { console.warn('[POS-HUB] enqueue failed:', e); }
}

// AIPOS-PRO: gọi Edge Function tự hạch toán kế toán + trừ tồn sau khi bán.
// Non-blocking — không chặn UI bán hàng. Lỗi chỉ log, không cản thu ngân.
async function aiposAutoPost(transactionId) {
  if (!transactionId) return;
  try {
    const url = SUPABASE_URL.replace(/\/$/, '') + '/functions/v1/pos-autopost';
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_KEY },
      body: JSON.stringify({ transaction_id: transactionId }),
    });
    const j = await r.json().catch(() => ({}));
    if (j && j.ok) {
      console.log('[POS-AUTOPOST] ✅ đã hạch toán:', j.voucher_no, '· DT', j.revenue, '· VAT', j.vat, '· giá vốn', j.cogs);
    } else if (j && j.skip) {
      console.log('[POS-AUTOPOST] bỏ qua:', j.skip);
    } else {
      console.warn('[POS-AUTOPOST] không hạch toán được:', j && j.error);
    }
  } catch (e) {
    console.warn('[POS-AUTOPOST] lỗi gọi hạch toán (sẽ cần hạch toán thủ công):', e?.message || e);
  }
}

// Retry các tx pending khi reconnect — gọi sau initSupabaseClient OK
async function flushPendingTxs() {
  if (!state.supabase) return { flushed: 0, remaining: 0 };
  const queue = Storage.get(POS_TX_QUEUE_KEY) || [];
  if (!queue.length) return { flushed: 0, remaining: 0 };
  console.log('[POS-HUB] flushing', queue.length, 'pending tx...');
  const remaining = [];
  let flushed = 0;
  for (const tx of queue) {
    try {
      const { error } = await state.supabase
        .from('pos_transactions')
        .upsert(txToSupabaseRow(tx), { onConflict: 'id' });
      if (error) {
        console.warn('[POS-HUB] retry tx failed:', tx.code, error.message);
        remaining.push(tx);
      } else {
        flushed++;
        console.log('[POS-HUB] ✅ retried tx synced:', tx.code);
      }
    } catch(e) {
      remaining.push(tx);
    }
  }
  if (remaining.length) {
    Storage.set(POS_TX_QUEUE_KEY, remaining);
  } else {
    Storage.remove(POS_TX_QUEUE_KEY);
  }
  if (flushed > 0) toast(`✓ Đồng bộ ${flushed} giao dịch chờ lên Hub`, 'success', 2500);
  return { flushed, remaining: remaining.length };
}

/* ============================================================
   HUB SYNC: KHO → POS (vc_inventory table)
   [Phase 5 — refactored 06/05/2026: kho_inventory → vc_inventory]
   Khi KHO update tồn (nhập hàng, điều chuyển, kiểm kê, hủy hàng)
   → POS auto cập nhật stock SP đang hiển thị (theo branch hiện tại)
   ============================================================ */
let _inventoryRealtimeChannel = null;
let _vcBranchesCache = null;  // Cache map: branch_id → code

async function _loadVcBranchesMap() {
  if (_vcBranchesCache) return _vcBranchesCache;
  if (!state.supabase) return null;
  try {
    const { data } = await state.supabase
      .from('vc_branches')
      .select('id, code, active');
    if (data) {
      _vcBranchesCache = {};
      data.forEach(b => { _vcBranchesCache[b.id] = b.code; });
    }
    return _vcBranchesCache;
  } catch(e) {
    console.warn('[POS-HUB] Load vc_branches failed:', e);
    return null;
  }
}

async function setupInventoryRealtimeSubscription() {
  if (!state.supabase || _inventoryRealtimeChannel) return;
  
  try {
    // Load branch map trước (để map branch_id → code)
    await _loadVcBranchesMap();
  } catch(e) {
    console.warn('[POS-HUB] Load branches map failed, continue anyway:', e);
    // Tiếp tục — subscription vẫn có thể hoạt động với cache rỗng
  }
  
  try {
    _inventoryRealtimeChannel = state.supabase
      .channel('pos-hub-inventory-watcher')
      .on('postgres_changes', {
        event: '*', // INSERT, UPDATE
        schema: 'public',
        table: 'vc_inventory',
      }, (payload) => {
        const r = payload.new || payload.old;
        if (!r?.sku || !r?.branch_id) return;
        
        // Convert branch_id → code (PB/VT/TA)
        const branchCode = _vcBranchesCache?.[r.branch_id];
        if (!branchCode) return;
        
        const myBranch = state.shift?.branch || 'PB';
        // Chỉ quan tâm tồn kho của branch hiện tại
        if (branchCode !== myBranch) return;
        
        const p = state.products.find(x => x.sku === r.sku);
        if (p) {
          const oldStock = p.stock;
          p.stock = parseInt(r.qty) || 0;
          // Cập nhật cả stockPB/VT/TA
          if (myBranch === 'PB') p.stockPB = p.stock;
          else if (myBranch === 'VT') p.stockVT = p.stock;
          else if (myBranch === 'TA') p.stockTA = p.stock;
          console.log('[POS-HUB] vc_inventory:', r.sku, '@CN', branchCode, oldStock, '→', p.stock);
          // Debounce render
          if (_inventoryRealtimeChannel._debounce) clearTimeout(_inventoryRealtimeChannel._debounce);
          _inventoryRealtimeChannel._debounce = setTimeout(() => {
            try { renderCart(); } catch(e) {}
            try { if (typeof renderProductGrid === 'function') renderProductGrid(); } catch(e) {}
          }, 400);
        }
      })
      .subscribe((status) => {
        if (status === 'SUBSCRIBED') {
          console.log('[POS-HUB] ✅ Realtime: vc_inventory active — auto-update tồn khi KHO nhập/điều chuyển/kiểm kê');
        }
      });
  } catch (err) {
    console.warn('[POS-HUB] vc_inventory subscribe failed:', err);
  }
}

   AUTH MODULE
   ============================================================ */
async function login(code, password) {
  // CÁCH A (bản thương mại AIPOS-PRO): đăng nhập Supabase Auth bằng email.
  // current_tenant_id() resolve qua auth.uid() → RLS lọc đúng dữ liệu công ty.
  const sb = state.supabase;
  if (!sb) throw new Error('Chưa kết nối AIPOS-PRO');
  const { data, error } = await sb.auth.signInWithPassword({ email: (code || '').trim(), password });
  if (error) throw new Error('Sai email hoặc mật khẩu');
  // lấy thông tin nhân viên + tenant qua RLS (app_users: chỉ ra dòng của chính user)
  let role = 'cashier', name = data.user.email, branches = [];
  try {
    const { data: au } = await sb.from('app_users')
      .select('full_name, role').eq('auth_uid', data.user.id).maybeSingle();
    if (au) { role = au.role || role; name = au.full_name || name; }
  } catch (e) {}
  return { code: data.user.email, name, role, branches, authUid: data.user.id };
}

  state.user = null;

      </div>
      <div class="form-group">
        <label>Tiền mặt thực tế trong két</label>
        <input type="text" id="closingCash" class="input-num" inputmode="numeric" placeholder="0" value="${expectedCash.toLocaleString('vi-VN')}" autofocus>
      </div>
      <div id="cashDiff"></div>
      <div class="form-group">
        <label>Ghi chú đóng ca</label>
        <textarea id="closeNote" rows="2" placeholder="VD: Két thiếu 5,000đ — đã đối soát"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-danger" onclick="closeShift()">Xác nhận đóng ca & in báo cáo Z</button>
    </div>
  `);

  $('#closingCash').addEventListener('input', e => {
    const v = parseMoney(e.target.value);
    e.target.value = v.toLocaleString('vi-VN');
    const diff = v - expectedCash;
    const diffEl = $('#cashDiff');
    if (diff === 0) {
      diffEl.innerHTML = `<div class="change-display positive"><span>Khớp két</span><span class="change-value">✓</span></div>`;
    } else if (diff > 0) {
      diffEl.innerHTML = `<div class="change-display positive"><span>Két dư</span><span class="change-value">+${fmt.money(diff)}</span></div>`;
    } else {
      diffEl.innerHTML = `<div class="change-display negative"><span>Két thiếu</span><span class="change-value">${fmt.money(diff)}</span></div>`;
    }
  });
  $('#closingCash').dispatchEvent(new Event('input'));
}

function closeShift() {
  const closingCash = parseMoney($('#closingCash').value);
  const note = $('#closeNote').value.trim();
  state.shift.closedAt = Date.now();
  state.shift.closingCash = closingCash;
  state.shift.cashDiff = closingCash - (state.shift.openingCash + state.shift.totalCash);
  state.shift.closeNote = note;

  // Print Z report
  printZReport(state.shift);

  // Archive
  const archived = Storage.get('vcm_pos_shift_archive') || [];
  archived.push(state.shift);
  Storage.set('vcm_pos_shift_archive', archived);

  // Clear current shift
  state.shift = null;
  state.cart = [];
  state.customer = null;
  Storage.remove(CONFIG.storageKeys.shift);
  Storage.remove(CONFIG.storageKeys.cart);

  closeModal();
  toast('Đã đóng ca thành công', 'success');
  $('#screen-pos').style.display = 'none';
  $('#screen-shift').style.display = 'flex';
}

function getSearchResults() {
  const q = (state.searchQuery || '').trim().toLowerCase();
  if (!q) return [];
  return state.products.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.sku.toLowerCase().includes(q) ||
    p.barcode.includes(q)
  ).slice(0, 8);
}

function renderSearchDropdown() {
  const dd = $('#searchDropdown');
  if (!state.searchQuery || !state.searchQuery.trim()) {
    dd.style.display = 'none';
    return;
  }
  const results = getSearchResults();
  if (results.length === 0) {
    dd.innerHTML = `<div class="search-empty">Không tìm thấy "${escapeHtml(state.searchQuery)}"</div>`;
    dd.style.display = 'block';
    return;
  }
  const idx = Math.min(state.searchActiveIdx || 0, results.length - 1);
  const html = `
    <div class="search-dropdown-header">
      <span>${results.length} kết quả · ↑↓ chọn · Enter thêm</span>
      <span>Esc đóng</span>
    </div>
    ${results.map((p,i) => {
      const stockTag = p.stock <= 0 ? '<span style="color:var(--red);font-weight:500">Hết hàng</span>' : `Còn ${p.stock} ${p.unit}`;
      return `
        <div class="search-result ${i===idx?'active':''} ${p.stock<=0?'out-of-stock':''}" onmousedown="addToCart('${p.sku}'); $('#searchInput').value=''; state.searchQuery=''; renderSearchDropdown(); $('#searchInput').focus()">
          <div class="info">
            <div class="name">${escapeHtml(p.name)}</div>
            <div class="meta">${escapeHtml(p.sku)} · ${escapeHtml(p.barcode)} · ${stockTag}</div>
          </div>
          <div class="price">${fmt.money(p.price)}<div class="price-unit">/ ${p.unit}</div></div>
        </div>
      `;
    }).join('')}
  `;
  dd.innerHTML = html;
  dd.style.display = 'block';
}

function findProduct(query) {
  const q = String(query).trim().toLowerCase();
  const queryRaw = String(query).trim();
  // Try exact barcode first (base unit)
  let p = state.products.find(p => p.barcode === queryRaw);
  if (p) return p;
  // ⚡ FIX v2: Check alt_units barcodes (Lốc/Thùng variants)
  // Trả về product với marker _matchedVariant để code khác biết áp giá variant
  for (const prod of state.products) {
    if (Array.isArray(prod.altUnits) && prod.altUnits.length > 0) {
      const variant = prod.altUnits.find(v => v.barcode === queryRaw);
      if (variant) {
        // Clone product với giá/cost của variant
        return Object.assign({}, prod, {
          _matchedVariant: variant,
          // Giá tạm theo variant (không ghi đè permanent)
          variantLabel: variant.label,
          variantQty: variant.qty,
          variantPrice: variant.price,
          variantCost: variant.cost,
        });
      }
    }
  }
  // Then SKU
  p = state.products.find(p => p.sku.toLowerCase() === q);
  if (p) return p;
  // Then partial match
  return state.products.find(p =>
    p.name.toLowerCase().includes(q) ||
    p.sku.toLowerCase().includes(q) ||
    p.barcode.includes(queryRaw)
  );
}

/* ============================================================
   CART MODULE
   ============================================================ */
function addToCart(sku, qty=1, variantInfo=null) {
  const p = state.products.find(x => x.sku === sku);
  if (!p) { toast('Không tìm thấy sản phẩm', 'error'); return; }
  
  // ⚡ FIX v3: Support variant (Lốc/Thùng) — trừ tồn theo variant.qty (đv lẻ)
  const variantQty = variantInfo?.qty || 1;
  const variantLabel = variantInfo?.label || null;
  const itemPrice = variantInfo?.price || p.price;
  const itemCost = variantInfo?.cost || p.cost;
  const itemBarcode = variantInfo?.barcode || p.barcode;
  
  // Check tồn (theo đv lẻ): qty bán × variantQty
  const stockNeeded = qty * variantQty;
  if (p.stock < stockNeeded) {
    const unitLabel = variantQty > 1 ? `${variantLabel} (${variantQty} ${p.unit})` : p.unit;
    toast(`Tồn không đủ — cần ${stockNeeded} ${p.unit}, còn ${p.stock}`, 'warning');
    return;
  }

  // Cart item key: sku + variantLabel (variant khác → cart item khác)
  const cartKey = variantLabel ? `${sku}__${variantLabel}` : sku;
  const existing = state.cart.find(i => (i.cartKey || i.sku) === cartKey);
  let isMerge = false;
  let newQty = qty;
  if (existing) {
    const totalNeeded = (existing.qty + qty) * variantQty;
    if (totalNeeded > p.stock) {
      toast(`Tồn không đủ — cần ${totalNeeded} ${p.unit}, còn ${p.stock}`, 'warning');
      return;
    }
    existing.qty += qty;
    isMerge = true;
    newQty = existing.qty;
  } else {
    state.cart.push({
      sku: p.sku,
      cartKey: cartKey,
      barcode: itemBarcode,
      name: variantLabel ? `${p.name} (${variantLabel})` : p.name,
      unit: variantLabel ? variantLabel : p.unit,
      price: itemPrice,
      cost: itemCost,
      qty: qty,
      variantQty: variantQty,         // ⚡ Để trigger biết nhân SL khi trừ tồn
      variantLabel: variantLabel,
      lineDiscount: 0,
      lineDiscountType: 'amount',
    });
  }
  state.lastAddedSku = sku;
  state.lastAddedAt = Date.now();
  saveCart();
  renderCart();
  
  const displayName = variantLabel ? `${p.name} (${variantLabel})` : p.name;
  if (isMerge) {
    toast(`✓ ${displayName} — cộng dồn (×${newQty})`, 'success', 1800);
  } else {
    toast(`+ ${displayName}`, 'success', 1500);
  }
}

function updateCartItemQty(sku, qty) {
  const item = state.cart.find(i => i.sku === sku);
  if (!item) return;
  const product = state.products.find(p => p.sku === sku);
  qty = Math.max(0, parseInt(qty) || 0);
  if (qty === 0) { removeFromCart(sku); return; }
  if (product && qty > product.stock) {
    toast(`Chỉ còn ${product.stock} ${product.unit}`, 'warning');
    qty = product.stock;
  }
  item.qty = qty;
  saveCart();
  renderCart();
}

function removeFromCart(sku) {
  state.cart = state.cart.filter(i => i.sku !== sku);
  saveCart();
  renderCart();
}

function setLineDiscount(sku) {
  const item = state.cart.find(i => i.sku === sku);
  if (!item) return;
  showModal(`
    <div class="modal-header">
      <h2>Giảm giá: ${escapeHtml(item.name)}</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:12px;color:var(--gray-600);font-size:13px">
        Giá gốc: <strong class="num">${fmt.money(item.price)}</strong> × ${item.qty} ${item.unit}
        = <strong class="num">${fmt.money(item.price * item.qty)}</strong>
      </div>
      <div class="form-group">
        <label>Giảm giá</label>
        <div class="discount-input-group">
          <input type="text" id="lineDiscValue" class="input-num" inputmode="numeric" value="${item.lineDiscount||0}" placeholder="0">
          <div class="discount-type-toggle">
            <button type="button" id="ldType-amount" class="${item.lineDiscountType==='amount'?'active':''}" onclick="setLineDiscType('amount')">VND</button>
            <button type="button" id="ldType-percent" class="${item.lineDiscountType==='percent'?'active':''}" onclick="setLineDiscType('percent')">%</button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-primary" onclick="applyLineDiscount('${sku}')">Áp dụng</button>
    </div>
  `, {size:'sm'});
}

let _lineDiscType = 'amount';
function setLineDiscType(t) {
  _lineDiscType = t;
  $('#ldType-amount').classList.toggle('active', t==='amount');
  $('#ldType-percent').classList.toggle('active', t==='percent');
}

function applyLineDiscount(sku) {
  const item = state.cart.find(i => i.sku === sku);
  const v = parseMoney($('#lineDiscValue').value);
  item.lineDiscount = v;
  item.lineDiscountType = _lineDiscType;
  saveCart();
  renderCart();
  closeModal();
}

function calcLineSubtotal(item) {
  return item.price * item.qty;
}

function calcLineDiscountAmount(item) {
  const sub = calcLineSubtotal(item);
  if (!item.lineDiscount) return 0;
  if (item.lineDiscountType === 'percent') return Math.round(sub * item.lineDiscount / 100);
  return Math.min(item.lineDiscount, sub);
}

function calcLineTotal(item) {
  return calcLineSubtotal(item) - calcLineDiscountAmount(item);
}

function calcSubtotal() {
  return state.cart.reduce((s,i) => s + calcLineTotal(i), 0);
}

function calcDiscountAmount() {
  const sub = calcSubtotal();
  if (!state.discount.value) return 0;
  if (state.discount.type === 'percent') return Math.round(sub * state.discount.value / 100);
  return Math.min(state.discount.value, sub);
}

function calcTotal() {
  const sub = calcSubtotal();
  const cartDisc = calcDiscountAmount();
  const afterCart = Math.max(0, sub - cartDisc);
  const promoResult = applyPromos(state.cart, state.customer, state.appliedCoupon);
  state.appliedPromos = promoResult.appliedList;
  state.promoDiscount = promoResult.totalDiscount;
  state.cartLineExtras = promoResult.cartLineExtras || {};
  state.standaloneGifts = promoResult.standaloneGifts || [];
  const afterPromo = Math.max(0, afterCart - promoResult.totalDiscount);
  const loy = calcLoyaltyDiscount(afterPromo, state.customer);
  state.loyaltyDiscount = loy.amount;
  return Math.max(0, afterPromo - loy.amount);
}

function renderCart() {
  const items = state.cart;
  const wrap = $('#cartTableWrap');

  if (items.length === 0) {
    wrap.innerHTML = '<div class="cart-empty-tbl"><div class="icon">🛒</div><div>Giỏ hàng trống</div><div style="font-size:11px;margin-top:4px">Quét barcode hoặc gõ tên sản phẩm để thêm vào giỏ</div></div>';
  } else {
    const totalUnits = items.reduce((s,i)=>s+i.qty,0);
    // Trigger calcTotal once to populate state.cartLineExtras
    calcTotal();
    const lineExtras = state.cartLineExtras || {};
    const standaloneGifts = state.standaloneGifts || [];
    const justMergedSku = (Date.now() - state.lastAddedAt) < 1000 ? state.lastAddedSku : null;

    const rowsHtml = items.map(i => {
      const lineSubtotal = calcLineSubtotal(i);
      const lineDisc = calcLineDiscountAmount(i);
      const lineTotal = calcLineTotal(i);
      const discTag = lineDisc > 0 ? ` · <span class="disc-tag">−${i.lineDiscountType==='percent' ? i.lineDiscount+'%' : fmt.money(lineDisc)}</span>` : '';
      const priceCell = lineDisc > 0
        ? `<span class="strike">${fmt.number(i.price)}</span>${fmt.number(Math.round(lineTotal/i.qty))}`
        : fmt.number(i.price);
      const flashClass = i.sku === justMergedSku ? ' just-merged' : '';
      // Promo sub-rows attached to this SKU
      const extras = lineExtras[i.sku] || [];
      const subRowsHtml = extras.map(ex => `
        <tr class="promo-sub-row">
          <td>
            <span class="promo-icon">🎁</span><span class="promo-label">${escapeHtml(ex.label)}</span>
            <span class="promo-meta">KM: ${escapeHtml(ex.promoName)}</span>
          </td>
          <td class="col-qty">${ex.qty > 0 ? '+' + ex.qty : '—'}</td>
          <td class="col-price">${ex.qty > 0 ? '0' : ''}</td>
          <td class="col-total">−${fmt.number(ex.amount)}</td>
          <td class="col-action"></td>
        </tr>
      `).join('');
      return `
        <tr data-sku="${i.sku}" class="${flashClass}">
          <td class="col-product">
            <div class="name">${escapeHtml(i.name)}</div>
            <div class="meta">${escapeHtml(i.sku)} · ${i.unit}${discTag}
              <button class="line-disc-btn" onclick="setLineDiscount('${i.sku}')">Giảm giá dòng</button>
            </div>
          </td>
          <td class="col-qty">
            <div class="qty-control-tbl">
              <button class="qty-btn-tbl" onclick="updateCartItemQty('${i.sku}', ${i.qty-1})">−</button>
              <input class="qty-input-tbl" type="text" value="${i.qty}" onchange="updateCartItemQty('${i.sku}', this.value)">
              <button class="qty-btn-tbl" onclick="updateCartItemQty('${i.sku}', ${i.qty+1})">+</button>
            </div>
          </td>
          <td class="col-price">${priceCell}</td>
          <td class="col-total">${fmt.number(lineTotal)}</td>
          <td class="col-action"><button class="remove-btn" onclick="removeFromCart('${i.sku}')" title="Xoá">×</button></td>
        </tr>
        ${subRowsHtml}
      `;
    }).join('');

    // Standalone gift rows (gift_threshold) at end of cart
    const giftRowsHtml = standaloneGifts.map(g => `
      <tr class="promo-sub-row standalone-gift">
        <td>
          <span class="promo-icon">🎁</span><span class="promo-label">Tặng kèm: ${escapeHtml(g.name)}</span>
          <span class="promo-meta">KM: ${escapeHtml(g.promoName)} · Trị giá ${fmt.money(g.originalPrice * g.qty)}</span>
        </td>
        <td class="col-qty">+${g.qty}</td>
        <td class="col-price"><span class="strike">${fmt.number(g.originalPrice)}</span>0</td>
        <td class="col-total">Tặng</td>
        <td class="col-action"></td>
      </tr>
    `).join('');
    wrap.innerHTML = `
      <table class="cart-table">
        <thead><tr>
          <th class="col-product">Sản phẩm</th>
          <th class="col-qty text-center">Số lượng</th>
          <th class="col-price text-right">Đơn giá</th>
          <th class="col-total text-right">Thành tiền</th>
          <th class="col-action"></th>
        </tr></thead>
        <tbody>${rowsHtml}${giftRowsHtml}</tbody>
      </table>
    `;
    // Auto-scroll to just-merged row
    if (justMergedSku) {
      setTimeout(() => {
        const row = wrap.querySelector(`tr[data-sku="${justMergedSku}"]`);
        if (row) row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 50);
    }
  }

  // Summary with applied promos + coupon input
  const sub = calcSubtotal();
  const disc = calcDiscountAmount();
  const total = items.length > 0 ? (sub - disc - state.promoDiscount - state.loyaltyDiscount) : 0;
  const totalUnits = items.reduce((s,i) => s+i.qty, 0);
  const promosHtml = (state.appliedPromos || []).map(p => `
    <div class="applied-promo-row">
      <span class="promo-name">${escapeHtml(p.name)}<span style="font-weight:400;font-size:10.5px;opacity:0.85;margin-left:4px">— ${escapeHtml(p.detail)}</span></span>
      <span class="promo-amount">${p.amount > 0 ? '−'+fmt.money(p.amount) : 'Tặng'}</span>
      ${p.type==='coupon' ? `<button class="promo-remove" onclick="clearCoupon()" title="Bỏ mã">×</button>` : ''}
    </div>
  `).join('');
  const couponSection = state.appliedCoupon ? `
    <div class="coupon-applied">
      <span>✓ Mã <strong>${escapeHtml(state.appliedCoupon)}</strong> đang áp dụng</span>
      <button onclick="clearCoupon()" style="background:none;border:none;color:var(--green);cursor:pointer;font-weight:600">Bỏ</button>
    </div>
  ` : items.length > 0 ? `
    <div class="coupon-input-row">
      <input id="couponInput" placeholder="Nhập mã KM..." onkeydown="if(event.key==='Enter')applyCoupon()">
      <button onclick="applyCoupon()">Áp dụng</button>
    </div>
  ` : '';
  // Build stats list (Co.opmart-exact layout)
  const statsList = [];
  statsList.push({ lbl: 'Tạm tính', val: fmt.number(sub), cls: '' });
  if (disc > 0) statsList.push({ lbl: `Giảm giá${state.discount.type==='percent'?' ('+state.discount.value+'%)':''}`, val: fmt.number(disc), cls: 'disc' });
  if (state.promoDiscount > 0) statsList.push({ lbl: `Khuyến mãi (${state.appliedPromos.length} CT)`, val: fmt.number(state.promoDiscount), cls: 'disc' });
  if (state.loyaltyDiscount > 0) statsList.push({ lbl: `Ưu đãi hạng ${state.customer?.tierName||''}`, val: fmt.number(state.loyaltyDiscount), cls: 'disc' });

  // VAT row (info only, doesn't change total — VAT is included in retail prices)
  const taxCfg = state.taxConfig || CONFIG.defaults.tax;
  if (taxCfg.enabled && total > 0) {
    const rate = taxCfg.rate || 10;
    // VAT-inclusive: extract VAT portion from total
    const vatAmount = Math.round(total * rate / (100 + rate));
    statsList.push({ lbl: 'Thuế', val: fmt.number(vatAmount), cls: 'tax' });
  }

  statsList.push({ lbl: 'Tổng số lượng', val: totalUnits.toString(), cls: 'qty' });

  const statsRowsHtml = statsList.map(s => `<div class="stat-row ${s.cls}"><span class="lbl">${escapeHtml(s.lbl)}</span><span class="num">${s.val}</span></div>`).join('');

  const slogan = (state.storeConfig?.slogan) || (CONFIG.defaults.store.slogan) || 'Luôn phục vụ tận tâm';
  const brandName = (state.storeConfig?.name) || 'VICOMART';
  const totalIntegerPart = fmt.number(total);

  const summaryHtml = items.length === 0 ? `
    <div class="summary-empty">Giỏ hàng trống — quét barcode để bắt đầu</div>
  ` : `
    ${promosHtml ? `<div class="summary-promos-row">${promosHtml}</div>` : ''}
    ${couponSection}
    <div class="summary-total-bar">
      <div class="stats-left">${statsRowsHtml}</div>
      <div class="col-divider"></div>
      <div class="total-block">
        <div class="label">Tổng tiền</div>
        <div class="amt">${totalIntegerPart}<span class="currency">₫</span></div>
      </div>
      <div class="slogan-footer"><span class="brand">${escapeHtml(brandName)}</span> — ${escapeHtml(slogan)}</div>
    </div>
  `;
  $('#cartSummary').innerHTML = summaryHtml;

  // Refresh right panels too
  renderCustomerPanel();
  renderPaymentPanel();
}

function confirmClearCart() {
  if (state.cart.length === 0) return;
  if (!confirm('Xoá toàn bộ giỏ hàng?')) return;
  state.cart = [];
  state.discount = { type: 'percent', value: 0 };
  state.customer = null;
  saveCart();
  renderCart();
}

function saveCart() {
  Storage.set(CONFIG.storageKeys.cart, {
    cart: state.cart,
    discount: state.discount,
    customer: state.customer,
    appliedCoupon: state.appliedCoupon,
  });
}

/* ============================================================
   HELD ORDERS
   ============================================================ */
function holdCurrentOrder() {
  if (state.cart.length === 0) { toast('Giỏ hàng trống', 'warning'); return; }
  const note = prompt('Ghi chú đơn treo (tuỳ chọn):', state.customer?.name || '');
  state.heldOrders.push({
    id: uid(),
    note: note || 'Không có ghi chú',
    cart: state.cart,
    discount: state.discount,
    customer: state.customer,
    total: calcTotal(),
    heldAt: Date.now(),
  });
  Storage.set(CONFIG.storageKeys.held, state.heldOrders);
  state.cart = [];
  state.discount = { type:'percent', value:0 };
  state.customer = null;
  saveCart();
  renderCart();
  updateHeldCount();
  toast('Đã treo đơn', 'success');
}

function updateHeldCount() {
  $('#heldCount').textContent = state.heldOrders.length;
}

function openHeldOrders() {
  if (state.heldOrders.length === 0) {
    showModal(`
      <div class="modal-header"><h2>Đơn treo</h2><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body"><div class="empty-state"><div class="icon">📋</div>Chưa có đơn nào được treo</div></div>
    `, {size:'sm'});
    return;
  }
  const html = state.heldOrders.map(h => `
    <div class="held-item">
      <div class="held-info" onclick="resumeHeld('${h.id}')">
        <div class="label">${fmt.time(h.heldAt)} · ${h.cart.length} mặt hàng</div>
        <div class="name">${escapeHtml(h.note)}</div>
        <div class="total">${fmt.money(h.total)}</div>
      </div>
      <div class="held-actions">
        <button class="btn btn-primary btn-sm" onclick="resumeHeld('${h.id}')">Lấy đơn</button>
        <button class="btn btn-ghost btn-sm" onclick="deleteHeld('${h.id}')">Xoá</button>
      </div>
    </div>
  `).join('');
  showModal(`
    <div class="modal-header"><h2>Đơn treo (${state.heldOrders.length})</h2><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body"><div class="held-list">${html}</div></div>
  `);
}

function resumeHeld(id) {
  if (state.cart.length > 0) {
    if (!confirm('Giỏ hàng hiện tại sẽ bị xoá. Tiếp tục?')) return;
  }
  const h = state.heldOrders.find(x => x.id === id);
  if (!h) return;
  state.cart = h.cart;
  state.discount = h.discount;
  state.customer = h.customer;
  state.heldOrders = state.heldOrders.filter(x => x.id !== id);
  Storage.set(CONFIG.storageKeys.held, state.heldOrders);
  saveCart();
  renderCart();
  updateHeldCount();
  closeModal();
  toast('Đã lấy đơn treo', 'success');
}

function deleteHeld(id) {
  if (!confirm('Xoá đơn treo này?')) return;
  state.heldOrders = state.heldOrders.filter(x => x.id !== id);
  Storage.set(CONFIG.storageKeys.held, state.heldOrders);
  updateHeldCount();
  openHeldOrders();
}

/* ============================================================
   PROMOTION ENGINE — schedule check + auto-apply + coupon
   ============================================================ */
const PROMO_TYPES = {
  percent_cart:     { label: 'Giảm % toàn hoá đơn', desc: 'VD: Giảm 10% cho mọi hoá đơn', needs: ['value'] },
  amount_cart:      { label: 'Giảm số tiền cố định', desc: 'VD: -50,000đ cho mọi hoá đơn', needs: ['value'] },
  percent_sku:      { label: 'Giảm % theo SKU', desc: 'VD: Giảm 20% mì Hảo Hảo', needs: ['value','sku'] },
  category_percent: { label: 'Giảm % theo danh mục', desc: 'VD: Giảm 15% tất cả đồ uống', needs: ['value','category'] },
  flat_price:       { label: 'Đồng giá theo SKU', desc: 'VD: Mọi mì Omachi đồng giá 5,000đ', needs: ['value','sku'] },
  bogo:             { label: 'Mua X tặng Y', desc: 'VD: Mua 2 tặng 1 nước Coca', needs: ['sku','buyQty','freeQty'] },
  gift_threshold:   { label: 'Tặng quà khi mua trên N', desc: 'VD: Mua trên 200k tặng 1 nước', needs: ['minTotal','giftSku'] },
  coupon:           { label: 'Mã giảm giá (coupon)', desc: 'Khách nhập mã để giảm giá', needs: ['code','couponType','value'] },
};

function isPromoActive(promo) {
  if (!promo.active) return false;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  if (promo.startDate) {
    const sd = new Date(promo.startDate + 'T00:00:00').getTime();
    if (today < sd) return false;
  }
  if (promo.endDate) {
    const ed = new Date(promo.endDate + 'T23:59:59').getTime();
    if (now.getTime() > ed) return false;
  }
  if (promo.daysOfWeek && promo.daysOfWeek.length > 0 && promo.daysOfWeek.length < 7) {
    const dow = now.getDay() === 0 ? 7 : now.getDay();
    if (!promo.daysOfWeek.includes(dow)) return false;
  }
  if (typeof promo.startHour === 'number' && typeof promo.endHour === 'number'
      && (promo.startHour !== 0 || promo.endHour !== 23)) {
    const h = now.getHours();
    if (h < promo.startHour || h > promo.endHour) return false;
  }
  return true;
}

function getPromoStatusLabel(promo) {
  if (!promo.active) return { text: 'Tắt', cls: 'off' };
  if (!isPromoActive(promo)) {
    const now = new Date();
    if (promo.startDate && new Date(promo.startDate+'T00:00:00') > now) return { text: 'Chưa tới', cls: 'off' };
    if (promo.endDate && new Date(promo.endDate+'T23:59:59') < now) return { text: 'Hết hạn', cls: 'off' };
    return { text: 'Ngoài lịch', cls: 'off' };
  }
  return { text: 'Đang chạy', cls: 'on' };
}

function getApplicablePromos(cart, customer, appliedCoupon) {
  if (!cart || cart.length === 0) return [];
  return (state.promotions || []).filter(p => {
    if (!isPromoActive(p)) return false;
    if (p.type === 'coupon') {
      return p.code && appliedCoupon && p.code.toUpperCase() === appliedCoupon.toUpperCase();
    }
    if (p.autoApply === false) return false;
    const subtotal = cart.reduce((s,i) => s + i.price * i.qty, 0);
    if (p.minTotal && subtotal < p.minTotal) return false;
    return true;
  });
}

function applyPromos(cart, customer, appliedCoupon) {
  if (!cart || cart.length === 0) return { totalDiscount: 0, appliedList: [], gifts: [], cartLineExtras: {}, standaloneGifts: [] };
  const applicable = getApplicablePromos(cart, customer, appliedCoupon);
  const subtotal = cart.reduce((s,i) => s + i.price * i.qty, 0);
  let totalDiscount = 0;
  const appliedList = [];
  const gifts = [];
  const cartLineExtras = {}; // {sku: [{type, label, amount, qty, promoName}]}
  const standaloneGifts = []; // [{sku, name, qty, promoName, originalPrice}]

  function pushExtra(sku, extra) {
    if (!cartLineExtras[sku]) cartLineExtras[sku] = [];
    cartLineExtras[sku].push(extra);
  }

  for (const p of applicable) {
    let disc = 0;
    let detail = '';
    if (p.type === 'percent_cart') {
      disc = Math.round(subtotal * (p.value || 0) / 100);
      detail = `Giảm ${p.value}% hoá đơn`;
    } else if (p.type === 'amount_cart') {
      disc = Math.min(p.value || 0, subtotal);
      detail = `Giảm ${fmt.money(p.value)}`;
    } else if (p.type === 'percent_sku') {
      const item = cart.find(i => i.sku === p.sku);
      if (item) {
        disc = Math.round(item.price * item.qty * (p.value || 0) / 100);
        detail = `Giảm ${p.value}% ${item.name}`;
        pushExtra(p.sku, { type:'sku_disc', label:`Giảm ${p.value}% (KM)`, amount: disc, qty: 0, promoName: p.name });
      }
    } else if (p.type === 'category_percent') {
      const items = cart.filter(i => {
        const prod = state.products.find(x => x.sku === i.sku);
        return prod && prod.category === p.category;
      });
      if (items.length > 0) {
        const totalCatDisc = items.reduce((s,i) => s + Math.round(i.price * i.qty * (p.value||0) / 100), 0);
        disc = totalCatDisc;
        detail = `Giảm ${p.value}% danh mục ${getCategoryLabel(p.category)} (${items.length} mặt hàng)`;
        items.forEach(i => {
          const itemDisc = Math.round(i.price * i.qty * (p.value||0) / 100);
          pushExtra(i.sku, { type:'cat_disc', label:`Giảm ${p.value}% danh mục (KM)`, amount: itemDisc, qty: 0, promoName: p.name });
        });
      }
    } else if (p.type === 'flat_price') {
      const item = cart.find(i => i.sku === p.sku);
      if (item && p.value < item.price) {
        disc = (item.price - p.value) * item.qty;
        detail = `${item.name} đồng giá ${fmt.money(p.value)}`;
        pushExtra(p.sku, { type:'flat', label:`Đồng giá ${fmt.money(p.value)} (KM)`, amount: disc, qty: 0, promoName: p.name });
      }
    } else if (p.type === 'bogo') {
      const item = cart.find(i => i.sku === p.sku);
      const set = (p.buyQty||0) + (p.freeQty||0);
      if (item && set > 0 && item.qty >= set) {
        const numSets = Math.floor(item.qty / set);
        const numFree = numSets * (p.freeQty || 0);
        disc = item.price * numFree;
        detail = `Mua ${p.buyQty} tặng ${p.freeQty} ${item.name} (×${numSets})`;
        pushExtra(p.sku, { type:'bogo', label:`Tặng kèm ${numFree} ${item.unit||'cái'}`, amount: disc, qty: numFree, promoName: `Mua ${p.buyQty} tặng ${p.freeQty}` });
      }
    } else if (p.type === 'gift_threshold') {
      if (p.giftSku && subtotal >= (p.minTotal || 0)) {
        const giftProduct = state.products.find(x => x.sku === p.giftSku);
        if (giftProduct) {
          const giftQty = p.giftQty || 1;
          gifts.push({ sku: p.giftSku, name: giftProduct.name, qty: giftQty, promoName: p.name });
          standaloneGifts.push({
            sku: p.giftSku, name: giftProduct.name, qty: giftQty,
            unit: giftProduct.unit, originalPrice: giftProduct.price, promoName: p.name,
          });
          detail = `Tặng ${giftQty} ${giftProduct.unit} ${giftProduct.name}`;
        }
      }
    } else if (p.type === 'coupon') {
      if (p.couponType === 'percent') {
        disc = Math.round(subtotal * (p.value||0) / 100);
        detail = `Mã ${p.code}: -${p.value}%`;
      } else {
        disc = Math.min(p.value || 0, subtotal);
        detail = `Mã ${p.code}: -${fmt.money(p.value)}`;
      }
    }
    if (disc > 0 || (p.type === 'gift_threshold' && detail)) {
      totalDiscount += disc;
      appliedList.push({ id: p.id, name: p.name, type: p.type, amount: disc, detail });
    }
  }
  return { totalDiscount, appliedList, gifts, cartLineExtras, standaloneGifts };
}

function applyCoupon() {
  const input = $('#couponInput');
  const code = input?.value.trim().toUpperCase();
  if (!code) return;
  const matched = (state.promotions || []).find(p => p.type === 'coupon' && p.code && p.code.toUpperCase() === code);
  if (!matched) {
    toast(`Mã "${code}" không tồn tại`, 'error');
    return;
  }
  if (!isPromoActive(matched)) {
    toast(`Mã "${code}" đã hết hạn hoặc ngoài giờ áp dụng`, 'warning');
    return;
  }
  state.appliedCoupon = code;
  saveCart();
  renderCart();
  toast(`✓ Đã áp dụng mã ${code}`, 'success');
}

function clearCoupon() {
  state.appliedCoupon = null;
  saveCart();
  renderCart();
}

/* ============================================================
   VIETQR GENERATOR (NAPAS-compliant via img.vietqr.io)
   ============================================================ */
function generateVietQRUrl(bankAcc, amount, addInfo, template='compact2') {
  if (!bankAcc || !bankAcc.bankBin || !bankAcc.accountNumber) return '';
  const params = new URLSearchParams();
  if (amount > 0) params.set('amount', amount);
  if (addInfo) params.set('addInfo', addInfo);
  if (bankAcc.accountHolder) params.set('accountName', bankAcc.accountHolder);
  const qs = params.toString();
  return `https://img.vietqr.io/image/${bankAcc.bankBin}-${bankAcc.accountNumber}-${template}.png${qs?'?'+qs:''}`;
}

function getActiveBankAccount() {
  if (!state.bankAccounts || state.bankAccounts.length === 0) return null;
  if (state.selectedBankId) {
    const sel = state.bankAccounts.find(b => b.id === state.selectedBankId);
    if (sel) return sel;
  }
  return state.bankAccounts.find(b => b.isDefault) || state.bankAccounts[0];
}

function getBillBankAccounts() {
  return (state.bankAccounts || []).filter(b => b.showOnBill);
}

/* ============================================================
   CUSTOMER DB + LOYALTY TIER ENGINE
   ============================================================ */
function getOrCreateCustomer(phone, name, dob, gender) {
  if (!phone) return null;
  if (!state.customers[phone]) {
    state.customers[phone] = {
      phone, name: name || '',
      dob: dob || '',
      gender: gender || '',
      points: 0,
      visits: 0,
      totalSpent: 0,
      firstVisit: Date.now(),
      lastVisit: Date.now(),
      email: '',
    };
  } else {
    if (name && !state.customers[phone].name) state.customers[phone].name = name;
    if (dob && !state.customers[phone].dob) state.customers[phone].dob = dob;
    if (gender && !state.customers[phone].gender) state.customers[phone].gender = gender;
  }
  return state.customers[phone];
}

function getCustomerTier(points) {
  const tiers = (state.loyaltyConfig || CONFIG.defaults.loyalty).tiers;
  let t = tiers[0];
  for (const tier of tiers) if (points >= tier.minPoints) t = tier;
  return t;
}

function getNextTier(currentTier) {
  const tiers = (state.loyaltyConfig || CONFIG.defaults.loyalty).tiers;
  const i = tiers.findIndex(t => t.id === currentTier.id);
  return i < tiers.length - 1 ? tiers[i+1] : null;
}

function calcLoyaltyDiscount(subtotalAfterCart, customer) {
  if (!customer || !state.loyaltyConfig?.enabled) return { amount: 0, tier: null };
  const tier = getCustomerTier(customer.points || 0);
  if (!tier.discount) return { amount: 0, tier };
  const amount = Math.round(subtotalAfterCart * tier.discount / 100);
  return { amount, tier };
}

function calcPointsEarned(amount) {
  const cfg = state.loyaltyConfig || CONFIG.defaults.loyalty;
  if (!cfg.enabled) return 0;
  return Math.floor(amount / (cfg.pointPerVnd || 10000));
}

function updateCustomerAfterTx(tx) {
  if (!tx.customer || !tx.customer.phone) return;
  const c = getOrCreateCustomer(tx.customer.phone, tx.customer.name);
  c.visits += 1;
  c.totalSpent += tx.total;
  c.points = (c.points || 0) + (tx.pointsEarned || 0);
  c.lastVisit = Date.now();
  if (tx.customer.email) c.email = tx.customer.email;
  Storage.set(CONFIG.storageKeys.customers, state.customers);
}

/* ============================================================
   CUSTOMER PANEL (right column)
   ============================================================ */
function renderCustomerPanel() {
  const el = $('#customerCardInline');
  if (state.customer) {
    const c = state.customer;
    const initials = (c.name || 'KH').split(' ').slice(-2).map(s=>s[0]||'').join('').toUpperCase().slice(0,2) || 'KH';
    const points = c.points || 0;
    const visits = c.visits || 1;
    const tier = getCustomerTier(points);
    const nextTier = getNextTier(tier);
    const age = c.dob ? calculateAge(c.dob) : null;
    const isBday = c.dob ? isBirthdayToday(c.dob) : false;
    const daysToB = c.dob ? daysUntilBirthday(c.dob) : null;
    let bdayBadge = '';
    if (isBday) bdayBadge = '<span class="birthday-badge">🎂 SINH NHẬT HÔM NAY!</span>';
    else if (daysToB !== null && daysToB <= 7 && daysToB > 0) bdayBadge = `<span class="birthday-badge" style="background:#FFF8E1;color:#A07A00">🎂 ${daysToB} ngày nữa SN</span>`;

    const gender = c.gender || '';
    const genderClass = gender === 'male' ? 'male' : gender === 'female' ? 'female' : '';
    const genderSymbol = gender === 'male' ? '♂' : gender === 'female' ? '♀' : '';
    const genderLabel = gender === 'male' ? 'Nam' : gender === 'female' ? 'Nữ' : '';

    // Subtitle: gender + age combined
    let subtitleParts = [];
    if (genderLabel) subtitleParts.push(`<span class="gender-${gender}">${genderSymbol} ${genderLabel}</span>`);
    if (age !== null) subtitleParts.push(`<span class="age-badge">${age} tuổi</span>`);
    const subtitle = subtitleParts.length > 0
      ? `<div class="subtitle">${subtitleParts.join('<span style="color:var(--gray-300)">·</span>')}</div>`
      : '';

    // Progress bar
    let progressHtml = '';
    if (nextTier) {
      const range = nextTier.minPoints - tier.minPoints;
      const have = points - tier.minPoints;
      const pct = Math.min(100, Math.max(0, (have / range) * 100));
      const remaining = nextTier.minPoints - points;
      progressHtml = `
        <div class="cust-progress-section">
          <div class="cust-progress-bar"><div class="fill ${tier.id}" style="width:${pct}%"></div></div>
          <div class="cust-progress-label">
            <span class="next">Còn <strong>${fmt.number(remaining)}</strong> điểm để lên hạng <strong>${escapeHtml(nextTier.name)}</strong></span>
            <span>${fmt.number(points)}/${fmt.number(nextTier.minPoints)}</span>
          </div>
        </div>
      `;
    } else {
      progressHtml = `
        <div class="cust-progress-section">
          <div class="cust-progress-bar"><div class="fill ${tier.id}" style="width:100%"></div></div>
          <div class="cust-progress-label">
            <span class="next">★ Hạng cao nhất</span>
            <span>${fmt.number(points)} điểm</span>
          </div>
        </div>
      `;
    }

    el.className = 'customer-card-inline';
    el.innerHTML = `
      <div class="card-label">Khách hàng ${bdayBadge}</div>
      <div class="customer-content-row">
        <div class="customer-avatar ${genderClass}">${escapeHtml(initials)}${genderSymbol?`<span class="gender-icon ${gender}">${genderSymbol}</span>`:''}</div>
        <div class="customer-info">
          <div class="name">${escapeHtml(c.name || 'Khách')}</div>
          ${subtitle}
        </div>
      </div>

let _inlineGender = '';

function setInlineGender(g) {
  _inlineGender = (_inlineGender === g) ? '' : g; // toggle off if click same
  const m = $('#genBtnMale'), f = $('#genBtnFemale');
  if (m) m.classList.toggle('active', _inlineGender === 'male');
  if (f) f.classList.toggle('active', _inlineGender === 'female');
}

function resetInlineForm() {
  ['custInlinePhone', 'custInlineName', 'custInlineDob'].forEach(id => {
    const el = $('#'+id);
    if (el) el.value = '';
  });
  _inlineGender = '';
  $('#genBtnMale')?.classList.remove('active');
  $('#genBtnFemale')?.classList.remove('active');
  $('#custFoundBanner').innerHTML = '';
  $('#custInlinePhone')?.classList.remove('found');
  $('#custInlinePhone')?.focus();
}

function lookupCustomerByPhone() {
  const phone = $('#custInlinePhone')?.value.trim();
  const banner = $('#custFoundBanner');
  const phoneInput = $('#custInlinePhone');
  if (!phone || phone.length < 8) {
    if (banner) banner.innerHTML = '';
    if (phoneInput) phoneInput.classList.remove('found');
    return;
  }
  const c = state.customers[phone];
  if (c) {
    $('#custInlineName').value = c.name || '';
    $('#custInlineDob').value = c.dob || '';
    if (c.gender) {
      _inlineGender = c.gender;
      $('#genBtnMale')?.classList.toggle('active', c.gender === 'male');
      $('#genBtnFemale')?.classList.toggle('active', c.gender === 'female');
    }
    if (phoneInput) phoneInput.classList.add('found');
    const tier = getCustomerTier(c.points || 0);
    const isBday = c.dob ? isBirthdayToday(c.dob) : false;
    const genderText = c.gender === 'male' ? '♂ Nam' : c.gender === 'female' ? '♀ Nữ' : '';
    if (banner) banner.innerHTML = `
      <div class="cust-found-banner">
        ✓ KH cũ${genderText?' · '+genderText:''} — ${fmt.number(c.points||0)} điểm · Hạng ${escapeHtml(tier.name)}${tier.discount?` (-${tier.discount}%)`:''} · Đã mua ${c.visits||0} lần${isBday?' · 🎂 SN HÔM NAY':''}
      </div>
    `;
  } else {    // ⚡ AUTO-SELECT: KH cũ → tự set state.customer khi lookup thấy
    const _autoTier = getCustomerTier(c.points || 0);
    state.customer = {
      phone: c.phone, name: c.name, dob: c.dob, gender: c.gender,
      visits: (c.visits || 0) + 1, points: c.points || 0,
      totalSpent: c.totalSpent || 0,
      tier: _autoTier.id, tierName: _autoTier.name, tierDiscount: _autoTier.discount,
      email: c.email || '',
    };
    saveCart();
    renderCart();

    if (phoneInput) phoneInput.classList.remove('found');
    if (banner) banner.innerHTML = `
      <div style="padding:6px 10px;background:var(--orange-light);border:1px solid #FFCC80;border-radius:5px;font-size:11px;color:var(--orange);font-weight:500">
        + KH mới — nhập tên + NTNS + giới tính để lưu
      </div>
    `;
  }
}

function saveCustomerInline() {
  const phone = $('#custInlinePhone')?.value.trim();
  const name = $('#custInlineName')?.value.trim();
  const dob = $('#custInlineDob')?.value || '';
  const gender = _inlineGender || '';
  if (!phone) { toast('Vui lòng nhập số điện thoại', 'warning'); $('#custInlinePhone').focus(); return; }
  if (phone.length < 9) { toast('SĐT phải tối thiểu 9 chữ số', 'warning'); return; }
  const dbCust = getOrCreateCustomer(phone, name, dob, gender);
  if (name && name !== dbCust.name) dbCust.name = name;
  if (dob && dob !== dbCust.dob) dbCust.dob = dob;
  if (gender && gender !== dbCust.gender) dbCust.gender = gender;
  Storage.set(CONFIG.storageKeys.customers, state.customers);
  const tier = getCustomerTier(dbCust.points);
  state.customer = {
    phone: dbCust.phone,
    name: dbCust.name,
    dob: dbCust.dob,
    gender: dbCust.gender,
    visits: dbCust.visits + 1,
    points: dbCust.points,
    totalSpent: dbCust.totalSpent,
    tier: tier.id,
    tierName: tier.name,
    tierDiscount: tier.discount,
    email: dbCust.email,
  };
  _inlineGender = '';
  saveCart();
  renderCart();
  toast(`✓ ${dbCust.visits === 0 ? 'Đã thêm KH mới' : 'Đã chọn KH cũ'}: ${dbCust.name || phone}${isBirthdayToday(dbCust.dob) ? ' 🎂' : ''}`, 'success');
}

function clearCustomerToForm() {
  state.customer = null;
  saveCart();
  renderCart();
  setTimeout(() => $('#custInlinePhone')?.focus(), 50);
}

function renderChangeBox(change, total, cash) {
  if (cash === 0) return `<div class="change-box zero"><span class="label">Chờ nhập tiền khách...</span><span class="value">0 ₫</span></div>`;
  if (change < 0) return `<div class="change-box negative"><span class="label">Còn thiếu</span><span class="value">${fmt.money(Math.abs(change))}</span></div>`;
  if (change === 0) return `<div class="change-box positive"><span class="label">✓ Khách đưa đủ</span><span class="value">0 ₫</span></div>`;
  return `<div class="change-box positive"><span class="label">✓ Tiền thừa trả khách</span><span class="value">${fmt.money(change)}</span></div>`;
}

function updateChangeBoxOnly() {
  // Re-render only the change box + complete button (avoid losing input focus)
  const total = calcTotal();
  const cash = state.payment.cashReceived || 0;
  const change = cash - total;
  const card = $('#paymentCardInline');
  // Find existing change-box and replace
  const existing = card.querySelector('.change-box');
  if (existing) existing.outerHTML = renderChangeBox(change, total, cash);
  const btn = $('#btnComplete');
  if (btn) {
    const ok = state.cart.length > 0 && cash >= total && total > 0;
    btn.disabled = !ok;
  }
}

function selectPayMethod(method) {
  state.payment.method = method;
  // Pre-fill amount on switch (except cash which user types)
  const total = calcTotal();
  if (method === 'transfer') state.payment.transferAmount = total;
  else if (method === 'card') state.payment.cardAmount = total;
  renderPaymentPanel();
  setTimeout(() => {
    const focusId = method==='cash' ? '#payCashInput' : method==='transfer' ? '#payTransferInput' : '#payCardInput';
    const el = $(focusId);
    if (el) { el.focus(); el.select(); }
  }, 30);
}

function setPayCashAmount(v) {
  state.payment.cashReceived = v;
  renderPaymentPanel();
}

function quickCashSuggestions(total) {
  if (!total) return [10000, 20000, 50000, 100000];
  const suggestions = new Set([total]);
  for (const round of [10000, 50000, 100000, 500000]) {
    const v = Math.ceil(total / round) * round;
    if (v > total) suggestions.add(v);
  }
  for (const d of [10000, 20000, 50000, 100000, 200000, 500000]) {
    if (d >= total) { suggestions.add(d); break; }
  }
  return [...suggestions].sort((a,b)=>a-b).slice(0,4);
}

function toggleEinvoice(on) {
  state.einvoice.requested = on;
  renderPaymentPanel();
}

/* ============================================================
   COMPLETE TRANSACTION
   ============================================================ */
async function completeTransaction() {
  const total = calcTotal();
  if (state.cart.length === 0) return;
  const m = state.payment.method;

  let received = 0;
  if (m === 'cash') {
    received = state.payment.cashReceived || 0;
    // Auto-fill cash to total if empty (assume customer pays exact amount)
    if (received === 0) {
      received = total;
      state.payment.cashReceived = total;
      toast(`✓ Mặc định khách trả đủ ${fmt.money(total)}`, 'info', 1400);
    } else if (received < total) {
      toast(`⚠ Khách đưa thiếu ${fmt.money(total - received)}. Sửa "Tiền khách đưa" hoặc xoá để mặc định trả đủ.`, 'warning', 3500);
      return;
    }
  } else if (m === 'transfer') {
    received = state.payment.transferAmount || 0;
    if (received === 0) {
      received = total;
      state.payment.transferAmount = total;
    } else if (received < total) { toast('Số tiền chuyển khoản chưa đủ', 'warning'); return; }
  } else if (m === 'card') {
    received = state.payment.cardAmount || 0;
    if (received === 0) {
      received = total;
      state.payment.cardAmount = total;
    } else if (received < total) { toast('Số tiền quẹt thẻ chưa đủ', 'warning'); return; }
  }

  // Build transaction with loyalty + promos
  const subtotal = calcSubtotal();
  const cartDiscount = calcDiscountAmount();
  const promoResult = applyPromos(state.cart, state.customer, state.appliedCoupon);
  const afterAll = Math.max(0, subtotal - cartDiscount - promoResult.totalDiscount);
  const loy = calcLoyaltyDiscount(afterAll, state.customer);
  const pointsEarned = state.customer ? calcPointsEarned(total) : 0;
  const tx = {
    id: uid(),
    code: txCode(),
    kind: 'sale',
    user: state.user.code,
    userName: state.user.name,
    branch: state.shift.branch,
    shiftId: state.shift.id,
    items: state.cart.map(i => ({...i, lineTotal: calcLineTotal(i)})),
    subtotal,
    discount: state.discount,
    discountAmount: cartDiscount,
    promoDiscount: promoResult.totalDiscount,
    appliedPromos: promoResult.appliedList,
    appliedCoupon: state.appliedCoupon,
    gifts: promoResult.gifts,
    loyaltyDiscount: loy.amount,
    loyaltyTier: loy.tier?.name,
    pointsEarned,
    total,
    paymentMethod: m,
    cashReceived: m==='cash' ? received : 0,
    transferAmount: m==='transfer' ? received : 0,
    cardAmount: m==='card' ? received : 0,
    change: m==='cash' ? Math.max(0, received - total) : 0,
    customer: state.customer,
    einvoiceRequested: !!state.einvoice.requested,
    einvoiceMst: state.einvoice.mst || null,
    einvoiceEmail: state.einvoice.email || null,
    createdAt: Date.now(),
  };
  updateCustomerAfterTx(tx);

  // Update shift stats
  state.shift.totalSales += tx.total;
  state.shift.txCount += 1;
  if (m==='cash') state.shift.totalCash += tx.total;
  else if (m==='transfer') state.shift.totalTransfer += tx.total;
  else if (m==='card') state.shift.totalCard += tx.total;
  Storage.set(CONFIG.storageKeys.shift, state.shift);

  // Deduct local stock (TODO Phase 2: NCC Supabase)
  state.cart.forEach(i => {
    const p = state.products.find(x => x.sku === i.sku);
    if (p) p.stock -= i.qty;
  });

  // Save tx (local first — instant UX)
  state.transactions.push(tx);
  Storage.set(CONFIG.storageKeys.transactions, state.transactions);

  // ← HUB SYNC: Push tx lên Supabase (non-blocking)
  // → KHO listener tự trừ kho_inventory realtime
  // → NCC SIS dashboard tự cộng dồn doanh thu
  syncTxToSupabase(tx);

  // E-invoice — Edge Function call thật (real mode khi Supabase NCC connected)
  let einvoiceResult = null;
  if (tx.einvoiceRequested) {
    try {
      einvoiceResult = await issueEinvoice(tx);
      tx.einvoice = einvoiceResult;
      tx.einvoiceResult = einvoiceResult;  // ← để confirmReturn cancel
      Storage.set(CONFIG.storageKeys.transactions, state.transactions);
    } catch (e) {
      einvoiceResult = { error: e.message || 'Lỗi xuất HĐĐT' };
    }
  }

  // Show result modal
  showTransactionResult(tx, einvoiceResult);

  // Reset
  state.cart = [];
  state.discount = { type: 'percent', value: 0 };
  state.customer = null;
  state.payment = { method: 'cash', cashReceived: 0, transferAmount: 0, cardAmount: 0 };
  state.einvoice = { requested: false, mst: '', email: '' };
  state.appliedCoupon = null;
  state.appliedPromos = [];
  state.promoDiscount = 0;
  state.cartLineExtras = {};
  state.standaloneGifts = [];
  state.lastAddedSku = null;
  state.lastAddedAt = 0;
  saveCart();
  renderCart();
}

// ═══════════════════════════════════════════════════════════════
// HĐĐT INTEGRATION — gọi Edge Function thật trên NCC project
// ═══════════════════════════════════════════════════════════════
//   - Mode 'real': call sinvoice-issue Edge Function → Viettel API
//   - Mode 'mock': dùng logic mock cũ (fallback khi Supabase chưa sẵn)
//   - Offline queue: nếu network/API fail → enqueue vào localStorage,
//     POS không bị block. flushPendingEinvoices() retry sau.
// ═══════════════════════════════════════════════════════════════
const EINVOICE_QUEUE_KEY = 'vcm_einvoice_pending';

function txToEdgePayload(tx) {
  // Convert POS transaction sang format Edge Function expect (POSTransaction)
  return {
    id: tx.id,
    branch: tx.branch || state.shift?.branch || 'PB',
    ts: new Date(tx.createdAt || Date.now()).toISOString(),
    total: tx.total,
    payment_method: tx.paymentMethod === 'cash' ? 'TM' 
                  : tx.paymentMethod === 'transfer' ? 'CK' 
                  : tx.paymentMethod === 'card' ? 'THE' : 'TM',
    items: (tx.items || []).map(i => ({
      sku: i.sku || '',
      product_id: i.productId || i.product_id,
      name: i.name,
      qty: i.qty,
      price: i.price || (i.lineTotal / i.qty),
      vat_rate: i.vatRate || 8,
      cost: i.cost || 0
    })),
    customer: tx.customer ? {
      name: tx.customer.name || 'Khách lẻ',
      tax_id: tx.customer.taxCode || tx.customer.tax_id,
      email: tx.customer.email,
      address: tx.customer.address
    } : { name: 'Khách lẻ' }
  };
}

async function issueEinvoice(tx) {
  const cfg = state.einvoiceConfig || {};
  if (!cfg.provider) throw new Error('Chưa cấu hình cổng HĐĐT — vào Cài đặt để thiết lập');

  // ─── REAL mode: call Edge Function trên NCC project ──────────
  if (state.supabase && cfg.useEdgeFunction !== false) {
    try {
      const payload = txToEdgePayload(tx);
      const url = `${NCC_SUPABASE_URL}/functions/v1/sinvoice-issue`;
      const r = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${NCC_SUPABASE_ANON_KEY}`,
          'apikey': NCC_SUPABASE_ANON_KEY
        },
        body: JSON.stringify(payload)
      });
      const j = await r.json();
      
      if (!r.ok || !j.ok) {
        // Edge Function trả về lỗi (Viettel API down, credential sai...) → enqueue retry
        enqueuePendingEinvoice(tx);
        throw new Error(j.error || `HĐĐT API failed: HTTP ${r.status}`);
      }
      
      return {
        provider: cfg.provider,
        providerLabel: ({viettel:'Viettel SInvoice', misa:'MISA meInvoice', vnpt:'VNPT Invoice', easyinvoice:'EasyInvoice', fpt:'FPT eInvoice'})[cfg.provider] || cfg.provider,
        invoiceNumber: j.invoice_no,
        issuedAt: Date.now(),
        lookupUrl: j.lookup_url || '',
        cqtCode: j.cqt_code,
        status: j.cached ? 'issued_cached' : 'issued',
        cached: !!j.cached
      };
    } catch (netErr) {
      // Network/timeout fail → enqueue retry, throw để UI biết
      enqueuePendingEinvoice(tx);
      throw new Error('Mạng lỗi hoặc HĐĐT API timeout — đã queue retry: ' + netErr.message);
    }
  }
  
  // ─── MOCK mode (fallback khi không có Supabase NCC client) ───
  await new Promise(r => setTimeout(r, 700));
  const seq = (state.einvoiceSeq = (state.einvoiceSeq || 1) + 1);
  const symbol = cfg.symbol || 'AB/24E';
  const num = String(seq).padStart(7,'0');
  const lookupBase = {
    viettel: 'https://hoadondientu.viettel.vn/tra-cuu',
    misa: 'https://www.meinvoice.vn/tra-cuu',
    vnpt: 'https://hoadon-vnpt.vn/tra-cuu',
    easyinvoice: 'https://easyinvoice.vn/tra-cuu',
    fpt: 'https://einvoice.fpt.com.vn/tra-cuu',
  }[cfg.provider] || 'https://hoadondientu.gdt.gov.vn';
  const lookupUrl = `${lookupBase}?nbmst=${cfg.taxCode||'0123456789'}&khhd=${encodeURIComponent(symbol)}&shd=${num}`;
  return {
    provider: cfg.provider,
    providerLabel: ({viettel:'Viettel SInvoice', misa:'MISA meInvoice', vnpt:'VNPT Invoice', easyinvoice:'EasyInvoice', fpt:'FPT eInvoice'})[cfg.provider],
    invoiceNumber: `${symbol}-${num}`,
    issuedAt: Date.now(),
    lookupUrl,
    qrData: `EINVOICE|${cfg.provider}|${symbol}|${num}|${tx.total}`,
    status: 'issued_mock',
  };
}

// ─── Offline queue: enqueue khi Edge Function fail ───────────
function enqueuePendingEinvoice(tx) {
  try {
    const queue = JSON.parse(localStorage.getItem(EINVOICE_QUEUE_KEY) || '[]');
    if (queue.find(q => q.id === tx.id)) return;  // already queued
    queue.push({ id: tx.id, payload: txToEdgePayload(tx), queuedAt: Date.now() });
    localStorage.setItem(EINVOICE_QUEUE_KEY, JSON.stringify(queue.slice(-100)));  // cap at 100
  } catch (e) { console.error('Enqueue HĐĐT fail:', e); }
}

async function flushPendingEinvoices() {
  if (!state.supabase) return;
  try {
    const queue = JSON.parse(localStorage.getItem(EINVOICE_QUEUE_KEY) || '[]');
    if (queue.length === 0) return;
    const remaining = [];
    for (const item of queue) {
      try {
        const url = `${NCC_SUPABASE_URL}/functions/v1/sinvoice-issue`;
        const r = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${NCC_SUPABASE_ANON_KEY}`,
            'apikey': NCC_SUPABASE_ANON_KEY
          },
          body: JSON.stringify(item.payload)
        });
        const j = await r.json();
        if (!r.ok || !j.ok) remaining.push(item);
        else console.log('[POS] Flushed pending HĐĐT:', item.id, '→', j.invoice_no);
      } catch (_) { remaining.push(item); }
    }
    localStorage.setItem(EINVOICE_QUEUE_KEY, JSON.stringify(remaining));
    if (queue.length > remaining.length) {
      const flushed = queue.length - remaining.length;
      toast(`✓ Đã xuất ${flushed} HĐĐT pending`, 'success');
    }
  } catch (e) { console.error('Flush HĐĐT fail:', e); }
}

// ─── Cancel HĐĐT khi return ──────────────────────────────────
async function cancelEinvoiceForReturn(originalTxId, reason) {
  if (!state.supabase) return null;
  try {
    const url = `${NCC_SUPABASE_URL}/functions/v1/sinvoice-cancel`;
    const r = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${NCC_SUPABASE_ANON_KEY}`,
        'apikey': NCC_SUPABASE_ANON_KEY
      },
      body: JSON.stringify({ pos_tx_id: originalTxId, reason: reason || 'Khách trả hàng', mode: 'cancel' })
    });
    const j = await r.json();
    if (!r.ok || !j.ok) {
      console.warn('[POS] Cancel HĐĐT fail:', j.error);
      return { ok: false, error: j.error };
    }
    return { ok: true, ...j };
  } catch (e) {
    console.error('[POS] Cancel HĐĐT exception:', e);
    return { ok: false, error: e.message };
  }
}

  showModal(`

      <button class="modal-close" onclick="closeModal()">×</button>
    </div>

        <div class="tx-bill-side">
          <div class="bill-frame">${billHtml}</div>
          <div class="bill-actions">
            <button class="btn btn-primary" onclick="doPrint()">🖨 In bill</button>
            <button class="btn btn-ghost" onclick="downloadBillPdf('${tx.id}')">📄 PDF</button>

        </div>
        <div class="tx-actions-side">
          <div class="tx-success-banner">
            <div class="icon">✓</div>
            <div class="title">Thanh toán thành công</div>
            <div class="amt">${fmt.money(tx.total)}</div>
            ${changeRow}
            ${pointsRow}
          </div>
          ${einvoiceCard}
          <div class="tx-quick-actions">
            <button onclick="closeModal();openReturnsForTx('${tx.id}')">↺ Trả hàng đơn này</button>
            <button onclick="emailReceipt('${tx.id}')">📧 Email khách</button>
          </div>
        </div>
      </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Đóng (giao dịch mới)</button>

    </div>
  `, {size:'xl'});

  // Focus the In & đóng button so Enter triggers print + close
  setTimeout(() => {
    const btn = $('#txPrintBtn');
    if (btn) btn.focus();
  }, 100);

  // Window-level Enter listener as backup (if focus is lost)
  state._txResultEnterHandler = function(e) {
    if (e.key === 'Enter' && !e.target.matches('input, textarea, select')) {
      e.preventDefault();
      e.stopPropagation();
      doPrint();
      closeModal();
      window.removeEventListener('keydown', state._txResultEnterHandler, true);
      state._txResultEnterHandler = null;
    } else if (e.key === 'Escape') {
      window.removeEventListener('keydown', state._txResultEnterHandler, true);
      state._txResultEnterHandler = null;
    }
  };
  window.addEventListener('keydown', state._txResultEnterHandler, true);

  if (state.printConfig?.printAuto) {
    setTimeout(() => doPrint(), 300);

function updateBankQRPreview() {
  const sel = $('#bankSel').value.split('|');
  const accNum = $('#bankAccNum').value.trim();
  const accHolder = $('#bankAccHolder').value.trim().toUpperCase();
  $('#bankAccHolder').value = accHolder;
  if (!accNum) {
    $('#bankQRPreview').src = '';
    $('#bankQRStatus').textContent = 'Nhập số TK để sinh QR';
    return;
  }
  const url = generateVietQRUrl({bankBin: sel[0], accountNumber: accNum, accountHolder: accHolder}, 0, '', 'compact2');
  $('#bankQRPreview').src = url;
  $('#bankQRStatus').textContent = 'QR có thể quét bằng app ngân hàng bất kỳ';
}

function saveBankAccount(editId) {
  const sel = $('#bankSel').value.split('|');
  const acc = {
    id: editId || uid(),
    bankBin: sel[0],
    bankName: sel[1],
    accountNumber: $('#bankAccNum').value.trim(),
    accountHolder: $('#bankAccHolder').value.trim().toUpperCase(),
    branch: $('#bankBranch').value.trim(),
    isDefault: $('#bankIsDefault').checked,
    showOnBill: $('#bankShowBill').checked,
  };
  if (!acc.accountNumber || !acc.accountHolder) { toast('Cần nhập STK và Chủ TK', 'warning'); return; }
  state.bankAccounts = state.bankAccounts || [];
  if (acc.isDefault) state.bankAccounts.forEach(b => b.isDefault = false);
  if (editId) {
    const i = state.bankAccounts.findIndex(b => b.id === editId);
    if (i >= 0) state.bankAccounts[i] = acc;
    else state.bankAccounts.push(acc);
  } else {
    if (state.bankAccounts.length === 0) acc.isDefault = true;
    state.bankAccounts.push(acc);
  }
  Storage.set(CONFIG.storageKeys.bankAccounts, state.bankAccounts);
  closeModal();
  toast('✓ Đã lưu tài khoản ngân hàng', 'success');
  openSettingsModal('store');
}

function editBankAccount(id) { closeModal(); openBankAccountModal(id); }

function setDefaultBank(id) {
  state.bankAccounts.forEach(b => b.isDefault = (b.id === id));
  Storage.set(CONFIG.storageKeys.bankAccounts, state.bankAccounts);

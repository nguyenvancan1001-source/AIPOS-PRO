/* ============================================================
   BARCODE SCANNER (USB keyboard wedge)
   - Detects fast burst of keystrokes ending with Enter
   ============================================================ */
let _scannerBuffer = '';
let _scannerTimer = null;

function setupScanner() {
  document.addEventListener('keydown', e => {
    // Only when on POS screen, not in input
    if ($('#screen-pos').style.display !== 'flex') return;
    const t = e.target;
    if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT') {
      // If it's the search input, allow Enter to find product
      if (t.id === 'searchInput' && e.key === 'Enter') {
        e.preventDefault();
        const q = t.value.trim();
        if (!q) return;
        const results = getSearchResults();
        if (results.length > 0) {
          const idx = Math.min(state.searchActiveIdx || 0, results.length - 1);
          const p = results[idx];
          if (p.stock > 0) {
            addToCart(p.sku);
            t.value = '';
            state.searchQuery = '';
            renderSearchDropdown();
          } else {
            toast('Sản phẩm hết hàng', 'warning');
          }
        } else {
          // Try barcode lookup directly
          const p = findProduct(q);
          if (p) {
            // ⚡ FIX v3: variant support
            if (p._matchedVariant) {
              addToCart(p.sku, 1, p._matchedVariant);
            } else {
              addToCart(p.sku);
            }
            t.value = '';
            state.searchQuery = '';
            renderSearchDropdown();
          } else {
            toast('Không tìm thấy sản phẩm', 'error');
          }
        }
      }
      return;
    }
    // Capture barcode-like input (digits) outside inputs
    if (/^[0-9]$/.test(e.key)) {
      _scannerBuffer += e.key;
      clearTimeout(_scannerTimer);
      _scannerTimer = setTimeout(() => { _scannerBuffer = ''; }, 100);
    } else if (e.key === 'Enter' && _scannerBuffer.length >= 8) {
      const p = findProduct(_scannerBuffer);
      if (p) {
        // ⚡ FIX v3: Nếu match alt_units variant → pass variantInfo
        if (p._matchedVariant) {
          addToCart(p.sku, 1, p._matchedVariant);
        } else {
          addToCart(p.sku);
        }
      }
      else toast('Mã vạch không có trong hệ thống: ' + _scannerBuffer, 'error');
      _scannerBuffer = '';
    } else {
      _scannerBuffer = '';
    }
  });
}

/* ============================================================
   FULLSCREEN MODE (F11)
   ============================================================ */
let _cursorIdleTimer = null;

function toggleFullscreen() {
  if (isFullscreen()) {
    exitFullscreen();
  } else {
    enterFullscreen();
  }
}

function isFullscreen() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
}

function enterFullscreen() {
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if (req) {
    req.call(el).then(() => {
      onEnterFullscreen();
    }).catch(err => {
      toast('Không thể bật toàn màn hình: ' + err.message, 'warning');
    });
  } else {
    toast('Trình duyệt không hỗ trợ toàn màn hình', 'warning');
  }
}

function exitFullscreen() {
  const exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
  if (exit && isFullscreen()) {
    exit.call(document);
  }
}

function onEnterFullscreen() {
  document.body.classList.add('fullscreen-mode');
  const btn = $('#btnFullscreen');
  if (btn) btn.classList.add('is-fullscreen');
  const ico = $('#fsIcon'), lbl = $('#fsLabel');
  if (ico) ico.textContent = '⛶';
  if (lbl) lbl.textContent = 'Thoát toàn màn hình';

  // Toggle FAB icon + label
  const fab = $('#fabFullscreen');
  if (fab) fab.classList.add('is-fullscreen');
  const fabIconEnter = $('#fabIconEnter');
  const fabIconExit = $('#fabIconExit');
  const fabLabel = $('#fabLabel');
  if (fabIconEnter) fabIconEnter.style.display = 'none';
  if (fabIconExit) fabIconExit.style.display = '';
  if (fabLabel) fabLabel.textContent = 'Thoát';

  // Show hint briefly
  showFullscreenHint();

  // Set up cursor auto-hide
  setupCursorAutoHide();
}

function onExitFullscreen() {
  document.body.classList.remove('fullscreen-mode', 'cursor-idle');
  const btn = $('#btnFullscreen');
  if (btn) btn.classList.remove('is-fullscreen');
  const ico = $('#fsIcon'), lbl = $('#fsLabel');
  if (ico) ico.textContent = '⛶';
  if (lbl) lbl.textContent = 'Toàn màn hình';

  // Toggle FAB icon + label back
  const fab = $('#fabFullscreen');
  if (fab) fab.classList.remove('is-fullscreen');
  const fabIconEnter = $('#fabIconEnter');
  const fabIconExit = $('#fabIconExit');
  const fabLabel = $('#fabLabel');
  if (fabIconEnter) fabIconEnter.style.display = '';
  if (fabIconExit) fabIconExit.style.display = 'none';
  if (fabLabel) fabLabel.textContent = 'Toàn màn hình';

  // Stop cursor auto-hide
  if (_cursorIdleTimer) { clearTimeout(_cursorIdleTimer); _cursorIdleTimer = null; }
  document.removeEventListener('mousemove', onCursorMove);
  document.removeEventListener('mousedown', onCursorMove);
  document.removeEventListener('keydown', onCursorMove);
}

function showFullscreenHint() {
  const hint = document.createElement('div');
  hint.className = 'fs-hint';
  hint.innerHTML = '<span class="ico">⛶</span><div><div style="font-weight:700">Đã vào toàn màn hình</div><div style="opacity:0.8;font-size:12px;margin-top:2px">Bấm F11 hoặc Esc để thoát</div></div>';
  document.body.appendChild(hint);
  setTimeout(() => hint.remove(), 2600);
}

function setupCursorAutoHide() {
  document.addEventListener('mousemove', onCursorMove, { passive: true });
  document.addEventListener('mousedown', onCursorMove, { passive: true });
  document.addEventListener('keydown', onCursorMove, { passive: true });
  resetCursorIdleTimer();
}

function onCursorMove() {
  document.body.classList.remove('cursor-idle');
  resetCursorIdleTimer();
}

function resetCursorIdleTimer() {
  if (_cursorIdleTimer) clearTimeout(_cursorIdleTimer);
  _cursorIdleTimer = setTimeout(() => {
    if (document.body.classList.contains('fullscreen-mode')) {
      document.body.classList.add('cursor-idle');
    }
  }, 4000);
}

// Listen for ALL fullscreen change events (browser-prefixed)
document.addEventListener('fullscreenchange', () => isFullscreen() ? onEnterFullscreen() : onExitFullscreen());
document.addEventListener('webkitfullscreenchange', () => isFullscreen() ? onEnterFullscreen() : onExitFullscreen());
document.addEventListener('mozfullscreenchange', () => isFullscreen() ? onEnterFullscreen() : onExitFullscreen());
document.addEventListener('MSFullscreenChange', () => isFullscreen() ? onEnterFullscreen() : onExitFullscreen());

/* ============================================================
   HOTKEYS
   ============================================================ */
function setupHotkeys() {
  document.addEventListener('keydown', e => {
    if ($('#screen-pos').style.display !== 'flex') return;
    const isInputField = e.target.matches('input, textarea, select');

    // Function keys + Escape always work (even in inputs)
    if (e.key === 'F1') { e.preventDefault(); $('#searchInput').focus(); $('#searchInput').select(); }
    else if (e.key === 'F2') { e.preventDefault(); openDiscountQuick(); }
    else if (e.key === 'F3') { e.preventDefault(); if(state.cart.length>0) holdCurrentOrder(); else toast('Giỏ trống','warning'); }
    else if (e.key === 'F4') { e.preventDefault(); confirmClearCart(); }
    else if (e.key === 'F5') { e.preventDefault(); focusCustomerForm(); }
    else if (e.key === 'F6') { e.preventDefault(); focusPayInput(); }
    else if (e.key === 'F8') { e.preventDefault(); confirmCloseShift(); }
    else if (e.key === 'F9') { e.preventDefault(); setPayMethodByKey('cash'); focusPayInput(); }
    else if (e.key === 'F10') { e.preventDefault(); setPayMethodByKey('transfer'); focusPayInput(); }
    else if (e.key === 'F11') { e.preventDefault(); toggleFullscreen(); }
    else if (e.key === 'F12') { e.preventDefault(); setPayMethodByKey('card'); focusPayInput(); }
    else if ((e.ctrlKey || e.metaKey) && (e.key === 'h' || e.key === 'H')) { e.preventDefault(); recallLastHeld(); }
    else if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.key === 'P')) { e.preventDefault(); reprintLastBill(); }
    else if ((e.ctrlKey || e.metaKey) && (e.key === 'e' || e.key === 'E')) { e.preventDefault(); toggleEinvoiceQuick(); }
    else if (e.key === 'Escape') {
      if ($('#modalRoot') && $('#modalRoot').children.length > 0 || document.querySelector('.modal-backdrop')) {
        closeModal();
      } else if (isInputField) {
        e.target.blur();
      }
    }
    // Ctrl/Cmd + Enter: quick complete with exact cash
    else if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      quickCompletePay();
    }

    // ? : help
    else if (e.key === '?' && !isInputField) {
      e.preventDefault();
      openShortcutsHelp();
    }
  });

}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  // Setup login form
  $('#loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const code = $('#loginCode').value.trim();
    const pwd = $('#loginPassword').value;
    if (!code || !pwd) { toast('Vui lòng nhập đầy đủ', 'warning'); return; }
    try {
      const user = await login(code, pwd);
      state.user = user;
      Storage.set(CONFIG.storageKeys.auth, user);
      // Check if shift exists
      const savedShift = Storage.get(CONFIG.storageKeys.shift);
      if (savedShift && !savedShift.closedAt) {
        state.shift = savedShift;
        // Restore cart, held, transactions
        const savedCart = Storage.get(CONFIG.storageKeys.cart);
        if (savedCart) {
          state.cart = savedCart.cart || [];
          state.discount = savedCart.discount || {type:'percent', value:0};
          state.customer = savedCart.customer || null;
          state.appliedCoupon = savedCart.appliedCoupon || null;
        }
        state.heldOrders = Storage.get(CONFIG.storageKeys.held) || [];
        state.transactions = Storage.get(CONFIG.storageKeys.transactions) || [];
        showPosScreen();
        toast(`Tiếp tục ca trực — ${BRANCHES[state.shift.branch].name}`, 'success');
      } else {
        showShiftScreen();
      }
    } catch (err) {
      toast(err.message, 'error');
    }
  });

  // Branch picker
  $('#branchPicker').addEventListener('click', e => {
    const btn = e.target.closest('.branch-btn');
    if (!btn) return;
    state.selectedBranch = btn.dataset.branch;
    $$('#branchPicker .branch-btn').forEach(b => b.classList.toggle('active', b === btn));
  });

  // Opening cash formatter
  $('#openingCash').addEventListener('input', e => {
    const v = parseMoney(e.target.value);
    e.target.value = v.toLocaleString('vi-VN');
  });

  // Search with autocomplete dropdown
  $('#searchInput').addEventListener('input', e => {
    state.searchQuery = e.target.value;
    state.searchActiveIdx = 0;
    renderSearchDropdown();
  });
  $('#searchInput').addEventListener('focus', () => {
    if (state.searchQuery) renderSearchDropdown();
  });
  $('#searchInput').addEventListener('blur', () => {
    setTimeout(() => { $('#searchDropdown').style.display = 'none'; }, 150);
  });
  $('#searchInput').addEventListener('keydown', e => {
    const dd = $('#searchDropdown');
    if (dd.style.display === 'none') return;
    const results = getSearchResults();
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      state.searchActiveIdx = Math.min(state.searchActiveIdx + 1, results.length - 1);
      renderSearchDropdown();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      state.searchActiveIdx = Math.max(state.searchActiveIdx - 1, 0);
      renderSearchDropdown();
    } else if (e.key === 'Escape') {
      e.target.blur();
      e.target.value = '';
      state.searchQuery = '';
      dd.style.display = 'none';
    }
  });

  // Auto-restore session if exists
  const savedAuth = Storage.get(CONFIG.storageKeys.auth);
  if (savedAuth) {
    state.user = savedAuth;
    const savedShift = Storage.get(CONFIG.storageKeys.shift);
    if (savedShift && !savedShift.closedAt) {
      state.shift = savedShift;
      const savedCart = Storage.get(CONFIG.storageKeys.cart);
      if (savedCart) {
        state.cart = savedCart.cart || [];
        state.discount = savedCart.discount || {type:'percent', value:0};
        state.customer = savedCart.customer || null;
        state.appliedCoupon = savedCart.appliedCoupon || null;
      }
      state.heldOrders = Storage.get(CONFIG.storageKeys.held) || [];
      state.transactions = Storage.get(CONFIG.storageKeys.transactions) || [];
      showPosScreen();
    } else {
      showShiftScreen();
    }
  } else {
    showLoginScreen();
  }

  setupScanner();
  setupHotkeys();
}

document.addEventListener('DOMContentLoaded', init);
</script>

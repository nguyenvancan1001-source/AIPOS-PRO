}

function deleteBankAccount(id) {
  if (!confirm('Xoá tài khoản ngân hàng này?')) return;
  state.bankAccounts = state.bankAccounts.filter(b => b.id !== id);
  if (state.bankAccounts.length > 0 && !state.bankAccounts.some(b => b.isDefault)) {
    state.bankAccounts[0].isDefault = true;
  }
  Storage.set(CONFIG.storageKeys.bankAccounts, state.bankAccounts);
  openSettingsModal('store');
  toast('Đã xoá', 'info');
}

function renderLabelSettings() {

function onLabelPromoPresetChange(presetKey) {
  const preset = LABEL_PAPER_PRESETS[presetKey];
  if (!preset) return;
  $('#lblPmPageWidth').value = preset.w;
  $('#lblPmPageHeight').value = preset.h;
}

function saveLabelPromoSettings() {
  state.labelPromoConfig = {
    ...(state.labelPromoConfig||CONFIG.defaults.labelPromo),
    paperSize: $('#lblPmPaperSize').value,
    pageWidth: parseFloat($('#lblPmPageWidth').value) || 50,
    pageHeight: parseFloat($('#lblPmPageHeight').value) || 30,
    promoColor: $('#lblPmColor').value || '#D32F2F',
    showPromoBadge: $('#lblPmShowBadge').checked,
    showProductName: $('#lblPmShowProductName').checked,
    showOriginalPrice: $('#lblPmShowOriginalPrice').checked,
    showPromoPrice: $('#lblPmShowPromoPrice').checked,
    showSavePercent: $('#lblPmShowSavePercent').checked,
    showSaveAmount: $('#lblPmShowSaveAmount').checked,
    showDateRange: $('#lblPmShowDateRange').checked,
    showSku: $('#lblPmShowSku').checked,
    showBarcode: $('#lblPmShowBarcode').checked,
    showBarcodeText: $('#lblPmShowBarcodeText').checked,
    promoBadgeText: $('#lblPmBadgeText').value.trim() || 'KHUYẾN MÃI',
    productNameSize: parseFloat($('#lblPmProductNameSize').value) || 8,
    promoPriceSize: parseFloat($('#lblPmPromoPriceSize').value) || 18,
    originalPriceSize: parseFloat($('#lblPmOriginalPriceSize').value) || 9,
    otherSize: parseFloat($('#lblPmOtherSize').value) || 6.5,
    barcodeHeight: parseInt($('#lblPmBarcodeHeight').value) || 24,

  Storage.set(CONFIG.storageKeys.labelPromoConfig, state.labelPromoConfig);
  toast('✓ Đã lưu cấu hình tem KM', 'success');
}

function refreshLabelPromoPreview() {
  saveLabelPromoSettings();
  const area = $('#labelPromoPreviewArea');
  if (area) area.innerHTML = renderLabelPromoPreview();
}

function renderLabelPromoPreview() {
  const sample = state.products[0] || {
    sku: 'MI001', barcode: '8934563168179',
    name: 'Mì Hảo Hảo Tôm chua cay 75g',
    unit: 'gói', price: 6000, category: 'Mì ăn liền',
  };
  // Demo promo: 25% off, runs 7 days
  const today = new Date();
  const endDate = new Date(today.getTime() + 7 * 86400000);
  const samplePromo = {
    originalPrice: sample.price || 6000,
    promoPrice: Math.round((sample.price || 6000) * 0.75),
    fromDate: fmt.shortDate(today.getTime()),
    toDate: fmt.shortDate(endDate.getTime()),
  };
  return buildPromoLabelHtml(sample, state.labelPromoConfig || CONFIG.defaults.labelPromo, samplePromo);
}

function buildPromoLabelHtml(product, cfg, promo = {}) {
  const c = cfg || state.labelPromoConfig || CONFIG.defaults.labelPromo;
  const w = c.pageWidth || 50;
  const h = c.pageHeight || 30;
  const orig = parseInt(promo.originalPrice) || product.price || 0;
  const promoPrice = parseInt(promo.promoPrice) || orig;
  const saveAmt = orig - promoPrice;
  const savePct = orig > 0 ? Math.round((saveAmt / orig) * 100) : 0;
  const fromDate = promo.fromDate || '';
  const toDate = promo.toDate || '';
  const promoColor = c.promoColor || '#D32F2F';
  const barcodeSvg = c.showBarcode ? generateCode128SVG(product.barcode || product.sku || '', { height: c.barcodeHeight || 24, width: w * 3.5 }) : '';

  return `
    <div class="vc-label-promo" style="
      width:${w}mm; height:${h}mm;
      padding:1.5mm; box-sizing:border-box;
      background:white; color:#000;
      font-family:Arial, sans-serif; font-size:${c.otherSize}pt;
      display:flex; flex-direction:column; gap:0.4mm;
      border:1.5px solid ${promoColor};
      page-break-inside:avoid; break-inside:avoid;
      overflow:hidden; position:relative;
    ">
      ${c.showPromoBadge ? `
        <div style="position:absolute;top:0;right:0;background:${promoColor};color:white;font-size:${Math.max(5.5, c.otherSize)}pt;font-weight:800;padding:0.4mm 1.5mm;letter-spacing:0.5px;border-bottom-left-radius:3mm;line-height:1.1">
          ${escapeHtml(c.promoBadgeText || 'KHUYẾN MÃI')}
        </div>
      ` : ''}

      ${c.showProductName ? `

/* === Code128 barcode generator (pure JS, no library) === */
const CODE128_PATTERNS = ["11011001100","11001101100","11001100110","10010011000","10010001100","10001001100","10011001000","10011000100","10001100100","11001001000","11001000100","11000100100","10110011100","10011011100","10011001110","10111001100","10011101100","10011100110","11001110010","11001011100","11001001110","11011100100","11001110100","11101101110","11101001100","11100101100","11100100110","11101100100","11100110100","11100110010","11011011000","11011000110","11000110110","10100011000","10001011000","10001000110","10110001000","10001101000","10001100010","11010001000","11000101000","11000100010","10110111000","10110001110","10001101110","10111011000","10111000110","10001110110","11101110110","11010001110","11000101110","11011101000","11011100010","11011101110","11101011000","11101000110","11100010110","11101101000","11101100010","11100011010","11101111010","11001000010","11110001010","10100110000","10100001100","10010110000","10010000110","10000101100","10000100110","10110010000","10110000100","10011010000","10011000010","10000110100","10000110010","11000010010","11001010000","11110111010","11000010100","10001111010","10100111100","10010111100","10010011110","10111100100","10011110100","10011110010","11110100100","11110010100","11110010010","11011011110","11011110110","11110110110","10101111000","10100011110","10001011110","10111101000","10111100010","11110101000","11110100010","10111011110","10111101110","11101011110","11110101110","11010000100","11010010000","11010011100","11000111010"];
function generateCode128SVG(text, opts = {}) {
  // Strip non-ASCII chars (Vietnamese, Unicode) to avoid silent mis-encoding
  // Code128 set B only supports ASCII 32-126. Other chars are skipped + warning logged.
  let raw = String(text || '').trim();
  const cleaned = raw.replace(/[^\x20-\x7E]/g, '');
  if (cleaned !== raw && typeof console !== 'undefined') {
    console.warn('[Code128] Bỏ qua ký tự không hợp lệ (Unicode/tiếng Việt) trong:', raw, '→', cleaned);
  }
  const t = cleaned;
  if (!t) return '<!-- empty barcode -->';

  const height = opts.height || 30;
  const moduleW = opts.moduleW || 1.4;

  const codes = [];
  codes.push(104);  // Start B
  let checksum = 104;
  for (let i = 0; i < t.length; i++) {
    const v = t.charCodeAt(i) - 32;  // ASCII 32-126 maps to 0-94 in Code128 set B
    codes.push(v);
    checksum += v * (i + 1);
  }
  codes.push(checksum % 103);  // Checksum
  codes.push(106);  // Stop

  let bits = '';
  for (const c of codes) bits += CODE128_PATTERNS[c];
  const totalW = bits.length * moduleW;

  let x = 0;
  let bars = '';
  for (let k = 0; k < bits.length; k++) {
    if (bits[k] === '1') {
      bars += `<rect x="${x.toFixed(2)}" y="0" width="${moduleW}" height="${height}" fill="#000"/>`;
    }
    x += moduleW;
  }
  // preserveAspectRatio="xMidYMid meet" preserves bar widths even if container forces resize
  // Adding explicit shape-rendering for sharper bars
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${totalW.toFixed(2)}" height="${height}" viewBox="0 0 ${totalW.toFixed(2)} ${height}" preserveAspectRatio="xMidYMid meet" shape-rendering="crispEdges" style="max-width:100%;height:auto">${bars}</svg>`;
}

/* === Multi-SKU print queue interface === */
function ensureInvSelection() {
  if (!state.invSelectedSkus) state.invSelectedSkus = new Set();
}

function toggleInvRowSelection(sku, checked) {
  ensureInvSelection();
  if (checked) state.invSelectedSkus.add(sku);
  else state.invSelectedSkus.delete(sku);
  updateInvBulkBar();
  // Update row visual without full re-render
  const tr = document.querySelector(`#invTable tbody tr[data-sku="${cssEscape(sku)}"]`);
  if (tr) {
    if (checked) {
      tr.dataset.bgOriginal = tr.style.background || '';
      tr.style.background = '#E3F2FD';
    } else {
      tr.style.background = tr.dataset.bgOriginal || '';
      delete tr.dataset.bgOriginal;
    }
  }
  // Sync select-all checkbox state
  syncSelectAllCheckbox();
}

function toggleInvSelectAll(checked) {
  ensureInvSelection();
  // Only operate on currently visible rows (respect filters)
  const visibleRows = $$('#invTable tbody tr').filter(tr => tr.style.display !== 'none');
  visibleRows.forEach(tr => {
    const sku = tr.dataset.sku;
    if (!sku) return;
    const cb = tr.querySelector('.inv-row-check');
    if (cb) cb.checked = checked;
    if (checked) {
      state.invSelectedSkus.add(sku);
      tr.dataset.bgOriginal = tr.style.background || '';
      tr.style.background = '#E3F2FD';
    } else {
      state.invSelectedSkus.delete(sku);
      tr.style.background = tr.dataset.bgOriginal || '';
      delete tr.dataset.bgOriginal;
    }
  });
  updateInvBulkBar();
}

function syncSelectAllCheckbox() {
  const all = $('#invSelectAll');
  if (!all) return;
  const visibleRows = $$('#invTable tbody tr').filter(tr => tr.style.display !== 'none');
  if (visibleRows.length === 0) { all.checked = false; all.indeterminate = false; return; }
  const checkedCount = visibleRows.filter(tr => tr.querySelector('.inv-row-check')?.checked).length;
  all.checked = checkedCount === visibleRows.length;
  all.indeterminate = checkedCount > 0 && checkedCount < visibleRows.length;
}

function clearInvSelection() {
  state.invSelectedSkus = new Set();
  $$('#invTable tbody tr').forEach(tr => {
    const cb = tr.querySelector('.inv-row-check');
    if (cb) cb.checked = false;
    tr.style.background = tr.dataset.bgOriginal || '';
    delete tr.dataset.bgOriginal;
  });
  syncSelectAllCheckbox();
  updateInvBulkBar();
}

function updateInvBulkBar() {
  ensureInvSelection();
  const bar = $('#invBulkBar');
  if (!bar) return;
  const count = state.invSelectedSkus.size;
  if (count > 0) {
    bar.style.display = 'flex';
    const c = $('#invSelCount');
    const c2 = $('#invSelCountInline');
    if (c) c.textContent = count.toLocaleString('vi-VN');
    if (c2) c2.textContent = count.toLocaleString('vi-VN');
  } else {
    bar.style.display = 'none';
  }
}

function bulkPrintSelected(labelType, withPromo = null) {
  ensureInvSelection();
  if (state.invSelectedSkus.size === 0) {
    toast('Chưa chọn SP nào', 'warning');
    return;
  }
  // Pre-fill labelPrintQueue from selection + open modal in correct mode
  state.labelPrintQueue = [];
  state._labelGlobalMode = labelType;
  const today = new Date();
  const endDate = new Date(today.getTime() + 7 * 86400000);
  const isBig = labelType !== 'small';
  // Big formats always with promo. Small can be normal (withPromo=false) or with KM (withPromo=true).
  // If withPromo is null (not specified), default = false for small.
  const wantPromo = isBig || withPromo === true;
  if (labelType === 'small') state._labelAutoPromoOnAdd = withPromo === true;
  Array.from(state.invSelectedSkus).forEach(sku => {
    const p = state.products.find(x => x.sku === sku);
    if (!p) return;
    const item = { sku, qty: state.labelConfig?.defaultQty || 1, labelType };
    if (wantPromo) {
      item.isPromo = true;
      item.promo = {
        originalPrice: p.price,
        promoPrice: Math.round(p.price * 0.75),
        fromDate: fmt.shortDate(today.getTime()),
        toDate: fmt.shortDate(endDate.getTime()),
      };
    }
    state.labelPrintQueue.push(item);
  });
  openLabelPrintModal([], { mode: labelType, autoPromo: wantPromo });
}

// CSS.escape polyfill for older browsers
function cssEscape(s) {
  s = String(s || '');
  if (!s) return '_empty_';
  if (typeof CSS !== 'undefined' && CSS.escape) return CSS.escape(s);
  return s.replace(/[^a-zA-Z0-9_-]/g, c => '\\' + c);
}

function openLabelPrintModal(preselectedSkus = [], opts = {}) {
  if (!state.products || state.products.length === 0) {
    toast('Chưa có sản phẩm nào trong kho', 'warning');
    return;
  }
  if (!state.labelPrintQueue) state.labelPrintQueue = [];
  if (preselectedSkus.length > 0 && state.labelPrintQueue.length === 0) {
    preselectedSkus.forEach(sku => {
      const p = state.products.find(x => x.sku === sku);
      if (p) state.labelPrintQueue.push({ sku: p.sku, qty: state.labelConfig?.defaultQty || 1 });
    });
  }
  // Mode is one of LABEL_TYPES keys: 'small' | 'a6' | 'a5' | 'a4'
  // Always default to 'small' (most common case = tem giá thường)
  if (opts.mode && LABEL_TYPES[opts.mode]) state._labelGlobalMode = opts.mode;
  if (!state._labelGlobalMode || !LABEL_TYPES[state._labelGlobalMode]) state._labelGlobalMode = 'small';
  // Auto-enable promo when caller passes opts.autoPromo (used for the "🔥 Tem KM" button)
  if (opts.autoPromo === true) state._labelAutoPromoOnAdd = true;
  if (opts.autoPromo === false) state._labelAutoPromoOnAdd = false;

  const totalQty = state.labelPrintQueue.reduce((s,i)=>s+(i.qty||1), 0);
  const promoCount = state.labelPrintQueue.filter(i => i.isPromo).length;

  showModal(`
    <div class="modal-header">
      <h2>🏷 In tem giá</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">

      ${(()=>{
        const m = state._labelGlobalMode || 'small';
        const lt = LABEL_TYPES[m];
        const isSmall = m === 'small';
        const autoKM = state._labelAutoPromoOnAdd === true;
        const expanded = state._labelTypesExpanded === true;

        // Section 1: Currently-selected type — prominent card
        const activeCard = `
          <div style="background:${lt.bgColor};border:2px solid ${lt.color};border-radius:10px;padding:13px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px">
            <div style="font-size:32px;line-height:1">${lt.icon}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:14px;font-weight:700;color:${lt.color};line-height:1.2">${escapeHtml(lt.name)} — ${escapeHtml(lt.role)}</div>
              <div style="font-size:11px;color:var(--gray-700);margin-top:3px;line-height:1.3">${escapeHtml(lt.description)}</div>
              <div style="font-size:10.5px;color:${lt.color};font-weight:600;margin-top:3px">📐 ${escapeHtml(lt.sizeOptions[0].label)}</div>
            </div>
            ${isSmall ? `
              <label style="display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 14px;border:2px solid ${autoKM?'#D32F2F':'var(--gray-300)'};border-radius:8px;background:${autoKM?'#FFEBEE':'white'};white-space:nowrap;font-family:var(--font-ui);min-width:115px">
                <div style="display:flex;align-items:center;gap:5px">
                  <input type="checkbox" ${autoKM?'checked':''} onchange="toggleAutoPromoMode(this.checked)" style="width:16px;height:16px;cursor:pointer;accent-color:#D32F2F">
                  <strong style="color:${autoKM?'#B71C1C':'var(--gray-700)'};font-size:12.5px">🔥 KM</strong>
                </div>
                <span style="font-size:9.5px;color:${autoKM?'#B71C1C':'var(--gray-500)'};line-height:1.2;text-align:center">SP mới tự bật<br>giá KM -25%</span>
              </label>
            ` : ''}
          </div>
        `;

        // Section 2: Toggle "Đổi loại tem khác" ▼
        const toggleBtn = `
          <div style="margin-bottom:14px">
            <button onclick="toggleLabelTypesExpanded()" style="width:100%;padding:8px 13px;background:${expanded?'var(--navy-light)':'white'};color:${expanded?'var(--navy-dark)':'var(--gray-700)'};border:1px dashed ${expanded?'var(--navy)':'var(--gray-300)'};border-radius:7px;cursor:pointer;font-size:12px;font-family:var(--font-ui);font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px">
              ${expanded ? '▲ Ẩn loại tem khác' : '▼ Đổi loại tem khác (A6 / A5 / A4)'}
            </button>
            ${expanded ? `
              <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;padding:11px;background:var(--gray-50);border-radius:7px">
                ${Object.entries(LABEL_TYPES).map(([k, lk]) => {
                  const active = m === k;
                  return `<button onclick="setLabelGlobalMode('${k}')" style="padding:10px 6px;border:2px solid ${active?lk.color:'var(--gray-300)'};border-radius:7px;background:${active?lk.bgColor:'white'};color:${active?lk.color:'var(--gray-700)'};font-weight:${active?'700':'500'};cursor:pointer;font-family:var(--font-ui);transition:all 0.12s;text-align:center">
                    <div style="font-size:16px;line-height:1;margin-bottom:2px">${lk.icon}</div>
                    <div style="font-size:11.5px;font-weight:700">${escapeHtml(lk.name)}</div>
                    <div style="font-size:9px;font-weight:600;margin-top:2px;opacity:0.85">${escapeHtml(lk.role)}</div>
                  </button>`;
                }).join('')}
              </div>
            ` : ''}
          </div>
        `;

        return activeCard + toggleBtn;
      })()}

      ${state.labelPrintQueue.length > 0 ? `
        <div style="display:flex;gap:8px;align-items:center;padding:10px 12px;background:#F5F5F5;border-radius:6px;margin-bottom:11px;font-size:12px">
          <span data-label-counter style="color:var(--gray-700)"><strong>${state.labelPrintQueue.length}</strong> SP · <strong>${totalQty}</strong> tem · ${promoCount > 0 ? `<span style="color:#D32F2F"><strong>${promoCount}</strong> tem KM</span>` : '0 tem KM'}</span>
          <button onclick="bulkSetPromoForAll(true)" style="margin-left:auto;font-size:11px;padding:5px 10px;background:#FFEBEE;color:#D32F2F;border:1px solid #FFCDD2;border-radius:4px;cursor:pointer;font-weight:600">🔥 Bật KM cho tất cả</button>
          <button onclick="bulkSetPromoForAll(false)" style="font-size:11px;padding:5px 10px;background:white;color:var(--gray-700);border:1px solid var(--gray-300);border-radius:4px;cursor:pointer">Tắt KM tất cả</button>
        </div>
      ` : ''}
      <div class="form-group">
        <label>🔍 Tìm SKU / barcode / tên SP để thêm</label>
        <input id="lblSearchSku" type="text" placeholder="Gõ SKU hoặc tên SP..." oninput="searchProductForLabel(this.value)" autocomplete="off">
        <div id="lblSearchResults" style="background:white;border:1px solid var(--gray-300);border-radius:6px;max-height:180px;overflow-y:auto;display:none;margin-top:4px"></div>
      </div>
      <div style="margin-top:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <strong style="font-size:13px">📋 Danh sách in (${state.labelPrintQueue.length} SKU)</strong>
          ${state.labelPrintQueue.length > 0 ? `<button class="btn btn-sm btn-ghost" onclick="clearLabelQueue()" style="font-size:11px;padding:4px 10px">🗑 Xoá tất cả</button>` : ''}
        </div>
        <div id="lblQueueList" style="max-height:280px;overflow-y:auto">${renderLabelQueueList()}</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-primary" data-label-submit onclick="printLabelQueue()" ${state.labelPrintQueue.length === 0 ? 'disabled' : ''}>
        🖨 In ${state.labelPrintQueue.reduce((s,i)=>s+(i.qty||1), 0)} tem
      </button>
    </div>
  `, {size:'md'});
}

function renderLabelQueueList() {
  if (!state.labelPrintQueue || state.labelPrintQueue.length === 0) {

    const p = state.products.find(x => x.sku === item.sku);
    if (!p) return '';
    const isPromo = !!item.isPromo;
    const isBigFormat = item.labelType && item.labelType !== 'small';
    const today = new Date();
    const defaultEnd = new Date(today.getTime() + 7 * 86400000);
    const promoFrom = item.promo?.fromDate || fmt.shortDate(today.getTime());
    const promoTo = item.promo?.toDate || fmt.shortDate(defaultEnd.getTime());
    const promoPrice = item.promo?.promoPrice ?? '';
    const originalPrice = item.promo?.originalPrice ?? p.price;
    return `
      <div style="border:${isPromo?'2px solid #D32F2F':'1px solid var(--gray-200)'};border-radius:8px;margin-bottom:8px;background:${isPromo?'#FFF8F8':'white'};overflow:hidden">
        <div style="display:flex;align-items:center;gap:10px;padding:10px 12px">

            <div style="font-weight:600;font-size:13px;line-height:1.3;overflow:hidden;text-overflow:ellipsis">

                const lblType = item.labelType || 'small';
                const lt = LABEL_TYPES[lblType];
                if (lblType === 'small' && !isPromo) return '';
                if (lblType === 'small' && isPromo) return '<span style="background:#D32F2F;color:white;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:9px;margin-right:6px;letter-spacing:0.3px">🔥 KM</span>';
                return `<span style="background:${lt.color};color:white;font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:9px;margin-right:6px;letter-spacing:0.3px">${lt.icon} ${escapeHtml(lt.name)} - ${escapeHtml(lt.role)}</span>`;
              })()}
              ${escapeHtml(p.name)}
            </div>
            <div style="font-size:10.5px;color:var(--gray-500);margin-top:2px;font-family:var(--font-num)">${escapeHtml(p.sku)} · Giá gốc ${fmt.money(p.price)}</div>
          </div>
          ${!isBigFormat ? `<label style="display:flex;align-items:center;gap:5px;font-size:11.5px;color:#D32F2F;cursor:pointer;font-weight:600;white-space:nowrap;padding:5px 10px;border:1.5px solid ${isPromo?'#D32F2F':'var(--gray-300)'};border-radius:5px;background:${isPromo?'#FFEBEE':'white'}">
            <input type="checkbox" ${isPromo?'checked':''} onchange="togglePromoLabel(${idx})">
            🔥 Tem KM
          </label>` : ''}
          <div style="display:flex;align-items:center;gap:6px">
            <button onclick="updateLabelQty(${idx}, -1)" style="width:28px;height:28px;border:1px solid var(--gray-300);background:white;border-radius:5px;cursor:pointer;font-size:14px;font-weight:600">−</button>
            <input type="number" min="1" max="999" value="${item.qty}" onchange="setLabelQty(${idx}, this.value)" style="width:55px;text-align:center;padding:5px;border:1px solid var(--gray-300);border-radius:5px;font-family:var(--font-num);font-weight:600">
            <button onclick="updateLabelQty(${idx}, 1)" style="width:28px;height:28px;border:1px solid var(--gray-300);background:white;border-radius:5px;cursor:pointer;font-size:14px;font-weight:600">+</button>
          </div>
          <button onclick="removeFromLabelQueue(${idx})" style="background:transparent;border:none;color:var(--red);cursor:pointer;font-size:18px;padding:0 4px" title="Xoá">×</button>
        </div>
        ${(isPromo || isBigFormat) ? `
          <div style="padding:10px 12px;background:#FFEBEE;border-top:1px dashed #FFCDD2;display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:11.5px">
            <div>
              <label style="display:block;font-weight:600;color:#B71C1C;margin-bottom:3px">Giá gốc</label>
              <input type="number" min="0" step="500" value="${originalPrice}" onchange="updatePromoField(${idx}, 'originalPrice', this.value)" style="width:100%;padding:6px 8px;border:1px solid #FFCDD2;border-radius:4px;font-family:var(--font-num);font-weight:600;background:white">
            </div>
            <div>
              <label style="display:block;font-weight:600;color:#B71C1C;margin-bottom:3px">Giá KM <span style="color:var(--gray-600);font-weight:400;font-size:10.5px">(rẻ hơn)</span></label>
              <input type="number" min="0" step="500" value="${promoPrice}" onchange="updatePromoField(${idx}, 'promoPrice', this.value)" placeholder="VD: ${Math.round((p.price||0)*0.75)}" style="width:100%;padding:6px 8px;border:1px solid #FFCDD2;border-radius:4px;font-family:var(--font-num);font-weight:600;background:white;color:#D32F2F">
            </div>
            <div>
              <label style="display:block;font-weight:600;color:#B71C1C;margin-bottom:3px">Từ ngày</label>
              <input type="date" value="${dateStrToInput(promoFrom)}" onchange="updatePromoField(${idx}, 'fromDate', dateInputToStr(this.value))" style="width:100%;padding:6px 8px;border:1px solid #FFCDD2;border-radius:4px;font-family:var(--font-num);background:white">
            </div>
            <div>
              <label style="display:block;font-weight:600;color:#B71C1C;margin-bottom:3px">Đến ngày</label>
              <input type="date" value="${dateStrToInput(promoTo)}" onchange="updatePromoField(${idx}, 'toDate', dateInputToStr(this.value))" style="width:100%;padding:6px 8px;border:1px solid #FFCDD2;border-radius:4px;font-family:var(--font-num);background:white">
            </div>
            <div style="grid-column:span 2;display:flex;gap:8px;font-size:11px;color:var(--gray-700)">
              <button onclick="setPromoQuickDiscount(${idx}, 10)" style="flex:1;padding:5px;background:white;border:1px solid #FFCDD2;border-radius:4px;cursor:pointer;font-weight:600;color:#D32F2F" onmouseover="this.style.background='#FFEBEE'" onmouseout="this.style.background='white'">−10%</button>
              <button onclick="setPromoQuickDiscount(${idx}, 15)" style="flex:1;padding:5px;background:white;border:1px solid #FFCDD2;border-radius:4px;cursor:pointer;font-weight:600;color:#D32F2F" onmouseover="this.style.background='#FFEBEE'" onmouseout="this.style.background='white'">−15%</button>
              <button onclick="setPromoQuickDiscount(${idx}, 20)" style="flex:1;padding:5px;background:white;border:1px solid #FFCDD2;border-radius:4px;cursor:pointer;font-weight:600;color:#D32F2F" onmouseover="this.style.background='#FFEBEE'" onmouseout="this.style.background='white'">−20%</button>
              <button onclick="setPromoQuickDiscount(${idx}, 25)" style="flex:1;padding:5px;background:white;border:1px solid #FFCDD2;border-radius:4px;cursor:pointer;font-weight:600;color:#D32F2F" onmouseover="this.style.background='#FFEBEE'" onmouseout="this.style.background='white'">−25%</button>
              <button onclick="setPromoQuickDiscount(${idx}, 30)" style="flex:1;padding:5px;background:white;border:1px solid #FFCDD2;border-radius:4px;cursor:pointer;font-weight:600;color:#D32F2F" onmouseover="this.style.background='#FFEBEE'" onmouseout="this.style.background='white'">−30%</button>
              <button onclick="setPromoQuickDiscount(${idx}, 50)" style="flex:1;padding:5px;background:white;border:1px solid #FFCDD2;border-radius:4px;cursor:pointer;font-weight:600;color:#D32F2F" onmouseover="this.style.background='#FFEBEE'" onmouseout="this.style.background='white'">−50%</button>
            </div>
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

function setLabelGlobalMode(mode) {
  state._labelGlobalMode = mode;
  // Switching to a big format (a6/a5/a4) implies auto-promo
  // Switching to small does NOT change auto-promo flag — user controls it
  refreshLabelPrintModal(true);  // full re-open since type cards change
}

function toggleAutoPromoMode(enabled) {
  state._labelAutoPromoOnAdd = !!enabled;
  // If toggling ON: also enable KM for ALL existing items in queue (helpful)
  // If toggling OFF: leave existing items unchanged (don't surprise the user)
  if (enabled && state.labelPrintQueue && state.labelPrintQueue.length > 0) {
    bulkSetPromoForAll(true);  // already calls refreshLabelPrintModal
    return;
  }
  refreshLabelPrintModal(true);
}

function toggleLabelTypesExpanded() {
  state._labelTypesExpanded = !state._labelTypesExpanded;
  refreshLabelPrintModal(true);
}

function bulkSetPromoForAll(enable) {
  if (!state.labelPrintQueue) return;
  const today = new Date();
  const endDate = new Date(today.getTime() + 7 * 86400000);
  state.labelPrintQueue.forEach(item => {
    item.isPromo = enable;
    if (enable && !item.promo) {
      const p = state.products.find(x => x.sku === item.sku);
      if (p) {
        item.promo = {
          originalPrice: p.price,
          promoPrice: Math.round(p.price * 0.75),
          fromDate: fmt.shortDate(today.getTime()),
          toDate: fmt.shortDate(endDate.getTime()),
        };
      }
    }
  });
  refreshLabelPrintModal();
  toast(enable ? `✓ Đã bật KM cho ${state.labelPrintQueue.length} SP` : `Đã tắt KM`, 'success', 1500);
}

function togglePromoLabel(idx) {
  const item = state.labelPrintQueue[idx];
  if (!item) return;
  item.isPromo = !item.isPromo;
  if (item.isPromo && !item.promo) {
    const p = state.products.find(x => x.sku === item.sku);
    if (p) {
      const today = new Date();
      const endDate = new Date(today.getTime() + 7 * 86400000);
      item.promo = {
        originalPrice: p.price,
        promoPrice: Math.round(p.price * 0.75),
        fromDate: fmt.shortDate(today.getTime()),
        toDate: fmt.shortDate(endDate.getTime()),
      };
    }
  }
  refreshLabelPrintModal();
}

function updatePromoField(idx, field, value) {
  const item = state.labelPrintQueue[idx];
  if (!item) return;
  if (!item.promo) item.promo = {};
  if (field === 'originalPrice' || field === 'promoPrice') {
    item.promo[field] = parseInt(value) || 0;
  } else {
    item.promo[field] = value;
  }
}

function setPromoQuickDiscount(idx, percent) {
  const item = state.labelPrintQueue[idx];
  if (!item) return;
  const p = state.products.find(x => x.sku === item.sku);
  if (!p) return;
  if (!item.promo) item.promo = {};
  item.promo.originalPrice = p.price;
  item.promo.promoPrice = Math.round(p.price * (100 - percent) / 100);
  refreshLabelPrintModal();
}

// Date string conversions: 'dd/mm/yyyy' <-> 'yyyy-mm-dd'
function dateStrToInput(s) {
  if (!s) return '';
  const parts = s.split('/');
  if (parts.length !== 3) return '';
  return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
}
function dateInputToStr(s) {
  if (!s) return '';
  const parts = s.split('-');
  if (parts.length !== 3) return s;
  return `${parts[2]}/${parts[1]}/${parts[0]}`;
}

let _labelSearchTimer = null;
function searchProductForLabel(query) {
  clearTimeout(_labelSearchTimer);
  _labelSearchTimer = setTimeout(() => {
    const q = (query||'').trim().toLowerCase();
    const dropdown = $('#lblSearchResults');
    if (!dropdown) return;
    if (!q) { dropdown.style.display = 'none'; return; }
    const matches = state.products.filter(p => {
      const text = `${p.sku} ${p.barcode||''} ${p.name}`.toLowerCase();
      return text.includes(q);
    }).slice(0, 15);
    if (matches.length === 0) {
      dropdown.innerHTML = `<div style="padding:11px 14px;color:var(--gray-500);font-size:12px;text-align:center">Không tìm thấy SP</div>`;
    } else {
      dropdown.innerHTML = matches.map(p => `
        <div onclick="addToLabelQueue('${escapeHtml(p.sku)}')" style="padding:8px 12px;border-bottom:1px solid var(--gray-100);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px" onmouseover="this.style.background='var(--navy-light)'" onmouseout="this.style.background='white'">
          <div style="flex:1;min-width:0">
            <div style="font-weight:500;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(p.name)}</div>
            <div style="font-size:10.5px;color:var(--gray-500);font-family:var(--font-num);margin-top:2px">${escapeHtml(p.sku)}${p.barcode && p.barcode !== p.sku ? ' · ' + escapeHtml(p.barcode) : ''}</div>
          </div>
          <div style="font-family:var(--font-num);font-weight:600;color:var(--navy-dark);font-size:12.5px;white-space:nowrap">${fmt.money(p.price)}</div>
        </div>
      `).join('');
    }
    dropdown.style.display = 'block';
  }, 150);
}

function addToLabelQueue(sku) {
  const p = state.products.find(x => x.sku === sku);
  if (!p) return;
  if (!state.labelPrintQueue) state.labelPrintQueue = [];
  const existing = state.labelPrintQueue.find(i => i.sku === sku);
  if (existing) {
    existing.qty = (existing.qty || 1) + 1;
  } else {
    const mode = state._labelGlobalMode || 'small';
    const newItem = { sku, qty: state.labelConfig?.defaultQty || 1, labelType: mode };
    // Auto-promo when:
    //  - Big format (a6/a5/a4) — always
    //  - Small format AND _labelAutoPromoOnAdd = true (user toggled "🔥 KM")
    const shouldPromo = (mode === 'a6' || mode === 'a5' || mode === 'a4') ||
                        (mode === 'small' && state._labelAutoPromoOnAdd === true);
    if (shouldPromo) {
      const today = new Date();
      const endDate = new Date(today.getTime() + 7 * 86400000);
      newItem.isPromo = true;
      newItem.promo = {
        originalPrice: p.price,
        promoPrice: Math.round(p.price * 0.75),
        fromDate: fmt.shortDate(today.getTime()),
        toDate: fmt.shortDate(endDate.getTime()),
      };
    }
    state.labelPrintQueue.push(newItem);
  }
  $('#lblSearchSku').value = '';
  $('#lblSearchResults').style.display = 'none';
  refreshLabelPrintModal();
  const lt = LABEL_TYPES[state._labelGlobalMode || 'small'];
  const promoMark = state._labelAutoPromoOnAdd && state._labelGlobalMode === 'small' ? ' 🔥' : '';
  toast(`+ ${p.name} ${lt?.icon || ''}${promoMark}`, 'success', 1300);
}

function removeFromLabelQueue(idx) {
  state.labelPrintQueue.splice(idx, 1);
  refreshLabelPrintModal();
}

function updateLabelQty(idx, delta) {
  const item = state.labelPrintQueue[idx];
  if (!item) return;
  item.qty = Math.max(1, Math.min(999, (item.qty || 1) + delta));
  refreshLabelPrintModal();
}

function setLabelQty(idx, val) {
  const item = state.labelPrintQueue[idx];
  if (!item) return;
  item.qty = Math.max(1, Math.min(999, parseInt(val) || 1));
  refreshLabelPrintModal();
}

function clearLabelQueue() {
  state.labelPrintQueue = [];
  refreshLabelPrintModal();
}

function refreshLabelPrintModal(forceFullReopen = false) {
  if (!forceFullReopen) {
    // Try in-place re-render of queue + counter (preserves scroll + focus)
    const queueArea = document.getElementById('lblQueueList');
    if (queueArea) {
      queueArea.innerHTML = renderLabelQueueList();
      const totalQty = state.labelPrintQueue.reduce((s,i)=>s+(i.qty||1), 0);
      const promoCount = state.labelPrintQueue.filter(i => i.isPromo).length;
      const counter = document.querySelector('[data-label-counter]');
      if (counter) {
        counter.innerHTML = `<strong>${state.labelPrintQueue.length}</strong> SP · <strong>${totalQty}</strong> tem · ${promoCount > 0 ? `<span style="color:#D32F2F"><strong>${promoCount}</strong> tem KM</span>` : '0 tem KM'}`;
      }
      const submitBtn = document.querySelector('[data-label-submit]');
      if (submitBtn) {
        submitBtn.disabled = state.labelPrintQueue.length === 0;
        submitBtn.innerHTML = `🖨 In ${totalQty} tem`;
      }
      return;
    }
  }
  // Full re-open (used when label type / auto-KM toggle changes)
  closeModal();
  setTimeout(() => openLabelPrintModal(), 30);
}

function printLabelQueue() {
  if (!state.labelPrintQueue || state.labelPrintQueue.length === 0) return;
  const items = state.labelPrintQueue.map(i => ({
    product: state.products.find(p => p.sku === i.sku),
    qty: i.qty || 1,
    isPromo: i.isPromo || false,      // ★ Fix: giữ lại flag KM
    promo: i.promo || null,           // ★ Fix: giữ lại thông tin KM
    labelType: i.labelType || 'small', // ★ Fix: giữ lại loại khổ giấy
  })).filter(x => x.product);
  if (items.length === 0) return;
  printLabels(items);
}

/* === Engine: open print window with label HTML === */
function printLabels(items) {
  const normalCfg = state.labelConfig || CONFIG.defaults.label;
  const promoCfg = state.labelPromoConfig || CONFIG.defaults.labelPromo;
  const a6Cfg = state.labelA6Config || CONFIG.defaults.labelA6;
  const a5Cfg = state.labelA5Config || CONFIG.defaults.labelA5;
  const a4Cfg = state.labelA4Config || CONFIG.defaults.labelA4;

  // Group items by output category — each category = separate print window with its own @page size
  const groups = { small: [], smallPromo: [], a6: [], a5: [], a4: [] };
  items.forEach(item => {
    const lt = item.labelType || 'small';
    if (lt === 'a6') groups.a6.push(item);
    else if (lt === 'a5') groups.a5.push(item);
    else if (lt === 'a4') groups.a4.push(item);
    else if (item.isPromo) groups.smallPromo.push(item);
    else groups.small.push(item);
  });

  // Determine which groups have items
  const activeGroups = Object.entries(groups).filter(([k, arr]) => arr.length > 0);
  if (activeGroups.length === 0) { toast('Không có tem nào để in', 'warning'); return; }

  // If mixed types — confirm with user before opening multiple print windows
  if (activeGroups.length > 1) {
    const summary = activeGroups.map(([k, arr]) => {
      const label = k === 'small' ? 'Tem nhỏ thường' : k === 'smallPromo' ? 'Tem nhỏ KM' : `Tem ${k.toUpperCase()}`;
      const qty = arr.reduce((s, i) => s + (i.qty || 1), 0);
      return `${label}: ${qty} tem`;
    }).join(', ');
    if (!confirm(`Tem có ${activeGroups.length} loại khổ giấy khác nhau (${summary}).\n\nMỗi loại sẽ mở 1 cửa sổ in riêng để giấy không bị sai khổ.\n\nBấm OK để tiếp tục.`)) return;
  }

  // Open one print window per group with correct @page size
  activeGroups.forEach(([groupKey, groupItems], idx) => {
    let cfg, builderFn;
    if (groupKey === 'a4') { cfg = a4Cfg; builderFn = (p, pr) => buildBigPromoLabelHtml(p, a4Cfg, pr, 'a4'); }
    else if (groupKey === 'a5') { cfg = a5Cfg; builderFn = (p, pr) => buildBigPromoLabelHtml(p, a5Cfg, pr, 'a5'); }
    else if (groupKey === 'a6') { cfg = a6Cfg; builderFn = (p, pr) => buildBigPromoLabelHtml(p, a6Cfg, pr, 'a6'); }
    else if (groupKey === 'smallPromo') { cfg = promoCfg; builderFn = (p, pr) => buildPromoLabelHtml(p, promoCfg, pr); }
    else { cfg = normalCfg; builderFn = (p) => buildLabelHtml(p, normalCfg); }

    const groupTotal = groupItems.reduce((s, i) => s + (i.qty || 1), 0);
    const labelsHtml = groupItems.map(item => {
      return Array(item.qty || 1).fill(0).map(() => builderFn(item.product, item.promo || {})).join('\n');
    }).join('\n');

    const w = cfg.pageWidth || 40;
    const h = cfg.pageHeight || 30;
    const groupName = groupKey === 'small' ? 'Tem nhỏ thường' : groupKey === 'smallPromo' ? 'Tem nhỏ KM' : `Tem ${groupKey.toUpperCase()}`;

    const html = `
    <!DOCTYPE html>
    <html lang="vi">
    <head>
      <meta charset="utf-8">
      <title>${groupName} — ${groupTotal} tem · Vicomart</title>
      <style>
        @page { size: ${w}mm ${h}mm; margin: 0; }
        /* ★ Fix: Bắt buộc in màu nền + màu chữ đúng như trên màn hình */
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          color-adjust: exact !important;
        }
        @media print {
          body { margin: 0 !important; padding: 0 !important; background: white !important; }
          .vc-label, .vc-label-promo, .vc-label-big-a4, .vc-label-big-a5, .vc-label-big-a6 { border: none !important; box-shadow: none !important; page-break-after: always; break-after: page; }
          .vc-label:last-child, .vc-label-promo:last-child, .vc-label-big-a4:last-child, .vc-label-big-a5:last-child, .vc-label-big-a6:last-child { page-break-after: avoid; break-after: avoid; }
          .print-controls { display: none !important; }
          .labels-container { gap: 0 !important; }
        }
        body { margin: 0; padding: 8px; background: #ECEFF1; font-family: Arial, sans-serif; }
        .print-controls { position: sticky; top: 0; background: white; padding: 12px; border-bottom: 1px solid #ddd; display: flex; gap: 10px; align-items: center; margin: -8px -8px 12px; z-index: 100; }
        .print-controls button { padding: 9px 18px; background: #1565C0; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; font-family: Arial, sans-serif; }
        .print-controls button:hover { background: #0D47A1; }
        .print-controls .info { font-size: 12px; color: #555; margin-left: auto; }
        .labels-container { display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-start; }
      </style>
    </head>
    <body>
      <div class="print-controls">
        <button onclick="window.print()">🖨 In ngay (Ctrl+P)</button>
        <button onclick="window.close()" style="background:#9E9E9E">Đóng</button>
        <span class="info">${groupName} · ${groupTotal} tem · ${w}×${h}mm</span>
        <span style="font-size:11px;color:#E53935;font-weight:600;line-height:1.5;">
          ⚠️ <strong>Edge/Chrome:</strong> Ctrl+P → chọn <strong>máy in thật</strong> (không phải "Save as PDF") → More settings → bật <strong>"Background graphics"</strong>
        </span>
      </div>
      <div class="labels-container">${labelsHtml}</div>
      <scr` + `ipt>setTimeout(() => window.print(), 800);</scr` + `ipt>
    </body>
    </html>
    `;

    // Open windows staggered so user can see them
    setTimeout(() => {
      const win = window.open('', '_blank', `width=900,height=700,left=${50 + idx * 40},top=${50 + idx * 40}`);
      if (!win) {
        toast(`Trình duyệt chặn cửa sổ in (${groupName}). Cho phép popup cho trang này.`, 'error', 4500);
        return;
      }
      win.document.open();
      win.document.write(html);
      win.document.close();
    }, idx * 350);
  });

  if (activeGroups.length > 1) {
    toast(`✓ Đang mở ${activeGroups.length} cửa sổ in (mỗi khổ tem 1 cửa sổ)`, 'success', 3500);
  }
}

function saveNccSettings() {
  const oldKey = state.nccConfig?.anonKey;
  const newKeyInput = $('#nccKey').value;
  state.nccConfig = {
    ...(state.nccConfig||CONFIG.defaults.ncc),
    enabled: $('#nccEnabled').checked,
    url: $('#nccUrl').value.trim(),
    anonKey: (newKeyInput && newKeyInput !== '••••••••••••') ? newKeyInput : oldKey,
    productsTable: $('#nccProductsTable').value.trim() || 'products',
    colSku: $('#nccColSku').value.trim() || 'sku',
    colBarcode: $('#nccColBarcode').value.trim() || 'barcode',
    colName: $('#nccColName').value.trim() || 'name',
    colUnit: $('#nccColUnit').value.trim() || 'unit',
    colPrice: $('#nccColPrice').value.trim() || 'price',
    colCost: $('#nccColCost').value.trim() || 'cost',
    colCategory: $('#nccColCategory').value.trim() || 'category',
    branchStockMode: $('#nccBranchStockMode').value,
    colStock: $('#nccColStock')?.value.trim() || 'stock',
    colStockPB: $('#nccColStockPB')?.value.trim() || 'stock_pb',
    colStockVT: $('#nccColStockVT')?.value.trim() || 'stock_vt',

function savePromo(editId) {
  const get = (id, def='') => $('#'+id) ? $('#'+id).value.trim() : def;
  const getNum = (id, def=0) => parseFloat(get(id, def))||def;
  const promo = {
    id: editId || uid(),
    name: get('pmName'),
    description: get('pmDesc'),
    type: get('pmType', 'percent_cart'),
    value: getNum('pmValue'),
    sku: get('pmSku'),
    category: get('pmCategory'),
    buyQty: parseInt(get('pmBuyQty'))||0,
    freeQty: parseInt(get('pmFreeQty'))||0,
    giftSku: get('pmGiftSku'),
    code: get('pmCode').toUpperCase(),
    couponType: get('pmCouponType', 'percent'),
    minTotal: parseInt(get('pmMinTotal'))||0,
    startDate: get('pmStartDate'),
    endDate: get('pmEndDate'),
    daysOfWeek: _promoEditDow.slice().sort(),
    startHour: parseInt(get('pmStartHour'))||0,
    endHour: parseInt(get('pmEndHour'))||23,
    active: $('#pmActive')?.checked !== false,
    autoApply: $('#pmAutoApply')?.checked !== false,
    createdAt: editId ? (state.promotions.find(p=>p.id===editId)?.createdAt || Date.now()) : Date.now(),
  };
  if (!promo.name) { toast('Nhập tên KM', 'warning'); return; }
  if (promo.type === 'coupon' && !promo.code) { toast('Mã coupon không được rỗng', 'warning'); return; }
  state.promotions = state.promotions || [];
  if (editId) {
    const i = state.promotions.findIndex(p => p.id === editId);
    if (i >= 0) state.promotions[i] = promo;
  } else {
    state.promotions.push(promo);
  }
  Storage.set(CONFIG.storageKeys.promotions, state.promotions);
  closeModal();
  toast(editId ? '✓ Đã cập nhật KM' : '✓ Đã tạo KM mới', 'success');
  openSettingsModal('promotions');
}

function togglePromo(id) {
  const p = state.promotions.find(x => x.id === id);
  if (!p) return;
  p.active = !p.active;
  Storage.set(CONFIG.storageKeys.promotions, state.promotions);
  switchSettingsTab('promotions');
}

function deletePromo(id) {
  if (!confirm('Xoá KM này?')) return;
  state.promotions = state.promotions.filter(x => x.id !== id);
  Storage.set(CONFIG.storageKeys.promotions, state.promotions);
  switchSettingsTab('promotions');
}

function todayTransactions() {
  const today = new Date(); today.setHours(0,0,0,0);
  return state.transactions.filter(t => t.createdAt >= today.getTime() && t.branch === state.shift.branch);
}

let _orderRange = 'today';
let _orderFromTs = 0;
let _orderToTs = Date.now();

function getOrderDateRange(rangeId) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const tomorrow = today + 86400000;
  if (rangeId === 'today') return { from: today, to: tomorrow };
  if (rangeId === 'yesterday') return { from: today - 86400000, to: today };
  if (rangeId === '7days') return { from: today - 6*86400000, to: tomorrow };
  if (rangeId === '30days') return { from: today - 29*86400000, to: tomorrow };
  if (rangeId === 'this-month') return { from: new Date(now.getFullYear(), now.getMonth(), 1).getTime(), to: tomorrow };
  if (rangeId === 'last-month') {
    const lm = new Date(now.getFullYear(), now.getMonth()-1, 1).getTime();
    const tm = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
    return { from: lm, to: tm };
  }
  if (rangeId === 'all') return { from: 0, to: Date.now() + 86400000 };
  if (rangeId === 'custom') return { from: _orderFromTs, to: _orderToTs };
  return { from: today, to: tomorrow };
}

function getRangeTransactions() {
  const r = getOrderDateRange(_orderRange);
  return state.transactions.filter(t =>
    t.createdAt >= r.from && t.createdAt < r.to && t.branch === state.shift.branch
  );
}

function setOrderRange(r) {
  _orderRange = r;
  if (r === 'custom') {
    const today = new Date(); today.setHours(0,0,0,0);
    _orderFromTs = today.getTime() - 6*86400000;
    _orderToTs = today.getTime() + 86400000;
  }
  switchMgmtTab('sales-today');
}

function setOrderCustomDate(which, dateStr) {
  if (!dateStr) return;
  const ts = new Date(dateStr + 'T00:00:00').getTime();
  if (which === 'from') _orderFromTs = ts;
  else _orderToTs = ts + 86400000;
  switchMgmtTab('sales-today');
}

          ${!isReturn?`<button onclick="closeModal();openReturnsForTx('${t.id}')">Trả</button>`:''}

  return `

      <div class="mgmt-kpi"><div class="label">TB / giao dịch</div><div class="value">${fmt.money(avgTx)}</div></div>

function renderInventoryTab() {
  // Init filter + pagination state
  if (!state.invFilter) {
    state.invFilter = { q: '', stock: '', category: '', page: 0, pageSize: 50 };

  // Pre-compute maps ONCE (used across all rows). Memoize across re-renders.
  const today = new Date(); today.setHours(0,0,0,0);
  const last7d = today.getTime() - 7 * 86400000;
  const branch = state.shift?.branch || 'PB';
  const cacheKey = `${branch}_${today.getTime()}`;

  if (!state._invCache || state._invCache.key !== cacheKey) {
    const todayTx = state.transactions.filter(t => t.createdAt >= today.getTime() && t.kind !== 'return' && t.branch === branch);
    const soldMap = {};
    todayTx.forEach(t => t.items.forEach(i => { soldMap[i.sku] = (soldMap[i.sku]||0) + i.qty; }));

    const last7dTx = state.transactions.filter(t => t.createdAt >= last7d && t.kind !== 'return' && t.branch === branch);
    const sold7Map = {};
    last7dTx.forEach(t => t.items.forEach(i => { sold7Map[i.sku] = (sold7Map[i.sku]||0) + i.qty; }));

    const sameProvinceBranches = getBranchesInSameProvince(branch);
    const otherBranches = sameProvinceBranches.filter(b => b !== branch);

      key: cacheKey, soldMap, sold7Map,

/* === Pagination + filter logic — separate from render so it can be called incrementally === */
function getInvFilteredProducts() {
  if (!state.invFilter) state.invFilter = { q: '', stock: '', category: '', page: 0, pageSize: 50 };
  const f = state.invFilter;
  const branch = state.shift?.branch || 'PB';
  const q = (f.q || '').trim().toLowerCase();
  const cache = state._invCache || {};

  return state.products.filter(p => {
    // Text filter
    if (q) {
      const text = `${p.sku} ${p.barcode||''} ${p.name} ${p.category||''}`.toLowerCase();
      if (!text.includes(q)) return false;
    }
    // Category filter
    if (f.category && (p.category || 'Chưa phân loại') !== f.category) return false;
    // Stock filter
    if (f.stock) {
      const stockHere = getStockAtBranch(p, branch);
      if (f.stock === 'ok' && stockHere < 10) return false;
      if (f.stock === 'low' && (stockHere <= 0 || stockHere >= 10)) return false;
      if (f.stock === 'out' && stockHere > 0) return false;
      if (f.stock === 'sold-today' && !(cache.soldMap && cache.soldMap[p.sku])) return false;
      if (f.stock === 'velocity') {
        const dailyAvg = (cache.sold7Map?.[p.sku] || 0) / 7;
        if (!(dailyAvg > 0 && stockHere > 0 && (stockHere / dailyAvg) <= 7)) return false;
      }
      if (f.stock === 'transfer') {
        if (stockHere >= 10) return false;
        const others = (cache.otherBranches || []);
        const otherTotal = others.reduce((s, b) => s + getStockAtBranch(p, b), 0);
        if (otherTotal <= 0) return false;
      }
    }
    return true;
  });
}

function renderInvRowsPaginated() {
  const f = state.invFilter;
  const cache = state._invCache;
  if (!cache) return '';
  const filtered = getInvFilteredProducts();
  const start = (f.page || 0) * f.pageSize;
  const end = start + f.pageSize;
  const pageProducts = filtered.slice(start, end);
  if (pageProducts.length === 0) {
    return `<tr><td colspan="8" style="text-align:center;padding:40px 20px;color:var(--gray-500);font-size:13px">${filtered.length === 0 ? 'Không tìm thấy SP nào khớp với bộ lọc' : 'Trang trống'}</td></tr>`;
  }
  return pageProducts.map(p => renderInvRowHtml(p, cache)).join('');
}

function renderInvRowHtml(p, cache) {
  const branch = state.shift?.branch || 'PB';
  const sold = cache.soldMap[p.sku] || 0;
  const dailyAvg = (cache.sold7Map[p.sku] || 0) / 7;
  const stockHere = getStockAtBranch(p, branch);
  const otherStocks = cache.otherBranches.map(b => ({ code: b, stock: getStockAtBranch(p, b) }));
  const branchesWithStock = otherStocks.filter(s => s.stock > 0);
  const totalOtherStock = otherStocks.reduce((s, x) => s + x.stock, 0);

  const stockStatus = stockHere <= 0 ? 'out' : stockHere < 10 ? 'low' : 'ok';
  const rowBgStyle = stockStatus === 'out' ? 'background:#FFF5F5' : stockStatus === 'low' ? 'background:#FFFCF5' : '';
  const badgeBg = stockStatus === 'out' ? 'background:#FCEBEB;color:#A32D2D' : stockStatus === 'low' ? 'background:#FAEEDA;color:#854F0B' : 'background:#EAF3DE;color:#27500A';

  let velocityHint = '';
  if (dailyAvg > 0 && stockHere > 0) {
    const daysLeft = Math.ceil(stockHere / dailyAvg);
    if (daysLeft <= 3) velocityHint = `<div style="font-size:10px;color:#A32D2D;margin-top:2px">⚠ ${daysLeft} ngày hết</div>`;
    else if (daysLeft <= 7) velocityHint = `<div style="font-size:10px;color:#854F0B;margin-top:2px">${daysLeft} ngày hết</div>`;
  }

  let soldTrend = '';
  if (sold > 0 && dailyAvg > 0) {
    const pct = Math.round((sold - dailyAvg) / dailyAvg * 100);
    if (pct > 10) soldTrend = `<div style="font-size:10px;color:#27500A;margin-top:2px">↑ ${pct}%</div>`;
    else if (pct < -10) soldTrend = `<div style="font-size:10px;color:#854F0B;margin-top:2px">↓ ${Math.abs(pct)}%</div>`;
  }

  let otherCellHtml = '';
  if (cache.otherBranches.length === 0) {
    otherCellHtml = `<span style="font-size:11px;color:var(--gray-400)">— (chỉ 1 CN)</span>`;
  } else if (totalOtherStock === 0) {
    otherCellHtml = `<div style="font-size:11.5px;color:#A32D2D;font-family:var(--font-num)">Tất cả 0</div><div style="font-size:10px;color:var(--gray-500);margin-top:2px">${cache.otherBranches.length} CN khác</div>`;
  } else {
    const colorClass = stockStatus === 'out' || stockStatus === 'low' ? '#185FA5' : 'var(--gray-700)';
    const fontWeight = stockStatus === 'out' || stockStatus === 'low' ? '600' : '500';
    otherCellHtml = `
      <div style="display:flex;align-items:center;gap:6px">
        <div style="font-family:var(--font-num);font-size:13px;color:${colorClass};font-weight:${fontWeight}">${totalOtherStock.toLocaleString('vi-VN')}</div>
        <button onclick="openBranchStockDetail('${escapeHtml(p.sku)}', event)" style="font-size:10px;padding:2px 8px;background:transparent;color:var(--navy);border:1px solid var(--gray-300);border-radius:4px;cursor:pointer;font-family:var(--font-ui);white-space:nowrap">Chi tiết ↗</button>
      </div>
      <div style="font-size:10px;color:var(--gray-500);margin-top:2px">${branchesWithStock.length}/${cache.otherBranches.length} CN còn</div>
    `;
  }

  const isSelected = state.invSelectedSkus && state.invSelectedSkus.has(p.sku);
  return `
    <tr style="${rowBgStyle}${isSelected ? ';background:#E3F2FD':''}" data-sku="${escapeHtml(p.sku)}">
      <td style="vertical-align:top;text-align:center;padding:13px 8px">
        <input type="checkbox" class="inv-row-check" ${isSelected ? 'checked' : ''} onchange="toggleInvRowSelection('${escapeHtml(p.sku)}', this.checked)" style="width:17px;height:17px;cursor:pointer;accent-color:var(--navy)">
      </td>
      <td style="vertical-align:top">
        <div style="font-weight:600;line-height:1.3">${escapeHtml(p.name)}</div>
        <div style="font-size:10.5px;color:var(--gray-500);font-family:var(--font-num);margin-top:3px">${escapeHtml(p.sku)}${p.barcode && p.barcode !== p.sku ? ' · ' + escapeHtml(p.barcode) : ''}</div>
      </td>
      <td style="vertical-align:top;font-size:12px;color:var(--gray-700)">${escapeHtml(p.category || 'Chưa phân loại')}</td>
      <td class="tr" style="vertical-align:top;font-family:var(--font-num)"><div style="font-weight:600;color:var(--navy-dark)">${fmt.number(p.price)}</div></td>
      <td class="tc" style="vertical-align:top;color:var(--gray-600);font-size:12px">${escapeHtml(p.unit || 'cái')}</td>
      <td class="tr" style="vertical-align:top;font-family:var(--font-num)">
        <div style="${sold > 0 ? 'color:var(--navy-dark);font-weight:600' : 'color:var(--gray-400)'}">${sold}</div>
        ${soldTrend}
      </td>
      <td class="tr" style="vertical-align:top">
        <span style="display:inline-flex;align-items:center;font-size:12px;font-weight:600;padding:4px 11px;border-radius:13px;font-family:var(--font-num);${badgeBg}">${stockHere} ${escapeHtml(p.unit || 'cái')}</span>
        ${velocityHint}
      </td>
      <td style="vertical-align:top">${otherCellHtml}</td>
    </tr>
  `;
}

function renderInvPagination() {
  const f = state.invFilter;
  const filtered = getInvFilteredProducts();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / f.pageSize));
  const cur = Math.min(f.page, totalPages - 1);
  const start = cur * f.pageSize + 1;
  const end = Math.min(start + f.pageSize - 1, total);
  if (total === 0) return `<span style="color:var(--gray-500)">Không có SP</span>`;

  const btnStyle = "padding:5px 11px;background:white;border:1px solid var(--gray-300);border-radius:5px;cursor:pointer;font-size:12px;font-family:var(--font-ui);min-width:34px";
  const btnDisabled = "padding:5px 11px;background:var(--gray-100);border:1px solid var(--gray-200);color:var(--gray-400);border-radius:5px;font-size:12px;cursor:not-allowed;min-width:34px";
  const btnActive = "padding:5px 11px;background:var(--navy);color:white;border:1px solid var(--navy);border-radius:5px;font-size:12px;font-weight:700;font-family:var(--font-ui);min-width:34px;cursor:default";

  // Show first, last, current ± 2
  const pages = new Set([0, totalPages - 1, cur, cur - 1, cur + 1, cur - 2, cur + 2]);
  const validPages = [...pages].filter(p => p >= 0 && p < totalPages).sort((a,b)=>a-b);
  let pageBtns = '';
  let prev = -1;
  for (const p of validPages) {
    if (prev >= 0 && p - prev > 1) pageBtns += `<span style="color:var(--gray-400);padding:0 4px">...</span>`;
    pageBtns += p === cur
      ? `<span style="${btnActive}">${p+1}</span>`
      : `<button style="${btnStyle}" onclick="invGotoPage(${p})">${p+1}</button>`;
    prev = p;
  }

  return `
    <button style="${cur===0?btnDisabled:btnStyle}" ${cur===0?'disabled':''} onclick="invGotoPage(${cur-1})">‹ Trước</button>
    ${pageBtns}
    <button style="${cur>=totalPages-1?btnDisabled:btnStyle}" ${cur>=totalPages-1?'disabled':''} onclick="invGotoPage(${cur+1})">Sau ›</button>
    <span style="margin-left:14px;color:var(--gray-600);font-size:11.5px">Hiện <strong style="color:var(--navy-dark)">${start}–${end}</strong> trong tổng <strong>${total.toLocaleString('vi-VN')}</strong> SP${total !== state.products.length ? ` (lọc từ ${state.products.length.toLocaleString('vi-VN')})` : ''}</span>
    <select onchange="invChangePageSize(this.value)" style="margin-left:10px;padding:4px 8px;border:1px solid var(--gray-300);border-radius:5px;font-size:11.5px">
      <option value="25" ${f.pageSize===25?'selected':''}>25/trang</option>
      <option value="50" ${f.pageSize===50?'selected':''}>50/trang</option>
      <option value="100" ${f.pageSize===100?'selected':''}>100/trang</option>
      <option value="200" ${f.pageSize===200?'selected':''}>200/trang</option>
    </select>
  `;
}

/* === Filter + pagination handlers === */
let _invSearchTimer = null;
function onInvSearchInput(value) {
  clearTimeout(_invSearchTimer);
  _invSearchTimer = setTimeout(() => {
    state.invFilter.q = value;
    state.invFilter.page = 0;
    invRefreshTable();
  }, 220);  // debounce 220ms — typing won't hammer filter
}

function onInvFilterChange(key, value) {
  state.invFilter[key] = value;
  state.invFilter.page = 0;
  invRefreshTable();
}

function invGotoPage(page) {
  state.invFilter.page = page;
  invRefreshTable();
  // Scroll to top of table
  const t = document.getElementById('invTable');
  if (t) t.scrollIntoView({ block: 'start', behavior: 'smooth' });
}

function invChangePageSize(size) {
  state.invFilter.pageSize = parseInt(size) || 50;
  state.invFilter.page = 0;
  invRefreshTable();
}

function invRefreshTable() {
  const tbody = document.getElementById('invTbody');
  const pag = document.getElementById('invPagination');
  if (tbody) tbody.innerHTML = renderInvRowsPaginated();
  if (pag) pag.innerHTML = renderInvPagination();
  syncSelectAllCheckbox();
  updateInvBulkBar();
}

function openBranchStockDetail(sku, e) {
  if (e) e.stopPropagation();
  const product = state.products.find(p => p.sku === sku);
  if (!product) { toast('Không tìm thấy sản phẩm', 'error'); return; }

  const currentBranch = state.shift?.branch || 'PB';
  const sameProvinceCodes = getBranchesInSameProvince(currentBranch);

  const allBranches = sameProvinceCodes.map(code => ({
    code,
    name: BRANCHES[code]?.name || code,
    address: BRANCHES[code]?.address || '',
    province: BRANCHES[code]?.provinceName || '',
    stock: getStockAtBranch(product, code),
    isCurrent: code === currentBranch,
  }));

  const totalStock = allBranches.reduce((s, b) => s + b.stock, 0);
  const otherStock = allBranches.filter(b => !b.isCurrent).reduce((s, b) => s + b.stock, 0);
  const branchesWithStock = allBranches.filter(b => !b.isCurrent && b.stock > 0).length;

  const rowsHtml = allBranches
    .sort((a, b) => {
      if (a.isCurrent) return -1;
      if (b.isCurrent) return 1;
      return b.stock - a.stock;
    })
    .map(b => {
      let badgeStyle, badgeLabel;
      if (b.stock <= 0) { badgeStyle = 'background:#FCEBEB;color:#A32D2D'; badgeLabel = 'Hết'; }
      else if (b.stock < 10) { badgeStyle = 'background:#FAEEDA;color:#854F0B'; badgeLabel = 'Sắp hết'; }
      else { badgeStyle = 'background:#EAF3DE;color:#27500A'; badgeLabel = 'Còn'; }
      const currentMark = b.isCurrent
        ? '<span style="background:var(--navy);color:white;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-left:8px">★ ĐANG BÁN</span>'
        : '';
      const transferBtn = (!b.isCurrent && b.stock > 0)
        ? `<button onclick="requestStockTransfer('${escapeHtml(sku)}', '${b.code}', '${currentBranch}')" style="font-size:11px;padding:6px 13px;background:var(--navy);color:white;border:none;border-radius:5px;cursor:pointer;white-space:nowrap;font-weight:500" onmouseover="this.style.background='var(--navy-dark)'" onmouseout="this.style.background='var(--navy)'">→ Yêu cầu điều chuyển</button>`
        : (b.isCurrent
          ? '<span style="font-size:11px;color:var(--gray-500)">—</span>'
          : '<span style="font-size:11px;color:var(--gray-400);font-style:italic">Không thể điều</span>');
      return `
        <tr style="${b.isCurrent ? 'background:var(--navy-light)' : ''}">
          <td style="padding:11px 14px;border-top:0.5px solid var(--gray-200)">
            <div style="display:flex;align-items:center;flex-wrap:wrap">
              <div>
                <div style="font-weight:600;font-size:13px">${escapeHtml(b.name)}</div>
                <div style="font-size:11px;color:var(--gray-600);margin-top:2px">${escapeHtml(b.address)}</div>
              </div>
              ${currentMark}
            </div>
          </td>
          <td style="padding:11px 14px;border-top:0.5px solid var(--gray-200);text-align:right;font-family:var(--font-num);font-size:14px;font-weight:600;color:var(--gray-900)">
            ${b.stock.toLocaleString('vi-VN')} ${escapeHtml(product.unit || 'cái')}
          </td>
          <td style="padding:11px 14px;border-top:0.5px solid var(--gray-200);text-align:center">
            <span style="display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:11px;${badgeStyle}">${badgeLabel}</span>
          </td>
          <td style="padding:11px 14px;border-top:0.5px solid var(--gray-200);text-align:right">
            ${transferBtn}
          </td>
        </tr>
      `;
    }).join('');

  showModal(`
    <div class="modal-header">
      <h2>📦 Tồn kho theo chi nhánh</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div style="background:var(--gray-50);padding:12px 14px;border-radius:8px;margin-bottom:14px">

function requestStockTransfer(sku, fromBranch, toBranch) {
  const product = state.products.find(p => p.sku === sku);
  if (!product) return;
  const fromBranchObj = BRANCHES[fromBranch];
  const toBranchObj = BRANCHES[toBranch];
  if (!fromBranchObj || !toBranchObj) return;
  // Province check (defense in depth — UI shouldn't allow but verify here)
  if (fromBranchObj.province !== toBranchObj.province) {
    toast(`✗ Không thể điều chuyển khác tỉnh (${fromBranchObj.provinceName} → ${toBranchObj.provinceName}). Phải đặt qua NCC.`, 'error', 4500);
    return;
  }
  const stockAtFrom = getStockAtBranch(product, fromBranch);
  if (stockAtFrom <= 0) { toast('CN nguồn đã hết hàng', 'warning'); return; }

  const defaultQty = Math.min(stockAtFrom, 10);
  showModal(`
    <div class="modal-header">
      <h2>→ Yêu cầu điều chuyển</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div style="background:var(--navy-light);padding:12px 14px;border-radius:7px;margin-bottom:14px">
        <div style="font-size:13px;font-weight:600;color:var(--navy-dark)">${escapeHtml(product.name)}</div>
        <div style="font-size:11.5px;color:var(--gray-600);margin-top:3px;font-family:var(--font-num)">${escapeHtml(product.sku)}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center;margin-bottom:14px;background:var(--gray-50);padding:14px;border-radius:8px">
        <div style="text-align:center">
          <div style="font-size:10.5px;color:var(--gray-600);text-transform:uppercase;letter-spacing:0.5px;font-weight:600">Từ chi nhánh</div>
          <div style="font-size:14px;font-weight:600;color:var(--gray-900);margin-top:5px">${escapeHtml(fromBranchObj.name)}</div>
          <div style="font-size:11px;color:var(--gray-500);margin-top:2px">Tồn: <span style="font-family:var(--font-num);font-weight:600">${stockAtFrom}</span> ${escapeHtml(product.unit || 'cái')}</div>
        </div>
        <div style="font-size:24px;color:var(--navy)">→</div>
        <div style="text-align:center">
          <div style="font-size:10.5px;color:var(--gray-600);text-transform:uppercase;letter-spacing:0.5px;font-weight:600">Tới chi nhánh</div>
          <div style="font-size:14px;font-weight:600;color:var(--navy-dark);margin-top:5px">${escapeHtml(toBranchObj.name)}</div>
          <div style="font-size:11px;color:var(--gray-500);margin-top:2px">Tồn: <span style="font-family:var(--font-num);font-weight:600">${getStockAtBranch(product, toBranch)}</span> ${escapeHtml(product.unit || 'cái')}</div>
        </div>
      </div>
      <div class="form-group">
        <label>Số lượng cần điều</label>
        <input type="number" id="transferQty" min="1" max="${stockAtFrom}" value="${defaultQty}" style="width:100%">
        <div style="font-size:11px;color:var(--gray-500);margin-top:4px">Tối đa ${stockAtFrom} ${escapeHtml(product.unit || 'cái')} (theo tồn CN nguồn)</div>
      </div>
      <div class="form-group">
        <label>Lý do / ghi chú</label>
        <textarea id="transferReason" placeholder="VD: CN ${fromBranch} bán nhanh, CN ${toBranch} đang dư hàng..." style="width:100%;min-height:60px;padding:8px 10px;border:1px solid var(--gray-300);border-radius:5px;font-family:var(--font-ui);font-size:12.5px;resize:vertical"></textarea>

      </div>

      <button class="btn btn-primary" onclick="submitTransferRequest('${escapeHtml(sku)}', '${fromBranch}', '${toBranch}')">📤 Gửi yêu cầu</button>

function submitTransferRequest(sku, fromBranch, toBranch) {
  const qty = parseInt($('#transferQty')?.value) || 0;
  const reason = $('#transferReason')?.value?.trim() || '';
  if (qty <= 0) { toast('Số lượng phải > 0', 'warning'); return; }
  const product = state.products.find(p => p.sku === sku);
  if (!product) return;
  // Save to local list (Phase 2.5: send to NCC Supabase)
  if (!state.transferRequests) state.transferRequests = [];
  const req = {
    id: 'TR-' + Date.now(),
    sku, fromBranch, toBranch, qty, reason,
    productName: product.name,
    requestedBy: state.user?.code || 'unknown',
    requestedAt: Date.now(),
    status: 'pending',
  };
  state.transferRequests.push(req);
  Storage.set('vcm_pos_transfer_requests', state.transferRequests);
  closeModal();
  toast(`✓ Yêu cầu điều chuyển ${qty} ${product.unit||'cái'} đã được gửi tới QLC`, 'success', 4000);
}

function filterCustomersByBday(filter) {
  const list = Object.values(state.customers || {});
  $$('#custTable tbody tr').forEach((tr, idx) => {
    const c = list.slice().sort((a,b)=>b.points-a.points)[idx];
    if (!c) return;
    let show = true;
    if (filter === 'today') show = c.dob && isBirthdayToday(c.dob);
    else if (filter === 'week') {
      const d = c.dob ? daysUntilBirthday(c.dob) : null;
      show = d !== null && d <= 7;
    } else if (filter === 'month') {
      if (!c.dob) show = false;
      else {
        const dob = new Date(c.dob + 'T00:00:00');
        show = dob.getMonth() === new Date().getMonth();
      }
    } else if (filter === 'no-dob') show = !c.dob;
    tr.style.display = show ? '' : 'none';
  });
}
function filterCustomers(q) {
  q = q.trim().toLowerCase();
  $$('#custTable tbody tr').forEach(tr => {
    tr.style.display = !q || tr.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function toggleReturnItemV2(sku, txId) {

let _returnMethod = 'cash';
function setReturnMethod(m) {
  _returnMethod = m;
  $('#rm-cash').classList.toggle('active', m==='cash');
  $('#rm-transfer').classList.toggle('active', m==='transfer');
}

function toggleReturnItem(sku, txId) {
  const sel = _returnSelections[sku];
  sel.selected = !sel.selected;
  sel.qty = sel.selected ? sel.max : 0;
  const row = $(`#ret-row-${sku}`);
  const qtyInput = row.querySelector('.qty-return');
  qtyInput.disabled = !sel.selected;
  qtyInput.value = sel.qty || sel.max;
  row.classList.toggle('disabled', !sel.selected);
  updateReturnSummary();
}

function setReturnQty(sku, q, txId) {
  const sel = _returnSelections[sku];
  let v = parseInt(q)||0;
  v = Math.min(v, sel.max);
  v = Math.max(0, v);
  sel.qty = v;
  if (v === 0) sel.selected = false;
  updateReturnSummary();
}

function updateReturnSummary() {
  const selected = Object.values(_returnSelections).filter(s => s.selected && s.qty > 0);
  const total = selected.reduce((s,sel) => {
    const item = sel.item;
    const unitPrice = item.lineTotal / item.qty;
    return s + Math.round(unitPrice * sel.qty);
  }, 0);
  $('#returnSelCount').textContent = `${selected.length} mặt hàng (${selected.reduce((s,x)=>s+x.qty,0)} đơn vị)`;
  $('#returnTotal').textContent = fmt.money(total);
  $('#btnConfirmReturn').disabled = total <= 0;
}

function confirmReturn(originalTxId) {
  const original = state.transactions.find(t => t.id === originalTxId);
  if (!original) return;
  const selected = Object.values(_returnSelections).filter(s => s.selected && s.qty > 0);
  if (selected.length === 0) { toast('Chưa chọn mặt hàng nào', 'warning'); return; }
  const reason = $('#returnReason').value.trim();
  const items = selected.map(sel => {
    const i = sel.item;
    const unitPrice = i.lineTotal / i.qty;
    return { ...i, qty: sel.qty, lineTotal: Math.round(unitPrice * sel.qty), price: Math.round(unitPrice) };
  });
  const total = items.reduce((s,i) => s + i.lineTotal, 0);

  const refundTx = {
    id: uid(),
    code: 'RT-' + txCode(),
    kind: 'return',
    refundOf: original.code,
    user: state.user.code,
    userName: state.user.name,
    branch: state.shift.branch,
    shiftId: state.shift.id,
    items,
    subtotal: total,
    discountAmount: 0,
    loyaltyDiscount: 0,
    total,
    paymentMethod: _returnMethod,
    cashReceived: _returnMethod==='cash' ? total : 0,
    transferAmount: _returnMethod==='transfer' ? total : 0,
    cardAmount: 0,
    change: 0,
    customer: original.customer,
    reason,
    createdAt: Date.now(),
  };

  // Update shift (reduce sales)
  state.shift.totalSales -= total;
  state.shift.txCount += 1;
  if (_returnMethod === 'cash') state.shift.totalCash -= total;
  else state.shift.totalTransfer -= total;
  Storage.set(CONFIG.storageKeys.shift, state.shift);

  // Restore stock
  items.forEach(i => {
    const p = state.products.find(x => x.sku === i.sku);
    if (p) p.stock += i.qty;
  });

  // Adjust customer points (deduct earned points proportionally)
  if (original.customer && original.pointsEarned) {
    const refundedPoints = Math.floor(total / (state.loyaltyConfig?.pointPerVnd || 10000));
    const c = state.customers[original.customer.phone];
    if (c) {
      c.points = Math.max(0, c.points - refundedPoints);
      c.totalSpent = Math.max(0, c.totalSpent - total);
      Storage.set(CONFIG.storageKeys.customers, state.customers);
    }
  }

  state.transactions.push(refundTx);
  state.returns = state.returns || [];
  state.returns.push(refundTx);
  Storage.set(CONFIG.storageKeys.transactions, state.transactions);
  Storage.set(CONFIG.storageKeys.returns, state.returns);

  // ← HUB SYNC: Push refund lên Supabase (non-blocking)
  // KHO listener filter `kind === 'return'` để skip auto-deduct (vì hoàn hàng)
  syncTxToSupabase(refundTx);

  // ← HĐĐT: Cancel HĐĐT của đơn gốc (non-blocking, không chặn UX)
  if (original.einvoiceRequested && original.einvoiceResult?.invoiceNumber) {
    cancelEinvoiceForReturn(original.id, reason || 'Khách trả hàng')
      .then(res => {
        if (res?.ok) {
          console.log('[POS] HĐĐT đơn gốc đã hủy:', original.einvoiceResult.invoiceNumber);
        } else if (res?.error) {
          console.warn('[POS] Hủy HĐĐT đơn gốc fail:', res.error);
        }
      });
  }

  closeModal();
  toast(`✓ Đã trả hàng — hoàn ${fmt.money(total)}`, 'success');

  // Show return slip
  const html = buildReceiptHtml(refundTx);
  $('#printArea').innerHTML = html;
  showModal(`
    <div class="modal-header"><h2>↺ Phiếu trả hàng ${refundTx.code}</h2><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body"><div class="receipt-preview">${html}</div></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Đóng</button>
      <button class="btn btn-primary" onclick="doPrint()">🖨 In phiếu trả</button>
    </div>
  `, {size:'sm'});
}

function buildReceiptHtml(tx, opts={}) {
  const branch = BRANCHES[tx.branch];
  const branchOverride = state.branchConfig?.[tx.branch] || {};
  const branchName = branchOverride.name || branch.name;
  const branchAddress = branchOverride.address || branch.address;
  const branchPhone = branchOverride.phone || '0234 xxx xxx';
  const store = state.storeConfig || CONFIG.defaults.store;
  const printCfg = state.printConfig || CONFIG.defaults.print;
  const paperSize = opts.paperSize || printCfg.paperSize || '80mm';
  const isReturn = tx.kind === 'return';

  const itemsHtml = tx.items.map(i => `
    <div class="receipt-item">
      <div class="name">${escapeHtml(i.name)}</div>
      <div class="detail">
        <span>${i.qty} ${i.unit} × ${fmt.number(i.price)}</span>
        <span>${fmt.number(i.lineTotal)}</span>
      </div>
    </div>
  `).join('');

  const methodLabel = {cash:'Tiền mặt', transfer:'Chuyển khoản', card:'Thẻ ATM'}[tx.paymentMethod];
  const paidAmount = tx.cashReceived || tx.transferAmount || tx.cardAmount;

  const headerExtra = printCfg.headerExtra ? `<div class="info" style="margin-top:4px;font-style:italic">${escapeHtml(printCfg.headerExtra)}</div>` : '';
  const slogan = store.slogan ? `<div class="info" style="margin-top:3px;font-size:9px">${escapeHtml(store.slogan)}</div>` : '';

  return `
    <div class="receipt receipt-${paperSize}" data-paper="${paperSize}">
      <div class="receipt-header">
        <h3>${escapeHtml(store.name || 'VICOMART')}${isReturn ? ' — PHIẾU TRẢ HÀNG' : ''}</h3>
        <div class="info">
          ${escapeHtml(branchName)} (${tx.branch})<br>
          ${escapeHtml(branchAddress)}<br>
          Hotline: ${escapeHtml(branchPhone)}${store.taxCode ? ` · MST: ${escapeHtml(store.taxCode)}` : ''}
        </div>
        ${headerExtra}
        ${slogan}
      </div>
      <div class="receipt-meta">
        <span>${isReturn ? 'PT' : 'HĐ'}: ${tx.code}</span>
        <span>${fmt.date(tx.createdAt)}</span>
      </div>
      <div class="receipt-meta">
        <span>NV: ${escapeHtml(tx.userName)}</span>
        ${tx.customer ? `<span>KH: ${escapeHtml(tx.customer.phone)}</span>` : ''}
      </div>
      ${tx.refundOf ? `<div class="receipt-meta"><span>Trả từ HĐ: ${tx.refundOf}</span></div>` : ''}
      <div class="receipt-divider"></div>
      ${itemsHtml}
      <div class="receipt-divider"></div>
      <div class="receipt-row"><span>${isReturn ? 'Tạm tính trả' : 'Tạm tính'}:</span><span>${fmt.number(tx.subtotal)}</span></div>
      ${tx.discountAmount > 0 ? `<div class="receipt-row"><span>Giảm giá đơn:</span><span>-${fmt.number(tx.discountAmount)}</span></div>` : ''}
      ${tx.loyaltyDiscount > 0 ? `<div class="receipt-row"><span>Ưu đãi hạng ${escapeHtml(tx.loyaltyTier||'')}:</span><span>-${fmt.number(tx.loyaltyDiscount)}</span></div>` : ''}
      <div class="receipt-row receipt-total"><span>${isReturn ? 'TIỀN TRẢ KHÁCH:' : 'TỔNG:'}</span><span>${fmt.number(tx.total)} ₫</span></div>
      <div class="receipt-divider"></div>
      <div class="receipt-row"><span>${methodLabel}:</span><span>${fmt.number(paidAmount)}</span></div>
      ${tx.change > 0 ? `<div class="receipt-row"><span>Tiền thừa:</span><span>${fmt.number(tx.change)}</span></div>` : ''}
      ${tx.pointsEarned ? `<div class="receipt-row"><span>Điểm tích luỹ:</span><span>+${fmt.number(tx.pointsEarned)}đ</span></div>` : ''}
      ${tx.einvoice ? `<div class="receipt-divider"></div><div class="receipt-meta"><span>HĐĐT:</span><span>${escapeHtml(tx.einvoice.invoiceNumber)}</span></div>` : ''}
      ${printCfg.showQR !== false && !isReturn ? buildReceiptBankQR(tx) : ''}

        ${escapeHtml(store.website || 'vicomart.vn')}

function buildReceiptBankQR(tx) {
  const banks = getBillBankAccounts();
  if (banks.length === 0) return '';
  const ckCode = 'VC' + tx.code.slice(-8);
  // Show 1st bank with QR (most common case)
  const primary = banks.find(b => b.isDefault) || banks[0];
  const qrUrl = generateVietQRUrl(primary, 0, ckCode, 'compact');
  const otherBanks = banks.filter(b => b.id !== primary.id);
  return `
    <div class="receipt-divider"></div>
    <div style="text-align:center;font-family:var(--font-ui);font-size:10px;margin-top:4px">
      <div style="font-weight:600;font-size:11px;margin-bottom:3px">QR chuyển khoản</div>
      <img src="${qrUrl}" alt="VietQR" style="width:90px;height:90px;display:inline-block;margin:2px 0"/>
      <div style="font-size:9px;line-height:1.3">
        <strong>${escapeHtml(primary.bankName)}</strong>${primary.branch?' · '+escapeHtml(primary.branch):''}<br>
        STK: <strong style="font-family:var(--font-num)">${escapeHtml(primary.accountNumber)}</strong><br>
        ${escapeHtml(primary.accountHolder)}
      </div>
      ${otherBanks.length > 0 ? `<div style="font-size:9px;color:#666;margin-top:3px">+${otherBanks.length} ngân hàng khác</div>`:''}
    </div>
  `;
}

function printReceipt(tx) {
  const html = buildReceiptHtml(tx);
  // Show preview modal with print button
  showModal(`

// Tính suggestions: 3 RULES (TA đã đóng, chỉ tính PB ↔ VT)
function computeSuggestions() {
  const target = ST.targetDOS;
  const sugs = [];
  
  for (const sku of ST.data) {
    const pb = { 
      id: 'PB', 
      stock: Number(sku.stock_pb)||0, 
      vel: Number(sku.sold_per_day_pb)||0, 
      dos: Number(sku.dos_pb)||999,
      sold: Number(sku.sold_30d_pb)||0
    };
    const vt = { 
      id: 'VT', 
      stock: Number(sku.stock_vt)||0, 
      vel: Number(sku.sold_per_day_vt)||0, 
      dos: Number(sku.dos_vt)||999,
      sold: Number(sku.sold_30d_vt)||0
    };
    
    // ────────────────────────────────────────────────────────
    // RULE 1: DOS-based — cả 2 CN có sale, chênh DOS > target
    // ────────────────────────────────────────────────────────
    if (pb.vel > 0 && vt.vel > 0) {
      const need = pb.dos < vt.dos ? pb : vt;
      const surplus = need.id === pb.id ? vt : pb;
      
      if (need.dos < target && surplus.dos > target * 1.5) {
        const qty_need_target = Math.ceil(target * need.vel - need.stock);
        const qty_surplus_can = Math.floor(surplus.stock - target * surplus.vel);
        const qty = Math.min(qty_need_target, qty_surplus_can);
        
        if (qty > 0) {
          const dos_after_need = (need.stock + qty) / Math.max(need.vel, 0.01);
          const dos_after_surplus = (surplus.stock - qty) / Math.max(surplus.vel, 0.01);
          
          sugs.push({
            sku: sku.sku, barcode: sku.barcode, name: sku.name,
            category: sku.category||'', unit: sku.unit||'cái',
            cost: Number(sku.cost)||0,
            from: surplus.id, to: need.id, qty: qty,
            urgency: need.dos === 0 ? 'CRITICAL' : need.dos < 3 ? 'CRITICAL' : need.dos < 7 ? 'HIGH' : 'NORMAL',
            stock_from: surplus.stock, stock_to: need.stock,
            dos_from: surplus.dos, dos_to: need.dos,
            vel_from: surplus.vel, vel_to: need.vel,
            dos_after_from: Math.round(dos_after_surplus),
            dos_after_to: Math.round(dos_after_need),
            value: qty * (Number(sku.cost)||0),
            rule: 'DOS',
            reason: `${surplus.id} dư (${surplus.dos}d) → ${need.id} thiếu (${need.dos}d)`,
            _key: sku.sku + '|' + surplus.id + '|' + need.id,
          });
        }
      }
    }
    
    // ────────────────────────────────────────────────────────
    // RULE 2: Stock imbalance — 1 CN hết stock + cả 2 có sale
    // ────────────────────────────────────────────────────────
    else if (pb.vel > 0 && vt.vel > 0) {
      // Đã handle ở rule 1
    }
    // CN có stock + bán, CN kia hết stock + bán → chuyển 50%
    if ((pb.stock > 0 && vt.stock === 0 && vt.vel > 0) ||
        (vt.stock > 0 && pb.stock === 0 && pb.vel > 0)) {
      const surplus = pb.stock > 0 ? pb : vt;
      const need = surplus.id === 'PB' ? vt : pb;
      
      // Chỉ chuyển nếu surplus có ít nhất 7 ngày stock cho mình
      const surplus_keep = surplus.vel > 0 ? Math.ceil(target * surplus.vel) : 0;
      const can_give = Math.max(0, Math.floor(surplus.stock - surplus_keep));
      // Need cần đủ 14 ngày
      const need_qty = Math.ceil(target * 2 * need.vel);
      const qty = Math.min(can_give, need_qty);
      
      if (qty > 0 && !sugs.find(s => s._key === sku.sku + '|' + surplus.id + '|' + need.id)) {
        sugs.push({
          sku: sku.sku, barcode: sku.barcode, name: sku.name,
          category: sku.category||'', unit: sku.unit||'cái',
          cost: Number(sku.cost)||0,
          from: surplus.id, to: need.id, qty: qty,
          urgency: 'CRITICAL', // hết stock + có bán = critical
          stock_from: surplus.stock, stock_to: need.stock,
          dos_from: surplus.dos, dos_to: 0,
          vel_from: surplus.vel, vel_to: need.vel,
          dos_after_from: surplus.vel > 0 ? Math.round((surplus.stock - qty) / surplus.vel) : 999,
          dos_after_to: need.vel > 0 ? Math.round(qty / need.vel) : 999,
          value: qty * (Number(sku.cost)||0),
          rule: 'OOS',
          reason: `${need.id} HẾT HÀNG nhưng vẫn bán (${need.sold} cái/30d) — ${surplus.id} có ${surplus.stock}`,
          _key: sku.sku + '|' + surplus.id + '|' + need.id,
        });
      }
    }
    
    // ────────────────────────────────────────────────────────
    // RULE 3: Sales fan-out — A có sale + stock dư, B chưa thử bán + hết stock
    // ────────────────────────────────────────────────────────
    if (pb.vel > 0 && pb.stock > 10 && !vt.vel && vt.stock === 0) {
      // PB bán mạnh + còn stock → chia 30% cho VT thử
      const sample_qty = Math.max(5, Math.min(30, Math.floor(pb.stock * 0.3)));
      const surplus_keep = Math.ceil(target * pb.vel);
      const can_give = Math.max(0, pb.stock - surplus_keep);
      const qty = Math.min(sample_qty, can_give);
      
      if (qty >= 5 && !sugs.find(s => s._key === sku.sku + '|PB|VT')) {
        sugs.push({
          sku: sku.sku, barcode: sku.barcode, name: sku.name,
          category: sku.category||'', unit: sku.unit||'cái',
          cost: Number(sku.cost)||0,
          from: 'PB', to: 'VT', qty: qty,
          urgency: 'NORMAL',
          stock_from: pb.stock, stock_to: 0,
          dos_from: pb.dos, dos_to: 999,
          vel_from: pb.vel, vel_to: 0,
          dos_after_from: Math.round((pb.stock - qty) / pb.vel),
          dos_after_to: 999,
          value: qty * (Number(sku.cost)||0),
          rule: 'FANOUT',
          reason: `PB bán ${pb.sold} cái/30d — VT chưa có hàng để thử thị trường`,
          _key: sku.sku + '|PB|VT',
        });
      }
    }
    if (vt.vel > 0 && vt.stock > 10 && !pb.vel && pb.stock === 0) {
      const sample_qty = Math.max(5, Math.min(30, Math.floor(vt.stock * 0.3)));
      const surplus_keep = Math.ceil(target * vt.vel);
      const can_give = Math.max(0, vt.stock - surplus_keep);
      const qty = Math.min(sample_qty, can_give);
      
      if (qty >= 5 && !sugs.find(s => s._key === sku.sku + '|VT|PB')) {
        sugs.push({
          sku: sku.sku, barcode: sku.barcode, name: sku.name,
          category: sku.category||'', unit: sku.unit||'cái',
          cost: Number(sku.cost)||0,
          from: 'VT', to: 'PB', qty: qty,
          urgency: 'NORMAL',
          stock_from: vt.stock, stock_to: 0,
          dos_from: vt.dos, dos_to: 999,
          vel_from: vt.vel, vel_to: 0,
          dos_after_from: Math.round((vt.stock - qty) / vt.vel),
          dos_after_to: 999,
          value: qty * (Number(sku.cost)||0),
          rule: 'FANOUT',
          reason: `VT bán ${vt.sold} cái/30d — PB chưa có hàng để thử thị trường`,
          _key: sku.sku + '|VT|PB',
        });
      }
    }
    
    // ────────────────────────────────────────────────────────
    // RULE 4: AI-DRIVEN STOCK GAP — AI quyết định ngưỡng theo category
    // Áp dụng cho SP có stock CẢ 2 CN, ngưỡng tự động theo category
    // ────────────────────────────────────────────────────────
    if (pb.stock >= 2 && vt.stock >= 2) {
      // Skip nếu đã có suggestion từ rule 1-3 (ưu tiên data bán thực)
      const alreadyHas = sugs.find(s => s.sku === sku.sku);
      if (!alreadyHas) {
        const max_stock = Math.max(pb.stock, vt.stock);
        const min_stock = Math.min(pb.stock, vt.stock);
        const gap_ratio = max_stock / min_stock;
        
        // ★ AI-driven threshold: lấy ngưỡng từ ST.aiRules theo category
        const rule = getAIRuleForSKU(sku);
        const threshold = rule?.threshold || ST.gapThreshold;
        
        if (gap_ratio >= threshold) {
          const surplus = pb.stock > vt.stock ? pb : vt;
          const need = surplus.id === 'PB' ? vt : pb;
          
          // Cân bằng theo logic AI rule (fast SKU chuyển nhiều hơn, slow SKU chuyển ít)
          const balance_factor = rule?.balance_factor || 0.5;   // 0.5 = chia đôi, 0.3 = chia 70/30
          const max_transfer_pct = rule?.max_transfer_pct || 0.4;  // không lấy quá 40%
          
          const qty_balance = Math.floor((surplus.stock - need.stock) * balance_factor);
          const qty_safe = Math.floor(surplus.stock * max_transfer_pct);
          const qty = Math.min(qty_balance, qty_safe);
          
          if (qty >= (rule?.min_qty || 1)) {
            sugs.push({
              sku: sku.sku, barcode: sku.barcode, name: sku.name,
              category: sku.category||'', unit: sku.unit||'cái',
              cost: Number(sku.cost)||0,
              from: surplus.id, to: need.id, qty: qty,
              urgency: rule?.urgency || 'NORMAL',
              stock_from: surplus.stock, stock_to: need.stock,
              dos_from: surplus.dos, dos_to: need.dos,
              vel_from: surplus.vel, vel_to: need.vel,
              dos_after_from: surplus.vel > 0 ? Math.round((surplus.stock - qty) / surplus.vel) : 999,
              dos_after_to: need.vel > 0 ? Math.round((need.stock + qty) / need.vel) : 999,
              value: qty * (Number(sku.cost)||0),
              rule: 'STOCKGAP',
              reason: rule ? `${rule.label} · ${surplus.id} ${surplus.stock} vs ${need.id} ${need.stock} (${gap_ratio.toFixed(1)}x ≥ ngưỡng ${threshold}x)` 
                            : `${surplus.id} tồn ${surplus.stock} vs ${need.id} tồn ${need.stock} (chênh ${gap_ratio.toFixed(1)}x)`,
              gap_ratio: Math.round(gap_ratio * 10) / 10,
              ai_label: rule?.label || 'Default',
              _key: sku.sku + '|' + surplus.id + '|' + need.id,
            });
          }
        }
      }
    }
  } // ← END for sku loop
  
  // Sort: CRITICAL → HIGH → NORMAL, sau đó theo value
  ST.suggestions = sugs.sort((a,b) => {
    const order = { CRITICAL: 0, HIGH: 1, NORMAL: 2 };
    if (order[a.urgency] !== order[b.urgency]) return order[a.urgency] - order[b.urgency];
    return b.value - a.value;
  });
  
  console.log('[ST] Computed', ST.suggestions.length, 'suggestions');
  console.log('[ST] By rule:', {
    DOS: sugs.filter(s => s.rule === 'DOS').length,
    OOS: sugs.filter(s => s.rule === 'OOS').length,
    FANOUT: sugs.filter(s => s.rule === 'FANOUT').length,
    STOCKGAP: sugs.filter(s => s.rule === 'STOCKGAP').length,
  });
  
  // Update badge
  const badge = document.getElementById('smartTransferBadge');
  if (badge) {
    const critical = ST.suggestions.filter(s => s.urgency === 'CRITICAL').length;
    badge.textContent = critical;
    badge.style.display = critical > 0 ? '' : 'none';
  }
}

function applySTFilters() {
  let list = [...ST.suggestions];
  if (ST.filters.urgency !== 'all') list = list.filter(s => s.urgency === ST.filters.urgency);
  if (ST.filters.fromBranch !== 'all') list = list.filter(s => s.from === ST.filters.fromBranch);
  if (ST.filters.toBranch !== 'all') list = list.filter(s => s.to === ST.filters.toBranch);
  if (ST.filters.category !== 'all') list = list.filter(s => s.category === ST.filters.category);
  if (ST.filters.rule !== 'all') list = list.filter(s => s.rule === ST.filters.rule);
  if (ST.filters.minValue > 0) list = list.filter(s => s.value >= ST.filters.minValue);
  return list;
}

// ── AI INSIGHTS (Claude Haiku, cache 24h) ───────────────────────
const ST_AI_CACHE_KEY = 'st_ai_insights_v1';

async function fetchAIInsights() {
  // Check cache trước (24h TTL)
  try {
    const raw = localStorage.getItem(ST_AI_CACHE_KEY);
    if (raw) {
      const cached = JSON.parse(raw);
      if (Date.now() - cached.ts < 24*3600*1000) {
        ST.aiInsights = cached.data;
        console.log('[ST-AI] Loaded from cache');
        return;
      }
    }
  } catch(e) {}
  
  // Lấy top 50 suggestions để gửi cho AI phân tích
  const sample = ST.suggestions.slice(0, 50).map(s => ({
    sku: s.sku, name: s.name, category: s.category,
    from: s.from, to: s.to, qty: s.qty, urgency: s.urgency,
    dos_from: s.dos_from, dos_to: s.dos_to
  }));
  
  if (!sample.length) { ST.aiInsights = null; return; }
  
  const prompt = `Bạn là AI phân tích retail FMCG cho chuỗi mini-supermarket Vicomart (${activeBranchCount()} chi nhánh active: ${getActiveBranches().map(b=>b.id+'='+b.name).join(', ')}, miền Trung VN). Hôm nay ${new Date().toISOString().slice(0,10)}.

Dữ liệu ${sample.length} đề xuất chuyển kho (Top urgent):
${JSON.stringify(sample, null, 2)}

Phân tích NGẮN GỌN (max 150 từ tiếng Việt):
1. Xu hướng nổi bật (chi nhánh nào thiếu nhiều/dư nhiều?)
2. Mùa vụ liên quan (Tết, hè, lễ?) — chỉ nói NẾU thấy rõ qua category/SKU
3. 1 hành động ƯU TIÊN cụ thể cho hôm nay

Trả lời ngắn gọn, không lan man. Format: 3 bullets ngắn.`;

  try {
    console.log('[ST-AI] Calling Claude Haiku...');
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 500,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    const text = j.content?.[0]?.text || '';
    if (text) {
      ST.aiInsights = text;
      localStorage.setItem(ST_AI_CACHE_KEY, JSON.stringify({ data: text, ts: Date.now() }));
      console.log('[ST-AI] ✅ Got insights');
    }
  } catch(e) {
    console.warn('[ST-AI] Fail:', e.message);
    ST.aiInsights = '⚠ AI tạm không khả dụng. Click "Refresh" để thử lại.';
  }
}

}

function toggleSelectST(key, checked) {
  if (checked) ST.selected.add(key);
  else ST.selected.delete(key);
  // Re-render footer count
  const btn = document.querySelector('.btn-success[onclick*="batchCreateTransfers"]');
  if (btn) {
    btn.textContent = `📦 Tạo phiếu (${ST.selected.size} đã chọn)`;
    btn.disabled = ST.selected.size === 0;
  }
}

function toggleSelectAllST(checked) {
  const filtered = applySTFilters();
  if (checked) filtered.forEach(s => ST.selected.add(s._key));
  else ST.selected.clear();
  renderSmartTransfer();
}

function createSingleTransfer(key) {
  const s = ST.suggestions.find(x => x._key === key);
  if (!s) { toast('Không tìm thấy đề xuất', 'error'); return; }
  if (!confirm(`Tạo phiếu chuyển kho:\n${s.from} → ${s.to}\nSP: ${s.name}\nSL: ${s.qty} ${s.unit}\nGiá trị: ${fmtVND(s.value)}đ`)) return;
  
  const transfer = {
    id: 'TR' + String((S.counters.transfer || 0) + 1).padStart(4,'0'),
    fromBranch: s.from,
    toBranch: s.to,
    date: todayStr(),
    status: 'pending',
    sentBy: null, receivedBy: null,
    items: [{
      sku: s.sku, name: s.name, qty: s.qty, 
      cost: s.cost, unit: s.unit, recv: 0
    }],
    note: `🤖 Smart Transfer · DOS ${s.from}=${s.dos_from}d (dư) → ${s.to}=${s.dos_to}d (thiếu) · target ${ST.targetDOS}d`,
    _smartTransfer: true,
  };
  
  S.counters.transfer = (S.counters.transfer || 0) + 1;
  S.transfers = S.transfers || [];
  S.transfers.unshift(transfer);
  ST.selected.delete(key);
  // Bỏ suggestion này khỏi list
  ST.suggestions = ST.suggestions.filter(x => x._key !== key);
  saveState();
  toast(`✓ Đã tạo phiếu ${transfer.id}`, 'success');
  renderSmartTransfer();
}

function batchCreateTransfers() {
  if (ST.selected.size === 0) return;
  const selectedSugs = ST.suggestions.filter(s => ST.selected.has(s._key));
  
  // Group theo (from, to)
  const groups = {};
  selectedSugs.forEach(s => {
    const k = s.from + '|' + s.to;
    if (!groups[k]) groups[k] = [];
    groups[k].push(s);
  });
  
  const groupCount = Object.keys(groups).length;
  const totalSku = selectedSugs.length;
  const totalQty = selectedSugs.reduce((sum, s) => sum + s.qty, 0);
  const totalValue = selectedSugs.reduce((sum, s) => sum + s.value, 0);
  
  if (!confirm(`Tạo ${groupCount} phiếu chuyển kho gộp:\n${totalSku} SKU · ${totalQty.toLocaleString('vi-VN')} cái · ${fmtVND(totalValue)}đ\n\nMỗi cặp (Từ → Đến) tạo 1 phiếu riêng.`)) return;
  
  const created = [];
  Object.entries(groups).forEach(([key, sugs]) => {
    const [from, to] = key.split('|');
    S.counters.transfer = (S.counters.transfer || 0) + 1;
    const transfer = {
      id: 'TR' + String(S.counters.transfer).padStart(4,'0'),
      fromBranch: from, toBranch: to, date: todayStr(),
      status: 'pending',
      sentBy: null, receivedBy: null,
      items: sugs.map(s => ({
        sku: s.sku, name: s.name, qty: s.qty, 
        cost: s.cost, unit: s.unit, recv: 0
      })),
      note: `🤖 Smart Transfer (${sugs.length} SKU) · gộp tự động · target ${ST.targetDOS}d`,
      _smartTransfer: true,
    };
    S.transfers = S.transfers || [];
    S.transfers.unshift(transfer);
    created.push(transfer.id);
    sugs.forEach(s => ST.selected.delete(s._key));
  });
  
  // Bỏ các suggestion đã tạo phiếu
  ST.suggestions = ST.suggestions.filter(s => !ST.selected.has(s._key) && !selectedSugs.some(ss => ss._key === s._key));
  
  saveState();
  toast(`✓ Đã tạo ${created.length} phiếu: ${created.join(', ')}`, 'success');
  renderSmartTransfer();
}

function exportSTExcel() {
  if (typeof XLSX === 'undefined') { toast('⚠ Đang load Excel lib', 'warn'); return; }
  const filtered = applySTFilters();
  if (!filtered.length) { toast('Không có dữ liệu', 'warn'); return; }
  
  const rows = [
    ['Vicomart Smart Transfer · ' + new Date().toLocaleString('vi-VN')],
    ['Target DOS: ' + ST.targetDOS + ' ngày · Tổng: ' + filtered.length + ' đề xuất'],
    [],
    ['SKU','Tên SP','Danh mục','Mức','Từ','Đến','Tồn từ','Tồn đến','DOS từ','DOS đến','SL chuyển','DOS từ sau','DOS đến sau','Giá vốn','Giá trị']
  ];
  filtered.forEach(s => rows.push([
    s.sku, s.name, s.category||'', s.urgency, s.from, s.to,
    s.stock_from, s.stock_to, s.dos_from===999?'∞':s.dos_from, s.dos_to,
    s.qty, s.dos_after_from, s.dos_after_to,
    s.cost, s.value
  ]));
  
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, 'Smart Transfer');
  XLSX.writeFile(wb, `Vicomart_SmartTransfer_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('✓ Đã xuất Excel', 'success');
}

    return;

  const fromBranch = isAllBranches() ? 'PB' : S.activeBranch;
  if (isAllBranches()) toast('💡 Default fromBranch=PB - đổi trong form nếu khác', 'info');
  window._tfDraft = { items: [], fromBranch, toBranch: BRANCHES.find(b => b.id !== fromBranch).id, note: '' };

}

function tfAddItem() {
  const skuId = document.getElementById('tfSkuPick').value.trim().toUpperCase();
  const qty = parseInt(document.getElementById('tfQty').value) || 0;
  if (!skuId) { toast('Chưa chọn SKU', 'error'); return; }
  const sku = findSku(skuId);
  if (!sku) { toast('SKU không tồn tại', 'error'); return; }
  if (qty <= 0) { toast('SL > 0', 'error'); return; }
  const stock = S.inventory[window._tfDraft.fromBranch]?.[skuId] || 0;
  if (qty > stock) { toast(`SL (${qty}) > tồn (${stock})`, 'error'); return; }
  const existing = window._tfDraft.items.find(it => it.sku === skuId);
  if (existing) {
    if (existing.qty + qty > stock) { toast(`Tổng vượt tồn`, 'error'); return; }
    existing.qty += qty;
  } else {
    window._tfDraft.items.push({ sku: skuId, qty, cost: sku.cost });
  }
  openTransferForm();
}

function tfUpdateQty(idx, val) {
  window._tfDraft.items[idx].qty = parseInt(val) || 1;
  openTransferForm();
}

function tfRemoveItem(idx) {
  window._tfDraft.items.splice(idx, 1);
  openTransferForm();
}

function saveTransfer() {
  const draft = window._tfDraft;
  if (!draft.items.length) return;
  if (draft.fromBranch === draft.toBranch) { toast('CN khác nhau', 'error'); return; }
  draft.note = document.getElementById('tfNote').value.trim();
  draft.date = document.getElementById('tfDate').value || todayStr();
  for (const it of draft.items) {
    const stock = S.inventory[draft.fromBranch]?.[it.sku] || 0;
    if (it.qty > stock) { toast(`SKU ${it.sku} chỉ còn ${stock}`, 'error'); return; }
  }
  if (!S.counters.transfer) S.counters.transfer = 0;
  S.counters.transfer++;
  const totalValue = draft.items.reduce((s, it) => s + (it.qty * it.cost), 0);
  const tf = {
    id: 'TF' + String(S.counters.transfer).padStart(4, '0'),
    date: draft.date, fromBranch: draft.fromBranch, toBranch: draft.toBranch,
    items: draft.items, totalValue, note: draft.note,
    createdBy: ROLES[S.activeRole]?.label || 'anh Kay', createdAt: nowISO(),
    status: 'pending', sentAt: null, receivedAt: null,
  };
  S.transfers.push(tf);
  draft.items.forEach(it => {
    S.inventory[draft.fromBranch][it.sku] = Math.max(0, (S.inventory[draft.fromBranch][it.sku] || 0) - it.qty);
  });
  addAuditLog('auto', tf.id, `Tạo phiếu điều chuyển ${tf.id} · ${draft.fromBranch} → ${draft.toBranch} · ${draft.items.length} SKU · ${fmtVND(totalValue)}đ`);
  saveState();
  window._tfDraft = null;
  closeModal();
  renderTransfer();
  toast(`✓ Tạo ${tf.id} · trừ tồn CN ${draft.fromBranch}`, 'success');
}

function markTransferSent(tfId) {
  const tf = S.transfers.find(t => t.id === tfId);
  if (!tf || tf.status !== 'pending') return;
  tf.status = 'in_transit';
  tf.sentAt = nowISO();
  tf.sentBy = ROLES[S.activeRole]?.label || 'anh Kay';
  addAuditLog('auto', tf.id, `🚚 Đã gửi ${tf.id} bởi ${tf.sentBy}`);
  saveState();
  closeModal();
  renderTransfer();
  toast('🚚 Đã đánh dấu đang chuyển', 'success');
}

function markTransferReceived(tfId) {
  const tf = S.transfers.find(t => t.id === tfId);
  if (!tf || tf.status !== 'in_transit') return;
  tf.items.forEach(it => {
    if (!S.inventory[tf.toBranch]) S.inventory[tf.toBranch] = {};
    S.inventory[tf.toBranch][it.sku] = (S.inventory[tf.toBranch][it.sku] || 0) + it.qty;
  });
  tf.status = 'received';
  tf.receivedAt = nowISO();
  tf.receivedBy = ROLES[S.activeRole]?.label || 'anh Kay';
  addAuditLog('auto', tf.id, `✓ ${tf.toBranch} nhận ${tf.id} bởi ${tf.receivedBy} - ${fmtVND(tf.totalValue)}đ`);
  saveState();
  closeModal();
  renderTransfer();
  toast(`✓ CN ${tf.toBranch} đã nhận - cộng tồn`, 'success');
}

function cancelTransfer(tfId) {
  const tf = S.transfers.find(t => t.id === tfId);
  if (!tf || tf.status !== 'pending') return;
  if (!confirm(`Hủy phiếu ${tf.id}? Tồn ${tf.fromBranch} sẽ được hoàn lại.`)) return;
  tf.items.forEach(it => {
    S.inventory[tf.fromBranch][it.sku] = (S.inventory[tf.fromBranch][it.sku] || 0) + it.qty;
  });
  tf.status = 'cancelled';
  addAuditLog('auto', tf.id, `✗ Hủy ${tf.id} - hoàn tồn ${tf.fromBranch}`);
  saveState();
  closeModal();
  renderTransfer();
  toast('Đã hủy & hoàn tồn', 'warn');
}

// 📋 KIỂM KÊ KHO (Stock Take)
// Đối soát tồn thực tế vs tồn hệ thống → tự bút toán điều chỉnh
// Workflow: counting → pending_approval → approved → giảm/tăng tồn

let stocktakeFilter = 'all'; // all | counting | pending_approval | approved | cancelled
let stocktakeBranch = 'all';

function renderStocktake() {
  let list = (S.stocktakes || []);

    totalLossValue: (S.stocktakes || []).filter(s => s.status === 'approved').reduce((sum,s) => sum + Math.max(0, -s.totalDiffValue || 0), 0),
    totalGainValue: (S.stocktakes || []).filter(s => s.status === 'approved').reduce((sum,s) => sum + Math.max(0, s.totalDiffValue || 0), 0),

      <div class="kpi-card success"><div class="kpi-label">Đã duyệt</div><div class="kpi-value">${stats.approved}</div></div>
      <div class="kpi-card danger"><div class="kpi-label">Tổng thiếu hụt</div><div class="kpi-value">${fmtVND(stats.totalLossValue)}<small>đ</small></div><div class="kpi-sub">phải bù lỗ</div></div>
      <div class="kpi-card"><div class="kpi-label">Tổng dư thừa</div><div class="kpi-value">${fmtVND(stats.totalGainValue)}<small>đ</small></div><div class="kpi-sub">tăng tồn</div></div>

    <div class="toolbar">

      <button class="btn ${stocktakeFilter==='pending_approval'?'btn-primary':''}" onclick="stocktakeFilter='pending_approval';renderStocktake()">Chờ duyệt (${stats.pending})</button>
      <button class="btn ${stocktakeFilter==='approved'?'btn-primary':''}" onclick="stocktakeFilter='approved';renderStocktake()">Đã duyệt (${stats.approved})</button>

      </select>
      <button class="btn btn-primary" style="margin-left:auto" onclick="openNewStocktake()">+ Tạo phiếu kiểm kê</button>
    </div>

    <div class="panel">

        ${list.length === 0 ? `<div style="padding:40px;text-align:center;color:var(--text-3);font-size:13px">Chưa có phiếu kiểm kê nào</div>` : `
          <table>
            <thead><tr>

              <th>Chi nhánh</th>

function stToggleScopeUI() {
  const cat = document.getElementById('stScopeC').checked;
  document.getElementById('stScopeCatField').style.display = cat ? '' : 'none';
}

function confirmCreateStocktake() {
  const date = document.getElementById('stDate').value;
  const branch = document.getElementById('stBranch').value;
  const scope = document.querySelector('input[name=stScope]:checked').value;
  const scopeValue = scope === 'category' ? document.getElementById('stScopeCat').value : null;
  const note = document.getElementById('stNote').value.trim();

  // Filter SKUs theo scope
  let targetSkus = S.skus;
  if (scope === 'category') targetSkus = S.skus.filter(s => s.cat === scopeValue);

  // Build items với SL hệ thống
  const inv = S.inventory[branch] || {};
  const items = targetSkus.map(s => ({
    sku: s.sku,
    name: s.name,
    cat: s.cat,
    brand: s.brand,
    unit: s.unit || 'cái',
    cost: s.cost,
    system: inv[s.sku] || 0,
    counted: null, // chưa đếm
    diff: 0,
    note: '',
  }));

  S.counters.stocktake++;
  const id = 'STK' + String(S.counters.stocktake).padStart(4, '0');
  const stocktake = {
    id, date, branch, scope, scopeValue,
    items,
    status: 'counting',
    createdBy: 'anh Kay',
    createdAt: nowISO(),
    note,
    totalDiffValue: 0,
  };
  S.stocktakes.push(stocktake);
  addAuditLog('auto', id, `Tạo phiếu kiểm kê ${BRANCHES.find(b=>b.id===branch)?.name} · ${items.length} SKU · Scope: ${scope === 'full' ? 'toàn kho' : scope === 'category' ? scopeValue : 'theo SKU'}`);
  saveState();
  closeModal();
  toast(`✓ Đã tạo ${id} · ${items.length} SKU cần đếm`, 'success');
  openStocktakeDetail(id);
}

function openStocktakeDetail(stId) {
  const st = (S.stocktakes || []).find(s => s.id === stId);
  if (!st) return;
  const br = BRANCHES.find(b => b.id === st.branch);
  const isLocked = st.status === 'approved' || st.status === 'cancelled';

  // Tính tổng
  const totalSku = st.items.length;
  const counted = st.items.filter(it => it.counted !== null).length;
  const totalDiffQty = st.items.reduce((s,it) => s + (it.counted !== null ? (it.counted - it.system) : 0), 0);
  const totalDiffValue = st.items.reduce((s,it) => s + (it.counted !== null ? (it.counted - it.system) * it.cost : 0), 0);
  const lossValue = st.items.reduce((s,it) => s + (it.counted !== null && it.counted < it.system ? (it.counted - it.system) * it.cost : 0), 0);
  const gainValue = st.items.reduce((s,it) => s + (it.counted !== null && it.counted > it.system ? (it.counted - it.system) * it.cost : 0), 0);

  st.totalDiffValue = totalDiffValue; // cập nhật real-time

  openModal(`Phiếu kiểm kê · ${st.id}`, `
    <div style="display:flex;gap:6px;margin-bottom:14px">
      <div class="tl-step ${st.status==='counting'?'current':st.status==='approved'||st.status==='pending_approval'?'done':''}">1. Đang đếm</div>
      <div class="tl-step ${st.status==='pending_approval'?'current':st.status==='approved'?'done':''}">2. Chờ duyệt</div>

      <div><span class="lbl">Ngày kiểm</span><span class="val">${fmtDate(st.date)}</span></div>

      <div class="kpi-card danger"><div class="kpi-label">Thiếu hụt</div><div class="kpi-value">${fmtVND(Math.abs(lossValue))}<small>đ</small></div></div>
      <div class="kpi-card success"><div class="kpi-label">Dư thừa</div><div class="kpi-value">${fmtVND(gainValue)}<small>đ</small></div></div>

    <div class="sec-label">Bảng đối soát SKU</div>

function stUpdateCount(stId, idx, val) {
  const st = S.stocktakes.find(s => s.id === stId);
  if (!st) return;
  const v = val === '' ? null : (parseInt(val) || 0);
  st.items[idx].counted = v;
  st.items[idx].diff = v !== null ? v - st.items[idx].system : 0;
  st.totalDiffValue = st.items.reduce((s,it) => s + (it.counted !== null ? (it.counted - it.system) * it.cost : 0), 0);
  saveState();
  // Re-render để update các tổng
  setTimeout(() => openStocktakeDetail(stId), 50);
}

function stUpdateNote(stId, idx, val) {
  const st = S.stocktakes.find(s => s.id === stId);
  if (!st) return;
  st.items[idx].note = val;
  saveState();
}

function submitStocktake(stId) {
  const st = S.stocktakes.find(s => s.id === stId);
  if (!st) return;
  const counted = st.items.filter(it => it.counted !== null).length;
  if (counted === 0) { toast('Chưa đếm SKU nào', 'error'); return; }
  if (!confirm(`Gửi duyệt phiếu ${stId}?\nĐã đếm ${counted}/${st.items.length} SKU.\nLệch SL: ${Math.abs(st.items.reduce((s,it)=>s+(it.counted!==null?it.counted-it.system:0),0))} · Giá trị: ${fmtVND(Math.abs(st.totalDiffValue||0))}đ`)) return;
  st.status = 'pending_approval';
  st.submittedAt = nowISO();
  addAuditLog('auto', stId, `Gửi duyệt phiếu kiểm kê - ${counted} SKU đã đếm, lệch ${fmtVND(Math.abs(st.totalDiffValue))}đ`);
  saveState();
  closeModal();
  renderStocktake();
  toast('✓ Đã gửi duyệt — chờ GĐ/QLCH approve', 'success');
}

function approveStocktake(stId) {
  const st = S.stocktakes.find(s => s.id === stId);
  if (!st) return;
  if (!confirm(`Duyệt phiếu ${stId}?\n\n⚠ Sẽ TỰ ĐỘNG cập nhật tồn theo SL đếm thực:\n· ${st.items.filter(it=>it.counted!==null && it.counted < it.system).length} SKU giảm tồn (mất hàng)\n· ${st.items.filter(it=>it.counted!==null && it.counted > it.system).length} SKU tăng tồn (dư)\n\nGiá trị điều chỉnh: ${fmtVND(Math.abs(st.totalDiffValue||0))}đ ${st.totalDiffValue<0?'(thiệt hại)':'(dư thừa)'}\n\nThao tác KHÔNG thể hoàn tác.`)) return;

  // Cập nhật tồn kho
  if (!S.inventory[st.branch]) S.inventory[st.branch] = {};
  let lossSku = 0, gainSku = 0;
  st.items.forEach(it => {
    if (it.counted !== null && it.counted !== it.system) {
      S.inventory[st.branch][it.sku] = it.counted;
      if (it.counted < it.system) lossSku++;
      else gainSku++;
    }
  });

  st.status = 'approved';
  st.approvedAt = nowISO();
  st.approvedBy = 'anh Kay';
  addAuditLog('auto', stId, `Duyệt kiểm kê ${BRANCHES.find(b=>b.id===st.branch)?.name}: ${lossSku} SKU mất hàng, ${gainSku} SKU dư thừa, giá trị điều chỉnh ${fmtVND(Math.abs(st.totalDiffValue))}đ`);
  saveState();
  closeModal();
  renderStocktake();
  toast(`✓ Đã duyệt ${stId} · Cập nhật tồn ${lossSku + gainSku} SKU`, 'success');
}

function cancelStocktake(stId) {
  const st = S.stocktakes.find(s => s.id === stId);
  if (!st) return;
  const reason = prompt('Lý do hủy phiếu:');
  if (!reason) return;
  st.status = 'cancelled';
  st.cancelReason = reason;
  st.cancelledAt = nowISO();
  addAuditLog('auto', stId, `Hủy phiếu kiểm kê: ${reason}`);
  saveState();
  closeModal();
  renderStocktake();
  toast('Đã hủy phiếu', 'warn');
}

// ⏰ CẢNH BÁO HSD (Expiry Alert)
// Đọc HSD từ PO items đã nhận → cảnh báo theo mức nguy hiểm
// ════════════════════════════════════════════════════════════════
let expiryThreshold = 30; // ngày

function computeExpiryAlerts() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const alerts = [];

  // Đọc từ tất cả PO đã received/partial có HSD
  S.pos.filter(p => p.status === 'received' || p.status === 'partial').forEach(po => {
    po.items.forEach(it => {
      if (!it.expiry || !(it.recv > 0)) return;
      // expiry format YYYY-MM (input type="month")
      const [y, m] = it.expiry.split('-').map(Number);
      if (!y || !m) return;
      // Lấy ngày cuối tháng làm HSD
      const expDate = new Date(y, m, 0);
      const daysLeft = Math.floor((expDate - today) / 86400000);

      const sku = findSku(it.sku);
      if (!sku) return;
      const stock = S.inventory[po.branch]?.[it.sku] || 0;
      if (stock === 0) return; // Không còn tồn → không cần alert

      // Aggregate per (sku, branch)
      const key = it.sku + '|' + po.branch;
      const existing = alerts.find(a => a.key === key);
      if (existing) {
        // Lấy HSD gần nhất (lô cũ nhất)
        if (daysLeft < existing.daysLeft) {
          existing.daysLeft = daysLeft;
          existing.expiry = it.expiry;
          existing.expDate = expDate;
        }
      } else {
        alerts.push({
          key,
          sku: it.sku, name: sku.name, brand: sku.brand, cat: sku.cat, unit: sku.unit || 'cái',
          branch: po.branch,
          stock,
          cost: sku.cost, price: sku.price,
          value: stock * sku.cost,
          expiry: it.expiry,
          expDate,
          daysLeft,
          fromPO: po.id,
        });
      }
    });
  });

  return alerts.sort((a, b) => a.daysLeft - b.daysLeft);
}

let expiryFilter = 'soon'; // soon | all | expired
let expiryBranchFilter = 'all';

function renderExpiry() {
  const allAlerts = computeExpiryAlerts();

  // Filter
  let list = allAlerts;
  if (expiryBranchFilter !== 'all') list = list.filter(a => a.branch === expiryBranchFilter);
  if (expiryFilter === 'expired') list = list.filter(a => a.daysLeft < 0);
  else if (expiryFilter === 'critical') list = list.filter(a => a.daysLeft >= 0 && a.daysLeft <= 7);
  else if (expiryFilter === 'warning') list = list.filter(a => a.daysLeft > 7 && a.daysLeft <= 30);
  else if (expiryFilter === 'soon') list = list.filter(a => a.daysLeft <= 30);
  else if (expiryFilter === 'safe') list = list.filter(a => a.daysLeft > 30 && a.daysLeft <= 90);

  // Stats
  const stats = {
    expired: allAlerts.filter(a => a.daysLeft < 0).length,
    critical: allAlerts.filter(a => a.daysLeft >= 0 && a.daysLeft <= 7).length,
    warning: allAlerts.filter(a => a.daysLeft > 7 && a.daysLeft <= 30).length,
    safe: allAlerts.filter(a => a.daysLeft > 30 && a.daysLeft <= 90).length,
    total: allAlerts.length,
    expiredValue: allAlerts.filter(a => a.daysLeft < 0).reduce((s,a)=>s+a.value, 0),
    soonValue: allAlerts.filter(a => a.daysLeft >= 0 && a.daysLeft <= 30).reduce((s,a)=>s+a.value, 0),

  c.innerHTML = `

    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(5,1fr)">
      <div class="kpi-card danger"><div class="kpi-label">Đã quá hạn</div><div class="kpi-value">${stats.expired}</div><div class="kpi-sub">${fmtVND(stats.expiredValue)}đ thiệt hại</div></div>
      <div class="kpi-card warn"><div class="kpi-label">Critical (≤ 7d)</div><div class="kpi-value">${stats.critical}</div><div class="kpi-sub">cần thanh lý gấp</div></div>
      <div class="kpi-card accent"><div class="kpi-label">Cảnh báo (≤ 30d)</div><div class="kpi-value">${stats.warning}</div><div class="kpi-sub">giảm giá / khuyến mãi</div></div>
      <div class="kpi-card"><div class="kpi-label">An toàn (≤ 90d)</div><div class="kpi-value">${stats.safe}</div></div>
      <div class="kpi-card success"><div class="kpi-label">Tổng giá trị nguy cơ</div><div class="kpi-value">${fmtVND(stats.soonValue)}<small>đ</small></div><div class="kpi-sub">SP HSD ≤ 30d</div></div>
    </div>

    <div class="toolbar">
      <button class="btn ${expiryFilter==='expired'?'btn-primary':''}" onclick="expiryFilter='expired';renderExpiry()">🔴 Đã quá hạn (${stats.expired})</button>
      <button class="btn ${expiryFilter==='critical'?'btn-primary':''}" onclick="expiryFilter='critical';renderExpiry()">🟠 Critical ≤ 7d (${stats.critical})</button>
      <button class="btn ${expiryFilter==='warning'?'btn-primary':''}" onclick="expiryFilter='warning';renderExpiry()">🟡 Cảnh báo 8-30d (${stats.warning})</button>
      <button class="btn ${expiryFilter==='soon'?'btn-primary':''}" onclick="expiryFilter='soon';renderExpiry()">⏰ Sắp hết (≤ 30d) (${stats.expired+stats.critical+stats.warning})</button>
      <button class="btn ${expiryFilter==='safe'?'btn-primary':''}" onclick="expiryFilter='safe';renderExpiry()">🟢 An toàn 31-90d (${stats.safe})</button>
      <button class="btn ${expiryFilter==='all'?'btn-primary':''}" onclick="expiryFilter='all';renderExpiry()">Tất cả (${stats.total})</button>
      <select class="select" onchange="expiryBranchFilter=this.value;renderExpiry()" style="margin-left:10px">
        <option value="all">Tất cả CN</option>
        ${getActiveBranches().map(b => `<option value="${b.id}" ${expiryBranchFilter===b.id?'selected':''}>${b.id} · ${b.name}</option>`).join('')}
      </select>
      <button class="btn" style="margin-left:auto" onclick="expiryExportExcel()">📥 Xuất Excel</button>
    </div>

    <div class="panel">
      <div class="panel-body flush">
        ${list.length === 0 ? `<div style="padding:40px;text-align:center;color:var(--text-3);font-size:13px">${stats.total === 0 ? '🎉 Tất cả SP đều có HSD an toàn (>90 ngày) hoặc chưa có dữ liệu HSD' : 'Không có SP nào ở mức cảnh báo này'}</div>` : `
          <table>
            <thead><tr>
              <th class="stt">STT</th>
              <th>SKU</th>
              <th style="min-width:200px">Tên SP</th>
              <th>Nhóm</th>
              <th>Brand</th>
              <th>CN</th>
              <th class="num">Tồn</th>
              <th>HSD</th>
              <th class="num">Còn lại</th>
              <th>Mức độ</th>
              <th class="num">Giá trị</th>
              <th class="num">Suggest</th>
              <th></th>
            </tr></thead>
            <tbody>${list.map((a, i) => {

              const dangerLevel = a.daysLeft < 0 ? 'expired' : a.daysLeft <= 7 ? 'critical' : a.daysLeft <= 30 ? 'warning' : 'safe';
              const levelPill = dangerLevel === 'expired' ? '<span class="pill pill-danger">🔴 QUÁ HẠN</span>'
                              : dangerLevel === 'critical' ? '<span class="pill pill-danger">🟠 ≤ 7 ngày</span>'
                              : dangerLevel === 'warning' ? '<span class="pill pill-warning">🟡 ≤ 30 ngày</span>'
                              : '<span class="pill pill-success">🟢 An toàn</span>';
              const suggestion = a.daysLeft < 0 ? 'Hủy ngay'
                              : a.daysLeft <= 7 ? 'Giảm 50% / Trả NCC'
                              : a.daysLeft <= 30 ? 'Khuyến mãi 20-30%'
                              : 'Theo dõi';
              return `<tr style="background:${dangerLevel==='expired'?'rgba(239,68,68,0.05)':dangerLevel==='critical'?'rgba(251,146,60,0.04)':''}">
                <td class="stt">${i+1}</td>
                <td><strong class="mono" style="font-size:10.5px">${a.sku}</strong></td>
                <td><strong>${a.name}</strong></td>
                <td><span class="pill pill-muted" style="font-size:10px">${a.cat}</span></td>
                <td style="font-size:11px"><strong>${a.brand || '—'}</strong></td>
                <td><span class="tag info">${a.branch}</span></td>
                <td class="num"><strong>${a.stock}</strong> ${a.unit}</td>

          </table>
        `}
      </div>
    </div>
  `;
}

function expiryQuickWriteoff(sku, branch, stock) {
  const skuObj = findSku(sku);
  if (!skuObj) return;
  if (!confirm(`Tạo phiếu hủy nhanh cho ${skuObj.name}?\n· Chi nhánh: ${branch}\n· SL hủy: ${stock} ${skuObj.unit || 'cái'}\n· Giá trị: ${fmtVND(stock * skuObj.cost)}đ\n· Lý do: Hết HSD\n\nSẽ chuyển sang tab Hủy hàng để hoàn tất.`)) return;

  S.counters.writeoff = (S.counters.writeoff || 0) + 1;
  const id = 'WO' + String(S.counters.writeoff).padStart(4, '0');
  if (!S.writeoffs) S.writeoffs = [];
  S.writeoffs.push({
    id, date: todayStr(), branch,
    reason: 'expired',
    items: [{ sku, qty: stock, cost: skuObj.cost, note: 'Hết HSD - tự động từ Cảnh báo HSD' }],
    totalValue: stock * skuObj.cost,
    createdBy: 'anh Kay',
    createdAt: nowISO(),
    status: 'pending',
  });
  addAuditLog('auto', id, `Tạo phiếu hủy nhanh từ Cảnh báo HSD: ${skuObj.name} · ${stock} ${skuObj.unit}`);
  saveState();
  toast(`✓ Đã tạo phiếu hủy ${id} · Đang ở trạng thái chờ duyệt`, 'success');
  setTab('writeoff');
}

function expiryExportExcel() {
  const alerts = computeExpiryAlerts();
  if (alerts.length === 0) { toast('Không có dữ liệu', 'warn'); return; }
  const rows = [];
  rows.push(['BÁO CÁO CẢNH BÁO HSD VICOMART', '', '', '', '', '', '', '', '', '', '']);
  rows.push(['Ngày: ' + new Date().toLocaleDateString('vi-VN'), '', '', '', '', '', '', '', '', '', '']);
  rows.push([]);
  rows.push(['STT','SKU','Tên SP','Nhóm','Brand','CN','Tồn','ĐVT','HSD','Còn lại (d)','Mức độ','Giá trị','Suggest']);
  alerts.forEach((a, i) => {
    const level = a.daysLeft < 0 ? 'QUÁ HẠN' : a.daysLeft <= 7 ? 'CRITICAL' : a.daysLeft <= 30 ? 'WARNING' : 'SAFE';
    const sug = a.daysLeft < 0 ? 'Hủy ngay' : a.daysLeft <= 7 ? 'Giảm 50% / Trả NCC' : a.daysLeft <= 30 ? 'KM 20-30%' : 'Theo dõi';
    rows.push([i+1, a.sku, a.name, a.cat, a.brand || '', a.branch, a.stock, a.unit, a.expiry, a.daysLeft, level, a.value, sug]);
  });
  const csv = '\ufeff' + rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Vicomart_CanhBaoHSD_${todayStr()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`Đã xuất ${alerts.length} cảnh báo`, 'success');
}

window.openSpDetail = openSpDetail;

/**
 * Quay lại tab trước (default: inventory)
 */
function spDetailBack() {
  window._spDetailSku = null;
  // Cleanup charts
  Object.values(window._spDetailCharts).forEach(c => { try { c.destroy(); } catch(e) {} });

/**
 * Load sales velocity từ inventory_movements
 */
async function loadSpVelocity(sku) {
  try {
    const db = getKhoSupa();
    if (!db) return;
    const now = new Date();
    const ago90 = new Date(now.getTime() - 90*86400000).toISOString();
    
    const { data, error } = await db.from('inventory_movements')
      .select('date, qty, type')
      .eq('product_sku', sku)
      .gte('date', ago90)
      .in('type', ['OUT', 'CUSTOMER_RETURN', 'RETURN_FROM_CUSTOMER']);
    
    if (error) throw error;
    
    const events = data || [];
    const calcVelocity = (days) => {
      const cutoff = new Date(now.getTime() - days*86400000);
      const sum = events
        .filter(e => new Date(e.date) >= cutoff)
        .reduce((s, e) => s + Math.abs(parseFloat(e.qty)||0) * (e.type === 'OUT' ? 1 : -1), 0);
      return { total: sum, perDay: sum / days };
    };
    
    const v7 = calcVelocity(7);
    const v30 = calcVelocity(30);
    const v90 = calcVelocity(90);
    const fv = (n) => (n||0).toLocaleString('vi-VN', {maximumFractionDigits:1});
    
    [[7,v7],[30,v30],[90,v90]].forEach(([d,v]) => {
      const el = document.getElementById(`sp-vel-${d}d`);
      if (!el) return;
      el.innerHTML = `
        <div style="font-size:9px;color:#64748b;font-weight:700;text-transform:uppercase">${d} ngày</div>
        <div style="font-size:13px;font-weight:800;color:#0f172a;font-family:'JetBrains Mono',monospace;margin-top:2px">${fv(v.total)}</div>
        <div style="font-size:10px;color:#64748b;margin-top:2px">${fv(v.perDay)}/ngày</div>
      `;
    });
    
    // DOS (Days of Stock)
    const sp = (S.skus || []).find(s => s.sku === sku);
    if (sp) {
      const totalStock = (parseFloat(sp.stock_pb||0)||0) + (parseFloat(sp.stock_vt||0)||0);
      const dos = v30.perDay > 0 ? totalStock / v30.perDay : 999;
      let dosColor = '#15803d', dosLabel = 'Đủ', dosBg = '#dcfce7';
      if (dos < 7)         { dosColor = '#dc2626'; dosLabel = 'Sắp hết — đặt ngay'; dosBg = '#fee2e2'; }
      else if (dos < 14)   { dosColor = '#d97706'; dosLabel = 'Cảnh báo — chuẩn bị đặt'; dosBg = '#fef3c7'; }
      else if (dos > 60)   { dosColor = '#7c3aed'; dosLabel = 'Tồn dư — xem xét giảm đặt'; dosBg = '#ede9fe'; }
      
      const dosEl = document.getElementById('sp-dos');
      if (dosEl) {
        dosEl.style.background = dosBg;
        dosEl.style.color = dosColor;
        dosEl.innerHTML = `<b>DOS:</b> ${dos > 999 ? '∞' : dos.toFixed(1)} ngày — <b>${dosLabel}</b>`;
      }
      
      // Reorder suggestion
      const leadTime = 7;
      const safetyDays = 14;
      const target = Math.ceil(v30.perDay * (leadTime + safetyDays));
      const reorder = Math.max(0, target - totalStock);
      const reorderBox = document.getElementById('sp-reorder-box');
      if (reorderBox) {
        reorderBox.innerHTML = `
          <div style="font-size:11px;font-weight:700;color:#0071CE;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">📦 Đề xuất đặt hàng</div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;font-size:12px">
            <div><div style="color:#64748b;font-size:10px;font-weight:600">Tồn hiện tại</div><div style="font-size:14px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#0f172a">${fv(totalStock)}</div></div>
            <div><div style="color:#64748b;font-size:10px;font-weight:600">Bán/ngày (30d)</div><div style="font-size:14px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#0f172a">${fv(v30.perDay)}</div></div>
            <div><div style="color:#64748b;font-size:10px;font-weight:600">Target ${leadTime+safetyDays}d</div><div style="font-size:14px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#0f172a">${fv(target)}</div></div>
            <div><div style="color:${reorder>0?'#dc2626':'#15803d'};font-size:10px;font-weight:700">${reorder>0?'⚠ Đề xuất đặt':'✓ Đủ tồn'}</div><div style="font-size:18px;font-weight:900;font-family:'JetBrains Mono',monospace;color:${reorder>0?'#dc2626':'#15803d'}">${fv(reorder)}</div></div>
          </div>
          <div style="margin-top:8px;font-size:11px;color:#64748b">
            Công thức: <code style="background:#f1f5f9;padding:1px 5px;border-radius:3px">target = avg30d × (leadTime ${leadTime}d + safety ${safetyDays}d)</code>
          </div>
        `;
      }
    }
  } catch(e) {
    console.warn('[SP Detail] Velocity load fail:', e);
  }
}
window.loadSpVelocity = loadSpVelocity;

/**
 * Load events từ inventory_movements (1 source duy nhất, đã đầy đủ)
 */
async function spHistLoad() {
  const sku = window._spDetailSku;
  const tbody = document.getElementById('sph-tbody');
  if (!tbody) return;
  
  try {
    const db = getKhoSupa();
    if (!db) throw new Error('Supabase chưa sẵn sàng');
    
    const { data, error } = await db.from('inventory_movements')
      .select('date, fiscal_period, product_sku, branch_id, type, qty, unit_cost, total_value, ref_type, ref_id, note, created_by, created_at')
      .eq('product_sku', sku)
      .order('date', { ascending: true })  // ASC để tính running balance forward
      .limit(5000);
    
    if (error) throw error;
    
    const events = data || [];
    
    // Compute running balance per branch
    const balanceMap = {};  // { 'PB': running, 'VT': running }
    events.forEach(e => {
      const br = e.branch_id || 'PB';
      if (!balanceMap[br]) balanceMap[br] = 0;
      balanceMap[br] += parseFloat(e.qty) || 0;
      e._balanceAfter = balanceMap[br];
    });
    
    // Sort DESC for display
    events.sort((a, b) => new Date(b.date) - new Date(a.date));
    
    window._spDetailEvents = events;
    window._spDetailEventsLoaded = true;
    spHistApply();
  } catch(e) {
    console.error('[SP History] Load fail:', e);
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:20px;color:#dc2626">❌ ${e.message}</td></tr>`;
  }
}
window.spHistLoad = spHistLoad;

function spHistApply() {
  const typeF = document.getElementById('sph-type')?.value || 'all';
  const branchF = document.getElementById('sph-branch')?.value || 'all';
  const fromStr = document.getElementById('sph-from')?.value;
  const toStr = document.getElementById('sph-to')?.value;
  const fromDate = fromStr ? new Date(fromStr + 'T00:00:00') : null;
  const toDate = toStr ? new Date(toStr + 'T23:59:59') : null;
  
  let filtered = window._spDetailEvents.filter(e => {
    if (typeF !== 'all') {
      const types = typeF.split(',');
      if (!types.includes(e.type)) return false;
    }
    if (branchF !== 'all' && e.branch_id !== branchF) return false;
    if (fromDate || toDate) {
      const d = new Date(e.date);
      if (fromDate && d < fromDate) return false;
      if (toDate && d > toDate) return false;
    }
    return true;
  });
  
  window._spDetailFilteredEvents = filtered;
  window._spDetailPage = 1;
  spHistRender();
}
window.spHistApply = spHistApply;

function spHistReset() {
  document.getElementById('sph-type').value = 'all';
  document.getElementById('sph-branch').value = 'all';
  const today = new Date();
  const past = new Date(today.getTime() - 30*86400000);
  document.getElementById('sph-from').value = past.toISOString().slice(0,10);
  document.getElementById('sph-to').value = today.toISOString().slice(0,10);
  spHistApply();
}
window.spHistReset = spHistReset;

function spHistQuick(days) {
  const today = new Date();
  if (days === 0) {
    document.getElementById('sph-from').value = '';
    document.getElementById('sph-to').value = '';
  } else {
    const past = new Date(today.getTime() - days*86400000);
    document.getElementById('sph-from').value = past.toISOString().slice(0,10);
    document.getElementById('sph-to').value = today.toISOString().slice(0,10);
  }
  spHistApply();
}
window.spHistQuick = spHistQuick;

function spHistRender() {
  const filtered = window._spDetailFilteredEvents;
  const page = window._spDetailPage;
  const pageSize = window._spDetailPageSize;
  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  if (page > totalPages) window._spDetailPage = totalPages;
  
  const start = (window._spDetailPage - 1) * pageSize;
  const pageData = filtered.slice(start, start + pageSize);
  
  // Summary
  let sumIn = 0, sumOut = 0, sumValue = 0;
  filtered.forEach(e => {
    const q = parseFloat(e.qty) || 0;
    const v = parseFloat(e.total_value) || 0;
    if (q > 0) sumIn += q;
    else sumOut += Math.abs(q);
    sumValue += Math.abs(v);
  });
  
  const fv = (n) => (n||0).toLocaleString('vi-VN');
  const setText = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  setText('sph-sum-in', fv(sumIn));
  setText('sph-sum-out', fv(sumOut));
  setText('sph-sum-cnt', fv(filtered.length));
  setText('sph-sum-val', fv(sumValue) + 'đ');
  // Last balance: từ event đầu tiên có _balanceAfter (sau filter, là event mới nhất do desc)
  const latestBal = filtered.length > 0 ? filtered[0]._balanceAfter : '—';
  setText('sph-sum-bal', typeof latestBal === 'number' ? fv(latestBal) : latestBal);
  
  // Render rows
  const branchColor = { PB: '#0071CE', VT: '#16a34a', TA: '#dc2626' };
  const typePillStyle = {
    OUT: 'background:#fee2e2;color:#b91c1c',
    IN: 'background:#dcfce7;color:#15803d',
    TRANSFER_OUT: 'background:#dbeafe;color:#1e40af',
    TRANSFER_IN: 'background:#dbeafe;color:#1e40af',
    WRITEOFF: 'background:#fef3c7;color:#92400e',
    RETURN_TO_NCC: 'background:#fce7f3;color:#9f1239',
    RETURN_FROM_CUSTOMER: 'background:#f3e8ff;color:#6b21a8',
    STOCKTAKE_ADJ: 'background:#e0e7ff;color:#4338ca',
    OPENING_BALANCE: 'background:#f1f5f9;color:#475569',
    CORRECTION: 'background:#fef3c7;color:#a16207',
  };
  const typeLabel = {
    OUT: 'Bán', IN: 'Nhập', TRANSFER_OUT: 'ĐC ra', TRANSFER_IN: 'ĐC vào',
    WRITEOFF: 'Hủy', RETURN_TO_NCC: 'Trả NCC', RETURN_FROM_CUSTOMER: 'KH trả',
    STOCKTAKE_ADJ: 'Kiểm kê', OPENING_BALANCE: 'Tồn đầu', CORRECTION: 'Hiệu chỉnh',
  };
  
  let tbodyHtml = '';
  if (pageData.length === 0) {
    tbodyHtml = '<tr><td colspan="9" style="text-align:center;padding:30px;color:#94a3b8;font-style:italic">Không có giao dịch khớp filter</td></tr>';
  } else {
    pageData.forEach((e, i) => {
      const d = new Date(e.date);
      const dateStr = d.toLocaleDateString('vi-VN', {day:'2-digit',month:'2-digit',year:'2-digit'});
      const timeStr = d.toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'});
      const qty = parseFloat(e.qty) || 0;
      const cost = parseFloat(e.unit_cost) || 0;
      const totalVal = parseFloat(e.total_value) || 0;
      const balAfter = e._balanceAfter !== undefined ? e._balanceAfter : '—';
      const qtyColor = qty > 0 ? '#15803d' : (qty < 0 ? '#b91c1c' : '#64748b');
      const balColor = balAfter < 10 ? '#dc2626' : '#0f172a';
      const pStyle = typePillStyle[e.type] || 'background:#f1f5f9;color:#64748b';
      const tLabel = typeLabel[e.type] || e.type;
      const bColor = branchColor[e.branch_id] || '#64748b';
      
      tbodyHtml += `<tr style="border-bottom:1px solid #f1f5f9;${i%2===1?'background:#fafbfc':''}" onmouseover="this.style.background='#eff6ff'" onmouseout="this.style.background='${i%2===1?'#fafbfc':'#fff'}'">
        <td style="padding:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#64748b;white-space:nowrap"><div>${dateStr}</div><div style="color:#94a3b8;font-size:9px">${timeStr}</div></td>
        <td style="padding:6px"><span style="${pStyle};padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap">${tLabel}</span></td>
        <td style="padding:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#0071CE">${e.ref_id || '—'}</td>
        <td style="padding:6px;text-align:center;color:${bColor};font-weight:700">${e.branch_id || '—'}</td>
        <td style="padding:6px;text-align:right;font-weight:800;font-family:'JetBrains Mono',monospace;color:${qtyColor}">${qty>0?'+':''}${fv(qty)}</td>
        <td style="padding:6px;text-align:right;font-family:'JetBrains Mono',monospace;color:#64748b;font-size:10px">${cost ? fv(cost)+'đ' : '—'}</td>
        <td style="padding:6px;text-align:right;font-family:'JetBrains Mono',monospace;color:#0f172a;font-size:11px">${totalVal ? fv(totalVal)+'đ' : '—'}</td>
        <td style="padding:6px;text-align:right;font-weight:800;font-family:'JetBrains Mono',monospace;color:${balColor};background:#f8fafc">${typeof balAfter === 'number' ? fv(balAfter) : '—'}</td>
        <td style="padding:6px;color:#64748b;font-size:11px">${e.note || ''}</td>
      </tr>`;
    });
  }
  document.getElementById('sph-tbody').innerHTML = tbodyHtml;
  
  // Pager
  const fromIdx = filtered.length === 0 ? 0 : start + 1;
  const toIdx = Math.min(start + pageSize, filtered.length);
  const info = `Hiển thị ${fromIdx}–${toIdx} / ${fv(filtered.length)} GD · Trang ${window._spDetailPage}/${totalPages}`;
  
  const buildPager = () => {
    if (totalPages <= 1) return '';
    let html = '';
    const cur = window._spDetailPage;
    html += `<button onclick="spHistGoPage(${Math.max(1,cur-1)})" ${cur<=1?'disabled':''} style="padding:4px 9px;border:1px solid #cbd5e0;border-radius:5px;background:#fff;cursor:pointer;font-size:11px;${cur<=1?'opacity:0.4':''}">‹</button>`;
    const pages = [...new Set([1, ...Array.from({length:5},(_,i)=>Math.max(1,Math.min(totalPages,cur-2+i))), totalPages])].sort((a,b)=>a-b);
    let prev = 0;
    for (const p of pages) {
      if (p - prev > 1) html += '<span style="color:#94a3b8;padding:0 3px">…</span>';
      const active = p === cur;
      html += `<button onclick="spHistGoPage(${p})" style="padding:4px 9px;border:1px solid ${active?'#0071CE':'#cbd5e0'};border-radius:5px;background:${active?'#0071CE':'#fff'};color:${active?'#fff':'#374151'};cursor:pointer;font-size:11px;font-weight:${active?'700':'400'}">${p}</button>`;
      prev = p;
    }
    html += `<button onclick="spHistGoPage(${Math.min(totalPages,cur+1)})" ${cur>=totalPages?'disabled':''} style="padding:4px 9px;border:1px solid #cbd5e0;border-radius:5px;background:#fff;cursor:pointer;font-size:11px;${cur>=totalPages?'opacity:0.4':''}">›</button>`;
    return html;
  };
  
  document.getElementById('sph-pager-top').innerHTML = `<span>${info}</span><div style="display:flex;gap:4px">${buildPager()}</div>`;
  document.getElementById('sph-info-bottom').textContent = info;
  document.getElementById('sph-pager-bottom').innerHTML = buildPager();
}
window.spHistRender = spHistRender;

function spHistGoPage(p) { window._spDetailPage = p; spHistRender(); }
window.spHistGoPage = spHistGoPage;

function spHistExportCSV() {
  const filtered = window._spDetailFilteredEvents;
  if (!filtered || filtered.length === 0) { alert('Không có dữ liệu để xuất'); return; }
  const sku = window._spDetailSku;
  const headers = ['Ngày Giờ','Loại','Phiếu','CN','SL','Đơn giá','Thành tiền','Tồn sau','Ghi chú'];
  const rows = filtered.map(e => {
    const d = new Date(e.date);
    return [
      d.toLocaleString('vi-VN'),
      e.type,
      e.ref_id || '',
      e.branch_id || '',
      parseFloat(e.qty) || 0,
      parseFloat(e.unit_cost) || 0,
      parseFloat(e.total_value) || 0,
      e._balanceAfter !== undefined ? e._balanceAfter : '',
      (e.note || '').replace(/"/g, '""'),
    ];
  });
  const csv = [headers, ...rows].map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `lich_su_NXT_${sku}_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  URL.revokeObjectURL(url);
}

async function renderSpDetailFifo(sp) {
  const wrap = document.getElementById('sp-detail-tab-content');
  if (!wrap) return;
  
  wrap.innerHTML = `
    <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;color:#0071CE;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">💰 Kế toán FIFO — Phân tích các lô nhập</div>
      <div id="fifo-content"><div style="text-align:center;padding:30px;color:#94a3b8">⏳ Đang phân tích lô FIFO...</div></div>
    </div>
  `;
  
  try {
    const db = getKhoSupa();
    const { data, error } = await db.from('inventory_movements')
      .select('date, branch_id, type, qty, unit_cost, total_value, ref_id, note')
      .eq('product_sku', sp.sku)
      .order('date', { ascending: true });
    if (error) throw error;
    
    const events = data || [];
    
    // Phân loại
    const inflows = events.filter(e => ['IN', 'OPENING_BALANCE', 'TRANSFER_IN', 'RETURN_FROM_CUSTOMER'].includes(e.type));
    const outflows = events.filter(e => ['OUT', 'TRANSFER_OUT', 'WRITEOFF', 'RETURN_TO_NCC'].includes(e.type));
    
    // FIFO consumption: mỗi outflow tiêu thụ inflow theo thứ tự cũ nhất trước
    const lots = inflows.map(e => ({
      date: e.date,
      branch_id: e.branch_id,
      ref_id: e.ref_id,
      qty: parseFloat(e.qty) || 0,
      unit_cost: parseFloat(e.unit_cost) || 0,
      remaining: parseFloat(e.qty) || 0,
      note: e.note,
    }));
    
    let totalOutQty = 0, totalOutCost = 0;
    outflows.forEach(o => {
      let need = Math.abs(parseFloat(o.qty) || 0);
      while (need > 0 && lots.find(l => l.remaining > 0 && l.branch_id === o.branch_id)) {
        const lot = lots.find(l => l.remaining > 0 && l.branch_id === o.branch_id);
        if (!lot) break;
        const take = Math.min(need, lot.remaining);
        lot.remaining -= take;
        totalOutQty += take;
        totalOutCost += take * lot.unit_cost;
        need -= take;
      }
    });
    
    // Còn lại = lots với remaining > 0
    const remainingLots = lots.filter(l => l.remaining > 0);
    const totalRemainingQty = remainingLots.reduce((s, l) => s + l.remaining, 0);
    const totalRemainingValue = remainingLots.reduce((s, l) => s + l.remaining * l.unit_cost, 0);
    
    // Giá vốn TB:
    // - FIFO: giá lô tiếp theo sẽ bán
    // - Bình quân gia quyền: (Σ qty × cost) / Σ qty của tất cả inflows
    // - LIFO: giá lô mới nhất chưa hết
    const fifoNext = remainingLots[0]?.unit_cost || 0;
    const totalInQty = inflows.reduce((s, e) => s + (parseFloat(e.qty) || 0), 0);
    const totalInValue = inflows.reduce((s, e) => s + (parseFloat(e.qty) || 0) * (parseFloat(e.unit_cost) || 0), 0);
    const avgWeighted = totalInQty > 0 ? totalInValue / totalInQty : 0;
    const lifoLast = inflows.length > 0 ? parseFloat(inflows[inflows.length - 1].unit_cost) || 0 : 0;
    
    const fv = (n) => (n||0).toLocaleString('vi-VN');
    
    document.getElementById('fifo-content').innerHTML = `
      <!-- Summary 4 cards -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">
        <div style="background:#dbeafe;border:1px solid #93c5fd;border-radius:8px;padding:10px 12px">
          <div style="font-size:10px;color:#1e40af;font-weight:700;text-transform:uppercase">Tồn còn lại</div>
          <div style="font-size:18px;font-weight:900;color:#1e3a8a;font-family:'JetBrains Mono',monospace">${fv(totalRemainingQty)}</div>
        </div>
        <div style="background:#dcfce7;border:1px solid #86efac;border-radius:8px;padding:10px 12px">
          <div style="font-size:10px;color:#166534;font-weight:700;text-transform:uppercase">Giá trị tồn</div>
          <div style="font-size:18px;font-weight:900;color:#14532d;font-family:'JetBrains Mono',monospace">${fv(Math.round(totalRemainingValue))}đ</div>
        </div>
        <div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:10px 12px">
          <div style="font-size:10px;color:#991b1b;font-weight:700;text-transform:uppercase">Đã xuất</div>
          <div style="font-size:18px;font-weight:900;color:#7f1d1d;font-family:'JetBrains Mono',monospace">${fv(Math.round(totalOutQty))}</div>
        </div>
        <div style="background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:10px 12px">
          <div style="font-size:10px;color:#92400e;font-weight:700;text-transform:uppercase">Giá vốn xuất</div>
          <div style="font-size:18px;font-weight:900;color:#78350f;font-family:'JetBrains Mono',monospace">${fv(Math.round(totalOutCost))}đ</div>
        </div>
      </div>
      
      <!-- 3 phương pháp giá vốn -->
      <div style="background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:14px">
        <div style="font-weight:700;color:#0071CE;font-size:12px;margin-bottom:8px">📐 Giá vốn theo 3 phương pháp</div>
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <tr style="border-bottom:1px solid #f1f5f9">
            <td style="padding:7px 4px;font-weight:600;color:#0f172a">FIFO (lô kế tiếp)</td>
            <td style="padding:7px 4px;text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700;color:#0071CE">${fv(Math.round(fifoNext))}đ</td>
            <td style="padding:7px 4px;color:#64748b;font-size:11px">Giá vốn cho đơn vị tiếp theo bán</td>
          </tr>
          <tr style="border-bottom:1px solid #f1f5f9">
            <td style="padding:7px 4px;font-weight:600;color:#0f172a">Bình quân gia quyền</td>
            <td style="padding:7px 4px;text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700;color:#15803d">${fv(Math.round(avgWeighted))}đ</td>
            <td style="padding:7px 4px;color:#64748b;font-size:11px">Trung bình toàn bộ lô đã nhập</td>
          </tr>
          <tr>
            <td style="padding:7px 4px;font-weight:600;color:#0f172a">LIFO (lô mới nhất)</td>
            <td style="padding:7px 4px;text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700;color:#7c3aed">${fv(Math.round(lifoLast))}đ</td>
            <td style="padding:7px 4px;color:#64748b;font-size:11px">Tham khảo (VAS không cho phép)</td>
          </tr>
        </table>
      </div>
      
      <!-- Bảng các lô -->
      <div style="font-weight:700;color:#0071CE;font-size:12px;margin-bottom:8px;text-transform:uppercase">📦 Tất cả lô nhập (${lots.length})</div>
      <div style="background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;max-height:500px;overflow-y:auto">
        <table style="width:100%;border-collapse:collapse;font-size:11px">
          <thead style="background:#1e293b;color:#fff;position:sticky;top:0">
            <tr>
              <th style="padding:8px;text-align:left;font-size:10px">Ngày</th>
              <th style="padding:8px;text-align:left;font-size:10px">Phiếu</th>
              <th style="padding:8px;text-align:center;font-size:10px">CN</th>

async function renderSpDetailCharts(sp) {
  const wrap = document.getElementById('sp-detail-tab-content');
  if (!wrap) return;
  
  if (typeof Chart === 'undefined') {
    wrap.innerHTML = '<div style="padding:30px;text-align:center;color:#dc2626">⚠ Chart.js chưa load. Vui lòng refresh.</div>';
    return;
  }
  
  // Cleanup existing charts
  Object.values(window._spDetailCharts).forEach(c => { try { c.destroy(); } catch(e) {} });
  window._spDetailCharts = {};
  
  wrap.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px">
        <div style="font-size:11px;font-weight:700;color:#0071CE;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">📈 Tồn kho 30 ngày qua</div>
        <div style="position:relative;height:280px"><canvas id="chart-stock"></canvas></div>
      </div>
      <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px">
        <div style="font-size:11px;font-weight:700;color:#0071CE;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">📊 Sales theo ngày</div>
        <div style="position:relative;height:280px"><canvas id="chart-sales"></canvas></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 2fr;gap:14px">
      <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px">
        <div style="font-size:11px;font-weight:700;color:#0071CE;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">🍩 Tồn theo CN</div>
        <div style="position:relative;height:240px"><canvas id="chart-branch"></canvas></div>
      </div>
      <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px">
        <div style="font-size:11px;font-weight:700;color:#0071CE;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">📦 Phân bổ loại GD (30 ngày)</div>
        <div style="position:relative;height:240px"><canvas id="chart-types"></canvas></div>
      </div>
    </div>
  `;
  
  try {
    const db = getKhoSupa();
    const now = new Date();
    const ago30 = new Date(now.getTime() - 30*86400000).toISOString();
    
    const { data, error } = await db.from('inventory_movements')
      .select('date, branch_id, type, qty')
      .eq('product_sku', sp.sku)
      .gte('date', ago30)
      .order('date', { ascending: true });
    if (error) throw error;
    
    const events = data || [];
    
    // Build daily aggregation
    const daysArr = [];
    for (let i = 29; i >= 0; i--) {
      const d = new Date(now.getTime() - i*86400000);
      daysArr.push(d.toISOString().slice(0,10));
    }
    
    // Daily stock running balance per branch (need full history before ago30 too)
    const { data: allHist } = await db.from('inventory_movements')
      .select('date, branch_id, qty')
      .eq('product_sku', sp.sku)
      .order('date', { ascending: true });
    
    const balanceMap = {};
    const dailyBalance = { PB: {}, VT: {} };
    (allHist || []).forEach(e => {
      const br = e.branch_id || 'PB';
      if (!balanceMap[br]) balanceMap[br] = 0;
      balanceMap[br] += parseFloat(e.qty) || 0;
      const day = new Date(e.date).toISOString().slice(0,10);
      if (!dailyBalance[br]) dailyBalance[br] = {};
      dailyBalance[br][day] = balanceMap[br];
    });
    
    // For each day in 30-day window, find latest balance
    const fillForward = (br) => {
      const result = [];
      let last = 0;
      // First find balance before window
      const sortedDays = Object.keys(dailyBalance[br] || {}).sort();
      for (const d of sortedDays) {
        if (d < daysArr[0]) last = dailyBalance[br][d];
      }
      for (const d of daysArr) {
        if (dailyBalance[br] && dailyBalance[br][d] !== undefined) {
          last = dailyBalance[br][d];
        }
        result.push(last);
      }
      return result;
    };
    
    const stockPB = fillForward('PB');
    const stockVT = fillForward('VT');
    
    // Sales daily
    const salesPB = daysArr.map(d => 
      events.filter(e => 
        new Date(e.date).toISOString().slice(0,10) === d && 
        e.type === 'OUT' && e.branch_id === 'PB'
      ).reduce((s, e) => s + Math.abs(parseFloat(e.qty)||0), 0)
    );
    const salesVT = daysArr.map(d => 
      events.filter(e => 
        new Date(e.date).toISOString().slice(0,10) === d && 
        e.type === 'OUT' && e.branch_id === 'VT'
      ).reduce((s, e) => s + Math.abs(parseFloat(e.qty)||0), 0)
    );
    
    const labels = daysArr.map(d => {
      const dt = new Date(d);
      return dt.toLocaleDateString('vi-VN', {day:'2-digit',month:'2-digit'});
    });
    
    // Chart 1: Stock
    window._spDetailCharts.stock = new Chart(document.getElementById('chart-stock'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'PB', data: stockPB, borderColor: '#0071CE', backgroundColor: 'rgba(0,113,206,0.1)', tension: 0.3, fill: true },
          { label: 'VT', data: stockVT, borderColor: '#16a34a', backgroundColor: 'rgba(22,163,74,0.1)', tension: 0.3, fill: true },
        ],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } },
    });
    
    // Chart 2: Sales
    window._spDetailCharts.sales = new Chart(document.getElementById('chart-sales'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'PB', data: salesPB, backgroundColor: '#0071CE' },
          { label: 'VT', data: salesVT, backgroundColor: '#16a34a' },
        ],
      },
      options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true } } },
    });
    
    // Chart 3: Donut PB vs VT
    const currentPB = stockPB[stockPB.length - 1] || 0;
    const currentVT = stockVT[stockVT.length - 1] || 0;
    window._spDetailCharts.branch = new Chart(document.getElementById('chart-branch'), {
      type: 'doughnut',
      data: {
        labels: ['PB', 'VT'],
        datasets: [{ data: [currentPB, currentVT], backgroundColor: ['#0071CE', '#16a34a'] }],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } },
    });
    
    // Chart 4: Type breakdown
    const typeCount = {};
    events.forEach(e => {
      typeCount[e.type] = (typeCount[e.type] || 0) + Math.abs(parseFloat(e.qty)||0);
    });
    const typeLabels = Object.keys(typeCount);
    const typeData = Object.values(typeCount);
    const typeColors = typeLabels.map(t => ({
      OUT: '#dc2626', IN: '#16a34a', TRANSFER_OUT: '#0071CE', TRANSFER_IN: '#0891b2',
      WRITEOFF: '#d97706', RETURN_TO_NCC: '#db2777', RETURN_FROM_CUSTOMER: '#7c3aed',
      STOCKTAKE_ADJ: '#4f46e5', OPENING_BALANCE: '#64748b',
    }[t] || '#94a3b8'));
    
    window._spDetailCharts.types = new Chart(document.getElementById('chart-types'), {
      type: 'bar',
      data: { labels: typeLabels, datasets: [{ data: typeData, backgroundColor: typeColors }] },
      options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } } },
    });
    
  } catch(e) {
    console.error('[SP Charts] fail:', e);
  }
}
window.renderSpDetailCharts = renderSpDetailCharts;

document.addEventListener('keydown', e => {
  // Bỏ qua nếu đang gõ trong input
  const tag = document.activeElement?.tagName;
  const inInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

  // Esc: đóng modal
  if (e.key === 'Escape') {
    const modal = document.getElementById('modalBg');
    if (modal.classList.contains('show')) { closeModal(); return; }
  }

  if (inInput) return;

  // F1: focus search trong POS
  if (e.key === 'F1' && currentTab === 'pos') {
    e.preventDefault();
    document.getElementById('posSearchInput')?.focus();
  }
  // F2: thanh toán
  if (e.key === 'F2' && currentTab === 'pos' && cart.length > 0) {
    e.preventDefault();
    openPayment();
  }
  // F3: đơn treo / treo đơn
  if (e.key === 'F3' && currentTab === 'pos') {
    e.preventDefault();
    if (cart.length > 0) holdCurrentOrder();
    else openHeldOrders();
  }
  // F5: chọn khách
  if (e.key === 'F5' && currentTab === 'pos') {
    e.preventDefault();
    openCustomerPicker();
  }
  // F6: giảm giá
  if (e.key === 'F6' && currentTab === 'pos' && cart.length > 0) {
    e.preventDefault();
    openDiscount();
  }
  // F8: đóng ca
  if (e.key === 'F8' && isShiftOpen()) {
    e.preventDefault();
    openCloseShift();
  }
  // F9: tổng quan
  if (e.key === 'F9') { e.preventDefault(); setTab('dashboard'); }
  // ?: phím tắt
  if (e.key === '?' && !inInput) {
    e.preventDefault();
    showShortcuts();
  }
});

// Helper tìm NCC trong memory cache (sync, instant)
function findNcc(nccId) {
  if (!nccId) return null;
  const k = String(nccId).trim();
  // Schema thật: purchase_orders.ncc_code = supplier_edits.ncc_ma = suppliers.ma (text)
  return S.suppliers.find(n => 
    String(n.id) === k ||
    String(n.code) === k ||
    String(n.ma||'') === k ||
    String(n.supplier_id_num||'') === k
  ) || null;
}

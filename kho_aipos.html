// ══════════════════════════════════════════════════════════
// HUB REALTIME — Tự động cập nhật khi data thay đổi
// ══════════════════════════════════════════════════════════
function setupHubRealtime() {
  const db = getKhoSupa();
  if (!db) return;

  // Debounce reload để tránh quá nhiều request
  let _reloadTimer = null;
  function debounceReload(label, fn, ms = 600) {
    clearTimeout(_reloadTimer);
    _reloadTimer = setTimeout(() => {
      console.log('[KHO-RT]', label);
      fn();
    }, ms);
  }

  // 1. purchase_orders — PO mới từ NCC app
  db.channel('rt-kho-po')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'purchase_orders' },
      payload => {
        const r = payload.new || payload.old;
        console.log('[KHO-RT] purchase_orders:', payload.eventType, r?.id);
        // Upsert vào S.pos
        if (payload.eventType === 'DELETE') {
          S.pos = S.pos.filter(p => p.id !== r.id);
        } else {
          const mapped = {
            id: r.id, _isNccPO: true,
            branch: r.cn_key||r.branch||'ALL',
            ncc: r.supplier_id||'', nccName: r.ncc_name||'',
            status: r.status||'draft',
            date: (r.created_at||'').slice(0,10),
            expected: r.deliv_date||r.expected_date||'',
            sentAt: r.sent_at||r.created_at, recvAt: r.received_at||null,
            invoiceNo: r.po_no||'', accDone: r.acc_done||false,
            note: r.note||'', totalQty: r.total_qty||0, totalValue: r.total_value||0,
            items: (r.items||[]).map(it=>({
              sku:it.sku||'', name:it.name||it.product_name||'',
              qty:it.qty||0, cost:it.cost||it.don_gia||0,
              unit:it.unit||'cái', recv:it.recv||0,
            })),
          };
          const idx = S.pos.findIndex(p => p.id === r.id);
          if (idx >= 0) S.pos[idx] = mapped;
          else S.pos.unshift(mapped);
        }
        debounceReload('PO changed → render', render);
      })
    .subscribe(s => console.log('[KHO-RT] purchase_orders:', s));

  // 2. kho_inventory — tồn kho thay đổi
  db.channel('rt-kho-inventory')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'kho_inventory' },
      payload => {
        const r = payload.new;
        if (!r?.branch || !r?.sku) return;
        if (!S.inventory[r.branch]) S.inventory[r.branch] = {};
        S.inventory[r.branch][r.sku] = r.qty;
        debounceReload('kho_inventory changed → render', render, 400);
      })
    .subscribe(s => console.log('[KHO-RT] kho_inventory:', s));

  // 3. kho_payables — công nợ thay đổi
  db.channel('rt-kho-payables')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'kho_payables' },
      payload => {
        const r = payload.new;
        if (!r) return;
        const mapped = {
          id:r.id, poId:r.po_id, ncc:r.ncc_id, amount:r.amount,
          paid:r.paid, balance:r.balance, dueDate:r.due_date,
          createdAt:r.created_at, payments:r.payments||[]
        };
        const idx = S.payables.findIndex(p => p.id === r.id);
        if (idx >= 0) S.payables[idx] = mapped;
        else S.payables.unshift(mapped);
        debounceReload('kho_payables changed → render', render);
      })
    .subscribe(s => console.log('[KHO-RT] kho_payables:', s));

  // 4. kho_transfers — điều chuyển
  db.channel('rt-kho-transfers')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'kho_transfers' },
      payload => {
        const r = payload.new;
        if (!r) return;
        const mapped = {
          id:r.id, fromBranch:r.from_branch, toBranch:r.to_branch,
          date:r.transfer_date||r.date, status:r.status,
          sentBy:r.sent_by, receivedBy:r.received_by, items:r.items||[]
        };
        const idx = S.transfers.findIndex(t => t.id === r.id);
        if (idx >= 0) S.transfers[idx] = mapped;
        else S.transfers.unshift(mapped);
        debounceReload('kho_transfers changed → render', render);
      })
    .subscribe(s => console.log('[KHO-RT] kho_transfers:', s));

  // 5. kho_writeoffs — hủy hàng
  db.channel('rt-kho-writeoffs')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'kho_writeoffs' },
      payload => {
        const r = payload.new;
        if (!r) return;
        const mapped = {
          id:r.id, branch:r.branch, date:r.writeoff_date||r.date,
          reason:r.reason, items:r.items||[],
          totalValue:r.total_value, createdBy:r.created_by, status:r.status
        };
        const idx = S.writeoffs.findIndex(w => w.id === r.id);
        if (idx >= 0) S.writeoffs[idx] = mapped;
        else S.writeoffs.unshift(mapped);
        debounceReload('kho_writeoffs changed → render', render);
      })
    .subscribe(s => console.log('[KHO-RT] kho_writeoffs:', s));

  // 6. kho_stocktakes — kiểm kê
  db.channel('rt-kho-stocktakes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'kho_stocktakes' },
      payload => {
        const r = payload.new;
        if (!r) return;
        const mapped = {
          id:r.id, branch:r.branch, date:r.stocktake_date||r.date,
          scope:r.scope, status:r.status, items:r.items||[],
          totalDiffValue:r.total_diff_value,
          createdBy:r.created_by, approvedBy:r.approved_by
        };
        const idx = S.stocktakes.findIndex(s => s.id === r.id);
        if (idx >= 0) S.stocktakes[idx] = mapped;
        else S.stocktakes.unshift(mapped);
        debounceReload('kho_stocktakes changed → render', render);
      })
    .subscribe(s => console.log('[KHO-RT] kho_stocktakes:', s));

  // 7. products — giá bán thay đổi từ KHO duyệt giá
  db.channel('rt-kho-products')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'products' },
      payload => {
        const r = payload.new;
        if (!r?.sku) return;
        const sk = S.skus.find(s => s.sku === r.sku);
        if (sk) {
          sk.price = parseInt(r.sell_price||0)||0;
          sk.cost  = parseInt(r.cost_price||0)||0;
          console.log('[KHO-RT] products price updated:', r.sku, sk.price);
          debounceReload('products changed → render', render, 400);
        }
      })
    .subscribe(s => console.log('[KHO-RT] products:', s));

  // ← POS bán hàng → tự trừ tồn kho realtime
  db.channel('rt-kho-pos-tx')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'pos_transactions' },
      payload => {
        const tx = payload.new;
        if (!tx || tx.kind === 'return') return;
        const branch = tx.branch || 'PB';
        // Trừ tồn kho theo items bán
        const items = tx.items || [];
        items.forEach(it => {
          if (!it.sku || !it.qty) return;
          if (!S.inventory[branch]) S.inventory[branch] = {};
          const cur = S.inventory[branch][it.sku] || 0;
          S.inventory[branch][it.sku] = Math.max(0, cur - it.qty);
          // Cập nhật luôn trong S.skus
          const sk = S.skus.find(s => s.sku === it.sku);
          if (sk) {
            if (branch==='PB') sk.stockPB = Math.max(0,(sk.stockPB||0)-it.qty);
            if (branch==='VT') sk.stockVT = Math.max(0,(sk.stockVT||0)-it.qty);
            if (branch==='TA') sk.stockTA = Math.max(0,(sk.stockTA||0)-it.qty);
            sk.stock = (sk.stockPB||0)+(sk.stockVT||0)+(sk.stockTA||0);
          }
        });
        console.log('[KHO-RT] POS bán:', tx.branch, items.length, 'SP → tồn kho cập nhật');

        // Ghi ngược lại kho_inventory DB để đồng bộ (không chỉ update memory)
        const db2 = getKhoSupa();
        if (db2 && items.length > 0) {
          const now = new Date().toISOString();
          const invRows = items
            .filter(it => it.sku && it.qty > 0)
            .map(it => ({
              branch,
              sku:   it.sku,
              qty:   Math.max(0, (S.inventory[branch]?.[it.sku] || 0)),
              updated_at: now,
            }));
          if (invRows.length > 0) {
            db2.from('kho_inventory')
              .upsert(invRows, { onConflict: 'branch,sku' })
              .then(({error}) => {
                if (error) console.warn('[KHO-RT] kho_inventory update lỗi:', error.message);
                else console.log('[KHO-RT] ✅ kho_inventory synced:', invRows.length, 'SKU');
              });
          }
        }

        if (['inventory','sku','dashboard'].includes(currentTab)) {
          clearTimeout(_rtDebounce);
          _rtDebounce = setTimeout(render, 500);
        }
      })
    .subscribe();

  console.log('[KHO-RT] ✅ Realtime: 8 bảng Hub (bao gồm POS)');
}
// ══════════════════════════════════════════════════════════
setTimeout(async () => {
  console.log('[KHO] Loading from Hub...');
  
  // ★ Phase 3: Load BRANCHES từ DB TRƯỚC khi render UI
  // (để picker, sidebar, KPI hiển thị đúng tên CN từ vc_branches)
  await loadBranches();
  renderBranchPicker();   // re-render picker với BRANCHES từ DB
  
  // Sau đó load toàn bộ data (PO, inventory, ...)
  await loadFromSupabase();
  
  // Setup realtime sau khi có supabase client
  setupHubRealtime();
}, 300);
</script>

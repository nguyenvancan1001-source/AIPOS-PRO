    <table style="border:1px solid var(--border);border-radius:6px;overflow:hidden">
      <thead><tr><th>Sản phẩm</th><th class="num">Đã nhận</th><th class="num">Tồn hiện tại</th><th class="num" style="width:100px">SL trả</th><th class="num">Giá trị</th></tr></thead>
      <tbody>${returnNccCart.map((it, idx) => {
        const sku = findSku(it.sku);
        const stock = getStock(it.sku, returnSourcePO.branch);
        const maxRet = Math.min(it.recv, stock);
        return `<tr>
          <td><strong style="font-size:12px">${sku?.name}</strong><div class="mono" style="font-size:10px;color:var(--text-3)">${it.sku}${it.expiry?' · HSD '+it.expiry:''}</div></td>
          <td class="num">${it.recv}</td>
          <td class="num">${stock}</td>
          <td class="num"><input class="input mono" type="number" min="0" max="${maxRet}" value="${it.returnQty}" style="width:80px;text-align:right;padding:4px 8px" onchange="returnNccCart[${idx}].returnQty=Math.min(parseInt(this.value)||0, ${maxRet}); renderSrItems()"></td>
          <td class="num"><strong style="color:var(--warn)">${fmtVND(it.returnQty * (it.costInvoice || it.cost))}đ</strong></td>
        </tr>`;
      }).join('')}</tbody>
      <tfoot><tr style="background:var(--surface-2)"><td colspan="4" class="num"><strong>Tổng giá trị trả:</strong></td><td class="num"><strong style="color:var(--warn);font-size:14px">${fmtVND(totalRefund)}đ</strong></td></tr></tfoot>
    </table>
  `;

function confirmSupplierReturn() {
  if (!returnSourcePO) { toast('Chưa chọn PO gốc', 'error'); return; }
  const totalQty = returnNccCart.reduce((s,it) => s+it.returnQty, 0);
  if (totalQty === 0) { toast('Chưa nhập SL trả', 'error'); return; }
  const reason = document.getElementById('srReason').value;
  if (!reason) { toast('Chọn lý do trả', 'error'); return; }
  const detail = document.getElementById('srDetail').value.trim();
  const totalValue = returnNccCart.reduce((s, it) => s + it.returnQty * (it.costInvoice || it.cost), 0);

  S.counters.suppRet = (S.counters.suppRet || 0) + 1;
  const ret = {
    id: 'TNCC' + String(S.counters.suppRet).padStart(4, '0'),
    poId: returnSourcePO.id, ncc: returnSourcePO.ncc, branch: returnSourcePO.branch,
    date: nowISO(), reason, detail, totalValue,
    items: returnNccCart.filter(it => it.returnQty > 0).map(it => ({
      sku: it.sku, qty: it.returnQty, cost: it.costInvoice || it.cost,
    })),
  };
  // Trừ tồn
  ret.items.forEach(it => {
    S.inventory[ret.branch][it.sku] = Math.max(0, (S.inventory[ret.branch][it.sku] || 0) - it.qty);
  });
  // Giảm công nợ NCC: tạo 1 payment "trả hàng" trừ tiền
  const payable = S.payables.find(p => p.poId === ret.poId);
  if (payable) {
    payable.amount = Math.max(0, payable.amount - totalValue);
    payable.balance = Math.max(0, payable.balance - totalValue);
    payable.payments.push({ date: ret.date, amount: totalValue, method: 'return', note: `Trả hàng ${ret.id} - ${reason}` });
  }

  S.supplierReturns.push(ret);
  addAuditLog('supplier_return', ret.id, `Trả NCC ${findNcc(ret.ncc)?.name}: ${ret.items.length} SKU, giá trị ${fmtVND(totalValue)}đ`);
  saveState();
  closeModal();
  renderSupplierReturns();
  toast(`✓ Phiếu trả ${ret.id} · giảm công nợ ${fmtVND(totalValue)}đ`, 'success');
}

// ============================================================
let poFilter = 'all'; // all | draft | sent | partial | received | cancelled

function renderPO() {
  // Filter theo branch — PO branch='ALL' hiện ở mọi chi nhánh
  let posInBranch = isAllBranches() 
    ? [...S.pos] 
    : S.pos.filter(p => p.branch === S.activeBranch || p.branch === 'ALL');
  let list = [...posInBranch].reverse();
  if (poFilter !== 'all') list = list.filter(p => p.status === poFilter);

  const counts = {
    all: posInBranch.length,
    draft: posInBranch.filter(p => p.status === 'draft').length,
    sent: posInBranch.filter(p => p.status === 'sent').length,
    partial: posInBranch.filter(p => p.status === 'partial').length,
    received: posInBranch.filter(p => p.status === 'received').length,
  };
  const totalValue = list.reduce((s, p) => s + p.items.reduce((ss, it) => ss + it.qty * it.cost, 0), 0);

  const c = document.getElementById('content');
  c.innerHTML = `
    ${isAllBranches() ? `<div class="banner banner-info" style="margin-bottom:14px">📊 Đang xem PO của <strong>tất cả chi nhánh</strong>. Cột "CN" cho biết PO thuộc CN nào.</div>` : ''}
    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi-card"><div class="kpi-label">Tổng PO${isAllBranches()?' (tất cả CN)':''}</div><div class="kpi-value">${counts.all}</div></div>
      <div class="kpi-card warn"><div class="kpi-label">Đang chờ về</div><div class="kpi-value">${counts.sent + counts.partial}</div><div class="kpi-sub">${counts.sent} sent · ${counts.partial} partial</div></div>
      <div class="kpi-card"><div class="kpi-label">Bản nháp</div><div class="kpi-value">${counts.draft}</div></div>
      <div class="kpi-card success"><div class="kpi-label">Giá trị PO (lọc)</div><div class="kpi-value">${fmtVND(totalValue)}<span style="font-size:12px;color:var(--text-3)">đ</span></div></div>
    </div>

    <div class="toolbar">
      <button class="btn ${poFilter==='all'?'btn-primary':''}" onclick="poFilter='all';renderPO()">Tất cả (${counts.all})</button>
      <button class="btn ${poFilter==='draft'?'btn-primary':''}" onclick="poFilter='draft';renderPO()">Nháp (${counts.draft})</button>
      <button class="btn ${poFilter==='sent'?'btn-primary':''}" onclick="poFilter='sent';renderPO()">Đã gửi (${counts.sent})</button>
      <button class="btn ${poFilter==='partial'?'btn-primary':''}" onclick="poFilter='partial';renderPO()">Một phần (${counts.partial})</button>
      <button class="btn ${poFilter==='received'?'btn-primary':''}" onclick="poFilter='received';renderPO()">Đã nhận (${counts.received})</button>
      <button class="btn btn-primary" style="margin-left:auto" onclick="openNewPO()">+ Tạo PO mới</button>
    </div>

    <div class="panel">
      <div class="panel-body flush">
        ${list.length === 0 ? `<div style="padding:40px;text-align:center;color:var(--text-3);font-size:13px">Không có PO nào</div>` : `
          <table>
            <thead><tr><th>Mã PO</th><th>Ngày</th><th>NCC</th><th>CN</th><th class="center">Số SKU</th><th class="num">Giá trị</th><th>Dự kiến</th><th class="center">TT</th><th></th></tr></thead>
            <tbody>${list.map(p => {
              const ncc = findNcc(p.ncc);
              // ★ Ưu tiên ncc_name snapshot từ DB (luôn đúng), fallback NCC profile, cuối cùng mã NCC
              const nccDisplay = p.nccName || ncc?.short || ncc?.name || ('NCC ' + (p.nccCode || p.ncc));
              const total = p.items.reduce((s,it) => s+it.qty*it.cost, 0);
              const recv = p.items.reduce((s,it) => s+(it.recv||0), 0);
              const totalQty = p.items.reduce((s,it) => s+it.qty, 0);
              const stTag = ({ draft: '<span class="tag">Nháp</span>', sent: '<span class="tag info">Đã gửi</span>', partial: `<span class="tag warn">Một phần (${recv}/${totalQty})</span>`, received: '<span class="tag ok">Đã nhận</span>', cancelled: '<span class="tag bad">Hủy</span>' })[p.status];
              return `<tr>
                <td><strong class="mono">${p.id}</strong></td>
                <td style="font-size:12px">${fmtDate(p.date)}</td>
                <td>${nccDisplay}</td>
                <td><span class="tag info">${p.branch}</span></td>
                <td class="center">${p.items.length}</td>
                <td class="num"><strong>${fmtVND(total)}đ</strong></td>
                <td style="font-size:12px;color:var(--text-2)">${fmtDate(p.expected)}</td>
                <td class="center">${stTag}</td>
                <td>
                  <div style="display:flex;gap:4px;justify-content:flex-end">
                    <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();console.log('[CLICK] viewPO',this.dataset.id);viewPO(this.dataset.id)" data-id="${p.id}">Xem</button>
                    ${p.status === 'draft' ? `<button class="btn btn-sm btn-primary" onclick="event.stopPropagation();console.log('[CLICK] sendPO',this.dataset.id);sendPO(this.dataset.id)" data-id="${p.id}">Gửi</button>` : ''}
                    ${p.status === 'sent' || p.status === 'partial' ? `<button class="btn btn-sm btn-success" onclick="event.stopPropagation();console.log('[CLICK] openReceivePO',this.dataset.id);openReceivePO(this.dataset.id)" data-id="${p.id}">Nhận</button>` : ''}
                  </div>
                </td>
              </tr>`;
            }).join('')}</tbody>
          </table>
        `}
      </div>
    </div>
  `;
}

function openNewPO() {
  if (isAllBranches()) {
    toast(`⚠ Vui lòng chọn 1 chi nhánh cụ thể (${getActiveBranches().map(b=>b.id).join('/')}) trước khi tạo PO`, 'error');
    return;
  }
  newPO = { branch: S.activeBranch, ncc: '', items: [], expected: '', note: '' };
  openModal('Tạo PO mới', `
    <div class="field-row">
      <div class="field"><label class="field-label">Nhà cung cấp *</label>
        <select class="select" id="poNcc"><option value="">-- Chọn NCC --</option>${S.suppliers.map(n => `<option value="${n.id}">${n.name} · NET ${n.paymentTerms}</option>`).join('')}</select>
      </div>
      <div class="field"><label class="field-label">Chi nhánh</label>
        <select class="select" id="poBranch">${getActiveBranches().map(b => `<option value="${b.id}" ${b.id === S.activeBranch ? 'selected' : ''}>CN ${b.name}</option>`).join('')}</select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label class="field-label">Ngày dự kiến nhận</label><input class="input" type="date" id="poExpected" value="${(()=>{const d=new Date();d.setDate(d.getDate()+2);return d.toISOString().slice(0,10);})()}"></div>
      <div class="field"><label class="field-label">Ghi chú</label><input class="input" id="poNote" placeholder="VD: Giao trước 10h..."></div>
    </div>
    <div class="field"><label class="field-label">Thêm sản phẩm vào PO</label>
      <input class="input" id="poSearch" placeholder="Tìm SKU / tên... (sẽ ưu tiên SKU của NCC đã chọn)">
      <div id="poSearchResults" style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;margin-top:6px;display:none"></div>
    </div>
    <div id="poItems"></div>
    <div id="poTotal" style="margin-top:12px;padding:10px 12px;background:var(--surface-2);border-radius:6px;display:none;justify-content:space-between;font-weight:600">
      <span>Tổng giá trị PO:</span><span class="mono" style="color:var(--primary-dark);font-size:16px" id="poTotalAmt">0đ</span>
    </div>
  `, `<button class="btn" onclick="closeModal()">Hủy</button><button class="btn" onclick="savePO('draft')">Lưu nháp</button><button class="btn btn-primary" onclick="savePO('sent')">Lưu &amp; Gửi NCC</button>`, 'lg');

  document.getElementById('poNcc').addEventListener('change', renderPOSearch);
  document.getElementById('poSearch').addEventListener('input', renderPOSearch);
  renderPOItems();
}

let newPO = null;

function renderPOSearch() {
  const q = (document.getElementById('poSearch').value || '').trim().toLowerCase();
  const ncc = document.getElementById('poNcc').value;
  const box = document.getElementById('poSearchResults');
  let list = S.skus;
  if (ncc) list = list.filter(s => s.ncc === ncc);
  if (q) list = list.filter(s => s.name.toLowerCase().includes(q) || s.sku.toLowerCase().includes(q));
  if (!q && !ncc) { box.style.display = 'none'; return; }
  list = list.slice(0, 10);
  if (list.length === 0) { box.innerHTML = `<div style="padding:10px;color:var(--text-3);font-size:12px">Không tìm thấy</div>`; box.style.display = 'block'; return; }
  box.innerHTML = list.map(s => {
    const stock = getStock(s.sku);
    return `<div style="padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="addPOItem('${s.sku}')">
      <div><strong style="font-size:12px">${s.name}</strong><div style="font-size:11px;color:var(--text-3)" class="mono">${s.sku} · giá vốn ${fmtVND(s.cost)}đ · tồn ${stock} · pack ×${s.pack}</div></div>
      <button class="btn btn-sm btn-primary">+</button>
    </div>`;
  }).join('');
  box.style.display = 'block';
}

function addPOItem(skuId) {
  if (newPO.items.find(i => i.sku === skuId)) { toast('Đã có trong PO', 'warn'); return; }
  const sku = findSku(skuId);
  newPO.items.push({ sku: skuId, name: sku.name, qty: sku.pack, cost: sku.cost, pack: sku.pack });
  document.getElementById('poSearch').value = '';
  document.getElementById('poSearchResults').style.display = 'none';
  renderPOItems();
}

function renderPOItems() {
  const box = document.getElementById('poItems');
  const totalBox = document.getElementById('poTotal');
  if (newPO.items.length === 0) {
    box.innerHTML = `<div style="padding:14px;text-align:center;color:var(--text-3);font-size:12px;border:1px dashed var(--border);border-radius:6px">Chưa có sản phẩm · Tìm và thêm ở trên</div>`;
    totalBox.style.display = 'none';
    return;
  }
  box.innerHTML = `<table style="margin:0;border:1px solid var(--border);border-radius:6px;overflow:hidden">
    <thead><tr><th>Sản phẩm</th><th class="num" style="width:80px">SL</th><th class="num" style="width:100px">Pack</th><th class="num" style="width:120px">Giá vốn</th><th class="num">Thành tiền</th><th></th></tr></thead>
    <tbody>${newPO.items.map((it, idx) => `
      <tr>
        <td><strong style="font-size:12px">${it.name}</strong><div class="mono" style="font-size:10px;color:var(--text-3)">${it.sku}</div></td>
        <td class="num"><input class="input mono" type="number" min="1" value="${it.qty}" style="width:70px;text-align:right;padding:4px 8px" onchange="newPO.items[${idx}].qty=parseInt(this.value)||1; renderPOItems()"></td>
        <td class="num mono" style="color:var(--text-3);font-size:11px">×${it.pack}</td>
        <td class="num"><input class="input mono" type="number" min="0" value="${it.cost}" style="width:110px;text-align:right;padding:4px 8px" onchange="newPO.items[${idx}].cost=parseInt(this.value)||0; renderPOItems()"></td>
        <td class="num"><strong>${fmtVND(it.qty * it.cost)}đ</strong></td>
        <td><button class="btn btn-sm btn-ghost" onclick="newPO.items.splice(${idx},1); renderPOItems()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></td>
      </tr>`).join('')}</tbody>
  </table>`;
  totalBox.style.display = 'flex';
  document.getElementById('poTotalAmt').textContent = fmtVND(newPO.items.reduce((s,i)=>s+i.qty*i.cost, 0)) + 'đ';
}

function savePO(status) {
  const ncc = document.getElementById('poNcc').value;
  const branch = document.getElementById('poBranch').value;
  const expected = document.getElementById('poExpected').value;
  const note = document.getElementById('poNote').value.trim();
  if (!ncc) { toast('Chọn nhà cung cấp', 'error'); return; }
  if (newPO.items.length === 0) { toast('Cần thêm ít nhất 1 sản phẩm', 'error'); return; }
  S.counters.po++;
  const po = {
    id: 'PO' + String(S.counters.po).padStart(5, '0'),
    date: todayStr(), branch, ncc, status,
    items: newPO.items.map(it => ({ sku: it.sku, qty: it.qty, cost: it.cost, recv: 0 })),
    expected, note,
    sentAt: status === 'sent' ? nowISO() : null,
    recvAt: null,
  };
  S.pos.push(po);
  saveState();
  closeModal();
  renderPO();
  toast(`Đã ${status === 'sent' ? 'tạo & gửi' : 'lưu nháp'} ${po.id}`, 'success');
}

function sendPO(id) {
  console.log('[sendPO] called with id:', id);
  if (!id) { toast('⚠ ID PO trống', 'error'); return; }
  const po = S.pos.find(p => String(p.id) === String(id));
  if (!po) {
    console.warn('[sendPO] PO not found:', id);
    toast(`⚠ Không tìm thấy PO ${id}`, 'error');
    return;
  }
  if (!confirm(`Gửi ${po.id} cho ${findNcc(po.ncc)?.name || po.nccName || po.ncc}?`)) return;
  po.status = 'sent';
  po.sentAt = nowISO();
  saveState();
  // ★ FIX: SAVE vào DB
  savePOToDB(po).catch(e => {
    console.error('[sendPO] save fail:', e);
    toast('⚠ Lưu DB lỗi: ' + e.message, 'warn');
  });
  renderPO();
  toast(`Đã gửi ${po.id}`, 'success');
}

function viewPO(id) {
  console.log('[viewPO] called with id:', id, 'type:', typeof id);
  if (!id) { console.warn('[viewPO] id is empty'); toast('⚠ ID PO trống', 'error'); return; }
  // Type-safe compare: ép cả 2 về string
  const targetId = String(id);
  const po = S.pos.find(p => String(p.id) === targetId);
  if (!po) {
    console.warn('[viewPO] PO not found in S.pos. Total POs:', S.pos.length, 'Sample IDs:', S.pos.slice(0,3).map(p=>p.id));
    toast(`⚠ Không tìm thấy PO ${id}`, 'error');
    return;
  }
  console.log('[viewPO] Found PO:', po.id, '· items:', po.items.length, '· status:', po.status);
  const ncc = findNcc(po.ncc);
  const total = po.items.reduce((s,it) => s+it.qty*it.cost, 0);
  const totalRecv = po.items.reduce((s,it) => s+(it.recv||0)*it.cost, 0);
  const totalQty = po.items.reduce((s,it) => s + it.qty, 0);
  const br = BRANCHES.find(b => b.id === po.branch);

  // ★ Build poGroup data structure để tái dùng aoExportSinglePO/aoCopyImagePO/aoExportPDF/aoCopyZaloSingle
  const poGroup = {
    po_number: po.id,
    supplier_id: po.ncc,
    supplier_name: ncc?.name || po.ncc,
    supplier_short: ncc?.short || po.ncc,
    receiving_location: br?.name || po.branch,
    receiving_branch: po.branch,
    expected_delivery: po.expected,
    net_days: ncc?.paymentTerms || 30,
    lead_days: ncc?.leadDays || 2,
    lines: po.items.map(it => {
      const sku = findSku(it.sku);
      return {
        sku: it.sku,
        product_name: sku?.name || it.sku,
        brand: sku?.brand || '',
        cat: sku?.cat || '',
        order_qty: it.qty,
        unit: sku?.unit || 'cái',
        unit_price: it.cost,
        amount: it.qty * it.cost,
        stock_current: S.inventory[po.branch]?.[it.sku] || 0,
        sold_per_day: 0, // không có data SPD ở đây
        days_left: 999,
        reorder_pt: 0,
        status: 'normal',
        pack: sku?.pack || 1,
        packs: 1,
      };
    }),
    total_qty: totalQty,
    total_amount: total,
    note: po.note || '',
  };

  // Lưu vào window._aoPOGroups slot 0 để các function (aoExportSinglePO etc) có thể tìm thấy
  window._aoPOGroups = [poGroup];
  // Cũng lưu note vào DOM theo format chuẩn (po-note-0)
  setTimeout(() => {
    const noteEl = document.getElementById('po-note-0');
    if (noteEl) noteEl.value = po.note || '';
  }, 100);

  const stPill = po.status === 'draft' ? '<span class="pill pill-muted">📋 Nháp</span>'
              : po.status === 'sent' ? '<span class="pill pill-info">📤 Đã gửi NCC</span>'
              : po.status === 'partial' ? '<span class="pill pill-warning">📦 Một phần</span>'
              : po.status === 'received' ? '<span class="pill pill-success">✅ Đã nhận</span>'
              : '<span class="pill pill-danger">❌ Hủy</span>';

  openModal(`PO ${po.id} · ${ncc?.short || ncc?.name}`, `
    <!-- TIMELINE -->
    <div class="timeline" style="margin-bottom:14px">
      <div class="tl-step ${po.status==='draft'?'current':'done'}">1. Nháp</div>
      <div class="tl-step ${po.status==='sent'?'current':po.status==='partial'||po.status==='received'?'done':''}">2. Gửi NCC</div>
      <div class="tl-step ${po.status==='partial'?'current':po.status==='received'?'done':''}">3. Nhận hàng</div>
      <div class="tl-step ${po.status==='received'?'current':''}">4. Hoàn tất</div>
    </div>

    <!-- INFO -->
    <div class="detail-grid" style="margin-bottom:14px">
      <div><span class="lbl">Trạng thái</span><span class="val">${stPill}</span></div>
      <div><span class="lbl">Mã PO</span><span class="val mono">${po.id}</span></div>
      <div><span class="lbl">Nhà cung cấp</span><span class="val">${ncc?.name || po.ncc}</span></div>
      <div><span class="lbl">MST NCC</span><span class="val mono">${ncc?.mst || '—'}</span></div>
      <div><span class="lbl">Liên hệ</span><span class="val">${ncc?.contact || '—'} · ${ncc?.phone || '—'}</span></div>
      <div><span class="lbl">Chi nhánh nhận</span><span class="val">${br?.name || po.branch}</span></div>
      <div><span class="lbl">Ngày tạo PO</span><span class="val">${fmtDate(po.date)}</span></div>
      <div><span class="lbl">Ngày dự kiến giao</span><span class="val">${fmtDate(po.expected)}</span></div>
      ${po.sentAt ? `<div><span class="lbl">Đã gửi lúc</span><span class="val">${fmtDateTime(po.sentAt)}</span></div>` : ''}
      ${po.recvAt ? `<div><span class="lbl">Đã nhận lúc</span><span class="val">${fmtDateTime(po.recvAt)}</span></div>` : ''}
      <div><span class="lbl">NET</span><span class="val">${ncc?.paymentTerms || 30} ngày</span></div>
      <div><span class="lbl">Lead Time</span><span class="val">${ncc?.leadDays || 2} ngày</span></div>
    </div>

    <!-- ★ ACTION BUTTONS ★ — đầy đủ 4 nút như Auto Order -->
    <div style="background:linear-gradient(135deg,#f0f4ff,#fafbff);border:1.5px solid var(--primary);border-radius:10px;padding:14px;margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;color:var(--primary-dark);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">
        📨 Gửi PO cho NCC
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">

        <button class="btn btn-sm" onclick="aoExportPDF(0)" title="Preview PDF + tải file" style="background:#dc2626;color:#fff;font-weight:700">📄 PDF (preview + tải)</button>
        <button class="btn btn-sm" onclick="aoCopyImagePO(0)" title="Tạo ảnh đẹp paste vào Zalo" style="background:#7c3aed;color:#fff;font-weight:700">📸 Ảnh đẹp (Zalo)</button>
        <button class="btn btn-sm" onclick="aoCopyZaloSingle(0)" title="Copy text Zalo format" style="background:#37474f;color:#fff;font-weight:700">📋 Text Zalo</button>
        <button class="btn btn-sm" onclick="window.print()" title="In PDF qua trình duyệt" style="background:#0891b2;color:#fff;font-weight:700">🖨 In</button>
      </div>
      <div style="font-size:11px;color:var(--text-3);margin-top:6px">
        💡 <strong>Mẹo:</strong> Bấm "Ảnh đẹp" → Copy ảnh → Paste vào Zalo (Ctrl+V). Nhanh, chuyên nghiệp, đầy đủ thông tin.
      </div>
    </div>

    <!-- BẢNG ITEMS -->
    <div class="sec-label">📋 Chi tiết đơn hàng</div>
    <div style="overflow-x:auto;border:1px solid var(--border);border-radius:6px">
      <table style="font-size:12px;min-width:760px;margin:0">
        <thead><tr style="background:var(--surface-2)">
          <th class="stt">STT</th>
          <th>Mã SKU</th>
          <th style="min-width:200px">Tên sản phẩm</th>
          <th class="num">SL đặt</th>
          <th class="num">Đã nhận</th>
          <th class="num">Đơn giá</th>
          <th class="num">Thành tiền</th>
        </tr></thead>
        <tbody>${po.items.map((it, i) => {
          const sku = findSku(it.sku);
          const recv = it.recv || 0;

            <td class="stt">${i+1}</td>
            <td><strong class="mono" style="font-size:10.5px">${it.sku}</strong></td>

// ✏ SỬA PO (status = draft hoặc sent)
// ════════════════════════════════════════════════════════════════
function openEditPO(id) {
  const po = S.pos.find(p => p.id === id);
  if (!po) return;
  if (po.status !== 'draft' && po.status !== 'sent') {
    toast('PO đã nhận hàng - không thể sửa', 'error');
    return;
  }
  window._editPO = JSON.parse(JSON.stringify(po));
  renderEditPOModal();
}

  const ncc = findNcc(ep.ncc);

  const totalQty = ep.items.reduce((s,it) => s+it.qty, 0);

  openModal(`✏ Sửa PO ${ep.id}${ep.status==='sent'?' · ⚠ Đã gửi NCC':''}`, `
    ${ep.status === 'sent' ? `<div class="banner banner-warning" style="margin-bottom:14px">⚠ <strong>PO này đã gửi NCC.</strong> Sau khi sửa, hãy thông báo NCC bằng cách gửi lại file Excel/PDF/Ảnh mới.</div>` : ''}

    <div class="detail-grid" style="margin-bottom:14px">
      <div><span class="lbl">Mã PO</span><span class="val mono">${ep.id}</span></div>
      <div><span class="lbl">NCC</span><span class="val">${ncc?.name}</span></div>

          ${getActiveBranches().map(b => `<option value="${b.id}" ${b.id===ep.branch?'selected':''}>CN ${b.name}</option>`).join('')}
        </select>

    <div style="display:flex;gap:8px;background:var(--surface-2);padding:10px;border-radius:8px">
      <select id="epAddSku" class="select" style="flex:1">
        <option value="">-- Chọn SKU thêm vào --</option>
        ${availableSkus.map(s => `<option value="${s.sku}">${s.sku} · ${s.name} · ${fmtVND(s.cost)}đ</option>`).join('')}

          <th class="stt">#</th><th>SKU</th><th style="min-width:200px">Tên SP</th>
          <th class="num">SL đặt</th><th>ĐVT</th><th class="num">Đơn giá</th><th class="num">Thành tiền</th><th></th>
        </tr></thead>
        <tbody>${ep.items.map((it, i) => {
          const sku = findSku(it.sku);
          return `<tr>
            <td class="stt">${i+1}</td>
            <td><strong class="mono" style="font-size:10.5px">${it.sku}</strong></td>

            <td class="num"><input type="number" min="1" value="${it.qty}" onchange="epUpdateQty(${i},this.value)" class="cell-input" style="width:70px;text-align:right;font-weight:700;color:var(--primary-dark)"></td>
            <td style="font-size:11px">${sku?.unit || 'cái'}</td>
            <td class="num mono">${fmtVND(it.cost)}</td>

          <td colspan="2"></td>

function epUpdateQty(idx, val) {
  if (!window._editPO) return;
  window._editPO.items[idx].qty = Math.max(1, parseInt(val) || 1);
  renderEditPOModal();
}

function epRemoveItem(idx) {
  if (!window._editPO) return;
  if (window._editPO.items.length === 1) { toast('PO phải có ít nhất 1 SKU', 'error'); return; }
  if (!confirm(`Xóa "${findSku(window._editPO.items[idx].sku)?.name}" khỏi PO?`)) return;
  window._editPO.items.splice(idx, 1);
  renderEditPOModal();
}

function epAddItem() {
  const skuId = document.getElementById('epAddSku').value;
  const qty = parseInt(document.getElementById('epAddQty').value) || 1;
  if (!skuId) { toast('Chọn SKU trước', 'error'); return; }
  const sku = findSku(skuId);
  if (!sku) return;
  window._editPO.items.push({ sku: skuId, qty, cost: sku.cost, recv: 0 });
  renderEditPOModal();
  toast(`Đã thêm ${sku.name}`, 'success');
}

function saveEditPO() {
  const ep = window._editPO;
  if (!ep) return;
  if (ep.items.length === 0) { toast('PO trống', 'error'); return; }
  const expected = document.getElementById('epExpected').value;
  const branch = document.getElementById('epBranch').value;
  const note = document.getElementById('epNote').value.trim();
  const po = S.pos.find(p => p.id === ep.id);
  if (!po) return;
  const oldTotal = po.items.reduce((s,it) => s+it.qty*it.cost, 0);
  const newTotal = ep.items.reduce((s,it) => s+it.qty*it.cost, 0);
  po.items = ep.items;
  po.expected = expected;
  po.branch = branch;
  po.note = note;
  po.editedAt = nowISO();
  addAuditLog('auto', po.id, `Sửa PO: ${po.items.length} SKU · ${fmtVND(oldTotal)}đ → ${fmtVND(newTotal)}đ${po.status === 'sent' ? ' (đã gửi NCC - cần thông báo lại)' : ''}`);
  saveState();
  closeModal();
  window._editPO = null;
  renderPO();
  toast(`✓ Đã lưu PO ${po.id}${po.status === 'sent' ? ' - Hãy gửi lại file mới cho NCC!' : ''}`, 'success');
}

function cancelPO(id) {
  const po = S.pos.find(p => p.id === id);
  if (!po) return;
  if (po.status !== 'draft') { toast('Chỉ xóa được PO ở trạng thái Nháp', 'error'); return; }
  if (!confirm(`Xóa PO ${po.id}?\n\n${po.items.length} SKU · ${fmtVND(po.items.reduce((s,it)=>s+it.qty*it.cost,0))}đ\n\nThao tác KHÔNG thể hoàn tác.`)) return;
  S.pos = S.pos.filter(p => p.id !== id);
  addAuditLog('auto', id, `Xóa PO Nháp`);
  saveState();
  closeModal();
  renderPO();
  toast(`Đã xóa ${id}`, 'success');
}

let receivePO = null;

function openReceivePO(id) {
  console.log('[openReceivePO] called with id:', id);

  }
  console.log('[openReceivePO] Found PO:', po.id, 'status:', po.status);
  receivePO = JSON.parse(JSON.stringify(po));
  receivePO.items.forEach(it => {
    it._toRecv = it.qty - (it.recv || 0);
    if (it.costInvoice == null) it.costInvoice = it.cost;
    if (it.giftQty == null) it.giftQty = 0;
    if (it.discountPct == null) it.discountPct = 0;
    if (!it.expiry) it.expiry = '';
    const sku = findSku(it.sku);
    if (it.vatRate == null) it.vatRate = sku?.vat || 0.10;
  });
  if (receivePO.shippingFee == null) receivePO.shippingFee = 0;
  if (receivePO.orderDiscountAmount == null) receivePO.orderDiscountAmount = 0;
  if (!receivePO.invoiceNo) receivePO.invoiceNo = '';
  if (!receivePO.invoiceDate) receivePO.invoiceDate = todayStr();

  const ncc = findNcc(po.ncc);
  const isNCC = true; // luôn là NCC trong hệ thống KHO
  const br = BRANCHES.find(b => b.id === po.branch);

  openModal(`Nhận hàng NCC · ${po.id}`, `
    <div class="timeline">
      <div class="tl-step current">1. Nhận vật lý</div>
      <div class="tl-step">2. Kế toán xử lý</div>
      <div class="tl-step">3. Duyệt giá lệch</div>
      <div class="tl-step">4. Hạch toán</div>
      <div class="tl-step">5. Thanh toán NCC</div>
    </div>

    <div class="detail-grid">
      <div><span class="lbl">Loại đơn</span><span class="val">Nhận hàng từ NCC</span></div>
      <div><span class="lbl">NCC</span><span class="val">${ncc?.name || po.ncc}</span></div>
      <div><span class="lbl">Cửa hàng nhận</span><span class="val">${br?.name || po.branch}</span></div>
      <div><span class="lbl">MST NCC</span><span class="val">${ncc?.mst || '—'}</span></div>
      <div><span class="lbl">Ngày dự kiến</span><span class="val">${fmtDate(po.expected)}</span></div>
      <div><span class="lbl">Hóa đơn VAT</span><span class="val">${receivePO.invoiceNo || '— chưa nhận —'}</span></div>
    </div>

    <div class="banner banner-warning" style="margin-top:14px">
      ⚠ Đơn NCC: cửa hàng chỉ kiểm SL + HSD + chất lượng. Giá do kế toán xử lý sau.
    </div>

    <div class="sec-label">Quét và đếm SKU</div>
    <div class="scan-box" onclick="incomingMockScan()">
      <div class="scan-icon">▮▯▮▮▯▮▯▮▮▯▮▮</div>
      <div class="scan-hint">Bấm để giả lập quét barcode (demo). App thật sẽ mở camera điện thoại.</div>
    </div>

    <div class="sec-label" style="margin-top:18px">Danh sách SKU</div>
    <div style="overflow-x:auto;border:1px solid var(--border);border-radius:6px">
      <table style="font-size:12px;min-width:760px;margin:0">
        <thead><tr>
          <th class="stt">STT</th>
          <th>Mã SKU</th>
          <th>Tên sản phẩm</th>
          <th class="num">SL hóa đơn</th>
          <th class="num">SL nhận</th>
          <th class="num" title="Lệch SL = SL nhận − SL hóa đơn">Lệch SL</th>
          <th>Hạn dùng</th>
          <th>Trạng thái</th>
        </tr></thead>
        <tbody id="rcRows">${receivePO.items.map((it, idx) => renderReceiveRow(it, idx)).join('')}</tbody>
      </table>

      <label>Số hóa đơn:</label>

      <label style="margin-left:8px">Ngày HĐ:</label>
      <input class="cell-input cell-input-wide" type="date" id="rcInvDate" value="${receivePO.invoiceDate}">

    <div class="field" style="margin-top:14px"><label class="field-label">Ghi chú nhận hàng</label><textarea class="input" id="rcvNote" rows="2" placeholder="VD: Đủ hàng, hộp Choco Pie hơi móp 2 cái..."></textarea></div>
  `, `<button class="btn" onclick="closeModal()">Đóng</button><button class="btn btn-warn" onclick="incomingReportIssue()">Báo sự cố</button><button class="btn btn-primary" onclick="confirmReceive()">Hoàn tất nhận hàng</button>`, 'lg');
}

function renderReceiveRow(it, idx) {
  const sku = findSku(it.sku);
  const need = it.qty - (it.recv || 0);
  const recv = it._toRecv;
  const qtyDiff = recv != null ? (recv - need) : null;
  let qtyDiffCell;
  if (qtyDiff == null || recv === 0) {
    qtyDiffCell = `<td class="num" style="color:var(--text-3)">—</td>`;
  } else if (qtyDiff === 0) {
    qtyDiffCell = `<td class="num" style="color:var(--success);font-weight:500">✓</td>`;
  } else if (qtyDiff < 0) {
    qtyDiffCell = `<td class="num" style="color:var(--warn);font-weight:600">−${Math.abs(qtyDiff)}</td>`;
  } else {
    qtyDiffCell = `<td class="num" style="color:var(--primary);font-weight:600">+${qtyDiff}</td>`;
  }
  let statusPill;
  if (recv == null || recv === 0) statusPill = '<span class="pill pill-muted">Chưa quét</span>';
  else if (qtyDiff === 0) statusPill = '<span class="pill pill-success">Khớp</span>';
  else if (qtyDiff < 0) statusPill = `<span class="pill pill-warning">Thiếu ${Math.abs(qtyDiff)}</span>`;
  else statusPill = `<span class="pill pill-info">Thừa ${qtyDiff}</span>`;

  return `<tr>
    <td class="stt">${idx + 1}</td>
    <td class="sku-cell">${it.sku}</td>
    <td>${sku?.name || it.sku}${sku?.kvi?' <span style="font-size:10px;color:var(--danger);font-weight:600">[KVI]</span>':''}${sku?.promo?' <span style="font-size:10px;color:var(--warn);font-weight:600">[KM]</span>':''}</td>
    <td class="num">${need}</td>
    <td class="num"><input type="number" class="cell-input qty" value="${recv || ''}" placeholder="${need}" min="0" onchange="receivePO.items[${idx}]._toRecv=parseInt(this.value)||0; rcReRender()"></td>
    ${qtyDiffCell}
    <td><input type="month" class="cell-input cell-input-wide" value="${it.expiry}" onchange="receivePO.items[${idx}].expiry=this.value"></td>
    <td>${statusPill}</td>
  </tr>`;
}

function rcReRender() {
  const rows = document.getElementById('rcRows');
  if (rows) rows.innerHTML = receivePO.items.map((it, idx) => renderReceiveRow(it, idx)).join('');
}

function incomingMockScan() {
  const next = receivePO.items.find(it => !it._toRecv || it._toRecv === 0);
  if (!next) { toast('Đã quét hết SKU trong đơn này', 'success'); return; }
  next._toRecv = next.qty - (next.recv || 0);
  toast(`Đã quét: ${next.sku} · SL ${next._toRecv}`, 'success');
  rcReRender();
}

function incomingReportIssue() {
  const issue = prompt('Mô tả sự cố:');
  if (!issue) return;
  toast('Đã ghi nhận sự cố. Sẽ thông báo cho quản lý.', 'warn');
}

function confirmReceive() {
  console.log('[confirmReceive] called');
  const po = S.pos.find(p => String(p.id) === String(receivePO.id));
  if (!po) {
    console.warn('[confirmReceive] PO not found:', receivePO.id);
    toast('⚠ Không tìm thấy PO', 'error');
    return;
  }
  
  // Normalize branch (PO có thể có branch chữ thường 'pb', chuyển về HOA 'PB' để match BRANCHES)
  const branchKey = String(po.branch || 'PB').toUpperCase();
  // Auto-init S.inventory[branch] nếu chưa có (defensive)
  if (!S.inventory[branchKey]) {
    console.warn('[confirmReceive] S.inventory['+branchKey+'] chưa khởi tạo, tạo mới');
    S.inventory[branchKey] = {};
  }
  
  let anyRecv = false;
  let allFull = true;

  po.invoiceNo = (document.getElementById('rcInvNo')?.value || '').trim();
  po.invoiceDate = document.getElementById('rcInvDate')?.value || '';

  receivePO.items.forEach((rit, idx) => {
    const toRecv = parseInt(rit._toRecv) || 0;
    if (toRecv > 0) {
      po.items[idx].recv = (po.items[idx].recv || 0) + toRecv;
      po.items[idx].expiry = rit.expiry;
      // QC nhận vật lý: cộng tồn ngay (chưa tính tiền chính xác - đó là việc kế toán)
      S.inventory[branchKey][rit.sku] = (S.inventory[branchKey][rit.sku] || 0) + toRecv;
      anyRecv = true;
    }
    if ((po.items[idx].recv || 0) < po.items[idx].qty) allFull = false;
  });
  if (!anyRecv) { toast('Chưa nhập số lượng nhận', 'error'); return; }
  po.status = allFull ? 'received' : 'partial';
  po.recvAt = nowISO();
  po.accDone = false;
  po.receivedBy = 'anh Kay'; // hoặc role hiện tại
  const noteVal = (document.getElementById('rcvNote')?.value || '').trim();
  if (noteVal) po.note = (po.note ? po.note + '\n' : '') + '[Nhận] ' + noteVal;

  // Tạo công nợ TẠM (sẽ điều chỉnh lại khi kế toán hạch toán xong)
  let payable = S.payables.find(p => p.poId === po.id);
  const ncc = findNcc(po.ncc);
  // Tạm tính: SL nhận × giá PO + VAT 10% (kế toán sẽ chỉnh sau)
  const tempTotal = po.items.reduce((s, it) => {
    const qty = it.recv || 0;
    const sub = qty * it.cost;
    return s + sub + Math.round(sub * (findSku(it.sku)?.vat || 0.10));
  }, 0);
  if (payable) {
    payable.amount = tempTotal;
    payable.balance = tempTotal - payable.paid;
  } else {
    const dueDate = new Date(po.recvAt);
    dueDate.setDate(dueDate.getDate() + (ncc?.paymentTerms || 30));
    S.counters.payable++;
    S.payables.push({
      id: 'CN' + String(S.counters.payable).padStart(4, '0'),
      poId: po.id, ncc: po.ncc, amount: tempTotal, paid: 0, balance: tempTotal,
      dueDate: dueDate.toISOString().slice(0, 10), createdAt: po.recvAt, payments: [],
      isTemp: true, // đánh dấu chưa hạch toán
    });
  }

  addAuditLog('goods_received', po.id, `${BRANCHES.find(b=>b.id===branchKey)?.name || branchKey} nhận vật lý ${po.items.filter(i=>i.recv>0).length}/${po.items.length} SKU từ ${ncc?.name || po.ncc}${allFull?' (đầy đủ)':' (một phần)'}`);

  saveState();
  // ★ FIX: SAVE PO thay đổi vào DB (purchase_orders) — không chỉ memory
  savePOToDB(po).catch(e => {
    console.error('[confirmReceive] save PO fail:', e);
    toast('⚠ Lưu DB lỗi: ' + e.message + ' — sẽ retry khi reload', 'warn');
  });
  closeModal();
  if (currentTab === 'po') renderPO();
  else if (currentTab === 'receive') renderReceive();
  else render();
  toast(`✓ Nhận hàng ${po.id} · CN ${branchKey} · chuyển tab Đối chiếu kế toán để xử lý giá`, 'success');
}

// ★ FIX: Helper save PO vào purchase_orders table
async function savePOToDB(po) {
  const db = getKhoSupa();
  if (!db) { console.warn('[savePOToDB] no Supabase client'); return; }
  if (!po || !po.id) { console.warn('[savePOToDB] invalid PO'); return; }
  
  // Convert PO state về DB schema
  const row = {
    id: parseInt(po.id) || po.id,         // bigint id
    status: po.status,
    items: po.items,                       // jsonb
    total_qty: po.totalQty || po.items.reduce((s,it)=>s+(it.qty||0),0),
    total_value: po.totalValue || po.items.reduce((s,it)=>s+(it.qty||0)*(it.cost||0),0),
    note: po.note || '',
    received_at: po.recvAt || null,
    sent_at: po.sentAt || null,
    updated_at: new Date().toISOString(),
  };
  // Chỉ giữ field không null (để không overwrite ncc_code, branch, etc.)
  Object.keys(row).forEach(k => row[k] === undefined && delete row[k]);
  
  console.log('[savePOToDB] saving PO', row.id, 'status:', row.status);
  const { error } = await db.from('purchase_orders').update(row).eq('id', row.id);
  if (error) throw error;
  console.log('[savePOToDB] ✅ saved PO', row.id);
}

function confirmPayPayable(id) {
  const p = S.payables.find(x => x.id === id);
  const amt = parseFloat(document.getElementById('payAmt').value) || 0;
  if (amt <= 0 || amt > p.balance) { toast('Số tiền không hợp lệ', 'error'); return; }
  const method = document.getElementById('payMth').value;
  const note = document.getElementById('payN').value.trim();
  p.payments.push({ date: nowISO(), amount: amt, method, note });
  p.paid += amt;
  p.balance -= amt;
  saveState();
  closeModal();
  renderPayables();
  toast(`Đã ghi nhận thanh toán ${fmtVND(amt)}đ${p.balance === 0 ? ' · Hoàn tất' : ''}`, 'success');
}

function holdCurrentOrder() {
  if (cart.length === 0) { toast('Giỏ hàng trống', 'warn'); return; }
  S.counters.held++;
  const id = 'HOLD' + String(S.counters.held).padStart(3, '0');
  S.heldOrders.push({
    id, branch: S.activeBranch, cashier: getActiveShift().cashier,
    cart: JSON.parse(JSON.stringify(cart)),
    customer: cartCustomer ? { ...cartCustomer } : null,
    discount: { ...cartDiscount },
    holdAt: nowISO(),
    note: '',
  });
  cart = []; cartCustomer = null; cartDiscount = { type: 'amount', value: 0 };
  saveState();
  renderPOS();
  toast(`Đã treo đơn ${id}`, 'success');
}

function openHeldOrders() {
  const list = (S.heldOrders || []).filter(h => h.branch === S.activeBranch);
  openModal('Đơn treo', `
    ${list.length === 0 ? `<div style="padding:30px;text-align:center;color:var(--text-3);font-size:13px">Không có đơn nào đang treo</div>` : `
      <div style="display:flex;flex-direction:column;gap:8px">
        ${list.map(h => {
          const total = h.cart.reduce((s,i) => s+i.qty*i.price, 0);
          return `<div style="border:1px solid var(--border);border-radius:8px;padding:12px;background:var(--surface-2)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <div><strong class="mono">${h.id}</strong> <span class="tag info">${h.branch}</span> ${h.customer ? `<span style="color:var(--text-2);font-size:12px;margin-left:6px">${h.customer.name}</span>` : ''}</div>
              <div style="display:flex;gap:6px">
                <button class="btn btn-sm btn-primary" onclick="resumeHeldOrder('${h.id}')">▶ Tiếp tục</button>
                <button class="btn btn-sm btn-ghost" onclick="deleteHeldOrder('${h.id}')" style="color:var(--danger)">Xóa</button>
              </div>
            </div>
            <div style="font-size:11px;color:var(--text-3);margin-bottom:6px">Treo lúc ${fmtDateTime(h.holdAt)} · ${h.cashier}</div>
            <div style="font-size:12px">${h.cart.map(it => `${it.qty}× ${it.name}`).join(', ')}</div>
            <div style="margin-top:6px;font-weight:600;color:var(--primary-dark)">${fmtVND(total)}đ · ${h.cart.length} món</div>
          </div>`;
        }).join('')}
      </div>
    `}
  `, `<button class="btn" onclick="closeModal()">Đóng</button>`, 'lg');
}

function resumeHeldOrder(id) {
  const idx = S.heldOrders.findIndex(h => h.id === id);
  if (idx < 0) return;
  if (cart.length > 0) {
    if (!confirm('Giỏ hàng hiện có sẵn. Treo đơn hiện tại trước?')) return;
    holdCurrentOrder();
  }
  const h = S.heldOrders[idx];
  cart = h.cart;
  cartCustomer = h.customer;
  cartDiscount = h.discount;
  S.heldOrders.splice(idx, 1);
  saveState();
  closeModal();
  renderPOS();
  toast(`Đã tiếp tục ${id}`, 'success');
}

function deleteHeldOrder(id) {
  if (!confirm('Xóa đơn treo này?')) return;
  S.heldOrders = S.heldOrders.filter(h => h.id !== id);
  saveState();
  openHeldOrders();
}

function vietqrURL(amount, addInfo) {
  const acc = BANK_ACCOUNT;
  const url = `https://img.vietqr.io/image/${acc.bin}-${acc.accountNumber}-compact2.png`;
  return `${url}?amount=${amount}&addInfo=${encodeURIComponent(addInfo)}&accountName=${encodeURIComponent(acc.accountHolder)}`;
}

function confirmReturn() {
  if (!returnSourceOrder) { toast('Chưa chọn đơn gốc', 'error'); return; }
  const totalQty = returnCart.reduce((s,it) => s+it.returnQty, 0);
  if (totalQty === 0) { toast('Chưa chọn số lượng trả', 'error'); return; }
  const reason = document.getElementById('rtReason').value;
  if (!reason) { toast('Chọn lý do trả hàng', 'error'); return; }
  const note = document.getElementById('rtNote').value.trim();
  const refund = returnCart.reduce((s,it) => s+it.returnQty*it.price, 0);

  S.counters.return = (S.counters.return || 0) + 1;
  const ret = {
    id: 'TR' + String(S.counters.return).padStart(4, '0'),
    orderId: returnSourceOrder.id,
    date: nowISO(), branch: returnSourceOrder.branch,
    cashier: getActiveShift()?.cashier || returnSourceOrder.cashier,
    customer: returnSourceOrder.customer,
    items: returnCart.filter(it => it.returnQty > 0).map(it => ({ sku: it.sku, name: it.name, qty: it.returnQty, price: it.price, cost: it.cost })),
    refund, reason, note,
  };

  // Restore tồn kho
  ret.items.forEach(it => {
    S.inventory[ret.branch][it.sku] = (S.inventory[ret.branch][it.sku] || 0) + it.qty;
  });
  // Trừ điểm KH (nếu có)
  if (ret.customer) {
    const cust = S.customers.find(c => c.id === ret.customer.id);
    if (cust) {
      const pointsBack = Math.floor(refund / 100000);
      cust.points = Math.max(0, cust.points - pointsBack);
      cust.totalSpent = Math.max(0, cust.totalSpent - refund);
    }
  }

  S.returns.push(ret);
  saveState();
  closeModal();
  renderReturns();
  toast(`✓ Đã trả hàng ${ret.id} · hoàn ${fmtVND(refund)}đ · cộng tồn lại`, 'success');
}

let skuSearch = '';
let skuPage = 1;
let skuPageSize = 100;
let invPage = 1;
let invPageSize = 100;
let _rtDebounce = null;
let skuFilterCat = 'all';
let skuFilterBrand = 'all';
let skuFilterTag = 'all';
let skuFilterStock = 'all'; // all | out | low | ok

function renderSKU() {
  let list = S.skus.map(s => {
    const stockPB = S.inventory['PB']?.[s.sku] || 0;
    const stockVT = S.inventory['VT']?.[s.sku] || 0;
    const stockTA = S.inventory['TA']?.[s.sku] || 0;
    const total = stockPB + stockVT + stockTA;
    return { ...s, stockPB, stockVT, stockTA, total, value: total * s.cost };
  });

  // Filters
  if (skuSearch) {
    const q = skuSearch.toLowerCase();
    list = list.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.sku.toLowerCase().includes(q) ||
      s.barcode.includes(q) ||
      (s.brand || '').toLowerCase().includes(q)
    );
  }
  if (skuFilterCat !== 'all') list = list.filter(s => s.cat === skuFilterCat);
  if (skuFilterBrand !== 'all') list = list.filter(s => s.brand === skuFilterBrand);
  if (skuFilterTag !== 'all') list = list.filter(s => (s.tags || []).includes(skuFilterTag));
  if (skuFilterStock === 'out') list = list.filter(s => s.total === 0);
  else if (skuFilterStock === 'low') list = list.filter(s => s.total > 0 && s.total < (s.min || 0));
  else if (skuFilterStock === 'ok') list = list.filter(s => s.total >= (s.min || 0));

  // Tổng kê
  const totalValue = list.reduce((s,i) => s+i.value, 0);
  const totalUnits = list.reduce((s,i) => s+i.total, 0);
  const outCount = list.filter(s => s.total === 0).length;
  const lowCount = list.filter(s => s.total > 0 && s.total < (s.min || 0)).length;

  // Lookup unique brands & tags
  const allBrands = [...new Set(S.skus.map(s => s.brand).filter(Boolean))].sort();
  const allCats = [...new Set(S.skus.map(s => s.cat))].sort();
  const allTags = [...new Set(S.skus.flatMap(s => s.tags || []))].sort();

  // ── Phân trang ──
  const SKU_PER_PAGE = skuPageSize || 100;
  const _totalFiltered = list.length;
  const _totalPages = Math.max(1, Math.ceil(_totalFiltered / SKU_PER_PAGE));
  if (skuPage > _totalPages) skuPage = _totalPages;
  if (skuPage < 1) skuPage = 1;
  const _pageStart = (skuPage - 1) * SKU_PER_PAGE;
  const pageList = list.slice(_pageStart, _pageStart + SKU_PER_PAGE);

  // Pagination HTML helper
  const _makePager = () => {
    const pageSizeSelect = `
      <select onchange="skuPageSize=parseInt(this.value);skuPage=1;renderSKU()"
        style="padding:4px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;color:#374151;background:white;cursor:pointer">
        ${[50,100,200,300,500].map(n => `<option value="${n}" ${n===skuPageSize?'selected':''}>${n} SP/trang</option>`).join('')}
      </select>`;
    if (_totalPages <= 1) return `<div style="display:flex;align-items:center;gap:8px">${pageSizeSelect}<span style="color:#64748b;font-size:11px">${_totalFiltered.toLocaleString('vi-VN')} SP</span></div>`;
    const pages = [];
    // Luôn hiện trang 1
    pages.push(1);
    // Trang xung quanh trang hiện tại
    for (let i = Math.max(2, skuPage-2); i <= Math.min(_totalPages-1, skuPage+2); i++) pages.push(i);
    // Luôn hiện trang cuối
    if (_totalPages > 1) pages.push(_totalPages);
    // Deduplicate + sort
    const uniq = [...new Set(pages)].sort((a,b)=>a-b);

    let html = '<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">';
    html += `<button onclick="skuPage=Math.max(1,skuPage-1);renderSKU()" ${skuPage<=1?'disabled':''} style="padding:5px 10px;border:1px solid #e2e8f0;border-radius:6px;background:white;cursor:pointer;font-size:12px">‹</button>`;
    let prev = 0;
    for (const p of uniq) {
      if (p - prev > 1) html += '<span style="color:#94a3b8;padding:0 4px">…</span>';
      const active = p === skuPage;
      html += `<button onclick="skuPage=${p};renderSKU()" style="padding:5px 10px;border:1px solid ${active?'#1565C0':'#e2e8f0'};border-radius:6px;background:${active?'#1565C0':'white'};color:${active?'white':'#374151'};cursor:pointer;font-size:12px;font-weight:${active?'600':'400'}">${p}</button>`;
      prev = p;
    }
    html += `<button onclick="skuPage=Math.min(_totalPages,skuPage+1);renderSKU()" ${skuPage>=_totalPages?'disabled':''} style="padding:5px 10px;border:1px solid #e2e8f0;border-radius:6px;background:white;cursor:pointer;font-size:12px">›</button>`;
    html += `<span style="color:#64748b;font-size:11px;margin-left:8px">Trang ${skuPage}/${_totalPages} · ${_totalFiltered.toLocaleString('vi-VN')} SP</span>`;
    html += `<span style="margin-left:auto">${pageSizeSelect}</span>`;
    html += '</div>';
    return html;
  };

  const c = document.getElementById('content');

      <div class="kpi-card"><div class="kpi-label">SKU hiển thị</div><div class="kpi-value">${list.length}</div><div class="kpi-sub">/ ${S.skus.length} tổng</div></div>
      <div class="kpi-card accent"><div class="kpi-label">Tổng tồn kho</div><div class="kpi-value">${fmtVND(totalUnits)}</div></div>
      <div class="kpi-card success"><div class="kpi-label">Giá trị tồn (giá vốn)</div><div class="kpi-value">${fmtVND(totalValue)}<span style="font-size:12px;color:var(--text-3)">đ</span></div></div>
      <div class="kpi-card danger"><div class="kpi-label">Hết hàng</div><div class="kpi-value">${outCount}</div></div>
      <div class="kpi-card warn"><div class="kpi-label">Sắp hết (dưới min)</div><div class="kpi-value">${lowCount}</div></div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Bộ lọc nâng cao</div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-primary btn-sm" onclick="openNewSku()">+ Thêm SKU mới</button>
          <button class="btn btn-sm" onclick="openImportSku()">📤 Nhập Excel</button>
          <button class="btn btn-sm" onclick="skuExportExcel()">📥 Xuất Excel</button>
        </div>
      </div>
      <div class="panel-body">
        <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:10px">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input class="input" id="skuSearchInput" placeholder="Tìm SKU / tên / barcode / thương hiệu..." value="${skuSearch}">
          </div>
          <select class="select" id="skuCatFilter">
            <option value="all">Tất cả nhóm hàng</option>
            ${allCats.map(c => `<option value="${c}" ${skuFilterCat===c?'selected':''}>${c}</option>`).join('')}
          </select>
          <select class="select" id="skuBrandFilter">
            <option value="all">Tất cả thương hiệu</option>
            ${allBrands.map(b => `<option value="${b}" ${skuFilterBrand===b?'selected':''}>${b}</option>`).join('')}
          </select>
          <select class="select" id="skuTagFilter">

function skuExportExcel() {
  // Tạo CSV (Excel-compatible với BOM UTF-8)
  const rows = [];
  rows.push(['STT','SKU','Barcode','Tên sản phẩm','Thương hiệu','Nhóm hàng','ĐVT','Thẻ hàng','NCC','Giá vốn','Giá bán','Lãi gộp %','Pack','Min','Tồn PB','Tồn VT','Tồn TA','Tổng tồn','Giá trị tồn','KVI','KM']);
  S.skus.forEach((s, i) => {
    const ncc = findNcc(s.ncc);
    const stockPB = S.inventory['PB']?.[s.sku] || 0;
    const stockVT = S.inventory['VT']?.[s.sku] || 0;
    const stockTA = S.inventory['TA']?.[s.sku] || 0;
    const total = stockPB + stockVT + stockTA;
    const margin = ((s.price - s.cost) / s.price * 100).toFixed(1);
    rows.push([
      i+1, s.sku, s.barcode, s.name, s.brand || '', s.cat, s.unit || 'cái',
      (s.tags || []).map(t => TAG_DEFS[t]?.label || t).join('; '),
      ncc?.name || '', s.cost, s.price, margin, s.pack, s.min,
      stockPB, stockVT, stockTA, total, total*s.cost,
      s.kvi ? 'X' : '', s.promo ? 'X' : ''
    ]);
  });
  const csv = '\ufeff' + rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Vicomart_DanhMucSKU_${todayStr()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`Đã xuất ${S.skus.length} SKU ra file CSV (mở bằng Excel)`, 'success');
}

function saveSku(existingSkuId) {
  const sku = document.getElementById('skSku').value.trim().toUpperCase();
  const name = document.getElementById('skName').value.trim();
  const brand = document.getElementById('skBrand').value.trim();
  const cat = document.getElementById('skCat').value.trim();
  if (!sku || !name || !brand || !cat) { toast('Cần nhập đủ SKU, Tên, Thương hiệu, Nhóm hàng', 'error'); return; }

  // Kiểm tra trùng SKU (chỉ khi thêm mới)
  if (!existingSkuId && S.skus.find(x => x.sku === sku)) {
    toast(`Mã SKU ${sku} đã tồn tại`, 'error'); return;
  }

  const cost = parseFloat(document.getElementById('skCost').value) || 0;
  const price = parseFloat(document.getElementById('skPrice').value) || 0;
  if (cost <= 0 || price <= 0) { toast('Cần nhập giá vốn và giá bán', 'error'); return; }
  if (price <= cost) {
    if (!confirm('⚠ Giá bán nhỏ hơn hoặc bằng giá vốn (sẽ lỗ). Vẫn lưu?')) return;
  }

  const tags = Array.from(document.querySelectorAll('.sk-tag-cb:checked')).map(cb => cb.value);
  const data = {
    sku,
    barcode: document.getElementById('skBarcode').value.trim(),
    name, brand, cat,
    unit: document.getElementById('skUnit').value,
    cost, price,
    pack: parseInt(document.getElementById('skPack').value) || 1,
    min: parseInt(document.getElementById('skMin').value) || 0,
    ncc: document.getElementById('skNcc').value,
    vat: parseFloat(document.getElementById('skVat').value),
    tags,
    kvi: document.getElementById('skKvi').checked,
    promo: document.getElementById('skPromo').checked,
  };

  if (existingSkuId) {
    const idx = S.skus.findIndex(x => x.sku === existingSkuId);
    if (idx >= 0) {
      const oldData = S.skus[idx];
      S.skus[idx] = { ...oldData, ...data };
      addAuditLog('auto', sku, `Sửa SKU "${name}" - giá vốn ${fmtVND(oldData.cost)}→${fmtVND(cost)}đ, giá bán ${fmtVND(oldData.price)}→${fmtVND(price)}đ`);
      toast(`✓ Đã cập nhật ${sku}`, 'success');
    }
  } else {
    S.skus.push(data);
    // Init tồn 0 cho tất cả CN active
    BRANCHES.forEach(b => {
      if (!S.inventory[b.id]) S.inventory[b.id] = {};
      S.inventory[b.id][sku] = 0;
    });
    addAuditLog('auto', sku, `Thêm SKU mới "${name}" (${brand}) - giá vốn ${fmtVND(cost)}đ, giá bán ${fmtVND(price)}đ`);
    toast(`✓ Đã thêm SKU ${sku}`, 'success');
  }
  saveState();
  closeModal();
  renderSKU();
}

function deleteSku(skuId) {
  const sku = findSku(skuId);
  if (!sku) return;
  // Check tồn còn không
  const totalStock = BRANCHES.reduce((s,b) => s + (S.inventory[b.id]?.[skuId] || 0), 0);
  if (totalStock > 0) {
    toast(`⚠ SKU ${skuId} còn tồn ${totalStock} ${sku.unit}, không thể xóa. Hãy thanh lý hoặc trả NCC trước.`, 'error');
    return;
  }
  // Check có trong PO chưa nhận?
  const inPO = S.pos.some(p => (p.status === 'sent' || p.status === 'partial' || p.status === 'draft') && p.items.some(it => it.sku === skuId));
  if (inPO) {
    toast(`⚠ SKU ${skuId} đang có trong PO chưa nhận xong, không thể xóa.`, 'error');
    return;
  }
  if (!confirm(`Xóa SKU "${sku.name}" (${skuId})?\nThao tác này không thể hoàn tác.`)) return;
  S.skus = S.skus.filter(x => x.sku !== skuId);
  BRANCHES.forEach(b => { if (S.inventory[b.id]) delete S.inventory[b.id][skuId]; });
  addAuditLog('auto', skuId, `Xóa SKU "${sku.name}"`);
  saveState();
  closeModal();
  renderSKU();
  toast(`Đã xóa ${skuId}`, 'success');
}

function parseCSV(text) {
  // Bỏ BOM nếu có
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  return lines.map(line => {
    const result = [];
    let cur = '', inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) { result.push(cur); cur = ''; }
      else cur += ch;
    }
    result.push(cur);
    return result;
  });
}

function doImportSku() {
  const data = window._skuImportData;
  if (!data || data.length < 2) { toast('Không có dữ liệu', 'error'); return; }
  const header = data[0].map(h => h.trim().toLowerCase());
  const rows = data.slice(1);
  let added = 0, updated = 0, skipped = 0;
  const errors = [];

  rows.forEach((row, idx) => {
    if (row.length < 7 || !row[0].trim()) { skipped++; return; }
    try {
      const sku = row[0].trim().toUpperCase();
      const newData = {
        sku,
        barcode: (row[1] || '').trim(),
        name: (row[2] || '').trim(),
        brand: (row[3] || '').trim(),
        cat: (row[4] || '').trim(),
        unit: (row[5] || 'cái').trim(),
        cost: parseFloat(row[6]) || 0,
        price: parseFloat(row[7]) || 0,
        pack: parseInt(row[8]) || 1,
        min: parseInt(row[9]) || 0,
        ncc: (row[10] || 'NCC001').trim(),
        vat: parseFloat(row[11]) || 0.10,
        tags: (row[12] || '').split(/[;,]/).map(t => t.trim()).filter(Boolean),
        kvi: (row[13] || '').trim().toLowerCase() === 'x' || (row[13] || '').trim() === '1',
        promo: (row[14] || '').trim().toLowerCase() === 'x' || (row[14] || '').trim() === '1',
      };
      if (!newData.name || !newData.brand) { errors.push(`Dòng ${idx+2}: thiếu Tên hoặc Thương hiệu`); return; }
      const existingIdx = S.skus.findIndex(x => x.sku === sku);
      if (existingIdx >= 0) {
        S.skus[existingIdx] = { ...S.skus[existingIdx], ...newData };
        updated++;
      } else {
        S.skus.push(newData);
        BRANCHES.forEach(b => {
          if (!S.inventory[b.id]) S.inventory[b.id] = {};
          S.inventory[b.id][sku] = 0;
        });
        added++;
      }
    } catch (err) {
      errors.push(`Dòng ${idx+2}: ${err.message}`);
    }
  });

  saveState();
  addAuditLog('auto', `${added+updated} SKU`, `Nhập Excel: thêm ${added}, cập nhật ${updated}, bỏ qua ${skipped}`);
  closeModal();
  renderSKU();
  let msg = `✓ Thêm ${added} · Cập nhật ${updated}${skipped?` · Bỏ qua ${skipped}`:''}`;
  if (errors.length > 0) msg += ` · Lỗi ${errors.length}`;
  toast(msg, errors.length > 0 ? 'warn' : 'success');
  if (errors.length > 0) console.warn('Import errors:', errors);
}

// ============================================================
// BÁO CÁO NHẬP - XUẤT - TỒN (chi tiết kế toán)
// Cấu trúc:
//   Tồn đầu kỳ + Nhập trong kỳ - Xuất trong kỳ = Tồn cuối kỳ
//   Xuất gồm: Bán (POS) + Điều chuyển + Hủy + Trả NCC
// ============================================================
let reportFromDate = (() => { const d = new Date(); d.setDate(1); return d.toISOString().slice(0,10); })();
let reportToDate = todayStr();
let reportBranch = 'all';

function renderReports() {
  // Tính kỳ
  const fromKey = reportFromDate;
  const toKey = reportToDate;

  // Build data per SKU per branch
  // Note: Tồn đầu kỳ = tồn hiện tại - (nhập trong kỳ) + (xuất trong kỳ) [reverse engineering]
  // Trong demo này: dùng heuristic - tồn đầu kỳ = tồn hiện tại - nhập + xuất
  const branches = reportBranch === 'all' ? getActiveBranches().map(b => b.id) : [reportBranch];

  // 1. Nhập trong kỳ (từ PO đã received/partial trong kỳ)
  const purchasesInPeriod = S.pos.filter(p =>
    (p.status === 'received' || p.status === 'partial') &&
    p.recvAt && p.recvAt.slice(0,10) >= fromKey && p.recvAt.slice(0,10) <= toKey &&
    (reportBranch === 'all' || p.branch === reportBranch)
  );

  // 2. Xuất bán (orders trong kỳ)
  const salesInPeriod = (S.orders || []).filter(o =>
    o.date.slice(0,10) >= fromKey && o.date.slice(0,10) <= toKey &&
    (reportBranch === 'all' || o.branch === reportBranch)
  );

  // 3. Xuất hủy/trả KH (returns POS)
  const returnsKH = (S.returns || []).filter(r =>
    r.date.slice(0,10) >= fromKey && r.date.slice(0,10) <= toKey &&
    (reportBranch === 'all' || r.branch === reportBranch)
  );

  // 4. Xuất trả NCC
  const returnsNCC = (S.supplierReturns || []).filter(r =>
    r.date.slice(0,10) >= fromKey && r.date.slice(0,10) <= toKey &&
    (reportBranch === 'all' || r.branch === reportBranch)
  );

  // Aggregate per SKU
  const skuData = {};
  S.skus.forEach(s => {
    skuData[s.sku] = {
      sku: s.sku, name: s.name, brand: s.brand || '', cat: s.cat,
      cost: s.cost, price: s.price,
      // Init: tồn đầu kỳ unknown, tồn cuối kỳ = tồn thực tế
      stockEnd: branches.reduce((sum,b) => sum + (S.inventory[b]?.[s.sku] || 0), 0),
      // Nhập
      purchaseQty: 0, purchaseValue: 0, purchaseGift: 0,
      // Xuất
      saleQty: 0, saleValue: 0, saleCogs: 0, // bán POS
      transferOutQty: 0, // điều chuyển ra (chưa implement, để 0)
      destroyQty: 0, destroyValue: 0, // hủy
      kReturnQty: 0, // KH trả lại (cộng vào tồn nhưng giảm xuất)
      nccReturnQty: 0, nccReturnValue: 0, // trả NCC
    };
  });

  purchasesInPeriod.forEach(po => po.items.forEach(it => {
    if (skuData[it.sku]) {
      skuData[it.sku].purchaseQty += (it.recv || 0);
      skuData[it.sku].purchaseGift += (it.giftQty || 0);
      const lc = calcLine(it);
      skuData[it.sku].purchaseValue += lc.net;
    }
  }));

  salesInPeriod.forEach(o => o.items.forEach(it => {
    if (skuData[it.sku]) {
      skuData[it.sku].saleQty += it.qty;
      skuData[it.sku].saleValue += it.qty * it.price;
      skuData[it.sku].saleCogs += it.qty * (it.cost || 0);
    }
  }));

  returnsKH.forEach(r => r.items.forEach(it => {
    if (skuData[it.sku]) {
      skuData[it.sku].kReturnQty += it.qty;
    }
  }));

  returnsNCC.forEach(r => r.items.forEach(it => {
    if (skuData[it.sku]) {
      skuData[it.sku].nccReturnQty += it.qty;
      skuData[it.sku].nccReturnValue += it.qty * it.cost;
    }
  }));

  // ★ NEW: Hủy hàng (writeoffs - chỉ tính các phiếu đã approved)
  const writeoffsInPeriod = (S.writeoffs || []).filter(w =>
    w.status === 'approved' &&
    w.date.slice(0,10) >= fromKey && w.date.slice(0,10) <= toKey &&
    (reportBranch === 'all' || w.branch === reportBranch)
  );
  writeoffsInPeriod.forEach(w => w.items.forEach(it => {
    if (skuData[it.sku]) {
      skuData[it.sku].destroyQty += it.qty;
      skuData[it.sku].destroyValue += it.qty * it.cost;
    }
  }));

  // ★ NEW: Điều chuyển nội bộ (chỉ phiếu received) - tính Out cho fromBranch
  const transfersInPeriod = (S.transfers || []).filter(t =>
    t.status === 'received' &&
    t.date.slice(0,10) >= fromKey && t.date.slice(0,10) <= toKey
  );
  transfersInPeriod.forEach(t => t.items.forEach(it => {
    if (!skuData[it.sku]) return;
    // Nếu lọc theo CN cụ thể: tính Out nếu là CN gửi
    if (reportBranch !== 'all') {
      if (t.fromBranch === reportBranch) {
        skuData[it.sku].transferOutQty += it.qty;
      }
    }
    // Nếu xem all CN: điều chuyển nội bộ là zero-sum, không cộng vào tổng
  }));

  // Tính tồn đầu kỳ ngược = tồn cuối kỳ - (nhập+tặng-bán+kh trả-trả ncc-hủy)
  Object.values(skuData).forEach(d => {
    d.stockStart = d.stockEnd
      - (d.purchaseQty + d.purchaseGift)
      + d.saleQty
      - d.kReturnQty
      + d.nccReturnQty
      + d.destroyQty;
    if (d.stockStart < 0) d.stockStart = 0; // safety
    d.stockStartValue = d.stockStart * d.cost;
    d.stockEndValue = d.stockEnd * d.cost;
    d.netMovement = (d.purchaseQty + d.purchaseGift) - d.saleQty + d.kReturnQty - d.nccReturnQty - d.destroyQty;

  const grossProfit = totals.saleValue - totals.saleCogs;

function rptQuickDate(period) {
  const now = new Date();
  const today = todayStr();
  if (period === 'today') {
    reportFromDate = today; reportToDate = today;
  } else if (period === 'week') {
    const dow = now.getDay();
    const diff = dow === 0 ? -6 : 1 - dow;
    const start = new Date(now); start.setDate(now.getDate() + diff);
    reportFromDate = start.toISOString().slice(0,10); reportToDate = today;
  } else if (period === 'month') {
    reportFromDate = today.slice(0,7) + '-01'; reportToDate = today;
  } else if (period === 'quarter') {
    const q = Math.floor(now.getMonth() / 3);
    const start = new Date(now.getFullYear(), q*3, 1);
    reportFromDate = start.toISOString().slice(0,10); reportToDate = today;
  } else if (period === 'year') {
    reportFromDate = now.getFullYear() + '-01-01'; reportToDate = today;
  }
  renderReports();
}

function rptExportExcel() {
  const rows = [];
  rows.push([`BÁO CÁO NHẬP-XUẤT-TỒN VICOMART | ${reportFromDate} → ${reportToDate} | Chi nhánh: ${reportBranch === 'all' ? 'Tất cả chi nhánh' : reportBranch}`]);
  rows.push([]);
  // Header tier 1 (nhóm cột)
  rows.push(['','','','','','','', 'TỒN ĐẦU KỲ','', 'NHẬP TRONG KỲ','','','', 'XUẤT BÁN POS','','', 'XUẤT KHÁC','','', 'TRẢ NCC','', 'TỒN CUỐI KỲ','']);
  // Header tier 2 (chi tiết)
  rows.push(['STT','Mã SKU','Tên SP','Nhóm hàng','Thương hiệu','ĐVT','Đơn giá vốn',
             'SL','Giá trị',
             'Mua','Tặng','Tổng','Giá trị nhập',
             'SL bán','Doanh thu','Giá vốn bán',
             'KH trả','Điều chuyển','Hủy/Hỏng',
             'SL trả NCC','Giá trị trả NCC',
             'SL tồn cuối','Giá trị tồn cuối']);

  const branches = reportBranch === 'all' ? getActiveBranches().map(b => b.id) : [reportBranch];
  const purchasesInPeriod = S.pos.filter(p => (p.status === 'received' || p.status === 'partial') && p.recvAt && p.recvAt.slice(0,10) >= reportFromDate && p.recvAt.slice(0,10) <= reportToDate && (reportBranch === 'all' || p.branch === reportBranch));
  const salesInPeriod = (S.orders || []).filter(o => o.date.slice(0,10) >= reportFromDate && o.date.slice(0,10) <= reportToDate && (reportBranch === 'all' || o.branch === reportBranch));
  const returnsKH = (S.returns || []).filter(r => r.date.slice(0,10) >= reportFromDate && r.date.slice(0,10) <= reportToDate && (reportBranch === 'all' || r.branch === reportBranch));
  const returnsNCC = (S.supplierReturns || []).filter(r => r.date.slice(0,10) >= reportFromDate && r.date.slice(0,10) <= reportToDate && (reportBranch === 'all' || r.branch === reportBranch));

  const skuData = {};
  S.skus.forEach(s => {
    skuData[s.sku] = {
      sku: s.sku, name: s.name, brand: s.brand || '', cat: s.cat || '', unit: s.unit || 'cái', cost: s.cost,
      stockEnd: branches.reduce((sum,b) => sum + (S.inventory[b]?.[s.sku] || 0), 0),
      purchaseQty: 0, purchaseValue: 0, purchaseGift: 0,
      saleQty: 0, saleValue: 0, saleCogs: 0,
      destroyQty: 0, kReturnQty: 0, transferOutQty: 0,
      nccReturnQty: 0, nccReturnValue: 0,
    };
  });
  purchasesInPeriod.forEach(po => po.items.forEach(it => { if (skuData[it.sku]) { skuData[it.sku].purchaseQty += (it.recv||0); skuData[it.sku].purchaseGift += (it.giftQty||0); skuData[it.sku].purchaseValue += calcLine(it).net; } }));
  salesInPeriod.forEach(o => o.items.forEach(it => { if (skuData[it.sku]) { skuData[it.sku].saleQty += it.qty; skuData[it.sku].saleValue += it.qty * it.price; skuData[it.sku].saleCogs += it.qty * (it.cost||0); } }));
  returnsKH.forEach(r => r.items.forEach(it => { if (skuData[it.sku]) skuData[it.sku].kReturnQty += it.qty; }));
  returnsNCC.forEach(r => r.items.forEach(it => { if (skuData[it.sku]) { skuData[it.sku].nccReturnQty += it.qty; skuData[it.sku].nccReturnValue += it.qty * it.cost; } }));
  Object.values(skuData).forEach(d => {
    d.stockStart = Math.max(0, d.stockEnd - (d.purchaseQty + d.purchaseGift) + d.saleQty - d.kReturnQty + d.nccReturnQty + d.destroyQty + d.transferOutQty);
    d.stockStartValue = d.stockStart * d.cost;
    d.stockEndValue = d.stockEnd * d.cost;
  });
  const list = Object.values(skuData).filter(d => d.purchaseQty > 0 || d.saleQty > 0 || d.kReturnQty > 0 || d.nccReturnQty > 0 || d.destroyQty > 0 || d.stockStart > 0 || d.stockEnd > 0);
  list.forEach((d,i) => {
    rows.push([
      i+1, d.sku, d.name, d.cat, d.brand, d.unit, d.cost,
      d.stockStart, d.stockStartValue,
      d.purchaseQty, d.purchaseGift, d.purchaseQty + d.purchaseGift, d.purchaseValue,
      d.saleQty, d.saleValue, d.saleCogs,
      d.kReturnQty, d.transferOutQty, d.destroyQty,
      d.nccReturnQty, d.nccReturnValue,
      d.stockEnd, d.stockEndValue,
    ]);
  });

  // Footer tổng
  const t = list.reduce((acc, d) => ({
    stockStart: acc.stockStart + d.stockStart,
    stockStartValue: acc.stockStartValue + d.stockStartValue,
    purchaseQty: acc.purchaseQty + d.purchaseQty,
    purchaseGift: acc.purchaseGift + d.purchaseGift,
    purchaseValue: acc.purchaseValue + d.purchaseValue,
    saleQty: acc.saleQty + d.saleQty,
    saleValue: acc.saleValue + d.saleValue,
    saleCogs: acc.saleCogs + d.saleCogs,
    kReturnQty: acc.kReturnQty + d.kReturnQty,
    transferOutQty: acc.transferOutQty + d.transferOutQty,
    destroyQty: acc.destroyQty + d.destroyQty,
    nccReturnQty: acc.nccReturnQty + d.nccReturnQty,
    nccReturnValue: acc.nccReturnValue + d.nccReturnValue,
    stockEnd: acc.stockEnd + d.stockEnd,
    stockEndValue: acc.stockEndValue + d.stockEndValue,
  }), { stockStart: 0, stockStartValue: 0, purchaseQty: 0, purchaseGift: 0, purchaseValue: 0, saleQty: 0, saleValue: 0, saleCogs: 0, kReturnQty: 0, transferOutQty: 0, destroyQty: 0, nccReturnQty: 0, nccReturnValue: 0, stockEnd: 0, stockEndValue: 0 });
  rows.push([]);
  rows.push(['TỔNG', '', '', '', '', '', '',
    t.stockStart, t.stockStartValue,
    t.purchaseQty, t.purchaseGift, t.purchaseQty + t.purchaseGift, t.purchaseValue,
    t.saleQty, t.saleValue, t.saleCogs,
    t.kReturnQty, t.transferOutQty, t.destroyQty,
    t.nccReturnQty, t.nccReturnValue,
    t.stockEnd, t.stockEndValue,
  ]);

  const csv = '\ufeff' + rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Vicomart_NhapXuatTon_${reportFromDate}_${reportToDate}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`Đã xuất báo cáo ${list.length} SKU ra file CSV`, 'success');
}

  if (!hasPermission('createWriteoff') && !hasPermission('*')) {
    toast(`Vai trò "${ROLES[S.activeRole].label}" không có quyền tạo phiếu hủy`, 'error');
    return;
  }
  // Khi ALL CN: default branch là PB, user có thể đổi trong form
  const defaultBranch = isAllBranches() ? 'PB' : S.activeBranch;
  if (isAllBranches()) toast('💡 Default chọn CN Phú Bài - đổi trong form nếu khác', 'info');
  window._wfDraft = { items: [], reason: 'expired', branch: defaultBranch, note: '' };
  openWriteoffForm();
}

function wfAddItem() {
  const skuId = document.getElementById('wfSkuPick').value.trim().toUpperCase();
  const qty = parseInt(document.getElementById('wfQty').value) || 0;
  const note = document.getElementById('wfItemNote').value.trim();
  if (!skuId) { toast('Chưa chọn SKU', 'error'); return; }
  const sku = findSku(skuId);
  if (!sku) { toast('SKU không tồn tại', 'error'); return; }
  if (qty <= 0) { toast('SL > 0', 'error'); return; }
  const stock = S.inventory[window._wfDraft.branch]?.[skuId] || 0;
  if (qty > stock) { toast(`SL hủy (${qty}) > tồn (${stock})`, 'error'); return; }
  const existing = window._wfDraft.items.find(it => it.sku === skuId);
  if (existing) {
    if (existing.qty + qty > stock) { toast(`Tổng vượt tồn`, 'error'); return; }
    existing.qty += qty;
  } else {
    window._wfDraft.items.push({ sku: skuId, qty, cost: sku.cost, note });
  }
  openWriteoffForm();
}

function wfUpdateQty(idx, val) {
  window._wfDraft.items[idx].qty = parseInt(val) || 1;
  openWriteoffForm();
}

function wfRemoveItem(idx) {
  window._wfDraft.items.splice(idx, 1);
  openWriteoffForm();
}

function saveWriteoff() {
  const draft = window._wfDraft;
  if (!draft.items.length) return;
  draft.note = document.getElementById('wfNote').value.trim();
  draft.date = document.getElementById('wfDate').value || todayStr();

  if (!S.counters.writeoff) S.counters.writeoff = 0;
  S.counters.writeoff++;
  const totalValue = draft.items.reduce((s, it) => s + (it.qty * it.cost), 0);
  const reason = WRITEOFF_REASONS.find(r => r.id === draft.reason);
  const autoApprove = S.activeRole === 'giam_doc';
  const wf = {
    id: 'WO' + String(S.counters.writeoff).padStart(4, '0'),
    date: draft.date, branch: draft.branch, reason: draft.reason,
    items: draft.items, totalValue, note: draft.note,
    createdBy: ROLES[S.activeRole]?.label || 'anh Kay', createdAt: nowISO(),
    status: autoApprove ? 'approved' : 'pending',
    approvedBy: autoApprove ? ROLES[S.activeRole]?.label : null,
    approvedAt: autoApprove ? nowISO() : null,
  };

  if (autoApprove) {
    draft.items.forEach(it => {
      if (S.inventory[draft.branch]) {
        S.inventory[draft.branch][it.sku] = Math.max(0, (S.inventory[draft.branch][it.sku] || 0) - it.qty);
      }
    });
  }

  S.writeoffs.push(wf);
  addAuditLog('auto', wf.id, `Tạo phiếu hủy ${wf.id} · ${draft.items.length} SKU · ${reason.label} · ${fmtVND(totalValue)}đ${autoApprove?' (tự duyệt)':' (chờ duyệt)'}`);
  saveState();
  window._wfDraft = null;
  closeModal();
  renderWriteoff();
  toast(`✓ ${wf.id} · ${fmtVND(totalValue)}đ${autoApprove?' đã duyệt':' - chờ duyệt'}`, 'success');
}

  const wf = S.writeoffs.find(w => w.id === wfId);
  if (!wf) return;
  const reason = WRITEOFF_REASONS.find(r => r.id === wf.reason);
  const canApprove = wf.status === 'pending' && (S.activeRole === 'giam_doc' || S.activeRole === 'quan_ly_ch');

  openModal(`Phiếu hủy ${wf.id}`, `
    <div class="detail-grid">
      <div><span class="lbl">Ngày tạo</span><span class="val">${fmtDate(wf.date)}</span></div>
      <div><span class="lbl">Chi nhánh</span><span class="val">${BRANCHES.find(b=>b.id===wf.branch)?.name}</span></div>
      <div><span class="lbl">Lý do</span><span class="val">${reason?.icon} ${reason?.label}</span></div>
      <div><span class="lbl">Người tạo</span><span class="val">${wf.createdBy}</span></div>
      <div><span class="lbl">Trạng thái</span><span class="val">${
        wf.status === 'pending' ? '<span class="pill pill-warning">Chờ duyệt</span>' :
        wf.status === 'approved' ? `<span class="pill pill-success">Đã duyệt bởi ${wf.approvedBy}</span>` :
        `<span class="pill pill-danger">Từ chối</span>`
      }</span></div>
      <div><span class="lbl">Tổng thiệt hại</span><span class="val" style="color:var(--danger);font-weight:700">${fmtVND(wf.totalValue)}đ</span></div>
    </div>

    <div class="sec-label">Chi tiết SKU</div>
    <table style="font-size:12px">
      <thead><tr><th class="stt">#</th><th>SKU</th><th>Tên SP</th><th class="num">SL</th><th class="num">Đơn giá</th><th class="num">Thành tiền</th><th>Ghi chú</th></tr></thead>
      <tbody>${wf.items.map((it, i) => {
        const sku = findSku(it.sku);
        return `<tr><td class="stt">${i+1}</td><td class="sku-cell">${it.sku}</td><td>${sku?.name||it.sku}</td><td class="num">${it.qty}</td><td class="num mono">${fmtVND(it.cost)}</td><td class="num"><strong>${fmtVND(it.qty*it.cost)}đ</strong></td><td style="font-size:11px">${it.note||'—'}</td></tr>`;
      }).join('')}</tbody>
    </table>

    ${wf.note ? `<div class="banner banner-info" style="margin-top:14px">📝 ${wf.note}</div>` : ''}
  `, `
    <button class="btn" onclick="closeModal()">Đóng</button>
    ${canApprove ? `<button class="btn btn-warn" onclick="rejectWriteoff('${wf.id}')">✗ Từ chối</button><button class="btn btn-success" onclick="approveWriteoff('${wf.id}')">✓ Duyệt &amp; trừ tồn</button>` : ''}
  `, 'lg');
}

function approveWriteoff(wfId) {
  const wf = S.writeoffs.find(w => w.id === wfId);
  if (!wf || wf.status !== 'pending') return;
  for (const it of wf.items) {
    const stock = S.inventory[wf.branch]?.[it.sku] || 0;
    if (it.qty > stock) { toast(`SKU ${it.sku} chỉ còn ${stock}`, 'error'); return; }
  }
  wf.items.forEach(it => {
    S.inventory[wf.branch][it.sku] = Math.max(0, (S.inventory[wf.branch][it.sku] || 0) - it.qty);
  });
  wf.status = 'approved';
  wf.approvedBy = ROLES[S.activeRole]?.label || 'anh Kay';
  wf.approvedAt = nowISO();
  addAuditLog('auto', wf.id, `✓ Duyệt phiếu hủy ${wf.id} bởi ${wf.approvedBy} - ${fmtVND(wf.totalValue)}đ`);
  saveState();
  closeModal();
  renderWriteoff();
  toast(`✓ Duyệt và trừ tồn ${fmtVND(wf.totalValue)}đ`, 'success');
}

function rejectWriteoff(wfId) {
  const wf = S.writeoffs.find(w => w.id === wfId);
  if (!wf) return;
  if (!confirm(`Từ chối phiếu hủy ${wf.id}?`)) return;
  wf.status = 'rejected';
  wf.rejectedBy = ROLES[S.activeRole]?.label || 'anh Kay';
  wf.rejectedAt = nowISO();
  addAuditLog('auto', wf.id, `✗ Từ chối phiếu hủy ${wf.id}`);
  saveState();
  closeModal();
  renderWriteoff();
  toast(`Đã từ chối`, 'warn');
}

// Bucket SKU vào nhóm dựa trên category + cost
function bucketSKU(sku) {
  const cat = String(sku.category || '').toLowerCase();
  const cost = Number(sku.cost) || 0;
  
  // Hot bucket: FMCG fast-moving (sữa, bánh, đồ uống)
  if (/sữa|bánh|kẹo|mì|bún|đồ uống|nước|kem|yogurt|phô mai/i.test(cat)) {
    return cost > 100000 ? 'fmcg_hot_premium' : 'fmcg_hot';
  }
  // Slow: vật tư, đồ gia dụng, mỹ phẩm
  if (/vật tư|gia dụng|mỹ phẩm|đồ chơi|dép|văn phòng|hóa chất/i.test(cat)) {
    return cost > 100000 ? 'slow_premium' : 'slow';
  }
  // Frozen / lạnh
  if (/đông lạnh|tươi sống|thủy sản|thịt|rau|trái cây/i.test(cat)) {
    return 'fresh';
  }
  // Premium giá cao
  if (cost > 200000) return 'premium';
  // Default
  return 'default';
}

function getAIRuleForSKU(sku) {
  if (!ST.aiRules) return null;
  const bucket = bucketSKU(sku);
  return ST.aiRules[bucket] || ST.aiRules['default'] || null;
}

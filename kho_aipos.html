// ============================================================
// AUTO ORDER - Đề xuất đặt hàng tự động
// Logic: với mỗi SKU, tính tốc độ bán 7 ngày qua. Nếu tồn hiện tại
// đủ < (target_days × velocity) hoặc < min_stock → đề xuất đặt
// theo packsize, group theo NCC.
// ============================================================
// ════════════════════════════════════════════════════════════════
// AUTO ORDER ENGINE — Port từ NCC v2.73 (Newsvendor R-S formula)
// ════════════════════════════════════════════════════════════════
// CÔNG THỨC CHUẨN:
//   reorderPoint = ⌈SPD × LeadTime + SafetyDays⌉
//   needOrder    = (availStock ≤ reorderPoint) ∨ (availStock < displayMin)
//   coverTotal   = LeadTime + SafetyDays + BufferDays
//   qtyRaw       = ⌈SPD × coverTotal × (1+spoilage) × serviceFactor − availStock + max(0, displayMin − availStock)⌉
//   qtyOrder     = roundUp(qtyRaw, packSize)
// ════════════════════════════════════════════════════════════════

const AO_DEFAULT = {
  leadTime:      3,    // ngày NCC giao hàng
  safety:        1,    // ngày dự phòng (nếu hàng thiết yếu +1)
  coverageDays:  2,    // số ngày muốn đủ hàng thêm sau nhận
  buffer:        null, // override coverage (null = tự tính theo NCC.net)
  minOrder:      1,    // SL đặt tối thiểu
  orderMultiple: 1,    // bội số đặt (auto theo cat)
  spoilageRate:  null, // tỷ lệ hư hao (null = auto theo cat)
  serviceFactor: 1.0,  // hệ số dịch vụ
  displayMin:    null, // số đơn vị tối thiểu trưng bày (null = auto theo cat)
};

// Mặc định spoilage + display min theo Nhóm hàng
const AO_CAT_DEFAULTS = {
  // Tươi sống — hư hao cao
  'Trái cây':       { spoilage: 0.12, display: 2 },
  'Rau củ':         { spoilage: 0.15, display: 2 },
  'Thịt':           { spoilage: 0.08, display: 2 },
  'Hải sản':        { spoilage: 0.10, display: 2 },
  'Đông lạnh':      { spoilage: 0.05, display: 3 },
  // Sữa
  'Sữa':            { spoilage: 0.05, display: 3 },
  // Bánh kẹo, snack
  'Bánh kẹo':       { spoilage: 0.02, display: 2 },
  // Khô
  'Mì - Cháo':      { spoilage: 0,    display: 3 },
  'Gia vị':         { spoilage: 0,    display: 1 },
  'Thực phẩm khô':  { spoilage: 0,    display: 1 },
  // Đồ uống
  'Đồ uống':        { spoilage: 0.01, display: 3 },
  // Hóa mỹ phẩm, đồ dùng
  'Hóa mỹ phẩm':    { spoilage: 0,    display: 1 },
  'Đồ dùng':        { spoilage: 0,    display: 1 },
};

function aoGetCatDefaults(cat) {
  if (!cat) return { spoilage: 0.02, display: 1 };
  if (AO_CAT_DEFAULTS[cat]) return AO_CAT_DEFAULTS[cat];
  // Substring match
  const cl = cat.toLowerCase();
  for (const k in AO_CAT_DEFAULTS) {
    if (cl.includes(k.toLowerCase())) return AO_CAT_DEFAULTS[k];
  }
  return { spoilage: 0.02, display: 1 };
}

// Pack rules theo nhóm hàng — áp dụng orderMultiple tự động
const AO_PACK_CAT = {
  'Sữa':        12,
  'Mì - Cháo':  30,
  'Đồ uống':    24,
  'Bánh kẹo':    8,
};

function aoDetectPackRule(cat, name) {
  if (cat && AO_PACK_CAT[cat]) {
    return { group: 'thùng', orderMultiple: AO_PACK_CAT[cat], minOrder: AO_PACK_CAT[cat], allowDecimal: false };
  }
  // Fallback theo tên SP
  const n = (name || '').toLowerCase();
  if (n.includes('mì ly') || n.includes('mì tô')) {
    return { group: 'thùng', orderMultiple: 24, minOrder: 24, allowDecimal: false };
  }
  return { group: 'lẻ', orderMultiple: 1, minOrder: 1, allowDecimal: true };
}

// Cấu hình per-SKU (override AO_DEFAULT) — lưu trong S.aoCfg
function aoGetCfg(sku) {
  const base = { ...AO_DEFAULT };
  const cat = sku.cat || '';
  const autoRule = aoDetectPackRule(cat, sku.name);
  if (autoRule.orderMultiple > 1) {
    base.orderMultiple = autoRule.orderMultiple;
    base.minOrder = autoRule.orderMultiple;
  }
  // Lấy override từ S.aoCfg
  const skuCfg = (S.aoCfg && S.aoCfg[sku.sku]) || {};
  const isManual = skuCfg._manual === true;
  const merged = isManual
    ? { ...base, ...skuCfg }
    : {
        ...base,
        leadTime:      skuCfg.leadTime !== undefined ? skuCfg.leadTime : base.leadTime,
        safety:        skuCfg.safety !== undefined ? skuCfg.safety : base.safety,
        coverageDays:  skuCfg.coverageDays !== undefined ? skuCfg.coverageDays : base.coverageDays,
        buffer:        skuCfg.buffer !== undefined ? skuCfg.buffer : base.buffer,
      };
  // Apply category defaults
  const catDef = aoGetCatDefaults(cat);
  if (merged.spoilageRate === null || merged.spoilageRate === undefined) merged.spoilageRate = catDef.spoilage;
  if (merged.displayMin === null || merged.displayMin === undefined) merged.displayMin = catDef.display;
  return { ...merged, _packGroup: isManual ? 'manual' : autoRule.group };
}

// Calc Review Period từ NCC orderDays (cách bao nhiêu ngày NCC nhận đơn 1 lần)
function aoCalcReviewPeriod(nccId) {
  const ncc = findNcc(nccId);
  if (!ncc) return 7;
  const daysPerWeek = (ncc.orderDays || []).length;
  if (daysPerWeek > 0) {
    return Math.max(1, Math.round(7 / daysPerWeek));
  }
  // Fallback theo paymentTerms
  return ncc.paymentTerms || 7;
}

// Smart SPD = weighted avg(SPD 7n, SPD 30d)
function aoCalcSmartSPD(skuId, branch) {
  const now = Date.now();
  const d7 = now - 7 * 86400000;
  const d30 = now - 30 * 86400000;
  const isAll = branch === 'ALL' || !branch;

  let qty7 = 0, qty30 = 0;
  (S.orders || []).forEach(o => {
    if (!isAll && o.branch !== branch) return; // Nếu ALL: tính tất cả CN
    const t = new Date(o.date).getTime();
    o.items.forEach(it => {
      if (it.sku !== skuId) return;
      if (t >= d7) qty7 += it.qty;
      if (t >= d30) qty30 += it.qty;
    });
  });
  const spd7 = qty7 / 7;
  const spd30 = qty30 / 30;

  if (spd7 <= 0 && spd30 <= 0) return 0;
  if (spd7 <= 0) return spd30;
  if (spd30 <= 0) return spd7;
  if (spd30 >= spd7 * 2) return spd7 * 1.2;
  if (spd7 >= spd30 * 2) return spd7;
  return 0.7 * spd7 + 0.3 * spd30;
}

// Hàng thiết yếu (tăng safety +1)
function aoIsEssential(sku) {
  const essentialCats = new Set(['Sữa', 'Mì - Cháo', 'Gia vị', 'Thực phẩm khô']);
  if (essentialCats.has(sku.cat)) return true;
  const kw = ['gạo', 'mì', 'sữa', 'nước mắm', 'dầu ăn', 'muối', 'đường', 'trứng'];
  const n = (sku.name || '').toLowerCase();
  return kw.some(k => n.includes(k));
}

function computeAutoOrder() {
  const branch = S.activeBranch;
  const isAll = branch === 'ALL';

  // Tồn: nếu ALL thì sum tồn tất cả CN active
  const getStockFor = (skuId) => {
    if (isAll) return BRANCHES.reduce((s, b) => s + (S.inventory[b.id]?.[skuId] || 0), 0);
    return S.inventory[branch]?.[skuId] || 0;
  };

  // PO đang về - không đề xuất lại (lọc theo branch)
  const inTransit = {};
  S.pos.filter(po => po.status === 'sent' || po.status === 'partial').forEach(po => {
    if (!isAll && po.branch !== branch) return; // Nếu ALL thì cộng inbound từ tất cả CN
    po.items.forEach(it => {
      const remaining = (it.qty || 0) - (it.recv || 0);
      if (remaining > 0) inTransit[it.sku] = (inTransit[it.sku] || 0) + remaining;
    });
  });

  const grouped = {};

  S.skus.forEach(sku => {
    const cfg = aoGetCfg(sku);
    const stock = getStockFor(sku.sku);
    const inbound = inTransit[sku.sku] || 0;
    const availStock = stock + inbound;

    // SPD smart
    const spdSmart = aoCalcSmartSPD(sku.sku, branch);

    // Review period từ NCC
    const reviewPer = aoCalcReviewPeriod(sku.ncc);

    // Safety days
    const isEssential = aoIsEssential(sku);
    const safetyDays = cfg.safety + (isEssential ? 1 : 0);

    // Effective review (auto-tune theo NCC net)
    const ncc = findNcc(sku.ncc);
    const nccNet = ncc?.paymentTerms || 7;
    const effectiveReview = Math.min(reviewPer, 2 * nccNet);

    // Buffer days
    const bufferDays = (cfg.buffer != null && cfg.buffer >= 0) ? Number(cfg.buffer) : effectiveReview;
    const coverTotal = cfg.leadTime + safetyDays + bufferDays;

    // Reorder point = SPD × leadTime + safety
    const reorderPoint = Math.ceil(spdSmart * cfg.leadTime + safetyDays);

    // Days left
    const daysLeft = spdSmart > 0 ? Math.round(availStock / spdSmart * 10) / 10 : 999;

    // Trigger
    const needOrder = availStock <= reorderPoint || availStock < cfg.displayMin;
    if (!needOrder) return;

    // Newsvendor formula
    const baseDemand = spdSmart * coverTotal * (1 + cfg.spoilageRate) * cfg.serviceFactor;
    const displayNeed = Math.max(0, cfg.displayMin - availStock);
    let qtyRaw = Math.ceil(baseDemand - availStock + displayNeed);

    qtyRaw = Math.max(0, qtyRaw);
    if (qtyRaw > 0 && qtyRaw < cfg.minOrder) qtyRaw = cfg.minOrder;
    // Hết hàng tuyệt đối → đặt ít nhất minOrder hoặc displayMin
    if (stock === 0 && qtyRaw === 0) {
      qtyRaw = Math.max(cfg.minOrder || 1, cfg.displayMin || 0, 1);
    }
    const mult = cfg.orderMultiple || 1;
    const qtyOrder = mult > 1 ? Math.ceil(qtyRaw / mult) * mult : qtyRaw;
    if (qtyOrder <= 0) return;

    // Status
    let status = 'normal';
    if (stock === 0) status = 'urgent';
    else if (spdSmart > 0 && daysLeft < cfg.leadTime) status = 'urgent';

    // Reason
    let reason;
    if (stock === 0) reason = 'Hết hàng';
    else if (stock < (sku.min || cfg.displayMin)) reason = 'Dưới mức an toàn';
    else if (daysLeft < cfg.leadTime) reason = `Sắp hết (${daysLeft}d)`;
    else reason = 'Đến chu kỳ đặt';

    const nccId = sku.ncc || 'NCC000';
    if (!grouped[nccId]) grouped[nccId] = { ncc: nccId, items: [], total: 0 };
    grouped[nccId].items.push({
      sku: sku.sku, name: sku.name, brand: sku.brand, cat: sku.cat, unit: sku.unit || 'cái',
      pack: sku.pack, cost: sku.cost,
      stock, inbound, availStock, spd: spdSmart, daysLeft, reorderPoint,
      coverTotal, qtyRaw, qty: qtyOrder, amount: qtyOrder * sku.cost,
      packs: Math.max(1, Math.ceil(qtyOrder / sku.pack)),
      reason, status,
      cfg,
    });
    grouped[nccId].total += qtyOrder * sku.cost;
  });

  return grouped;
}

function createPOFromAuto(nccId) {
  if (isAllBranches()) {
    toast(`⚠ Vui lòng chọn 1 chi nhánh cụ thể (${getActiveBranches().map(b=>b.id).join('/')}) trước khi tạo PO`, 'error');
    return;
  }
  const grouped = computeAutoOrder();
  const g = grouped[nccId];
  if (!g) { toast('Không có sản phẩm cần đặt cho NCC này', 'warn'); return; }
  S.counters.po++;
  const id = 'PO' + String(S.counters.po).padStart(5, '0');
  const ncc = findNcc(nccId);
  const expected = new Date();
  expected.setDate(expected.getDate() + (ncc?.leadDays || 2));
  const po = {
    id, date: todayStr(), branch: S.activeBranch, ncc: nccId, status: 'draft',
    items: g.items.map(it => ({ sku: it.sku, qty: it.qty, cost: it.cost, recv: 0 })),
    expected: expected.toISOString().slice(0, 10),
    sentAt: null, recvAt: null, note: 'Tạo từ Auto Order',
  };
  S.pos.push(po);
  addAuditLog('auto', id, `Tạo PO từ Auto Order: ${ncc.short} · ${g.items.length} SKU · ${fmtVND(g.total)}đ`);
  saveState();
  toast(`Đã tạo ${id} cho ${ncc.short} · ${fmtVND(g.total)}đ`, 'success');
  setTab('po');
}

function aoUpdatePOLine(pi, li, val) {
  const qty = Math.max(0, parseInt(val) || 0);
  const po = window._aoPOGroups?.[pi];
  if (!po) return;
  po.lines[li].order_qty = qty;
  po.lines[li].amount = qty * po.lines[li].unit_price;
  po.total_qty = po.lines.reduce((s, l) => s + l.order_qty, 0);
  po.total_amount = po.lines.reduce((s, l) => s + l.amount, 0);
  // Update DOM
  const amtEl = document.getElementById(`po-amt-${pi}-${li}`);
  if (amtEl) amtEl.textContent = fmtVND(po.lines[li].amount) + 'đ';
  const totalEl = document.getElementById(`po-total-${pi}`);
  if (totalEl) totalEl.textContent = fmtVND(po.total_amount) + 'đ';
}

function aoPlaceSinglePO(pi) {
  const po = window._aoPOGroups?.[pi];
  if (!po) return;
  const validLines = po.lines.filter(l => l.order_qty > 0);
  if (validLines.length === 0) { toast('PO này không có dòng nào > 0', 'error'); return; }
  // Lưu note
  const noteEl = document.getElementById(`po-note-${pi}`);
  const note = noteEl ? noteEl.value.trim() : '';

  S.counters.po++;
  const newPO = {
    id: 'PO' + String(S.counters.po).padStart(5, '0'),
    date: todayStr(),
    branch: po.receiving_branch,
    ncc: po.supplier_id,
    status: 'draft',
    items: validLines.map(l => ({ sku: l.sku, qty: l.order_qty, cost: l.unit_price, recv: 0 })),
    expected: po.expected_delivery,
    sentAt: null, recvAt: null,
    note: note || `⚡ Auto Order: ${validLines.length} SKU, ${fmtVND(po.total_amount)}đ`,
  };
  S.pos.push(newPO);
  addAuditLog('auto', newPO.id, `Đặt PO Auto: ${po.supplier_short} · ${validLines.length} SKU · ${fmtVND(po.total_amount)}đ`);
  // Mark đã placed
  po._placed = true;
  // Disable card
  const card = document.getElementById(`po-group-${pi}`);
  if (card) {
    card.style.opacity = '0.5';
    card.style.pointerEvents = 'none';
    const head = card.querySelector('div');
    if (head) head.style.background = 'var(--success-soft)';
  }
  saveState();
  toast(`✓ Đã tạo ${newPO.id} cho ${po.supplier_short}`, 'success');
}

function aoPlaceAllPOConfirm() {
  const groups = window._aoPOGroups || [];
  const pending = groups.filter(p => !p._placed);
  if (pending.length === 0) { toast('Tất cả PO đã được đặt', 'warn'); return; }
  if (!confirm(`Tạo ${pending.length} PO ở trạng thái 'Nháp'? Anh có thể review và gửi NCC sau.`)) return;
  let count = 0, totalAmt = 0;
  pending.forEach((po, pi) => {
    const validLines = po.lines.filter(l => l.order_qty > 0);
    if (validLines.length === 0) return;
    S.counters.po++;
    const newPO = {
      id: 'PO' + String(S.counters.po).padStart(5, '0'),
      date: todayStr(),
      branch: po.receiving_branch,
      ncc: po.supplier_id,
      status: 'draft',
      items: validLines.map(l => ({ sku: l.sku, qty: l.order_qty, cost: l.unit_price, recv: 0 })),
      expected: po.expected_delivery,
      sentAt: null, recvAt: null,
      note: `⚡ Auto Order hàng loạt: ${validLines.length} SKU`,
    };
    S.pos.push(newPO);
    count++;
    totalAmt += po.total_amount;
    po._placed = true;
  });
  addAuditLog('auto', `${count} PO`, `⚡ Đặt ${count} PO Auto Order hàng loạt · tổng ${fmtVND(totalAmt)}đ`);
  saveState();
  closeModal();
  toast(`✓ Đã tạo ${count} PO · tổng ${fmtVND(totalAmt)}đ`, 'success');
  setTab('po');
}

  const map = {

    'VT': 'Vicomart Vinh Thành — Thôn Vinh Thành, Xã Hương Vinh, TP. Huế, TT-Huế',

  return map[branchId] || 'Vicomart — TT Huế';

  rows.push(['','','','','','','','','']);

  // Totals

  rows.push(['','','','','','Tổng tiền hàng:','','', po.total_amount]);
  rows.push(['','','','','','Giảm giá / Chiết khấu:','','', 0]);
  rows.push(['','','','','','TỔNG CỘNG THANH TOÁN:','','', po.total_amount]);

  rows.push(['','','','','','','','','']);

  // Terms

  [
    '1. Đơn hàng có giá trị khi có xác nhận của cả hai bên.',
    '2. Hóa đơn giao hàng phải ghi rõ Mã PO của đơn hàng này.',
    '3. Hàng hóa giao phải đúng quy cách, đủ số lượng, còn hạn sử dụng tối thiểu 2/3.',
    '4. Mọi sai lệch phải được thông báo trong vòng 24 giờ sau khi nhận hàng.',
    '5. Chi phí vận chuyển và đóng gói do Nhà cung cấp chịu trách nhiệm.',
  ].forEach(t => rows.push([t,'','','','','','','','']));

  rows.push(['','','','','','','','','']);

  // Signatures
  rows.push(['ĐẠI DIỆN NHÀ CUNG CẤP','','','','ĐẠI DIỆN VICOMART','','','','']);
  rows.push(['','','','','','','','','']);
  rows.push(['','','','','','','','','']);
  rows.push(['Họ tên: _______________________','','','','Họ tên: _______________________','','','','']);
  rows.push(['Ngày ký: ____/____/________','','','','Ngày ký: ____/____/________','','','','']);

  // Tạo worksheet
  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Column widths
  ws['!cols'] = [
    {wch:5},{wch:38},{wch:16},{wch:8},{wch:9},{wch:9},{wch:6},{wch:14},{wch:16}

  // Merges
  const M = (r,c,re,ce) => ({s:{r,c},e:{r:re,c:ce}});

    M(0,0,0,8), M(1,0,1,8), M(2,0,2,8), // Title rows
    M(4,0,4,4), M(4,5,4,8),               // Section headers
    M(5,1,5,4), M(6,1,6,4), M(7,1,7,4), M(8,1,8,4), // Supplier vals
    M(5,6,5,8), M(6,6,6,8), M(7,6,7,8), M(8,6,8,8), // PO vals

  // Cell styling helpers
  const numFmt = '#,##0';

// ── XUẤT PDF (mở preview window + download) ──────────────────────
async function aoExportPDF(pi) {
  const result = aoBuildPDFHtml(pi);
  if (!result) { toast('❌ Không build được HTML PDF', 'error'); return; }
  const { html, poNo, ncc } = result;

  const win = window.open('', '_blank', 'width=900,height=700,scrollbars=yes');
  if (!win) {
    toast('⚠ Trình duyệt chặn popup — vui lòng cho phép popup!', 'error');
    return;
  }

  // Inject jsPDF + html2canvas + downloadPdfFile function
  const filename = `${poNo}_${(ncc || 'NCC').replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40)}_${new Date().toISOString().slice(0, 10)}.pdf`;
  const scriptInject = `
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"><\/script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"><\/script>
    <script>
      window._pdfFilename = ${JSON.stringify(filename)};
      window._downloadPdfFile = async function() {
        try {
          const btn = document.querySelector('button[onclick*="_downloadPdfFile"]');
          const origText = btn ? btn.innerHTML : "";
          if (btn) { btn.innerHTML = "⏳ Đang tạo PDF..."; btn.disabled = true; }
          if (typeof html2canvas !== "function" || typeof window.jspdf === "undefined") {
            alert("❌ Thư viện chưa tải xong — đợi 2 giây và thử lại");
            if (btn) { btn.innerHTML = origText; btn.disabled = false; }
            return;
          }
          const pageEl = document.querySelector(".page");
          if (!pageEl) { alert("❌ Không tìm thấy nội dung PO"); return; }
          const noPrintEls = document.querySelectorAll(".no-print");
          noPrintEls.forEach(el => el.style.display = "none");
          await new Promise(r => setTimeout(r, 100));
          const canvas = await html2canvas(pageEl, { scale: 2, useCORS: true, backgroundColor: "#ffffff", logging: false });
          noPrintEls.forEach(el => el.style.display = "");
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
          const pdfW = 210, pdfH = 297;
          const imgW = pdfW;
          const imgH = (canvas.height / canvas.width) * imgW;
          const imgData = canvas.toDataURL("image/jpeg", 0.92);
          if (imgH <= pdfH) {
            pdf.addImage(imgData, "JPEG", 0, 0, imgW, imgH);
          } else {
            let heightLeft = imgH; let position = 0;
            pdf.addImage(imgData, "JPEG", 0, position, imgW, imgH);
            heightLeft -= pdfH;
            while (heightLeft > 0) {
              position -= pdfH;
              pdf.addPage();
              pdf.addImage(imgData, "JPEG", 0, position, imgW, imgH);
              heightLeft -= pdfH;
            }
          }
          pdf.save(window._pdfFilename);
          if (btn) { btn.innerHTML = "✅ Đã tải PDF!"; btn.style.background = "#16a34a"; }
          setTimeout(() => { if (btn) { btn.innerHTML = origText; btn.style.background = "#0071CE"; btn.disabled = false; } }, 2500);
        } catch(e) {
          console.error("[DownloadPDF]", e);
          alert("❌ Lỗi tạo PDF: " + e.message);
          const btn = document.querySelector('button[onclick*="_downloadPdfFile"]');
          if (btn) { btn.innerHTML = "📥 Tải PDF về máy"; btn.disabled = false; }
        }
      };
    <\/script>`;

  const htmlWithScript = html.replace('</head>', scriptInject + '</head>');
  win.document.write(htmlWithScript);
  win.document.close();
  toast('✅ Đã mở preview — Click "📥 Tải PDF" để tải file về máy', 'success');
  addAuditLog('auto', poNo, `Xuất PDF PO cho ${ncc}`);
}

// ════ Copy ảnh vào clipboard ════
async function vmCopyImageToClipboard() {
  if (!window._vmLastImageBlob) { toast('Không có ảnh để copy', 'error'); return; }
  try {
    if (navigator.clipboard && window.ClipboardItem) {
      await navigator.clipboard.write([
        new ClipboardItem({ 'image/png': window._vmLastImageBlob })
      ]);
      toast(`✅ Đã copy ảnh ${window._vmLastPONum} — paste vào Zalo (Ctrl+V)`, 'success');
    } else {
      throw new Error('Clipboard API not supported');
    }
  } catch (e) {
    toast('⚠ Trình duyệt không hỗ trợ — vui lòng click phải vào ảnh → Copy image', 'warn');
  }
}

// ════ Tải PNG ════
function vmDownloadImage() {
  if (!window._vmLastImageUrl) return;
  const a = document.createElement('a');
  a.href = window._vmLastImageUrl;
  a.download = `${window._vmLastPONum}.png`;
  a.click();
  toast(`✅ Đã tải ${window._vmLastPONum}.png`, 'success');
}

// ════ Tải PDF — chuyên nghiệp ════
async function vmDownloadPOPDF() {
  if (!window.jspdf) {
    toast('⚠ Đang tải thư viện PDF...', 'warn');
    return;
  }
  if (!window._vmLastImageUrl) return;
  const po = window._vmLastPO;
  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const imgProps = pdf.getImageProperties(window._vmLastImageUrl);
    const pdfWidth = 190; // 210 - margin 10x2
    const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
    pdf.addImage(window._vmLastImageUrl, 'PNG', 10, 10, pdfWidth, Math.min(pdfHeight, 277));
    pdf.save(`${po.po_number}_${(po.supplier_short || 'NCC').replace(/[^a-zA-Z0-9]/g,'_')}.pdf`);
    toast(`✅ Đã tải ${po.po_number}.pdf`, 'success');
    addAuditLog('auto', po.po_number, `Tải PDF cho ${po.supplier_name}`);
  } catch (e) {
    toast('❌ Lỗi tạo PDF: ' + e.message, 'error');
  }
}

// ════ Web Share API (mobile) ════
async function vmShareWebShare() {
  if (!window._vmLastImageBlob) return;
  if (!navigator.share) {
    toast('⚠ Trình duyệt không hỗ trợ Share — dùng Copy ảnh thay thế', 'warn');
    return;
  }
  try {
    const file = new File([window._vmLastImageBlob], `${window._vmLastPONum}.png`, { type: 'image/png' });
    await navigator.share({
      title: `Đơn đặt hàng ${window._vmLastPONum}`,
      text: `Đơn đặt hàng từ Vicomart — ${window._vmLastPONum}`,
      files: [file],
    });
    toast('✅ Đã chia sẻ', 'success');
  } catch (e) {
    if (e.name !== 'AbortError') toast('⚠ ' + e.message, 'warn');
  }
}

// ════ Tải PDF trực tiếp (không qua image preview) ════
async function aoDownloadPOPDF(pi) {
  const po = window._aoPOGroups?.[pi];
  if (!po) return;
  if (!window.jspdf) { toast('⚠ Thư viện PDF chưa tải', 'warn'); return; }
  if (typeof html2canvas === 'undefined') { toast('⚠ Thư viện canvas chưa tải', 'warn'); return; }
  // Dùng aoCopyImagePO để render rồi convert PDF
  await aoCopyImagePO(pi);
  setTimeout(() => vmDownloadPOPDF(), 600);
}

}

function aoCfgRenderSKU() {
  let list = S.skus.map(s => ({ ...s, cfg: aoGetCfg(s) }));

  // Filters
  if (aoCfgSearch) {
    const q = aoCfgSearch.toLowerCase();
    list = list.filter(s => s.name.toLowerCase().includes(q) || s.sku.toLowerCase().includes(q) || (s.brand||'').toLowerCase().includes(q));
  }
  if (aoCfgFilterNCC) list = list.filter(s => s.ncc === aoCfgFilterNCC);
  if (aoCfgFilterCat) list = list.filter(s => s.cat === aoCfgFilterCat);
  if (aoCfgFilterQC === 'thung') list = list.filter(s => s.cfg._packGroup === 'thùng');
  else if (aoCfgFilterQC === 'le') list = list.filter(s => s.cfg._packGroup === 'lẻ');
  else if (aoCfgFilterQC === 'manual') list = list.filter(s => s.cfg._packGroup === 'manual');

  const total = list.length;
  const totalPages = Math.ceil(total / AO_CFG_PER_PAGE) || 1;
  if (aoCfgPage > totalPages) aoCfgPage = 1;
  const startIdx = (aoCfgPage - 1) * AO_CFG_PER_PAGE;
  const data = list.slice(startIdx, startIdx + AO_CFG_PER_PAGE);

  const allNCC = [...new Set(S.skus.map(s => s.ncc))].sort();
  const allCats = [...new Set(S.skus.map(s => s.cat))].sort();

  return `
    <div class="banner banner-warning">
      ⚠ Override per-SKU sẽ ưu tiên hơn cài đặt toàn cục. SKU đã edit → highlight vàng + có nút Reset.
    </div>

    <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:10px;margin-bottom:10px">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="input" id="aoCfgSearchInput" placeholder="Tìm SKU / tên / thương hiệu..." value="${aoCfgSearch}">
      </div>
      <select class="select" onchange="aoCfgFilterNCC=this.value;aoCfgPage=1;aoOpenSettingsModal()">
        <option value="">Tất cả NCC</option>
        ${allNCC.map(id => {
          const n = findNcc(id);
          return `<option value="${id}" ${aoCfgFilterNCC===id?'selected':''}>${n?.short || id}</option>`;
        }).join('')}
      </select>
      <select class="select" onchange="aoCfgFilterCat=this.value;aoCfgPage=1;aoOpenSettingsModal()">
        <option value="">Tất cả nhóm</option>
        ${allCats.map(c => `<option value="${c}" ${aoCfgFilterCat===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <select class="select" onchange="aoCfgFilterQC=this.value;aoCfgPage=1;aoOpenSettingsModal()">
        <option value="">Tất cả pack</option>
        <option value="thung" ${aoCfgFilterQC==='thung'?'selected':''}>📦 Thùng</option>
        <option value="le" ${aoCfgFilterQC==='le'?'selected':''}>📋 Lẻ</option>
        <option value="manual" ${aoCfgFilterQC==='manual'?'selected':''}>⭐ Manual</option>
      </select>
      <span style="display:flex;align-items:center;font-size:11px;color:var(--text-3);white-space:nowrap">${total} SP · Tr ${aoCfgPage}/${totalPages}</span>
    </div>

    <div style="overflow-x:auto;border:1px solid var(--border);border-radius:6px;max-height:480px;overflow-y:auto">
      <table style="font-size:11px;min-width:1300px;margin:0">
        <thead><tr style="background:var(--surface-2);position:sticky;top:0;z-index:10">
          <th class="stt">#</th>
          <th>SKU</th>
          <th style="min-width:200px">Tên SP</th>
          <th>NCC</th>
          <th>Nhóm</th>
          <th title="Pack size + label">Quy cách</th>
          <th class="num" title="Lead Time (ngày)">LT</th>
          <th class="num" title="Safety days">SS</th>
          <th class="num" title="Coverage / Buffer days">Cov</th>
          <th class="num" title="Min Order">Min</th>
          <th class="num" title="Margin (%)">Margin</th>
          <th class="num" title="Spoilage rate (%)">Hư hao</th>
          <th class="num" title="Display Min">DispMin</th>
          <th></th>
        </tr></thead>
        <tbody>${data.map((s, i) => {
          const idx = startIdx + i;
          const isManual = (S.aoCfg?.[s.sku]?._manual === true);
          const ncc = findNcc(s.ncc);
          const margin = (S.aoCfg?.[s.sku]?.margin) ?? AO_MARGIN_MAP[s.cat] ?? 0.18;
          const _label = S.aoCfg?.[s.sku]?._label;
          const packBadge = isManual
            ? `<span class="pill pill-warning" style="font-size:10px">⭐ ${_label || ('×' + s.cfg.orderMultiple)}</span>`
            : s.cfg._packGroup === 'thùng'
            ? `<span class="pill pill-info" style="font-size:10px">📦 Thùng ×${s.cfg.orderMultiple}</span>`
            : `<span class="pill pill-muted" style="font-size:10px">📋 Lẻ</span>`;
          // Tìm preset matching
          const matchPreset = AO_PACK_PRESETS.find(p => p.value === s.cfg.orderMultiple);
          const isCustomPack = !matchPreset;
          return `<tr style="${isManual?'background:#fef9c3':''}">
            <td class="stt">${idx + 1}</td>
            <td><strong class="mono" style="font-size:10px">${s.sku}</strong></td>
            <td><strong style="font-size:11px">${s.name}</strong>${s.kvi||s.promo?`<div style="font-size:9.5px;margin-top:1px">${s.kvi?'<span style="color:var(--danger);font-weight:700">[KVI]</span> ':''}${s.promo?'<span style="color:var(--warn);font-weight:700">[KM]</span>':''}</div>`:''}</td>
            <td style="font-size:10.5px;color:var(--text-2)">${ncc?.short || s.ncc}</td>
            <td><span class="pill pill-muted" style="font-size:9.5px">${s.cat}</span></td>
            <td>
              <div style="display:flex;align-items:center;gap:4px">
                ${packBadge}
                <select onchange="aoOnPackChange('${s.sku}',this)" style="width:90px;padding:2px 4px;font-size:10px;border:1px solid var(--border-strong);border-radius:4px;background:var(--surface)">
                  ${AO_PACK_PRESETS.map(p => `<option value="${p.value}" ${(!isCustomPack && s.cfg.orderMultiple===p.value)?'selected':''}>×${p.value} ${p.label}</option>`).join('')}
                  <option value="custom" ${isCustomPack?'selected':''}>✏️ Tùy...</option>
                </select>
                ${isCustomPack ? `<input type="number" min="1" max="999" value="${s.cfg.orderMultiple}" onchange="aoCfgSetSku('${s.sku}','orderMultiple',this.value);aoCfgSetSku('${s.sku}','minOrder',this.value)" style="width:50px;padding:2px 4px;font-size:10px;border:1px solid var(--warn);border-radius:4px;text-align:center;background:#fffbeb">` : ''}
              </div>
            </td>
            <td class="num"><input type="number" value="${s.cfg.leadTime}" min="0" max="30" onchange="aoCfgSetSku('${s.sku}','leadTime',this.value)" class="cell-input" style="width:50px"></td>
            <td class="num"><input type="number" value="${s.cfg.safety}" min="0" max="14" onchange="aoCfgSetSku('${s.sku}','safety',this.value)" class="cell-input" style="width:50px"></td>
            <td class="num"><input type="number" value="${s.cfg.coverageDays}" min="0" max="30" onchange="aoCfgSetSku('${s.sku}','coverageDays',this.value)" class="cell-input" style="width:50px"></td>
            <td class="num"><input type="number" value="${s.cfg.minOrder}" min="1" max="999" onchange="aoCfgSetSku('${s.sku}','minOrder',this.value)" class="cell-input" style="width:55px"></td>
            <td class="num"><input type="number" value="${(margin*100).toFixed(0)}" min="0" max="50" onchange="aoCfgSetSku('${s.sku}','margin',(parseFloat(this.value)||0)/100)" class="cell-input" style="width:50px"></td>
            <td class="num"><input type="number" value="${(s.cfg.spoilageRate*100).toFixed(0)}" min="0" max="50" onchange="aoCfgSetSku('${s.sku}','spoilageRate',(parseFloat(this.value)||0)/100)" class="cell-input" style="width:50px"></td>
            <td class="num"><input type="number" value="${s.cfg.displayMin}" min="0" max="20" onchange="aoCfgSetSku('${s.sku}','displayMin',this.value)" class="cell-input" style="width:50px"></td>
            <td>${isManual ? `<button class="btn btn-sm btn-ghost" onclick="aoCfgResetSku('${s.sku}')" title="Reset SKU này">🔄</button>` : ''}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>

    <!-- Pagination -->
    ${totalPages > 1 ? `
    <div style="display:flex;justify-content:center;gap:4px;margin-top:10px;align-items:center">
      <button class="btn btn-sm" ${aoCfgPage===1?'disabled':''} onclick="aoCfgPage=Math.max(1,aoCfgPage-1);aoOpenSettingsModal()">← Trước</button>
      ${Array.from({length: Math.min(7, totalPages)}, (_, i) => {
        let p;
        if (totalPages <= 7) p = i + 1;
        else if (aoCfgPage <= 4) p = i + 1;
        else if (aoCfgPage >= totalPages - 3) p = totalPages - 6 + i;
        else p = aoCfgPage - 3 + i;
        return `<button class="btn btn-sm ${aoCfgPage===p?'btn-primary':''}" onclick="aoCfgPage=${p};aoOpenSettingsModal()">${p}</button>`;
      }).join('')}
      <button class="btn btn-sm" ${aoCfgPage===totalPages?'disabled':''} onclick="aoCfgPage=Math.min(${totalPages},aoCfgPage+1);aoOpenSettingsModal()">Sau →</button>
    </div>
    ` : ''}
  `;
}

function aoOnPackChange(skuId, sel) {
  const val = sel.value;
  if (val === 'custom') {
    // Toggle custom input — re-render
    aoCfgSetSku(skuId, 'orderMultiple', 1);
    aoOpenSettingsModal();
    return;
  }
  const v = parseInt(val);
  if (!isNaN(v) && v > 0) {
    aoCfgSetSku(skuId, 'orderMultiple', v);
    aoCfgSetSku(skuId, 'minOrder', v);
    const preset = AO_PACK_PRESETS.find(p => p.value === v);
    if (preset && S.aoCfg[skuId]) S.aoCfg[skuId]._label = preset.label;
    aoOpenSettingsModal();
  }
}

function aoCfgSaveGlobal() {
  const lt = parseInt(document.getElementById('aocfgLT').value) || 3;
  const safety = parseInt(document.getElementById('aocfgSafety').value) || 1;
  const cov = parseInt(document.getElementById('aocfgCov').value) || 2;
  const svc = parseFloat(document.getElementById('aocfgSvc').value) || 1.0;

  AO_DEFAULT.leadTime = lt;
  AO_DEFAULT.safety = safety;
  AO_DEFAULT.coverageDays = cov;
  AO_DEFAULT.serviceFactor = svc;

  S.aoSettings = { leadTime: lt, safety, coverageDays: cov, serviceFactor: svc };
  addAuditLog('auto', 'AO_GLOBAL', `Cập nhật cấu hình AO: LT=${lt}d Safety=${safety}d Cover=${cov}d Service=${svc}`);
  saveState();
  toast('✓ Đã lưu cấu hình AO toàn cục', 'success');
  closeModal();
  if (currentTab === 'autoorder') renderAutoOrder();
}

function aoCfgResetAll() {
  if (!confirm('Reset TẤT CẢ cấu hình AO về mặc định? Sẽ xóa cả override per-SKU.')) return;
  S.aoCfg = {};
  S.aoSettings = {};
  AO_DEFAULT.leadTime = 3;
  AO_DEFAULT.safety = 1;
  AO_DEFAULT.coverageDays = 2;
  AO_DEFAULT.serviceFactor = 1.0;
  addAuditLog('auto', 'AO_GLOBAL', 'Reset toàn bộ cấu hình AO');
  saveState();
  toast('Đã reset', 'success');
  closeModal();
  if (currentTab === 'autoorder') renderAutoOrder();
}

function aoCfgSetSku(skuId, field, value) {
  if (!S.aoCfg) S.aoCfg = {};
  if (!S.aoCfg[skuId]) S.aoCfg[skuId] = {};
  const v = parseFloat(value);
  S.aoCfg[skuId][field] = isNaN(v) ? value : v;
  S.aoCfg[skuId]._manual = true;
  saveState();
}

function aoCfgResetSku(skuId) {
  if (S.aoCfg && S.aoCfg[skuId]) {
    delete S.aoCfg[skuId];
    saveState();
    aoOpenSettingsModal();
    toast(`Đã reset ${skuId}`, 'success');
  }
}

// ════════════════════════════════════════════════════════════════
// BULK APPLY (port chuẩn từ NCC v2.73)
// ════════════════════════════════════════════════════════════════
function aoBulkApply(type) {
  // type: 'ncc' | 'cat'
  const selVal = document.getElementById(`bulk${type==='ncc'?'Ncc':'Cat'}Sel`).value;
  if (!selVal) { toast(`Chưa chọn ${type==='ncc'?'NCC':'Nhóm hàng'}`, 'error'); return; }

  const qcSel = document.getElementById(`bulk${type==='ncc'?'Ncc':'Cat'}Qc`);
  const qcCustom = document.getElementById(`bulk${type==='ncc'?'Ncc':'Cat'}Custom`);
  const labelInp = document.getElementById(`bulk${type==='ncc'?'Ncc':'Cat'}Label`);

  // Custom có ưu tiên hơn dropdown
  const customVal = parseInt(qcCustom?.value) || 0;
  const selectVal = parseInt(qcSel?.value) || 0;
  let qcVal = customVal > 0 ? customVal : (selectVal > 0 ? selectVal : 1);

  // Auto-generate label nếu user không nhập
  let label = labelInp?.value?.trim() || '';
  if (!label) {
    const preset = AO_PACK_PRESETS.find(p => p.value === qcVal);
    label = preset ? preset.label : (qcVal === 1 ? 'Lẻ' : qcVal >= 12 ? `Thùng ${qcVal}` : qcVal >= 6 ? `Lốc ${qcVal}` : `Gói ${qcVal}`);
  }

  // Lọc SKU target
  const targets = S.skus.filter(s => {
    if (type === 'ncc') return s.ncc === selVal;
    return s.cat === selVal;
  });
  if (targets.length === 0) { toast(`Không có SKU nào khớp`, 'error'); return; }

  let count = 0;
  if (!S.aoCfg) S.aoCfg = {};
  targets.forEach(s => {
    if (!S.aoCfg[s.sku]) S.aoCfg[s.sku] = {};
    S.aoCfg[s.sku].orderMultiple = qcVal;
    S.aoCfg[s.sku].minOrder = qcVal;
    S.aoCfg[s.sku]._manual = true;
    if (label) S.aoCfg[s.sku]._label = label;
    count++;
  });

  const targetName = type === 'ncc' ? findNcc(selVal)?.name : selVal;
  addAuditLog('auto', `Bulk ${type}`, `Áp dụng ×${qcVal} (${label}) cho ${count} SKU thuộc ${targetName}`);
  saveState();
  toast(`✓ Đã áp dụng ×${qcVal} ${label} cho ${count} SKU`, 'success');
  aoOpenSettingsModal();
}

function aoBulkApplyDefaults() {
  const lt = document.getElementById('bulkAllLT').value;
  const ss = document.getElementById('bulkAllSS').value;
  const cov = document.getElementById('bulkAllCov').value;
  const svc = document.getElementById('bulkAllSvc').value;

  if (!lt && !ss && !cov && !svc) { toast('Chưa nhập gì cả', 'error'); return; }

  if (!confirm(`Áp dụng cho TẤT CẢ ${S.skus.length} SKU? Các giá trị bỏ trống sẽ giữ nguyên.`)) return;

  if (!S.aoCfg) S.aoCfg = {};
  let count = 0;
  S.skus.forEach(s => {
    if (!S.aoCfg[s.sku]) S.aoCfg[s.sku] = {};
    if (lt) S.aoCfg[s.sku].leadTime = parseInt(lt);
    if (ss) S.aoCfg[s.sku].safety = parseInt(ss);
    if (cov) S.aoCfg[s.sku].coverageDays = parseInt(cov);
    if (svc) S.aoCfg[s.sku].serviceFactor = parseFloat(svc);
    if (lt || ss || cov || svc) S.aoCfg[s.sku]._manual = true;
    count++;
  });

  const changes = [];
  if (lt) changes.push(`LT=${lt}`);
  if (ss) changes.push(`SS=${ss}`);
  if (cov) changes.push(`Cov=${cov}`);
  if (svc) changes.push(`Svc=${svc}`);
  addAuditLog('auto', 'Bulk ALL', `Áp dụng ${changes.join(', ')} cho ${count} SKU`);
  saveState();
  toast(`✓ Đã áp dụng cho ${count} SKU`, 'success');
  aoOpenSettingsModal();
}

// Áp dụng pack rules tự động dựa trên Nhóm hàng (port chuẩn từ NCC v2.73)
function aoApplyPackRules() {
  if (!S.aoCfg) S.aoCfg = {};
  let thungCount = 0, leCount = 0;
  S.skus.forEach(s => {
    const rule = aoDetectPackRule(s.cat, s.name);
    // Chỉ apply nếu chưa có config manual
    if (!S.aoCfg[s.sku] || !S.aoCfg[s.sku]._manual) {
      if (rule.group === 'thùng') {
        S.aoCfg[s.sku] = {
          orderMultiple: rule.orderMultiple,
          minOrder: rule.minOrder,
          _manual: false,
          _label: 'Thùng ' + rule.orderMultiple,
        };
        thungCount++;
      } else {
        leCount++;
      }
    }
  });
  addAuditLog('auto', 'AO_PACK', `Áp dụng pack rules: ${thungCount} SKU nhóm thùng, ${leCount} SKU nhóm lẻ`);
  saveState();
  toast(`✓ Đã áp dụng: ${thungCount} thùng · ${leCount} lẻ (giữ nguyên SKU đã set manual)`, 'success');
  aoOpenSettingsModal();
}

// Khởi tạo lại AO_DEFAULT từ S.aoSettings nếu có
function aoApplySettings() {
  if (S.aoSettings) {
    if (S.aoSettings.leadTime !== undefined) AO_DEFAULT.leadTime = S.aoSettings.leadTime;
    if (S.aoSettings.safety !== undefined) AO_DEFAULT.safety = S.aoSettings.safety;
    if (S.aoSettings.coverageDays !== undefined) AO_DEFAULT.coverageDays = S.aoSettings.coverageDays;
    if (S.aoSettings.serviceFactor !== undefined) AO_DEFAULT.serviceFactor = S.aoSettings.serviceFactor;
  }
}

// ============================================================
// LỊCH GIAO - ĐẶT HÀNG
// Hiển thị 7 ngày trong tuần, mỗi ngày có:
//  • NCC cần ĐẶT (orderDays match weekday hôm đó)
//  • PO sẽ NHẬN (PO sent với expected date trùng ngày đó)
// ============================================================
let scheduleWeekOffset = 0; // 0 = tuần này, 1 = tuần sau, -1 = tuần trước
const VN_DAYS_FULL = ['Chủ nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
const VN_DAYS_SHORT = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];

function getWeekStart(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offset * 7);
  const dow = d.getDay();
  const diff = dow === 0 ? -6 : 1 - dow; // T2 là đầu tuần
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function getWeekDays(offset = 0) {
  const start = getWeekStart(offset);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    return d;
  });
}

function renderSchedule() {
  const days = getWeekDays(scheduleWeekOffset);
  const todayKey = todayStr();
  const c = document.getElementById('content');

  // Tính cho mỗi ngày: NCC đặt + PO nhận
  const dayData = days.map(d => {
    const dKey = d.toISOString().slice(0, 10);
    const dow = d.getDay();
    // NCC đặt hôm đó (orderDays match)
    const ordersToPlace = S.suppliers.filter(n => n.orderDays.includes(dow));
    // PO sẽ về hôm đó (sent/partial + expected = dKey)
    const posIncoming = S.pos.filter(p => (p.status === 'sent' || p.status === 'partial') && p.expected === dKey);
    return { date: d, dKey, dow, isToday: dKey === todayKey, isPast: dKey < todayKey, ordersToPlace, posIncoming };
  });

  const todayIdx = dayData.findIndex(d => d.isToday);
  const todayDay = todayIdx >= 0 ? dayData[todayIdx] : null;

  // KPI
  const todayPlaceCount = todayDay ? todayDay.ordersToPlace.length : 0;
  const todayReceiveCount = todayDay ? todayDay.posIncoming.length : 0;
  const weekPosCount = dayData.reduce((s,d) => s + d.posIncoming.length, 0);
  const overdueCount = S.pos.filter(p => (p.status === 'sent' || p.status === 'partial') && p.expected < todayKey).length;

  // Bảng NCC × thứ
  const todayDow = new Date().getDay();

  // Timeline 14 ngày tới
  const next14Days = [];
  for (let i = 0; i < 14; i++) {
    const d = new Date(); d.setDate(d.getDate() + i);
    const dKey = d.toISOString().slice(0, 10);
    const dow = d.getDay();
    const orders = S.suppliers.filter(n => n.orderDays.includes(dow));
    const incoming = S.pos.filter(p => (p.status === 'sent' || p.status === 'partial') && p.expected === dKey);
    if (orders.length > 0 || incoming.length > 0) next14Days.push({ date: d, dKey, dow, orders, incoming });
  }

  c.innerHTML = `
    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi-card warn">
        <div class="kpi-label">Cần đặt hôm nay</div>
        <div class="kpi-value">${todayPlaceCount}</div>
        <div class="kpi-sub">NCC theo lịch ${VN_DAYS_SHORT[todayDow]}</div>
      </div>
      <div class="kpi-card success">
        <div class="kpi-label">Nhận hàng hôm nay</div>
        <div class="kpi-value">${todayReceiveCount}</div>
        <div class="kpi-sub">PO sẽ về</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">PO trong tuần</div>
        <div class="kpi-value">${weekPosCount}</div>
        <div class="kpi-sub">7 ngày tuần ${scheduleWeekOffset === 0 ? 'này' : scheduleWeekOffset > 0 ? 'sau' : 'trước'}</div>
      </div>
      <div class="kpi-card danger">
        <div class="kpi-label">PO quá hạn giao</div>
        <div class="kpi-value">${overdueCount}</div>
        <div class="kpi-sub">${overdueCount > 0 ? 'Liên hệ NCC ngay' : 'Đúng tiến độ'}</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Lịch tuần
          <small>${days[0].toLocaleDateString('vi-VN', {day:'2-digit',month:'2-digit'})} → ${days[6].toLocaleDateString('vi-VN', {day:'2-digit',month:'2-digit',year:'numeric'})}</small>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm" onclick="scheduleWeekOffset--; renderSchedule()">← Tuần trước</button>
          <button class="btn btn-sm ${scheduleWeekOffset === 0 ? 'btn-primary' : ''}" onclick="scheduleWeekOffset=0; renderSchedule()">Tuần này</button>
          <button class="btn btn-sm" onclick="scheduleWeekOffset++; renderSchedule()">Tuần sau →</button>
        </div>
      </div>
      <div class="panel-body" style="padding:0">
        <div class="schedule-grid">
          ${dayData.map((d, i) => `
            <div class="sch-day ${d.isToday ? 'today' : ''} ${d.isPast ? 'past' : ''} ${d.dow === 0 ? 'sunday' : ''}">
              <div class="sch-day-head">
                <strong>${VN_DAYS_FULL[d.dow]}</strong>
                <span class="sch-date">${d.date.getDate()}/${d.date.getMonth()+1}</span>
              </div>
              <div class="sch-day-body">
                ${d.ordersToPlace.length > 0 ? `
                  <div class="sch-section sch-place">
                    <div class="sch-section-label">📤 ĐẶT (${d.ordersToPlace.length})</div>
                    ${d.ordersToPlace.map(n => `
                      <div class="sch-item place" onclick="quickPOForNCC('${n.id}')" title="Click để xem Auto Order cho ${n.name}">
                        <span class="sch-item-dot"></span>
                        <span>${n.short}</span>
                        <small>+${n.leadDays}d</small>
                      </div>
                    `).join('')}
                  </div>
                ` : ''}
                ${d.posIncoming.length > 0 ? `
                  <div class="sch-section sch-receive">
                    <div class="sch-section-label">📦 NHẬN (${d.posIncoming.length})</div>
                    ${d.posIncoming.map(p => {
                      const ncc = findNcc(p.ncc);
                      const total = p.items.reduce((s,it)=>s+it.qty*it.cost, 0);
                      return `<div class="sch-item receive" onclick="event.stopPropagation();viewPO(this.dataset.id)" data-id="${p.id}" title="${fmtVND(total)}đ · ${p.items.length} SKU">
                        <span class="sch-item-dot"></span>
                        <span>${ncc?.short || p.ncc}</span>
                        <small class="mono">${p.id.slice(2)}</small>
                      </div>`;
                    }).join('')}
                  </div>
                ` : ''}
                ${d.ordersToPlace.length === 0 && d.posIncoming.length === 0 ? `
                  <div class="sch-empty">—</div>

              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    ${todayDay && (todayDay.ordersToPlace.length > 0 || todayDay.posIncoming.length > 0) ? `
      <div class="panel" style="border-left:3px solid var(--primary)">
        <div class="panel-head" style="background:var(--primary-soft)">
          <div class="panel-title" style="color:var(--primary-dark)">📌 Việc cần làm hôm nay (${VN_DAYS_FULL[new Date().getDay()]} · ${fmtDate(todayKey)})</div>
        </div>
        <div class="panel-body">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div>
              <h4 style="font-size:13px;margin-bottom:8px;color:var(--warn)">📤 Cần đặt cho ${todayDay.ordersToPlace.length} NCC</h4>
              ${todayDay.ordersToPlace.length === 0 ? `<div style="color:var(--text-3);font-size:12px;padding:10px">Không có NCC nào cần đặt hôm nay</div>` : `
                <div style="display:flex;flex-direction:column;gap:6px">
                  ${todayDay.ordersToPlace.map(n => `
                    <div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface-2);border-radius:6px">
                      <div style="flex:1">
                        <strong style="font-size:13px">${n.name}</strong>

                      </div>
                      <button class="btn btn-sm btn-primary" onclick="quickPOForNCC('${n.id}')">Đặt ngay →</button>
                    </div>
                  `).join('')}
                </div>
              `}
            </div>
            <div>
              <h4 style="font-size:13px;margin-bottom:8px;color:var(--success)">📦 Nhận hàng hôm nay (${todayDay.posIncoming.length})</h4>
              ${todayDay.posIncoming.length === 0 ? `<div style="color:var(--text-3);font-size:12px;padding:10px">Không có PO nào về hôm nay</div>` : `
                <div style="display:flex;flex-direction:column;gap:6px">

                      <div style="flex:1">

                    </div>`;

                </div>
              `}
            </div>
          </div>
        </div>
      </div>

    <div class="panel">
      <div class="panel-head">

      </div>

    </div>

    ${next14Days.length > 0 ? `
      <div class="panel">
        <div class="panel-head"><div class="panel-title">Timeline 14 ngày tới</div></div>
        <div class="panel-body flush">
          <table>
            <thead><tr><th>Ngày</th><th>Thứ</th><th>📤 Đặt cho NCC</th><th>📦 Nhận PO</th></tr></thead>
            <tbody>${next14Days.map(d => `
              <tr style="${d.dKey === todayKey ? 'background:var(--primary-soft)' : ''}">
                <td><strong>${fmtDate(d.dKey)}</strong>${d.dKey === todayKey ? ' <span class="tag info">Hôm nay</span>' : ''}</td>
                <td><span class="tag">${VN_DAYS_FULL[d.dow]}</span></td>
                <td>${d.orders.length === 0 ? '<span style="color:var(--text-3)">—</span>' : d.orders.map(n => `<span class="tag warn" style="margin-right:3px;cursor:pointer" onclick="quickPOForNCC('${n.id}')">${n.short}</span>`).join('')}</td>
                <td>${d.incoming.length === 0 ? '<span style="color:var(--text-3)">—</span>' : d.incoming.map(p => {
                  const ncc = findNcc(p.ncc);
                  return `<span class="tag ok" style="margin-right:3px;cursor:pointer" onclick="event.stopPropagation();viewPO(this.dataset.id)" data-id="${p.id}">${p.id} · ${ncc?.short}</span>`;
                }).join('')}</td>
              </tr>
            `).join('')}</tbody>
          </table>
        </div>
      </div>
    ` : ''}
  `;
}

function quickPOForNCC(nccId) {
  const oldFilter = aoNCCFilter;
  aoNCCFilter = 'all';
  setTab('autoorder');
  setTimeout(() => {
    const el = document.querySelector(`[onclick="createPOFromAuto('${nccId}')"]`);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.animation = 'pulse-attention 1s ease 2';
    }
  }, 100);
}

// ============================================================
// ĐỐI CHIẾU KẾ TOÁN - chuẩn 100% theo file tham chiếu
// Timeline 5 bước: Nhận VL → KT xử lý → Duyệt giá → Hạch toán → Thanh toán
// 14 cột: STT/SKU/Tên/SL HĐ/SL nhận/Lệch SL/Tặng/Đơn giá HĐ/CK%/VAT/Giá trước/Giá thực/Δ giá/Trạng thái
// Bút toán: Nợ 156 / Nợ 1331 / Có 331
// ============================================================
let accFilter = 'pending'; // pending | variance | done | all

function renderAccounting() {
  let list = S.pos.filter(p => p.status === 'received' || p.status === 'partial');
  list.forEach(po => {
    po._variances = po.items.reduce((s, it) => {
      if (!it.recv) return s;
      const change = calcCostChange(it);
      const qtyDiff = (it.recv || 0) !== it.qty;
      const claimed = it.status === 'qty_short_claimed';
      return s + (Math.abs(change.pct) > 1 ? 1 : 0) + (qtyDiff && !claimed ? 1 : 0);
    }, 0);
    po._isAccDone = !!po.accDone;
    po._calc = calcPO(po);
    po._hasExtras = (po.orderDiscountAmount > 0) || (po.shippingFee > 0) || po._calc.totalGifts > 0;
  });

  if (accFilter === 'pending') list = list.filter(p => !p._isAccDone);
  else if (accFilter === 'variance') list = list.filter(p => !p._isAccDone && p._variances > 0);
  else if (accFilter === 'done') list = list.filter(p => p._isAccDone);

  const counts = {
    pending: S.pos.filter(p => (p.status==='received'||p.status==='partial') && !p.accDone).length,
    variance: S.pos.filter(p => (p.status==='received'||p.status==='partial') && !p.accDone && p._variances > 0).length,
    done: S.pos.filter(p => p.accDone).length,
    all: S.pos.filter(p => p.status==='received'||p.status==='partial').length,
  };

  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="banner banner-info" style="margin-bottom:14px">
      📋 <strong>Đối chiếu 3 chiều</strong>: PO đã đặt ↔ Phiếu nhận thực tế ↔ Hóa đơn VAT NCC. Kế toán review giá lệch, SL lệch, sau đó hạch toán → công nợ chính xác.
    </div>

    <div class="toolbar">
      <button class="btn ${accFilter==='pending'?'btn-primary':''}" onclick="accFilter='pending';renderAccounting()">Chờ kế toán (${counts.pending})</button>
      <button class="btn ${accFilter==='variance'?'btn-primary':''}" onclick="accFilter='variance';renderAccounting()">Có lệch (${counts.variance})</button>
      <button class="btn ${accFilter==='done'?'btn-primary':''}" onclick="accFilter='done';renderAccounting()">Đã hạch toán (${counts.done})</button>
      <button class="btn ${accFilter==='all'?'btn-primary':''}" onclick="accFilter='all';renderAccounting()">Tất cả (${counts.all})</button>
    </div>

    <div class="panel">
      <div class="panel-body flush">
        ${list.length === 0 ? `<div style="padding:40px;text-align:center;color:var(--text-3);font-size:13px">Không có đơn nào.</div>` : `
          <table>
            <thead><tr>
              <th class="stt">STT</th><th>Mã đơn</th><th>NCC</th><th>Cửa hàng</th>
              <th>Ngày nhận</th><th class="num">Tổng thanh toán</th>
              <th>Ghi chú</th><th>Trạng thái</th><th></th>
            </tr></thead>
            <tbody>${list.map((p, i) => {
              const ncc = findNcc(p.ncc);
              const br = BRANCHES.find(b => b.id === p.branch);
              const stPill = p.accDone ? '<span class="pill pill-success">Đã hạch toán</span>' :
                             p._variances > 0 ? '<span class="pill pill-warning">Có lệch</span>' :
                             '<span class="pill pill-warning">Chờ kế toán</span>';
              return `<tr style="cursor:pointer" onclick="openAccountingDetail('${p.id}')">
                <td class="stt">${i+1}</td>
                <td><strong class="mono">${p.id}</strong></td>
                <td>${ncc?.name}</td>
                <td>${br?.name}</td>
                <td class="mono" style="font-size:12px">${p.recvAt?fmtDate(p.recvAt):'—'}</td>
                <td class="num"><strong>${fmtVND(p._calc.grandTotal)}đ</strong></td>
                <td>${p._hasExtras ? '<span class="pill pill-info">CK / KM</span>' : '—'}</td>
                <td>${stPill}</td>
                <td><button class="btn btn-sm" onclick="event.stopPropagation();openAccountingDetail('${p.id}')">Mở →</button></td>
              </tr>`;
            }).join('')}</tbody>
          </table>
        `}
      </div>
    </div>
  `;
}

function openAccountingDetail(poId) {
  const po = S.pos.find(p => p.id === poId);
  if (!po) return;
  const ncc = findNcc(po.ncc);
  const br = BRANCHES.find(b => b.id === po.branch);

  // Init items với defaults
  po.items.forEach(it => {
    if (it.costInvoice == null) it.costInvoice = it.cost;
    if (it.giftQty == null) it.giftQty = 0;
    if (it.discountPct == null) it.discountPct = 0;
    const sku = findSku(it.sku);
    if (it.vatRate == null) it.vatRate = sku?.vat || 0.10;
    if (it.recv == null) it.recv = 0;
  });
  if (po.shippingFee == null) po.shippingFee = 0;
  if (po.orderDiscountAmount == null) po.orderDiscountAmount = 0;

  const calc = calcPO(po);

  // Phân tích thay đổi giá
  const changes = po.items.map(it => ({ it, change: calcCostChange(it) }));
  const upCount = changes.filter(c => c.change.direction === 'up' && Math.abs(c.change.pct) > 1).length;
  const downCount = changes.filter(c => c.change.direction === 'down' && Math.abs(c.change.pct) > 1).length;
  const sameCount = changes.length - upCount - downCount;

  // Bút toán
  const accountHang = calc.sumNet - calc.orderDiscount + calc.shippingFee;
  const accountVAT = calc.sumVAT;
  const accountPay = calc.grandTotal;

  // Vấn đề
  const qtyIssues = po.items.filter(it => {
    if (it.status === 'qty_short_claimed') return false;
    return (it.recv || 0) < it.qty;
  }).length;
  const priceUpItems = po.items.filter(it => {
    const ch = calcCostChange(it);
    return ch.direction === 'up' && Math.abs(ch.pct) > 1;
  });
  const priceUpCount = priceUpItems.length;
  const hasIssues = qtyIssues > 0;

  const itemRows = po.items.map((it, i) => {
    const sku = findSku(it.sku);
    const lineCalc = calcLine(it);
    const change = calcCostChange(it);
    const qtyDiff = (it.recv || 0) - it.qty;

    // Status pill
    let statusPill;
    if (it.status === 'qty_short_claimed') statusPill = '<span class="pill pill-info">Đã claim NCC</span>';
    else if (qtyDiff < 0) statusPill = `<span class="pill pill-warning">Thiếu ${Math.abs(qtyDiff)}</span>`;
    else if (change.direction === 'up' && Math.abs(change.pct) > 1) statusPill = `<span class="pill pill-danger">Giá thực ↑${change.pct.toFixed(1)}%</span>`;
    else if (change.direction === 'down' && Math.abs(change.pct) > 1) statusPill = `<span class="pill pill-success">Giá thực ↓${Math.abs(change.pct).toFixed(1)}%</span>`;
    else statusPill = '<span class="pill pill-success">Khớp</span>';

    // Δ% display
    let deltaCell;
    if (change.direction === 'up') deltaCell = `<td class="num diff-up" style="font-weight:500">↑${change.pct.toFixed(1)}%</td>`;
    else if (change.direction === 'down') deltaCell = `<td class="num" style="color:var(--success);font-weight:500">↓${Math.abs(change.pct).toFixed(1)}%</td>`;
    else deltaCell = `<td class="num" style="color:var(--text-3)">≈ 0%</td>`;

    // Lệch SL cell
    let qtyDiffCell;
    if (qtyDiff === 0) qtyDiffCell = `<td class="num" style="color:var(--success);font-weight:500">✓</td>`;
    else if (qtyDiff < 0) qtyDiffCell = `<td class="num" style="color:var(--warn);font-weight:600">−${Math.abs(qtyDiff)}</td>`;
    else qtyDiffCell = `<td class="num" style="color:var(--primary);font-weight:600">+${qtyDiff}</td>`;

    return `<tr>
      <td class="stt">${i+1}</td>
      <td class="sku-cell">${it.sku}</td>
      <td style="font-size:12px">${sku?.name || '?'}</td>
      <td class="num" style="font-size:11px;color:var(--text-3)">${it.qty}</td>
      <td class="num"><input type="number" value="${it.recv || 0}" class="cell-input qty" onchange="accUpdateField('${po.id}','${it.sku}','recv',this.value)"></td>
      ${qtyDiffCell}
      <td class="num"><input type="number" value="${it.giftQty}" class="cell-input gift" min="0" onchange="accUpdateField('${po.id}','${it.sku}','giftQty',this.value)"></td>
      <td class="num"><input type="number" value="${it.costInvoice}" class="cell-input cell-input-wide" onchange="accUpdateField('${po.id}','${it.sku}','costInvoice',this.value)"></td>
      <td class="num"><input type="number" value="${it.discountPct}" class="cell-input pct" min="0" max="100" step="0.5" onchange="accUpdateField('${po.id}','${it.sku}','discountPct',this.value)"></td>
      <td><select onchange="accUpdateField('${po.id}','${it.sku}','vatRate',this.value)" class="cell-input" style="width:54px;text-align:center">
        <option value="0" ${it.vatRate===0?'selected':''}>0%</option>
        <option value="0.05" ${it.vatRate===0.05?'selected':''}>5%</option>
        <option value="0.08" ${it.vatRate===0.08?'selected':''}>8%</option>
        <option value="0.10" ${it.vatRate===0.10?'selected':''}>10%</option>
      </select></td>
      <td class="num" style="font-size:11px;color:var(--text-3)">${fmtVND(change.previous)}</td>
      <td class="num" style="font-weight:600;color:var(--primary-dark)">${fmtVND(lineCalc.effectiveCost)}</td>
      ${deltaCell}
      <td>${statusPill}</td>
    </tr>`;
  }).join('');

  let bannerHTML = '';
  if (qtyIssues > 0) {
    bannerHTML += `<div class="banner banner-warning">⚠ ${qtyIssues} dòng thiếu SL — hãy "Tạo claim NCC" trước khi hạch toán.</div>`;
  }
  if (priceUpCount > 0) {
    bannerHTML += `<div class="banner banner-info">ℹ ${priceUpCount} dòng có giá thực tăng > 1%. Khi hạch toán, các SKU này sẽ được tự động đưa vào tab <b>Duyệt giá bán</b> để phụ trách mua xem xét.</div>`;
  }

  openModal(`Đối chiếu kế toán · ${po.id}`, `
    <div class="timeline">
      <div class="tl-step done">1. Nhận vật lý</div>
      <div class="tl-step ${!po.accDone ? 'current' : 'done'}">2. Kế toán xử lý</div>
      <div class="tl-step">3. Duyệt giá lệch</div>
      <div class="tl-step ${po.accDone ? 'current' : ''}">4. Hạch toán</div>
      <div class="tl-step">5. Thanh toán NCC</div>
    </div>

    <div class="detail-grid">
      <div><span class="lbl">Người nhận hàng</span><span class="val">${po.receivedBy || '—'}</span></div>
      <div><span class="lbl">MST NCC</span><span class="val">${ncc?.mst || '—'}</span></div>
      <div><span class="lbl">Số hóa đơn VAT</span><span class="val">${po.invoiceNo || '— chưa có —'}</span></div>
      <div><span class="lbl">Ngày hóa đơn</span><span class="val">${po.invoiceDate?fmtDate(po.invoiceDate):'—'}</span></div>
      <div><span class="lbl">Hạn thanh toán</span><span class="val">${ncc?.paymentTerms || 30} ngày</span></div>
      <div><span class="lbl">Kế toán xử lý</span><span class="val">anh Kay</span></div>
    </div>

    <div class="sec-label">Hóa đơn VAT đầu vào</div>
    <div style="background:var(--surface-2);border:1.5px dashed var(--border-strong);border-radius:8px;padding:14px">
      <div class="form-row" style="gap:8px;flex-wrap:wrap">
        <label>Số HĐ:</label>
        <input class="cell-input cell-input-wide" id="accInvNo" value="${po.invoiceNo||''}" onchange="po=S.pos.find(p=>p.id==='${po.id}'); po.invoiceNo=this.value; saveState()">
        <label style="margin-left:8px">Ngày:</label>
        <input class="cell-input cell-input-wide" type="date" id="accInvDate" value="${po.invoiceDate||''}" onchange="po=S.pos.find(p=>p.id==='${po.id}'); po.invoiceDate=this.value; saveState()">
        <span style="margin-left:auto;font-size:11px;color:var(--text-3)">App thật sẽ tự đọc XML e-invoice từ VNPT/Viettel</span>
      </div>
    </div>

    <div style="background:var(--surface-2);border-radius:8px;padding:12px 14px;margin:12px 0;display:flex;gap:18px;flex-wrap:wrap;font-size:13px">
      <div style="font-weight:500;color:var(--primary-dark)">Phân tích giá nhập thực tế:</div>
      ${upCount > 0 ? `<div><span class="pill pill-danger">${upCount} TĂNG</span> <span style="color:var(--text-2)">cần xem xét tăng giá bán</span></div>` : ''}
      ${downCount > 0 ? `<div><span class="pill pill-success">${downCount} GIẢM</span> <span style="color:var(--text-2)">margin cải thiện</span></div>` : ''}
      ${sameCount > 0 ? `<div><span class="pill pill-muted">${sameCount} không đổi</span></div>` : ''}
    </div>

    <div class="sec-label">Chi tiết dòng hàng (giá thực tự fix theo CK + tặng kèm)</div>
    <div style="overflow-x:auto;border:1px solid var(--border);border-radius:6px">
      <table style="font-size:12px;min-width:1200px;margin:0">
        <thead><tr>
          <th class="stt">STT</th>
          <th>Mã SKU</th>
          <th>Tên SP</th>
          <th class="num" title="SL hóa đơn NCC ghi">SL HĐ</th>
          <th class="num" title="SL thực nhận">SL nhận</th>
          <th class="num" title="Lệch SL = SL nhận − SL hóa đơn">Lệch SL</th>
          <th class="num" title="Hàng tặng kèm">Tặng</th>
          <th class="num">Đơn giá HĐ</th>
          <th class="num" title="Chiết khấu trên dòng (%)">CK %</th>
          <th class="num">VAT</th>
          <th class="num" title="Giá nhập trước đó">Giá trước</th>
          <th class="num" title="Giá nhập thực tế = (tiền hàng sau CK) / (SL nhận + Tặng)">Giá thực</th>
          <th class="num" title="So với giá nhập trước">Δ giá</th>
          <th>Trạng thái</th>
        </tr></thead>
        <tbody>${itemRows}</tbody>
      </table>
    </div>

    <div class="sec-label">Chiết khấu / Phí toàn đơn</div>
    <div class="form-row" style="background:var(--surface-2);padding:10px 14px;border-radius:8px">
      <label>Phí vận chuyển:</label>
      <input type="number" value="${po.shippingFee}" onchange="accUpdateOrder('${po.id}','shippingFee',this.value)" class="cell-input cell-input-wide">
      <span style="margin:0 14px;color:var(--text-3)">|</span>
      <label>Chiết khấu thương mại:</label>
      <input type="number" value="${po.orderDiscountAmount}" onchange="accUpdateOrder('${po.id}','orderDiscountAmount',this.value)" class="cell-input cell-input-wide">
      ${po.orderDiscountNote ? `<span style="font-size:11px;color:var(--text-3);margin-left:8px">${po.orderDiscountNote}</span>` : ''}
    </div>

    <div class="sec-label">Tổng kết tiền</div>
    <div class="journal" style="font-size:13px;max-width:520px;margin-left:auto">
      <div class="j-row"><span>Cộng tiền hàng (SL × đơn giá)</span><span>${fmtVND(calc.sumSubtotal)}đ</span></div>
      ${calc.sumDiscount > 0 ? `<div class="j-row" style="color:var(--warn)"><span>− Chiết khấu trên dòng</span><span>−${fmtVND(calc.sumDiscount)}đ</span></div>` : ''}
      <div class="j-row"><span>Tiền hàng sau CK dòng</span><span>${fmtVND(calc.sumNet)}đ</span></div>
      <div class="j-row"><span>Tiền VAT</span><span>${fmtVND(calc.sumVAT)}đ</span></div>
      ${calc.shippingFee > 0 ? `<div class="j-row"><span>+ Phí vận chuyển</span><span>+${fmtVND(calc.shippingFee)}đ</span></div>` : ''}
      ${calc.orderDiscount > 0 ? `<div class="j-row" style="color:var(--warn)"><span>− Chiết khấu thương mại toàn đơn</span><span>−${fmtVND(calc.orderDiscount)}đ</span></div>` : ''}
      <div class="j-row total"><span>Tổng thanh toán cho NCC</span><span style="color:var(--primary-dark);font-size:14px">${fmtVND(calc.grandTotal)}đ</span></div>
      ${calc.totalGifts > 0 ? `<div class="j-row" style="margin-top:8px;color:var(--success);font-size:11px"><span>+ Hàng tặng kèm (giảm giá nhập thực)</span><span>${calc.totalGifts} sản phẩm</span></div>` : ''}
    </div>

    <div class="sec-label" style="margin-top:18px">Bút toán dự kiến</div>
    <div class="journal" style="max-width:520px;margin-left:auto">
      <div class="j-row"><span>Nợ 156 — Hàng hóa</span><span>${fmtVND(accountHang)}đ</span></div>
      <div class="j-row"><span>Nợ 1331 — VAT đầu vào</span><span>${fmtVND(accountVAT)}đ</span></div>
      <div class="j-row total"><span>Có 331 — Phải trả ${ncc?.name}</span><span>${fmtVND(accountPay)}đ</span></div>
    </div>
    <div style="font-size:11px;color:var(--text-3);margin-top:6px;text-align:right;max-width:520px;margin-left:auto">
      Tồn kho cập nhật theo <b>giá nhập thực tế</b> mỗi SKU (chia đều tiền hàng cho SL mua + tặng).
    </div>

    ${bannerHTML}
  `, `
    <button class="btn" onclick="closeModal()">Đóng</button>
    ${qtyIssues > 0 ? `<button class="btn btn-warn" onclick="accCreateClaim('${po.id}')">Tạo claim NCC</button>` : ''}
    ${!po.accDone ? `<button class="btn btn-primary" ${hasIssues ? 'disabled' : ''} onclick="accPost('${po.id}')">${hasIssues ? 'Hạch toán (xử lý lệch SL trước)' : (priceUpCount > 0 ? `Hạch toán + đẩy ${priceUpCount} SKU sang Duyệt giá` : 'Hạch toán')}</button>` : ''}
  `, 'lg');
}

function accUpdateField(poId, sku, field, value) {
  const po = S.pos.find(p => p.id === poId);
  const it = po.items.find(i => i.sku === sku);
  if (!it) return;
  if (field === 'recv' || field === 'giftQty') it[field] = parseInt(value) || 0;
  else if (field === 'discountPct' || field === 'vatRate' || field === 'costInvoice') it[field] = parseFloat(value) || 0;
  else it[field] = value;
  saveState();
  openAccountingDetail(poId);
}

function accUpdateOrder(poId, field, value) {
  const po = S.pos.find(p => p.id === poId);
  if (!po) return;
  po[field] = parseFloat(value) || 0;
  saveState();
  openAccountingDetail(poId);
}

function accCreateClaim(poId) {
  const po = S.pos.find(p => p.id === poId);
  const qtyShortItems = po.items.filter(it => (it.recv || 0) < it.qty && it.status !== 'qty_short_claimed');
  const claimAmount = qtyShortItems.reduce((s, it) => s + (it.qty - (it.recv || 0)) * (it.costInvoice || it.cost), 0);
  qtyShortItems.forEach(it => { it.status = 'qty_short_claimed'; });
  addAuditLog('auto', poId, `Tạo claim giảm trừ công nợ NCC: ${fmtVND(claimAmount)}đ cho ${qtyShortItems.length} dòng thiếu SL`);
  saveState();
  toast(`Đã tạo claim ${fmtVND(claimAmount)}đ giảm công nợ NCC`, 'warn');
  closeModal();
  openAccountingDetail(poId);
}

function accPost(poId) {
  const po = S.pos.find(p => p.id === poId);
  let proposalsCreated = 0;

  po.items.forEach(it => {
    const sku = findSku(it.sku);
    if (!sku) return;
    const lineCalc = calcLine(it);
    const change = calcCostChange(it);

    // Tạo priceProposal nếu giá thực tăng > 1%
    if (change.direction === 'up' && Math.abs(change.pct) > 1) {
      if (!S.priceProposals.find(pp => pp.sku === it.sku && pp.status !== 'applied')) {
        const oldMargin = calcMarginPct(sku.cost, sku.price);
        const newSellRaw = lineCalc.effectiveCost / (1 - oldMargin);
        const newSell = roundPrice(newSellRaw, '500');
        S.priceProposals.unshift({
          sku: it.sku,
          costOld: change.previous,
          costNew: lineCalc.effectiveCost,
          sellOld: sku.price,
          sellNew: sku.kvi || sku.promo ? sku.price : newSell,
          isKVI: sku.kvi || false,
          isPromo: sku.promo || false,
          status: sku.kvi ? 'kvi' : (sku.promo ? 'promo' : 'auto'),
          selected: !sku.kvi && !sku.promo,
          fromPO: po.id,
          createdAt: nowISO(),
        });
        proposalsCreated++;
      }
    }
    // Cập nhật giá vốn = giá thực tế (cả tăng lẫn giảm)
    sku.cost = lineCalc.effectiveCost;
  });

  po.accDone = true;
  po.accDoneAt = nowISO();

  // Cập nhật công nợ chính xác
  const calc = calcPO(po);
  const payable = S.payables.find(p => p.poId === po.id);
  if (payable) {
    payable.amount = calc.grandTotal;
    payable.balance = calc.grandTotal - payable.paid;
    payable.isTemp = false;
  }

  const msg = proposalsCreated > 0
    ? `Hạch toán xong + đẩy ${proposalsCreated} SKU sang tab "Duyệt giá bán"`
    : `Hạch toán hoàn tất — cập nhật giá nhập thực tế cho ${po.items.length} SKU`;
  addAuditLog('accounting', po.id, msg);
  saveState();
  closeModal();
  renderAccounting();
  toast(proposalsCreated > 0 ? `Hạch toán xong · ${proposalsCreated} SKU vào Duyệt giá bán` : 'Hạch toán xong — giá nhập đã cập nhật', 'success');
}

// DUYỆT GIÁ BÁN MỚI - sau khi giá nhập NCC tăng
// ============================================================
let pricingMethod = 'margin_pct'; // margin_pct | margin_abs | markup
let pricingRound = '500'; // 500 | 900 | 0
let pricingExclude = 'kvi_promo'; // kvi_promo | kvi | none

function renderPricing() {
  const proposals = S.priceProposals.filter(p => p.status === 'pending' || p.status === 'kvi' || p.status === 'promo' || p.status === 'auto');

  const c = document.getElementById('content');
  if (proposals.length === 0) {
    c.innerHTML = `
      <div class="panel" style="text-align:center;padding:60px">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" style="margin-bottom:14px"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <h3 style="font-size:16px;margin-bottom:6px">Không có đề xuất giá nào</h3>
        <p style="color:var(--text-2);font-size:13px">Khi NCC tăng giá nhập, hệ thống tự động tạo đề xuất giá bán mới ở đây</p>
      </div>
    `;
    return;
  }

  // Apply pricing method
  proposals.forEach(p => {
    const oldMargin = calcMarginPct(p.costOld, p.sellOld);
    let newSell;
    if (pricingMethod === 'margin_pct') {
      newSell = p.costNew / (1 - oldMargin);
    } else if (pricingMethod === 'margin_abs') {
      newSell = p.costNew + (p.sellOld - p.costOld);
    } else {
      const markup = p.sellOld / p.costOld;
      newSell = p.costNew * markup;
    }
    p._suggestedSell = roundPrice(newSell, pricingRound);
    p._newMargin = calcMarginPct(p.costNew, p._suggestedSell);
    p._oldMargin = oldMargin;

    // Auto exclude based on filter
    if (pricingExclude === 'kvi_promo' && (p.isKVI || p.isPromo)) p._excluded = true;
    else if (pricingExclude === 'kvi' && p.isKVI) p._excluded = true;
    else p._excluded = false;
  });

  const selectableCount = proposals.filter(p => !p._excluded).length;
  const selectedCount = proposals.filter(p => p._selected && !p._excluded).length;
  const totalImpact = proposals.filter(p => p._selected && !p._excluded).reduce((s, p) => s + (p._suggestedSell - p.sellOld), 0);

  c.innerHTML = `
    <div style="background:linear-gradient(135deg,var(--warn),#bf360c);color:#fff;padding:14px 18px;border-radius:10px;margin-bottom:16px">
      <strong style="font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:1px">💰 DUYỆT GIÁ BÁN MỚI</strong>
      <div style="font-size:12px;opacity:0.9;margin-top:4px">Khi giá nhập NCC tăng, hệ thống đề xuất giá bán mới để giữ margin. Anh review từng SKU rồi áp dụng cho POS.</div>
    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi-card warn"><div class="kpi-label">SKU đề xuất</div><div class="kpi-value">${proposals.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">Đã chọn</div><div class="kpi-value">${selectedCount}/${selectableCount}</div></div>
      <div class="kpi-card accent"><div class="kpi-label">Loại trừ tự động</div><div class="kpi-value">${proposals.filter(p=>p._excluded).length}</div><div class="kpi-sub">KVI / KM</div></div>
      <div class="kpi-card success"><div class="kpi-label">Tăng giá TB</div><div class="kpi-value">${selectedCount>0?'+'+fmtVND(Math.round(totalImpact/selectedCount)):'—'}<span style="font-size:12px;color:var(--text-3)">đ</span></div></div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Cấu hình tính giá mới</div>
      </div>
      <div class="panel-body">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
          <div class="field"><label class="field-label">Phương pháp tính</label>
            <select class="select" onchange="pricingMethod=this.value;renderPricing()">
              <option value="margin_pct" ${pricingMethod==='margin_pct'?'selected':''}>Giữ % margin (mặc định)</option>
              <option value="margin_abs" ${pricingMethod==='margin_abs'?'selected':''}>Giữ margin tuyệt đối</option>
              <option value="markup" ${pricingMethod==='markup'?'selected':''}>Markup cố định</option>
            </select>
          </div>
          <div class="field"><label class="field-label">Làm tròn giá</label>
            <select class="select" onchange="pricingRound=this.value;renderPricing()">
              <option value="500" ${pricingRound==='500'?'selected':''}>...500₫ (10K, 10K500, 11K)</option>
              <option value="900" ${pricingRound==='900'?'selected':''}>...900₫ (9K900, 10K900)</option>
              <option value="0" ${pricingRound==='0'?'selected':''}>...000₫ (làm tròn nghìn)</option>
            </select>
          </div>
          <div class="field"><label class="field-label">Loại trừ tự động</label>
            <select class="select" onchange="pricingExclude=this.value;renderPricing()">
              <option value="kvi_promo" ${pricingExclude==='kvi_promo'?'selected':''}>KVI + đang KM</option>
              <option value="kvi" ${pricingExclude==='kvi'?'selected':''}>Chỉ KVI</option>
              <option value="none" ${pricingExclude==='none'?'selected':''}>Không loại trừ</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn btn-sm" onclick="pricingSelectAll()">☑ Chọn tất cả (chỉ SKU không loại trừ)</button>
      <button class="btn btn-sm" onclick="pricingDeselectAll()">☐ Bỏ chọn</button>
      <span style="margin-left:auto;font-size:12px;color:var(--text-2)"><strong>${selectedCount}</strong>/${selectableCount} SKU đã chọn để áp dụng</span>
      <button class="btn btn-primary" onclick="applyPricing()" ${selectedCount === 0 ? 'disabled' : ''}>✓ Áp dụng giá đã chọn (${selectedCount})</button>
    </div>

    <div class="panel">
      <div class="panel-body flush">
        <table>
          <thead><tr>
            <th style="width:36px"></th>
            <th>SKU</th>
            <th>Sản phẩm</th>
            <th class="num">Giá nhập cũ</th>
            <th class="num">Giá nhập mới</th>
            <th class="num">Giá bán cũ</th>
            <th class="num">Giá bán đề xuất</th>
            <th class="num">Margin cũ</th>
            <th class="num">Margin mới</th>
            <th>Tag</th>
          </tr></thead>
          <tbody>${proposals.map((p, idx) => {
            const sku = findSku(p.sku);
            const tags = [];
            if (p.isKVI) tags.push('<span class="tag bad" style="font-size:10px">KVI</span>');
            if (p.isPromo) tags.push('<span class="tag warn" style="font-size:10px">KM</span>');
            const costPct = ((p.costNew - p.costOld) / p.costOld * 100).toFixed(1);
            return `<tr style="${p._excluded?'opacity:0.5;background:var(--surface-2)':''}">
              <td><input type="checkbox" ${p._selected?'checked':''} ${p._excluded?'disabled':''} onchange="S.priceProposals[${S.priceProposals.indexOf(p)}]._selected=this.checked;renderPricing()"></td>
              <td><strong class="mono" style="font-size:11px">${p.sku}</strong></td>
              <td style="font-size:12px">${sku?.name}</td>
              <td class="num mono">${fmtVND(p.costOld)}</td>
              <td class="num mono"><strong style="color:var(--danger)">${fmtVND(p.costNew)}</strong> <small style="color:var(--danger)">+${costPct}%</small></td>
              <td class="num mono">${fmtVND(p.sellOld)}</td>
              <td class="num mono"><strong style="color:var(--primary-dark)">${fmtVND(p._suggestedSell)}</strong> <small style="color:${p._suggestedSell>p.sellOld?'var(--success)':'var(--text-3)'}">${p._suggestedSell>p.sellOld?'+':''}${fmtVND(p._suggestedSell-p.sellOld)}</small></td>
              <td class="num mono">${(p._oldMargin*100).toFixed(1)}%</td>
              <td class="num mono"><strong>${(p._newMargin*100).toFixed(1)}%</strong></td>
              <td>${tags.join(' ') || ''}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>
  `;
}

function pricingSelectAll() {
  S.priceProposals.forEach(p => {
    if (p.status !== 'pending' && p.status !== 'kvi' && p.status !== 'promo') return;
    if ((pricingExclude === 'kvi_promo' && (p.isKVI || p.isPromo)) ||
        (pricingExclude === 'kvi' && p.isKVI)) {
      p._selected = false;
    } else {
      p._selected = true;
    }
  });
  renderPricing();
}

function pricingDeselectAll() {
  S.priceProposals.forEach(p => p._selected = false);
  renderPricing();
}

function applyPricing() {
  const selected = S.priceProposals.filter(p => p._selected && !p._excluded && (p.status === 'pending' || p.status === 'kvi' || p.status === 'promo' || p.status === 'auto'));
  if (selected.length === 0) { toast('Chưa chọn SKU nào', 'error'); return; }
  if (!confirm(`Áp dụng giá bán mới cho ${selected.length} SKU? Giá mới sẽ có hiệu lực ngay lập tức cho POS.`)) return;
  selected.forEach(p => {
    const sku = findSku(p.sku);
    if (sku) {
      sku.cost = p.costNew;
      sku.price = p._suggestedSell;
    }
    p.status = 'applied';
    p.appliedAt = nowISO();
    p.appliedSell = p._suggestedSell;
  });
  addAuditLog('price_proposal', `${selected.length} SKU`, `Áp dụng giá bán mới: ${selected.map(p=>p.sku).join(', ').slice(0,80)}${selected.length>5?'...':''}`);
  saveState();
  renderPricing();
  toast(`✓ Đã áp dụng giá mới cho ${selected.length} SKU · POS sẽ dùng giá mới`, 'success');
}

function selectReturnSourcePO(poId) {
  returnSourcePO = S.pos.find(p => p.id === poId);
  if (!returnSourcePO) { document.getElementById('srItems').innerHTML = ''; return; }
  returnNccCart = returnSourcePO.items.filter(it => it.recv > 0).map(it => ({ ...it, returnQty: 0 }));
  renderSrItems();
}

function renderSrItems() {
  const totalRefund = returnNccCart.reduce((s, it) => s + it.returnQty * (it.costInvoice || it.cost), 0);
  document.getElementById('srItems').innerHTML = `
    <div style="margin-top:14px;padding:10px;background:var(--primary-soft);border-radius:6px;font-size:12px;margin-bottom:10px">
      <strong>PO ${returnSourcePO.id}</strong> · ${findNcc(returnSourcePO.ncc)?.name} · CN ${returnSourcePO.branch}
    </div>
